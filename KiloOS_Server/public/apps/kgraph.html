<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .header {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .glass-panel {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .func-label {
    font-size: 18px;
    font-weight: bold;
    color: #5a8bd4;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    font-family: 'Consolas', monospace;
    font-size: 15px;
    transition: all 0.3s;
  }
  input[type="text"]:focus {
    border-color: #5a8bd4;
    box-shadow: 0 0 0 3px rgba(90, 139, 212, 0.3);
  }
  button.plot-btn {
    background: linear-gradient(135deg, #5a8bd4, #3a6baf);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(90, 139, 212, 0.4);
  }
  button.plot-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(90, 139, 212, 0.6);
  }
  button.plot-btn:active {
    transform: translateY(0);
  }
  .canvas-container {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 10px;
    min-height: 15px;
  }
</style>
</head>
<body>
  <div class="header">KGraph</div>
  <div class="glass-panel">
    <div class="input-group">
      <span class="func-label">f(x) =</span>
      <input type="text" id="funcInput" value="Math.sin(x)" placeholder="e.g. Math.sin(x) or x*x" onkeypress="handleKeyPress(event)">
      <button class="plot-btn" onclick="plotGraph()">Plot</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="canvas-container">
      <canvas id="graphCanvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    
    // Virtual coordinates: x from -10 to 10
    const RANGE_X = 10;
    const RANGE_Y = 10;
    
    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
      plotGraph();
    }
    
    window.addEventListener('resize', resizeCanvas);
    
    function drawGrid() {
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.clearRect(0, 0, w, h);
      
      // Grid lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 1;
      
      // Vertical grid
      for(let x = -RANGE_X; x <= RANGE_X; x++) {
        const px = (x + RANGE_X) / (2 * RANGE_X) * w;
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.lineTo(px, h);
        ctx.stroke();
      }
      
      // Horizontal grid
      for(let y = -RANGE_Y; y <= RANGE_Y; y++) {
        const py = h - ((y + RANGE_Y) / (2 * RANGE_Y) * h);
        ctx.beginPath();
        ctx.moveTo(0, py);
        ctx.lineTo(w, py);
        ctx.stroke();
      }
      
      // Axes
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 2;
      
      // Y axis
      ctx.beginPath();
      ctx.moveTo(w / 2, 0);
      ctx.lineTo(w / 2, h);
      ctx.stroke();
      
      // X axis
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') plotGraph();
    }
    
    function plotGraph() {
      drawGrid();
      const expr = document.getElementById('funcInput').value;
      const errBox = document.getElementById('errorMsg');
      errBox.innerText = '';
      
      if (!expr) return;
      
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.strokeStyle = '#5a8bd4';
      ctx.lineWidth = 2;
      ctx.beginPath();
      
      let first = true;
      
      // Simple and extremely naive sanitization for eval
      const safeExpr = expr.replace(/[^a-zA-Z0-9\.\+\-\*\/\(\) \bMath\.]/g, '');
      
      try {
        for (let px = 0; px <= w; px += 2) { // Step by 2 pixels for performance
          const x = (px / w) * (2 * RANGE_X) - RANGE_X;
          
          // Evaluate function
          // We use a safe-ish constructor
          const func = new Function('x', 'return ' + safeExpr + ';');
          const y = func(x);
          
          if (isNaN(y) || !isFinite(y)) {
            first = true;
            continue;
          }
          
          const py = h - ((y + RANGE_Y) / (2 * RANGE_Y) * h);
          
          if (first) {
            ctx.moveTo(px, py);
            first = false;
          } else {
            ctx.lineTo(px, py);
          }
        }
        ctx.stroke();
      } catch (e) {
        errBox.innerText = 'Invalid mathematical expression';
      }
    }
    
    // Init
    setTimeout(resizeCanvas, 100);
  </script>
</body>
</html>

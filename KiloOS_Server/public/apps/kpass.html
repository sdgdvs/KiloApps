<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .tabs {
    display: flex;
    background: #2d2d2d;
    border-bottom: 1px solid #3d3d3d;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #888;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    background: #3d3d3d;
    border-bottom: 2px solid #e74c3c;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .display {
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 24px;
    color: #e74c3c;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-all;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  button {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #555;
  }
  button.primary {
    background: #e74c3c;
    border-color: #e74c3c;
    width: 100%;
    margin-top: 10px;
  }
  button.primary:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabGen">Generator</div>
    <div class="tab" id="tabVault">Vault</div>
  </div>
  
  <div class="content" id="contentGen">
    <div class="display" id="pwdDisplay">...</div>
    <div class="controls">
      <button class="primary" id="btnGen">Generate</button>
    </div>
  </div>
  
  <div class="content" id="contentVault" style="display: none;">
    <p>Vault Logic</p>
  </div>

  <script>
    // Phase 1: Layout Scaffold
  </script>
</body>
</html>

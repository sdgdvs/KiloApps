<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #111;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .header {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
    text-align: center;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #fff;
    padding: 10px;
    border-radius: 6px;
    outline: none;
  }
  button {
    background: #5a8bd4;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }
  .todo-list {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 12px;
    overflow-y: auto;
  }
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .todo-item.completed span {
    text-decoration: line-through;
    color: #888;
  }
  .todo-text { flex: 1; }
  .delete-btn { background: #d45a5a; padding: 4px 8px; }
</style>
</head>
<body>
  <div class="header">KTodo</div>
  <div class="input-group">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
  </div>
  <div class="todo-list" id="todoList">
    <!-- Tasks go here -->
  </div>

  <script>
    // JavaScript logic will be implemented in Phase 2

    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KTask</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Tahoma', sans-serif; background: #ece9d8; user-select: none; display: flex; flex-direction: column; box-sizing: border-box; }
  .list-container { flex: 1; padding: 10px; padding-bottom: 0; }
  select { width: 100%; height: 100%; font-family: 'Tahoma', sans-serif; font-size: 13px; border: 2px inset #ccc; outline: none; }
  .buttons { display: flex; gap: 10px; padding: 10px; justify-content: space-between; }
  button { padding: 4px 10px; cursor: pointer; border: 1px solid #999; border-radius: 3px; background: linear-gradient(to bottom, #f9f9f9, #e0e0e0); }
  button:active { background: #d0d0d0; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); }
</style>
</head>
<body>
  <div class="list-container">
    <select id="tasklist" size="10"></select>
  </div>
  <div class="buttons">
    <button onclick="refresh()">Refresh</button>
    <button onclick="endTask()">End Task</button>
  </div>

  <script>
    let reqIdCounter = 0;
    
    function refresh() {
      const reqId = ++reqIdCounter;
      window.parent.postMessage({ type: 'OS_LIST_TASKS', requestId: reqId }, '*');
    }

    function endTask() {
      const select = document.getElementById('tasklist');
      if (select.selectedIndex !== -1) {
        const taskId = select.options[select.selectedIndex].value;
        const reqId = ++reqIdCounter;
        window.parent.postMessage({ type: 'OS_KILL_TASK', requestId: reqId, taskId: taskId }, '*');
        setTimeout(refresh, 50); // slight delay to let it close
      }
    }

    window.addEventListener('message', (e) => {
      if (e.data.type === 'OS_LIST_TASKS_DONE') {
        const select = document.getElementById('tasklist');
        select.innerHTML = '';
        e.data.tasks.forEach(task => {
          const opt = document.createElement('option');
          opt.value = task.id;
          opt.innerText = `[${task.id.substring(0,6)}] ${task.title}`;
          select.appendChild(opt);
        });
      }
    });

    // Initial load
    setTimeout(refresh, 100);
  </script>
</body>
</html>

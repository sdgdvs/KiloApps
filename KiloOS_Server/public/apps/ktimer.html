<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #111;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .tabs {
    display: flex;
    background: #222;
    border-bottom: 1px solid #333;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #888;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    background: #333;
    border-bottom: 2px solid #5a8bd4;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .display {
    font-family: 'Consolas', monospace;
    font-size: 48px;
    color: #5a8bd4;
    text-shadow: 0 0 10px rgba(90, 139, 212, 0.4);
    margin-bottom: 30px;
  }
  .controls {
    display: flex;
    gap: 12px;
  }
  button {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #555;
  }
  button.primary {
    background: #5a8bd4;
    border-color: #5a8bd4;
  }
  button.primary:hover {
    background: #4a7bc4;
    border-color: #4a7bc4;
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabStopwatch">Stopwatch</div>
    <div class="tab" id="tabTimer">Timer</div>
  </div>
  
  <div class="content" id="contentStopwatch">
    <div class="display">00:00:00.000</div>
    <div class="controls">
      <button class="primary">Start</button>
      <button>Lap</button>
      <button>Reset</button>
    </div>
  </div>
  
  <div class="content" id="contentTimer" style="display: none;">
    <div class="display">00:00:00</div>
    <div class="controls">
      <button class="primary">Start</button>
      <button>Reset</button>
    </div>
  </div>

  <script>
    // Phase 1: Layout Scaffold
  </script>
</body>
</html>

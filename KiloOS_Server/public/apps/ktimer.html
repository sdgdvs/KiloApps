<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTimer</title>
<style>
  :root {
    --bg-color: #111;
    --card-bg: #1a1a1a;
    --border-color: #333;
    --primary-color: #5a8bd4;
    --primary-hover: #6ba0f0;
    --text-main: #e0e0e0;
    --text-muted: #888;
    --danger-color: #e74c3c;
  }
  
  body {
    background: var(--bg-color);
    color: var(--text-main);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .tabs {
    display: flex;
    background: #181818;
    border-bottom: 1px solid var(--border-color);
  }
  
  .tab {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    outline: none;
  }

  .tab:hover, .tab:focus-visible {
    color: #fff;
    background: rgba(255, 255, 255, 0.04);
  }
  
  .tab.active {
    color: #fff;
    background: #222;
    border-bottom: 2px solid var(--primary-color);
  }

  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  .ring-container {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 25px;
  }

  .progress-ring {
    position: absolute;
    top: 0;
    left: 0;
    transform: rotate(-90deg);
  }

  .progress-ring-circle {
    transition: stroke-dashoffset 0.05s linear;
  }
  
  .display-wrapper {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 200px;
  }

  .display {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 32px;
    font-weight: bold;
    color: var(--primary-color);
    text-shadow: 0 0 15px rgba(90, 139, 212, 0.4);
    margin: 0;
    z-index: 10;
    user-select: none;
  }

  .timer-input {
    background: transparent;
    border: none;
    border-bottom: 2px solid #444;
    color: var(--primary-color);
    font-family: 'Consolas', monospace;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    width: 180px;
    outline: none;
    z-index: 10;
    transition: border-color 0.2s;
  }

  .timer-input:focus {
    border-bottom-color: var(--primary-color);
  }

  .timer-input.invalid {
    border-bottom-color: var(--danger-color);
    color: var(--danger-color);
  }
  
  .controls {
    display: flex;
    gap: 15px;
  }

  button.btn {
    background: #2a2a2a;
    color: white;
    border: 1px solid #444;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    outline: none;
  }

  button.btn:hover, button.btn:focus-visible {
    background: #333;
    border-color: #555;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
  }

  button.btn:active {
    transform: translateY(1px);
  }

  button.btn.primary {
    background: var(--primary-color);
    border-color: var(--primary-color);
    color: #000;
    box-shadow: 0 4px 15px rgba(90, 139, 212, 0.3);
  }

  button.btn.primary:hover, button.btn.primary:focus-visible {
    background: var(--primary-hover);
    border-color: var(--primary-hover);
    box-shadow: 0 6px 20px rgba(90, 139, 212, 0.4);
  }

  .laps-container {
    margin-top: 20px;
    width: 240px;
    height: 120px;
    overflow-y: auto;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    color: #aaa;
    box-sizing: border-box;
    scrollbar-width: thin;
  }

  .lap-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid #282828;
  }

  .lap-item:last-child {
    border-bottom: none;
  }

  .hint-text {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
</style>
</head>
<body>
  <div class="tabs" role="tablist" aria-label="Timer & Stopwatch Tabs">
    <button class="tab active" id="tabStopwatch" role="tab" aria-selected="true" aria-controls="contentStopwatch" tabindex="0">STOPWATCH</button>
    <button class="tab" id="tabTimer" role="tab" aria-selected="false" aria-controls="contentTimer" tabindex="-1">TIMER</button>
  </div>
  
  <!-- Stopwatch Content -->
  <main class="content" id="contentStopwatch" role="tabpanel" aria-labelledby="tabStopwatch">
    <div class="ring-container">
      <svg class="progress-ring" height="240" width="240" aria-hidden="true">
        <circle fill="transparent" stroke="#222" stroke-width="6" r="110" cx="120" cy="120" />
        <circle class="progress-ring-circle" id="swRing" fill="transparent" stroke="var(--primary-color)" stroke-width="8" stroke-linecap="round" r="110" cx="120" cy="120" stroke-dasharray="691.15" stroke-dashoffset="691.15" />
      </svg>
      <div class="display-wrapper">
        <div class="display" id="swDisplay" aria-live="polite" aria-atomic="true" aria-label="Stopwatch time">00:00:00.000</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn primary" id="swBtnStart" aria-label="Start stopwatch">Start</button>
      <button class="btn" id="swBtnLap" aria-label="Record lap time">Lap</button>
      <button class="btn" id="swBtnReset" aria-label="Reset stopwatch">Reset</button>
    </div>
    <div class="laps-container" id="swLaps" aria-live="polite" aria-label="Recorded lap times"></div>
  </main>
  
  <!-- Timer Content -->
  <main class="content" id="contentTimer" role="tabpanel" aria-labelledby="tabTimer" style="display: none;">
    <div class="ring-container">
      <svg class="progress-ring" height="240" width="240" aria-hidden="true">
        <circle fill="transparent" stroke="#222" stroke-width="6" r="110" cx="120" cy="120" />
        <circle class="progress-ring-circle" id="tmRing" fill="transparent" stroke="var(--primary-color)" stroke-width="8" stroke-linecap="round" r="110" cx="120" cy="120" stroke-dasharray="691.15" stroke-dashoffset="0" />
      </svg>
      <div class="display-wrapper">
        <label for="tmInput" class="sr-only">Timer duration (HH:MM:SS)</label>
        <input type="text" id="tmInput" class="timer-input" value="00:05:00" placeholder="00:05:00" aria-label="Timer Duration">
        <div class="display" id="tmDisplay" style="display: none;" aria-live="polite" aria-atomic="true" aria-label="Remaining time">00:00:00</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn primary" id="tmBtnStart" aria-label="Start countdown timer">Start</button>
      <button class="btn" id="tmBtnReset" aria-label="Reset countdown timer">Reset</button>
    </div>
    <div class="hint-text" id="tmHint">Enter format HH:MM:SS or MM:SS</div>
  </main>

  <script>
    const circumference = 2 * Math.PI * 110; // ~691.15
    const MAX_LAPS = 500;

    // --- Safe LocalStorage Helper ---
    function safeStorageGet(key, defaultVal) {
      try {
        const val = localStorage.getItem(key);
        return val !== null ? val : defaultVal;
      } catch (e) {
        return defaultVal;
      }
    }

    function safeStorageSet(key, val) {
      try {
        localStorage.setItem(key, val);
      } catch (e) {}
    }

    // --- Tab Switching & Keyboard Accessibility ---
    const tabStopwatch = document.getElementById('tabStopwatch');
    const tabTimer = document.getElementById('tabTimer');
    const contentStopwatch = document.getElementById('contentStopwatch');
    const contentTimer = document.getElementById('contentTimer');

    function switchTab(target) {
      if (target === 'stopwatch') {
        tabStopwatch.classList.add('active');
        tabStopwatch.setAttribute('aria-selected', 'true');
        tabStopwatch.setAttribute('tabindex', '0');
        tabTimer.classList.remove('active');
        tabTimer.setAttribute('aria-selected', 'false');
        tabTimer.setAttribute('tabindex', '-1');
        contentStopwatch.style.display = 'flex';
        contentTimer.style.display = 'none';
        safeStorageSet('ktimer_active_tab', 'stopwatch');
      } else {
        tabTimer.classList.add('active');
        tabTimer.setAttribute('aria-selected', 'true');
        tabTimer.setAttribute('tabindex', '0');
        tabStopwatch.classList.remove('active');
        tabStopwatch.setAttribute('aria-selected', 'false');
        tabStopwatch.setAttribute('tabindex', '-1');
        contentTimer.style.display = 'flex';
        contentStopwatch.style.display = 'none';
        safeStorageSet('ktimer_active_tab', 'timer');
      }
    }

    tabStopwatch.onclick = () => switchTab('stopwatch');
    tabTimer.onclick = () => switchTab('timer');

    [tabStopwatch, tabTimer].forEach(tab => {
      tab.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
          const next = tab === tabStopwatch ? tabTimer : tabStopwatch;
          next.focus();
          next.click();
        }
      });
    });

    // --- Stopwatch Logic ---
    let swStart = 0;
    let swElapsed = 0;
    let swInterval = null;
    let lapCount = 0;

    const swDisplay = document.getElementById('swDisplay');
    const swBtnStart = document.getElementById('swBtnStart');
    const swBtnLap = document.getElementById('swBtnLap');
    const swBtnReset = document.getElementById('swBtnReset');
    const swRing = document.getElementById('swRing');
    const swLaps = document.getElementById('swLaps');

    function formatStopwatchTime(ms) {
      if (ms < 0) ms = 0;
      let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
      let m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
      let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
      let milli = Math.floor(ms % 1000).toString().padStart(3, '0');
      return `${h}:${m}:${s}.${milli}`;
    }

    function updateSw() {
      let currentMs = swElapsed + (swInterval ? performance.now() - swStart : 0);
      swDisplay.innerText = formatStopwatchTime(currentMs);
      
      let progress = (currentMs % 60000) / 60000;
      swRing.style.strokeDashoffset = circumference - (progress * circumference);
    }

    swBtnStart.onclick = () => {
      if (swInterval) {
        clearInterval(swInterval);
        swInterval = null;
        swElapsed += performance.now() - swStart;
        swBtnStart.innerText = "Start";
        swBtnStart.setAttribute('aria-label', 'Start stopwatch');
        swBtnStart.classList.add("primary");
      } else {
        swStart = performance.now();
        if (swInterval) clearInterval(swInterval);
        swInterval = setInterval(updateSw, 20);
        swBtnStart.innerText = "Stop";
        swBtnStart.setAttribute('aria-label', 'Stop stopwatch');
        swBtnStart.classList.remove("primary");
      }
    };

    swBtnLap.onclick = () => {
      if (!swInterval) return;
      if (lapCount >= MAX_LAPS) return;
      lapCount++;
      let currentMs = swElapsed + performance.now() - swStart;
      
      let lapItem = document.createElement('div');
      lapItem.className = 'lap-item';
      lapItem.innerHTML = `<span>Lap ${lapCount}</span><span>${formatStopwatchTime(currentMs)}</span>`;
      swLaps.prepend(lapItem);
    };

    swBtnReset.onclick = () => {
      if (swInterval) {
        clearInterval(swInterval);
        swInterval = null;
      }
      swElapsed = 0;
      lapCount = 0;
      swLaps.innerHTML = "";
      swBtnStart.innerText = "Start";
      swBtnStart.setAttribute('aria-label', 'Start stopwatch');
      swBtnStart.classList.add("primary");
      updateSw();
      swRing.style.strokeDashoffset = circumference;
    };

    // --- Timer Logic ---
    let timerTarget = 0;
    let timerRemaining = 0;
    let timerTotal = 0;
    let timerInterval = null;

    const tmDisplay = document.getElementById('tmDisplay');
    const tmInput = document.getElementById('tmInput');
    const tmBtnStart = document.getElementById('tmBtnStart');
    const tmBtnReset = document.getElementById('tmBtnReset');
    const tmRing = document.getElementById('tmRing');
    const tmHint = document.getElementById('tmHint');

    // Restore saved timer input
    const savedTimer = safeStorageGet('ktimer_preset', '00:05:00');
    tmInput.value = savedTimer;

    function formatTimerDisplay(ms) {
      if (ms < 0) ms = 0;
      let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
      let m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
      let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function parseTimeInput(valStr) {
      if (!valStr || typeof valStr !== 'string') return 0;
      const clean = valStr.trim();
      if (!clean) return 0;
      
      const parts = clean.split(':').map(p => p.trim());
      let h = 0, m = 0, s = 0;
      
      if (parts.length === 3) {
        h = parseInt(parts[0], 10) || 0;
        m = parseInt(parts[1], 10) || 0;
        s = parseInt(parts[2], 10) || 0;
      } else if (parts.length === 2) {
        m = parseInt(parts[0], 10) || 0;
        s = parseInt(parts[1], 10) || 0;
      } else if (parts.length === 1) {
        s = parseInt(parts[0], 10) || 0;
      } else {
        return 0;
      }
      
      if (h < 0) h = 0;
      if (m < 0) m = 0;
      if (s < 0) s = 0;

      const totalSec = h * 3600 + m * 60 + s;
      if (totalSec <= 0 || totalSec > 359999) return 0;
      return totalSec * 1000;
    }

    function playAlarm() {
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        
        for (let i = 0; i < 3; i++) {
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, ctx.currentTime + i * 0.4);
          osc.frequency.setValueAtTime(800, ctx.currentTime + i * 0.4 + 0.1);
          gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.4);
          gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + i * 0.4 + 0.3);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.4);
          osc.stop(ctx.currentTime + i * 0.4 + 0.3);
        }

        setTimeout(() => {
          try { ctx.close(); } catch(e) {}
        }, 1800);
      } catch (e) {}
    }

    function updateTimer() {
      timerRemaining = timerTarget - Date.now();
      if (timerRemaining <= 0) {
        timerRemaining = 0;
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
        tmBtnStart.innerText = "Start";
        tmBtnStart.setAttribute('aria-label', 'Start countdown timer');
        tmBtnStart.classList.add("primary");
        playAlarm();
        tmInput.style.display = 'block';
        tmDisplay.style.display = 'none';
        tmRing.style.strokeDashoffset = 0;
      } else {
        tmDisplay.innerText = formatTimerDisplay(timerRemaining);
        let progress = timerTotal > 0 ? (timerRemaining / timerTotal) : 0;
        tmRing.style.strokeDashoffset = circumference - (progress * circumference);
      }
    }

    tmInput.addEventListener('blur', () => {
      let ms = parseTimeInput(tmInput.value);
      if (ms > 0) {
        tmInput.classList.remove('invalid');
        tmInput.value = formatTimerDisplay(ms);
        safeStorageSet('ktimer_preset', tmInput.value);
      } else {
        tmInput.classList.add('invalid');
      }
    });

    tmInput.addEventListener('focus', () => {
      tmInput.classList.remove('invalid');
    });

    tmBtnStart.onclick = () => {
      if (timerInterval) {
        // Pause
        clearInterval(timerInterval);
        timerInterval = null;
        tmBtnStart.innerText = "Resume";
        tmBtnStart.setAttribute('aria-label', 'Resume countdown timer');
        tmBtnStart.classList.add("primary");
      } else {
        // Start / Resume
        if (tmInput.style.display !== 'none') {
          let ms = parseTimeInput(tmInput.value);
          if (ms <= 0) {
            tmInput.classList.add('invalid');
            tmHint.innerText = "Please enter valid time (e.g., 00:05:00)";
            return;
          }
          tmInput.classList.remove('invalid');
          tmHint.innerText = "Enter format HH:MM:SS or MM:SS";
          timerRemaining = ms;
          timerTotal = ms;
          tmInput.value = formatTimerDisplay(ms);
          safeStorageSet('ktimer_preset', tmInput.value);
          tmInput.style.display = 'none';
          tmDisplay.style.display = 'block';
        }
        
        if (timerRemaining > 0) {
          timerTarget = Date.now() + timerRemaining;
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(updateTimer, 50);
          updateTimer();
          tmBtnStart.innerText = "Pause";
          tmBtnStart.setAttribute('aria-label', 'Pause countdown timer');
          tmBtnStart.classList.remove("primary");
        }
      }
    };

    tmBtnReset.onclick = () => {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerRemaining = 0;
      timerTotal = 0;
      tmBtnStart.innerText = "Start";
      tmBtnStart.setAttribute('aria-label', 'Start countdown timer');
      tmBtnStart.classList.add("primary");
      tmInput.style.display = 'block';
      tmDisplay.style.display = 'none';
      tmRing.style.strokeDashoffset = 0;
    };

    // Restore saved tab
    const savedTab = safeStorageGet('ktimer_active_tab', 'stopwatch');
    if (savedTab === 'timer') {
      switchTab('timer');
    }

    // Cleanup on window unload
    window.addEventListener('beforeunload', () => {
      if (swInterval) clearInterval(swInterval);
      if (timerInterval) clearInterval(timerInterval);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #111;
    color: #0f0;
    font-family: 'Consolas', 'Courier New', monospace;
    margin: 0;
    padding: 20px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    gap: 15px;
  }
  .box {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  label {
    font-weight: bold;
    font-size: 14px;
    color: #fff;
  }
  textarea {
    flex: 1;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    padding: 10px;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
  }
  textarea:focus { border-color: #0f0; }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover { background: #333; border-color: #0f0; color: #0f0; }
</style>
</head>
<body>
  <div class="box">
    <label>Input</label>
    <textarea id="inpText" placeholder="Enter text here..."></textarea>
  </div>
  
  <div class="controls">
    <button id="btnEncode">B64 Encode ▼</button>
    <button id="btnDecode">B64 Decode ▼</button>
    <button id="btnHash">SHA-256 ▼</button>
  </div>
  
  <div class="box">
    <label>Output</label>
    <textarea id="outText" placeholder="Result will appear here..." readonly></textarea>
  </div>

  <script>
    const inpText = document.getElementById('inpText');
    const outText = document.getElementById('outText');
    const btnEncode = document.getElementById('btnEncode');
    const btnDecode = document.getElementById('btnDecode');
    const btnHash = document.getElementById('btnHash');

    btnEncode.onclick = () => {
      try {
        outText.value = btoa(unescape(encodeURIComponent(inpText.value)));
      } catch(e) {
        outText.value = "Error: Could not encode to Base64.";
      }
    };

    btnDecode.onclick = () => {
      try {
        outText.value = decodeURIComponent(escape(atob(inpText.value.trim())));
      } catch(e) {
        outText.value = "Error: Invalid Base64 input string.";
      }
    };

    btnHash.onclick = async () => {
      try {
        const msgUint8 = new TextEncoder().encode(inpText.value);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        outText.value = hashHex;
      } catch(e) {
        outText.value = "Error: Could not generate hash.";
      }
    };

    outText.onclick = () => {
      if (outText.value && !outText.value.startsWith("Error")) {
        navigator.clipboard.writeText(outText.value);
        const original = outText.value;
        outText.value = "Copied to clipboard!";
        setTimeout(() => outText.value = original, 1000);
      }
    };
  </script>
</body>
</html>

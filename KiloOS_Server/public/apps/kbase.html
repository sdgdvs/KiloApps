<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #111;
    color: #0f0;
    font-family: 'Consolas', 'Courier New', monospace;
    margin: 0;
    padding: 20px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    gap: 15px;
  }
  .box {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  label {
    font-weight: bold;
    font-size: 14px;
    color: #fff;
  }
  textarea {
    flex: 1;
    background: #000;
    color: #0f0;
    border: 1px solid #333;
    padding: 10px;
    resize: none;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    border-radius: 4px;
  }
  textarea:focus { border-color: #0f0; }
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit;
    transition: all 0.2s;
  }
  button:hover { background: #333; border-color: #0f0; color: #0f0; }
</style>
</head>
<body>
  <div class="box">
    <label>Input</label>
    <textarea id="inpText" placeholder="Enter text here..."></textarea>
  </div>
  
  <div class="controls">
    <button id="btnEncode">B64 Encode ▼</button>
    <button id="btnDecode">B64 Decode ▲</button>
    <button id="btnHash">SHA-256 ▼</button>
  </div>
  
  <div class="box">
    <label>Output</label>
    <textarea id="outText" placeholder="Result will appear here..." readonly></textarea>
  </div>

  <script>
    // Phase 1 Scaffold
  </script>
</body>
</html>

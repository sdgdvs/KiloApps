<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #fdfdfd;
    color: #333;
    font-family: 'Georgia', serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    transition: background 0.3s, color 0.3s;
  }
  body.dark {
    background: #121212;
    color: #e0e0e0;
  }
  .toolbar {
    background: #eee;
    border-bottom: 1px solid #ddd;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  body.dark .toolbar {
    background: #1a1a1a;
    border-color: #333;
  }
  .toolbar-group {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button, label.btn {
    background: #fff;
    border: 1px solid #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    transition: all 0.2s;
  }
  button:hover, label.btn:hover { background: #f0f0f0; }
  
  body.dark button, body.dark label.btn {
    background: #2a2a2a;
    border-color: #444;
    color: #e0e0e0;
  }
  body.dark button:hover, body.dark label.btn:hover { background: #3a3a3a; }
  
  .file-input { display: none; }
  
  .reader-container {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    justify-content: center;
    scroll-behavior: smooth;
  }
  .content {
    max-width: 800px;
    width: 100%;
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #888;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .empty-state p { margin-top: 10px; }
  
</style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <label class="btn">
        Open File
        <input type="file" id="fileInp" class="file-input" accept=".txt,.md,.csv,.log">
      </label>
      <button id="btnClear">Clear</button>
    </div>
    <div class="toolbar-group">
      <button id="btnAUp">A+</button>
      <button id="btnADown">A-</button>
      <button id="btnTheme">Dark Mode</button>
    </div>
  </div>
  
  <div class="reader-container" id="readerContainer">
    <div class="empty-state" id="emptyState">
      <h3>No Document Loaded</h3>
      <p>Open a text file to begin reading.</p>
    </div>
    <div class="content" id="textContent" style="display:none;"></div>
  </div>

  <script>
    const fileInp = document.getElementById('fileInp');
    const btnClear = document.getElementById('btnClear');
    const btnAUp = document.getElementById('btnAUp');
    const btnADown = document.getElementById('btnADown');
    const btnTheme = document.getElementById('btnTheme');
    
    const readerContainer = document.getElementById('readerContainer');
    const emptyState = document.getElementById('emptyState');
    const textContent = document.getElementById('textContent');

    let currentText = localStorage.getItem('kread_text') || '';
    let currentScroll = parseInt(localStorage.getItem('kread_scroll') || '0');
    let fontSize = parseInt(localStorage.getItem('kread_fontsize') || '18');
    let isDark = localStorage.getItem('kread_dark') === 'true';

    function applyState() {
      textContent.style.fontSize = fontSize + 'px';
      if (isDark) document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      
      if (currentText) {
        emptyState.style.display = 'none';
        textContent.style.display = 'block';
        textContent.textContent = currentText;
        setTimeout(() => readerContainer.scrollTop = currentScroll, 10);
      } else {
        emptyState.style.display = 'flex';
        textContent.style.display = 'none';
      }
    }

    fileInp.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        currentText = ev.target.result;
        currentScroll = 0;
        localStorage.setItem('kread_text', currentText);
        localStorage.setItem('kread_scroll', '0');
        applyState();
      };
      reader.readAsText(file);
    });

    btnClear.onclick = () => {
      currentText = '';
      currentScroll = 0;
      localStorage.removeItem('kread_text');
      localStorage.setItem('kread_scroll', '0');
      applyState();
    };

    btnAUp.onclick = () => {
      fontSize = Math.min(fontSize + 2, 48);
      localStorage.setItem('kread_fontsize', fontSize);
      applyState();
    };

    btnADown.onclick = () => {
      fontSize = Math.max(fontSize - 2, 12);
      localStorage.setItem('kread_fontsize', fontSize);
      applyState();
    };

    btnTheme.onclick = () => {
      isDark = !isDark;
      localStorage.setItem('kread_dark', isDark);
      applyState();
    };

    let scrollTimeout;
    readerContainer.onscroll = () => {
      if (scrollTimeout) clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        if (currentText) {
          localStorage.setItem('kread_scroll', readerContainer.scrollTop);
        }
      }, 500);
    };

    applyState();
  </script>
</body>
</html>

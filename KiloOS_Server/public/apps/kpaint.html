<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPaint Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f111a;
    --panel-bg: #181b28;
    --panel-border: rgba(255, 255, 255, 0.08);
    --primary: #3b82f6;
    --primary-hover: #60a5fa;
    --accent: #8b5cf6;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    --btn-bg: rgba(255, 255, 255, 0.05);
    --btn-hover: rgba(255, 255, 255, 0.12);
    --btn-active: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body, html {
    width: 100%;
    height: 100%;
    background: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    color: var(--text-main);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header Bar */
  .top-bar {
    height: 48px;
    background: var(--panel-bg);
    border-bottom: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 10;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #60a5fa, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .top-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Main Workspace */
  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Sidebar */
  .sidebar {
    width: 250px;
    background: var(--panel-bg);
    border-right: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 16px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }

  /* Grid Layouts for Buttons */
  .tool-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .palette-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }

  .filter-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  /* Tool Button Styling */
  .btn {
    padding: 8px 10px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--btn-bg);
    color: var(--text-main);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-align: center;
  }

  .btn:hover {
    background: var(--btn-hover);
    border-color: rgba(255, 255, 255, 0.2);
  }

  .btn.active {
    background: var(--primary);
    color: #ffffff;
    border-color: var(--primary);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: transparent;
  }

  .btn-accent {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
    border-color: rgba(139, 92, 246, 0.4);
  }
  .btn-accent:hover {
    background: linear-gradient(135deg, rgba(59, 130, 246, 0.4), rgba(139, 92, 246, 0.4));
  }

  /* Color Swatches */
  .swatch {
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s ease, border-color 0.15s ease;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
  }
  .swatch:hover { transform: scale(1.1); }
  .swatch.active {
    border-color: #ffffff;
    transform: scale(1.15);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
  }

  .custom-color-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  input[type="color"] {
    -webkit-appearance: none;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: 1px solid var(--panel-border); border-radius: 6px; }

  select {
    width: 100%;
    padding: 6px 10px;
    background: var(--btn-bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text-main);
    font-family: inherit;
    font-size: 12px;
    outline: none;
  }
  select:focus { border-color: var(--primary); }

  /* Sliders */
  .control-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .control-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
  }
  .control-val {
    color: var(--text-main);
    font-weight: 600;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
  }

  /* Canvas Area */
  .canvas-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #090a0f;
    position: relative;
    overflow: auto;
    padding: 20px;
  }

  .canvas-wrapper {
    position: relative;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255,255,255,0.05);
    border-radius: 4px;
    background: #ffffff;
    transition: transform 0.1s ease;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    border-radius: 4px;
  }
  #canvas { z-index: 1; background: #ffffff; cursor: crosshair; }
  #preview { z-index: 2; pointer-events: none; }

  /* Status Bar */
  .status-bar {
    height: 28px;
    background: var(--panel-bg);
    border-top: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .status-info { display: flex; gap: 16px; }

  /* Brush Preview Pill */
  .brush-preview-box {
    width: 100%;
    height: 36px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    border: 1px solid var(--panel-border);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 4px;
  }
  .brush-dot {
    background: #ffffff;
    border-radius: 50%;
    transition: all 0.1s ease;
  }
</style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <div class="brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
      KPAINT PRO
    </div>
    <div class="top-actions">
      <button class="btn" id="btn-undo" onclick="undo()" disabled title="Undo (Ctrl+Z)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
        Undo
      </button>
      <button class="btn" id="btn-redo" onclick="redo()" disabled title="Redo (Ctrl+Y)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
        Redo
      </button>
      <div style="width: 1px; height: 20px; background: var(--panel-border); margin: 0 4px;"></div>
      <button class="btn btn-accent" onclick="document.getElementById('img-loader').click()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Import
      </button>
      <button class="btn btn-accent" onclick="saveVFS()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        Save to OS
      </button>
      <button class="btn btn-accent" onclick="exportPNG()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        Export PNG
      </button>
    </div>
  </div>

  <input type="file" id="img-loader" style="display:none" accept="image/*" onchange="importImage(event)">

  <div class="workspace">
    <!-- Sidebar Controls -->
    <div class="sidebar">
      
      <!-- Drawing Tools -->
      <div>
        <div class="section-title">Tools</div>
        <div class="tool-grid">
          <button class="btn active" id="tool-freehand" onclick="setTool('freehand')" title="Brush (B)">Brush</button>
          <button class="btn" id="tool-line" onclick="setTool('line')" title="Line (L)">Line</button>
          <button class="btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle (R)">Rect</button>
          <button class="btn" id="tool-ellipse" onclick="setTool('ellipse')" title="Ellipse (C)">Ellipse</button>
          <button class="btn" id="tool-fill" onclick="setTool('fill')" title="Bucket Fill (G)">Fill</button>
          <button class="btn" id="tool-spray" onclick="setTool('spray')" title="Airbrush">Spray</button>
          <button class="btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser (E)">Eraser</button>
        </div>
      </div>

      <!-- Brush Settings -->
      <div>
        <div class="section-title">Brush & Size</div>
        <div class="control-group">
          <div class="control-label">
            <span>Size</span>
            <span class="control-val" id="size-val">4px</span>
          </div>
          <input type="range" id="brush-size" min="1" max="80" value="4" oninput="updateBrushSettings()">
        </div>
        <div class="control-group" style="margin-top: 8px;">
          <div class="control-label">
            <span>Shape</span>
          </div>
          <select id="brush-shape" onchange="updateBrushSettings()">
            <option value="round">Round</option>
            <option value="square">Square</option>
          </select>
        </div>
        <div class="brush-preview-box">
          <div class="brush-dot" id="brush-preview"></div>
        </div>
      </div>

      <!-- Color Palette -->
      <div>
        <div class="section-title">Color Palette</div>
        <div style="margin-bottom: 8px;">
          <select id="palette-preset" onchange="loadPalettePreset()">
            <option value="classic">Classic Palette</option>
            <option value="pastel">Pastel Dreams</option>
            <option value="cyberpunk">Cyberpunk Neon</option>
            <option value="earth">Earthy Tones</option>
          </select>
        </div>
        <div class="palette-grid" id="palette-grid">
          <!-- Swatches dynamically loaded -->
        </div>
        <div class="custom-color-picker">
          <input type="color" id="color-picker" value="#111111" onchange="setCustomColor(this.value)">
          <span style="font-size: 12px; color: var(--text-muted);">Custom Color</span>
        </div>
      </div>

      <!-- Image Filters -->
      <div>
        <div class="section-title">Image Adjustments</div>
        <div class="filter-grid">
          <button class="btn" onclick="applyFilter('invert')">Invert</button>
          <button class="btn" onclick="applyFilter('grayscale')">Grayscale</button>
          <button class="btn" onclick="applyFilter('brighten')">+Brightness</button>
          <button class="btn" onclick="applyFilter('darken')">-Brightness</button>
          <button class="btn" onclick="applyFilter('contrast')">+Contrast</button>
          <button class="btn" onclick="applyFilter('sepia')">Sepia</button>
        </div>
      </div>

      <!-- Canvas Transforms -->
      <div>
        <div class="section-title">Canvas Transform</div>
        <div class="filter-grid">
          <button class="btn" onclick="transformCanvas('rotate90cw')">Rotate 90° CW</button>
          <button class="btn" onclick="transformCanvas('rotate90ccw')">Rotate 90° CCW</button>
          <button class="btn" onclick="transformCanvas('fliph')">Flip Horiz</button>
          <button class="btn" onclick="transformCanvas('flipv')">Flip Vert</button>
        </div>
      </div>

      <!-- Clear Canvas -->
      <div style="margin-top: auto;">
        <button class="btn" style="width: 100%; color: #ef4444; border-color: rgba(239, 68, 68, 0.3);" onclick="clearCanvasPrompt()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
          Clear Canvas
        </button>
      </div>

    </div>

    <!-- Canvas Container -->
    <div class="canvas-container" id="container">
      <div class="canvas-wrapper" id="canvas-wrapper" style="width: 800px; height: 600px;">
        <canvas id="canvas" width="800" height="600"></canvas>
        <canvas id="preview" width="800" height="600"></canvas>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-info">
      <span>Canvas: <strong id="lbl-dim">800 x 600</strong></span>
      <span>Pos: <strong id="lbl-pos">0, 0</strong></span>
      <span>Tool: <strong id="lbl-tool">Brush</strong></span>
    </div>
    <div>Press <strong>Ctrl+Z</strong> to Undo | <strong>B</strong> Brush | <strong>E</strong> Eraser | <strong>G</strong> Fill</div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const previewCanvas = document.getElementById('preview');
    const pctx = previewCanvas.getContext('2d');
    const wrapper = document.getElementById('canvas-wrapper');

    let painting = false;
    let currentColor = '#111111';
    let currentTool = 'freehand'; // freehand, line, rect, ellipse, fill, spray, eraser
    let brushSize = 4;
    let brushShape = 'round';
    let currentVfsPath = null;
    let startX = 0, startY = 0;

    // History Stack
    const undoStack = [];
    const redoStack = [];
    const MAX_UNDO = 25;

    // Presets
    const PALETTES = {
      classic: ['#111111', '#555555', '#aaaaaa', '#ffffff', '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#1abc9c', '#3498db', '#9b59b6', '#34495e'],
      pastel: ['#fbf8cc', '#fde4cf', '#ffcfd2', '#f1c0e8', '#cfbaf0', '#a3c4f3', '#90dbf4', '#8eecf5', '#98f5e1', '#b9fbc0', '#6c757d', '#212529'],
      cyberpunk: ['#050505', '#ff0055', '#ff5000', '#ffcc00', '#00ff66', '#00ffff', '#0066ff', '#7000ff', '#b000ff', '#ff00b0', '#ffffff', '#22223b'],
      earth: ['#2b1e1a', '#4a3525', '#6c584c', '#a3b18a', '#588157', '#3a5a40', '#344e41', '#d4a373', '#e9d8a6', '#ee9b00', '#ca6702', '#9b2226']
    };

    // Communication with KiloOS
    let currentReqId = 0;
    const callbacks = {};
    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (msg && callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg);
        delete callbacks[msg.requestId];
      }
    });
    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    // Initialize Canvas State
    function initCanvas() {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      loadPalettePreset();
      updateBrushSettings();
      saveState();
    }

    // History Management
    function saveState() {
      if (undoStack.length >= MAX_UNDO) undoStack.shift();
      undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
      redoStack.length = 0; // Clear redo
      updateHistoryButtons();
    }

    function undo() {
      if (undoStack.length <= 1) return;
      redoStack.push(undoStack.pop());
      const prevState = undoStack[undoStack.length - 1];
      ctx.putImageData(prevState, 0, 0);
      updateHistoryButtons();
    }

    function redo() {
      if (redoStack.length === 0) return;
      const nextState = redoStack.pop();
      undoStack.push(nextState);
      ctx.putImageData(nextState, 0, 0);
      updateHistoryButtons();
    }

    function updateHistoryButtons() {
      document.getElementById('btn-undo').disabled = undoStack.length <= 1;
      document.getElementById('btn-redo').disabled = redoStack.length === 0;
    }

    // Palettes & Colors
    function loadPalettePreset() {
      const presetKey = document.getElementById('palette-preset').value;
      const colors = PALETTES[presetKey] || PALETTES.classic;
      const grid = document.getElementById('palette-grid');
      grid.innerHTML = '';
      colors.forEach((c, idx) => {
        const div = document.createElement('div');
        div.className = 'swatch' + (c === currentColor ? ' active' : '');
        div.style.background = c;
        div.onclick = () => selectColor(c, div);
        grid.appendChild(div);
      });
    }

    function selectColor(c, el) {
      currentColor = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('color-picker').value = c.startsWith('#') && c.length === 7 ? c : '#111111';
      updateBrushSettings();
    }

    function setCustomColor(c) {
      currentColor = c;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      updateBrushSettings();
    }

    // Tool Management
    function setTool(t) {
      currentTool = t;
      document.querySelectorAll('.tool-grid .btn').forEach(b => b.classList.remove('active'));
      const activeBtn = document.getElementById('tool-' + t);
      if (activeBtn) activeBtn.classList.add('active');
      document.getElementById('lbl-tool').innerText = t.charAt(0).toUpperCase() + t.slice(1);
    }

    function updateBrushSettings() {
      brushSize = parseInt(document.getElementById('brush-size').value, 10);
      brushShape = document.getElementById('brush-shape').value;
      document.getElementById('size-val').innerText = brushSize + 'px';

      // Update brush preview box
      const previewDot = document.getElementById('brush-preview');
      previewDot.style.width = Math.min(brushSize, 30) + 'px';
      previewDot.style.height = Math.min(brushSize, 30) + 'px';
      previewDot.style.background = currentTool === 'eraser' ? '#ffffff' : currentColor;
      previewDot.style.borderRadius = brushShape === 'square' ? '2px' : '50%';
    }

    // Mouse & Touch Tracking
    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = (e.touches && e.touches.length > 0) ? e.touches[0].clientX : e.clientX;
      const clientY = (e.touches && e.touches.length > 0) ? e.touches[0].clientY : e.clientY;
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: Math.round((clientX - rect.left) * scaleX),
        y: Math.round((clientY - rect.top) * scaleY)
      };
    }

    function startPosition(e) {
      const pos = getMousePos(e);
      startX = pos.x;
      startY = pos.y;

      if (currentTool === 'fill') {
        floodFill(startX, startY, currentColor);
        saveState();
        return;
      }

      painting = true;

      if (currentTool === 'freehand' || currentTool === 'eraser' || currentTool === 'spray') {
        ctx.beginPath();
        draw(e);
      }
    }

    function endPosition(e) {
      if (!painting) return;
      painting = false;

      const pos = getMousePos(e);

      if (currentTool !== 'freehand' && currentTool !== 'eraser' && currentTool !== 'spray') {
        // Draw permanent shape
        ctx.lineWidth = brushSize;
        ctx.lineCap = brushShape === 'square' ? 'square' : 'round';
        ctx.lineJoin = brushShape === 'square' ? 'miter' : 'round';
        ctx.strokeStyle = currentColor;
        ctx.beginPath();

        if (currentTool === 'line') {
          ctx.moveTo(startX, startY);
          ctx.lineTo(pos.x, pos.y);
          ctx.stroke();
        } else if (currentTool === 'rect') {
          ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
        } else if (currentTool === 'ellipse') {
          const rx = Math.abs(pos.x - startX) / 2;
          const ry = Math.abs(pos.y - startY) / 2;
          const cx = startX + (pos.x - startX) / 2;
          const cy = startY + (pos.y - startY) / 2;
          ctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
          ctx.stroke();
        }
        pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
      } else {
        ctx.beginPath();
      }

      saveState();
    }

    function draw(e) {
      const pos = getMousePos(e);
      document.getElementById('lbl-pos').innerText = `${pos.x}, ${pos.y}`;

      if (!painting) return;

      const activeColor = currentTool === 'eraser' ? '#ffffff' : currentColor;

      if (currentTool === 'freehand' || currentTool === 'eraser') {
        ctx.lineWidth = brushSize;
        ctx.lineCap = brushShape === 'square' ? 'square' : 'round';
        ctx.lineJoin = brushShape === 'square' ? 'miter' : 'round';
        ctx.strokeStyle = activeColor;
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      } else if (currentTool === 'spray') {
        ctx.fillStyle = activeColor;
        const density = Math.max(10, brushSize * 2);
        for (let i = 0; i < density; i++) {
          const offsetAngle = Math.random() * 2 * Math.PI;
          const offsetRadius = Math.random() * (brushSize / 2);
          const px = pos.x + Math.cos(offsetAngle) * offsetRadius;
          const py = pos.y + Math.sin(offsetAngle) * offsetRadius;
          ctx.fillRect(px, py, 1, 1);
        }
      } else {
        // Shape preview
        pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        pctx.lineWidth = brushSize;
        pctx.lineCap = brushShape === 'square' ? 'square' : 'round';
        pctx.lineJoin = brushShape === 'square' ? 'miter' : 'round';
        pctx.strokeStyle = activeColor;
        pctx.beginPath();

        if (currentTool === 'line') {
          pctx.moveTo(startX, startY);
          pctx.lineTo(pos.x, pos.y);
          pctx.stroke();
        } else if (currentTool === 'rect') {
          pctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
        } else if (currentTool === 'ellipse') {
          const rx = Math.abs(pos.x - startX) / 2;
          const ry = Math.abs(pos.y - startY) / 2;
          const cx = startX + (pos.x - startX) / 2;
          const cy = startY + (pos.y - startY) / 2;
          pctx.ellipse(cx, cy, rx, ry, 0, 0, 2 * Math.PI);
          pctx.stroke();
        }
      }
    }

    // Flood Fill Algorithm
    function floodFill(startX, startY, fillColorHex) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;
      const w = canvas.width;
      const h = canvas.height;

      // Hex to RGB
      const fillR = parseInt(fillColorHex.slice(1, 3), 16);
      const fillG = parseInt(fillColorHex.slice(3, 5), 16);
      const fillB = parseInt(fillColorHex.slice(5, 7), 16);

      const targetIdx = (startY * w + startX) * 4;
      const targetR = data[targetIdx];
      const targetG = data[targetIdx + 1];
      const targetB = data[targetIdx + 2];
      const targetA = data[targetIdx + 3];

      if (targetR === fillR && targetG === fillG && targetB === fillB) return;

      const stack = [[startX, startY]];

      while (stack.length > 0) {
        const [x, y] = stack.pop();
        let currY = y;

        while (currY >= 0 && matchColor(currY * w + x)) {
          currY--;
        }
        currY++;

        let reachLeft = false;
        let reachRight = false;

        while (currY < h && matchColor(currY * w + x)) {
          const idx = (currY * w + x) * 4;
          data[idx] = fillR;
          data[idx + 1] = fillG;
          data[idx + 2] = fillB;
          data[idx + 3] = 255;

          if (x > 0) {
            if (matchColor(currY * w + (x - 1))) {
              if (!reachLeft) {
                stack.push([x - 1, currY]);
                reachLeft = true;
              }
            } else if (reachLeft) {
              reachLeft = false;
            }
          }

          if (x < w - 1) {
            if (matchColor(currY * w + (x + 1))) {
              if (!reachRight) {
                stack.push([x + 1, currY]);
                reachRight = true;
              }
            } else if (reachRight) {
              reachRight = false;
            }
          }
          currY++;
        }
      }

      ctx.putImageData(imgData, 0, 0);

      function matchColor(pixelIdx) {
        const idx = pixelIdx * 4;
        return (
          Math.abs(data[idx] - targetR) < 10 &&
          Math.abs(data[idx + 1] - targetG) < 10 &&
          Math.abs(data[idx + 2] - targetB) < 10 &&
          Math.abs(data[idx + 3] - targetA) < 10
        );
      }
    }

    // Filters
    function applyFilter(type) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        let r = data[i], g = data[i + 1], b = data[i + 2];

        if (type === 'invert') {
          data[i] = 255 - r;
          data[i + 1] = 255 - g;
          data[i + 2] = 255 - b;
        } else if (type === 'grayscale') {
          const avg = 0.299 * r + 0.587 * g + 0.114 * b;
          data[i] = data[i + 1] = data[i + 2] = avg;
        } else if (type === 'brighten') {
          data[i] = Math.min(255, r + 25);
          data[i + 1] = Math.min(255, g + 25);
          data[i + 2] = Math.min(255, b + 25);
        } else if (type === 'darken') {
          data[i] = Math.max(0, r - 25);
          data[i + 1] = Math.max(0, g - 25);
          data[i + 2] = Math.max(0, b - 25);
        } else if (type === 'contrast') {
          const factor = 1.3;
          data[i] = Math.min(255, Math.max(0, factor * (r - 128) + 128));
          data[i + 1] = Math.min(255, Math.max(0, factor * (g - 128) + 128));
          data[i + 2] = Math.min(255, Math.max(0, factor * (b - 128) + 128));
        } else if (type === 'sepia') {
          data[i] = Math.min(255, (r * 0.393) + (g * 0.769) + (b * 0.189));
          data[i + 1] = Math.min(255, (r * 0.349) + (g * 0.686) + (b * 0.168));
          data[i + 2] = Math.min(255, (r * 0.272) + (g * 0.534) + (b * 0.131));
        }
      }

      ctx.putImageData(imgData, 0, 0);
      saveState();
    }

    // Transforms
    function transformCanvas(action) {
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      if (action === 'fliph') {
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        tempCtx.translate(canvas.width, 0);
        tempCtx.scale(-1, 1);
        tempCtx.drawImage(canvas, 0, 0);
      } else if (action === 'flipv') {
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        tempCtx.translate(0, canvas.height);
        tempCtx.scale(1, -1);
        tempCtx.drawImage(canvas, 0, 0);
      } else if (action === 'rotate90cw') {
        tempCanvas.width = canvas.height;
        tempCanvas.height = canvas.width;
        tempCtx.translate(canvas.height, 0);
        tempCtx.rotate(Math.PI / 2);
        tempCtx.drawImage(canvas, 0, 0);
        resizeCanvas(tempCanvas.width, tempCanvas.height);
      } else if (action === 'rotate90ccw') {
        tempCanvas.width = canvas.height;
        tempCanvas.height = canvas.width;
        tempCtx.translate(0, canvas.width);
        tempCtx.rotate(-Math.PI / 2);
        tempCtx.drawImage(canvas, 0, 0);
        resizeCanvas(tempCanvas.width, tempCanvas.height);
      }

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(tempCanvas, 0, 0);
      saveState();
    }

    function resizeCanvas(w, h) {
      canvas.width = w;
      canvas.height = h;
      previewCanvas.width = w;
      previewCanvas.height = h;
      wrapper.style.width = w + 'px';
      wrapper.style.height = h + 'px';
      document.getElementById('lbl-dim').innerText = `${w} x ${h}`;
    }

    function clearCanvasPrompt() {
      if (confirm('Clear the entire canvas?')) {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pctx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
        saveState();
      }
    }

    function importImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          if (img.width !== canvas.width || img.height !== canvas.height) {
            resizeCanvas(img.width, img.height);
          }
          ctx.drawImage(img, 0, 0);
          saveState();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    }

    // Save Logic
    async function saveVFS() {
      if (!currentVfsPath) {
        const res = await sendToOS({ type: 'VFS_SHOW_SAVE' });
        if (!res || !res.path) return;
        currentVfsPath = res.path.endsWith('.png') ? res.path : res.path + '.png';
      }
      const data = canvas.toDataURL('image/png');
      await sendToOS({ type: 'VFS_WRITE', path: currentVfsPath, data });
      alert("Saved image to KiloOS Filesystem!");
    }

    function exportPNG() {
      const link = document.createElement('a');
      link.download = 'kpaint_artwork.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Event Listeners
    canvas.addEventListener('mousedown', startPosition);
    window.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);

    canvas.addEventListener('touchstart', startPosition);
    window.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, { passive: false });

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.ctrlKey || e.metaKey) {
        if (e.key === 'z' || e.key === 'Z') {
          if (e.shiftKey) redo(); else undo();
          e.preventDefault();
        } else if (e.key === 'y' || e.key === 'Y') {
          redo();
          e.preventDefault();
        }
      } else {
        const k = e.key.toLowerCase();
        if (k === 'b') setTool('freehand');
        else if (k === 'e') setTool('eraser');
        else if (k === 'l') setTool('line');
        else if (k === 'r') setTool('rect');
        else if (k === 'c') setTool('ellipse');
        else if (k === 'g') setTool('fill');
      }
    });

    // Hash VFS Load support
    window.onload = () => {
      initCanvas();
      if (window.location.hash) {
        const path = window.location.hash.substring(1);
        if (path) loadVFSFile(path);
      }
    };

    async function loadVFSFile(path) {
      currentVfsPath = path;
      const res = await sendToOS({ type: 'VFS_READ', path });
      if (res && res.data) {
        const img = new Image();
        img.onload = () => {
          if (img.width !== canvas.width || img.height !== canvas.height) {
            resizeCanvas(img.width, img.height);
          }
          ctx.drawImage(img, 0, 0);
          saveState();
        };
        img.src = res.data;
      }
    }
  </script>
</body>

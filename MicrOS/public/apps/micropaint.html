<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MicroPaint</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; flex-direction: column; background: #ece9d8; font-family: 'Tahoma', sans-serif; }
  .toolbar { padding: 5px; background: #ece9d8; border-bottom: 1px solid #ccc; display: flex; gap: 5px; align-items: center; }
  .color { width: 20px; height: 20px; border: 1px solid #000; cursor: pointer; }
  .color.active { outline: 2px solid #316ac5; }
  canvas { background: white; flex: 1; cursor: crosshair; touch-action: none; }
  button { padding: 2px 8px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="color active" style="background: black;" onclick="setColor('black', this)"></div>
    <div class="color" style="background: red;" onclick="setColor('red', this)"></div>
    <div class="color" style="background: blue;" onclick="setColor('blue', this)"></div>
    <div class="color" style="background: green;" onclick="setColor('green', this)"></div>
    <div class="color" style="background: white;" onclick="setColor('white', this)" title="Eraser"></div>
    <input type="range" id="size" min="1" max="20" value="2" style="width: 60px;">
    <button onclick="clearCanvas()">Clear</button>
    <div style="flex:1"></div>
    <button onclick="saveVFS()">Save (VFS)</button>
    <button onclick="saveLocal()">Save (Local)</button>
  </div>
  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let painting = false;
    let currentColor = 'black';
    let currentVfsPath = null;

    let currentReqId = 0;
    const callbacks = {};

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg);
        delete callbacks[msg.requestId];
      }
    });

    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    function resize() {
      // Only resize if canvas is empty to not clear drawing, or just do it once on load
      if (!canvas.width) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 32;
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
    }
    window.addEventListener('resize', () => {
      // Re-adjusting canvas size clears it in HTML5, so we avoid dynamic resize during painting in this minimal app
    });
    resize();

    function setColor(c, el) {
      currentColor = c;
      document.querySelectorAll('.color').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
    }

    function clearCanvas() {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function startPosition(e) {
      painting = true;
      draw(e);
    }
    function endPosition() {
      painting = false;
      ctx.beginPath();
    }
    function draw(e) {
      if (!painting) return;
      ctx.lineWidth = document.getElementById('size').value;
      ctx.lineCap = 'round';
      ctx.strokeStyle = currentColor;
      
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX || (e.touches && e.touches[0].clientX);
      const clientY = e.clientY || (e.touches && e.touches[0].clientY);
      const x = clientX - rect.left;
      const y = clientY - rect.top;

      ctx.lineTo(x, y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', endPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseleave', endPosition);
    
    canvas.addEventListener('touchstart', startPosition);
    canvas.addEventListener('touchend', endPosition);
    canvas.addEventListener('touchmove', e => { e.preventDefault(); draw(e); }, {passive: false});

    // Save and Load logic
    window.onload = () => {
      if (window.location.hash) {
        const path = window.location.hash.substring(1);
        if (path) loadVFSFile(path);
      }
    };

    async function loadVFSFile(path) {
      currentVfsPath = path;
      const res = await sendToOS({ type: 'VFS_READ', path });
      if (res.data) {
        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, 0, 0);
        };
        img.src = res.data;
      }
    }

    async function saveVFS() {
      if (!currentVfsPath) {
        const res = await sendToOS({ type: 'VFS_SHOW_SAVE' });
        if (!res.path) return;
        currentVfsPath = res.path.endsWith('.png') ? res.path : res.path + '.png';
      }
      const data = canvas.toDataURL('image/png');
      await sendToOS({ type: 'VFS_WRITE', path: currentVfsPath, data });
      alert("Saved to Virtual Filesystem!");
    }

    async function saveLocal() {
      try {
        const fileHandle = await window.showSaveFilePicker({
          types: [{ description: 'PNG Image', accept: {'image/png': ['.png']} }]
        });
        const writable = await fileHandle.createWritable();
        const dataUrl = canvas.toDataURL('image/png');
        const blob = await (await fetch(dataUrl)).blob();
        await writable.write(blob);
        await writable.close();
      } catch (e) { console.log(e); }
    }
  </script>
</body>
</html>

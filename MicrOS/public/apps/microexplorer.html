<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>File Browser</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Tahoma', sans-serif; background: #fff; }
  .toolbar { background: #ece9d8; border-bottom: 1px solid #ccc; padding: 5px; font-size: 12px; display: flex; gap: 10px; }
  .toolbar button { cursor: pointer; padding: 2px 5px; }
  .file-list { padding: 10px; display: flex; flex-wrap: wrap; gap: 15px; }
  .file-item { width: 70px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .file-item:hover { background: #e5f3fb; border-radius: 3px; }
  .file-icon { width: 32px; height: 32px; background: #fff; border: 2px solid #ccc; margin-bottom: 5px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #555; }
  .file-name { font-size: 11px; text-align: center; word-break: break-all; }
</style>
</head>
<body>
  <div class="toolbar">
    <button onclick="refresh()">Refresh</button>
  </div>
  <div class="file-list" id="list"></div>

  <script>
    let currentReqId = 0;
    const callbacks = {};

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (msg.type === 'VFS_LIST_DONE' && callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg.files);
        delete callbacks[msg.requestId];
      }
    });

    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    async function refresh() {
      const files = await sendToOS({ type: 'VFS_LIST' });
      const list = document.getElementById('list');
      list.innerHTML = '';
      if (files.length === 0) {
        list.innerHTML = '<div style="color:#777; font-size:12px;">Virtual Filesystem is empty.</div>';
        return;
      }
      files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'file-item';
        const ext = f.split('.').pop().toUpperCase();
        item.innerHTML = `<div class="file-icon">${ext}</div><div class="file-name">${f}</div>`;
        item.ondblclick = () => {
          // Tell OS to launch appropriate app
          const appId = f.endsWith('.png') ? 'micropaint' : 'micropad';
          window.parent.postMessage({ type: 'OS_LAUNCH_APP', appId: appId, path: f }, '*');
        };
        list.appendChild(item);
      });
    }

    // Auto-refresh on load
    refresh();
  </script>
</body>
</html>

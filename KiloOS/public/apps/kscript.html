<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KScript</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Fira+Code&display=swap');
    
    :root {
        --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --accent: #8b5cf6;
        --accent-hover: #a78bfa;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --error: #f43f5e;
    }

    body {
        margin: 0;
        padding: 20px;
        font-family: 'Inter', sans-serif;
        background: var(--bg-gradient);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
        overflow: hidden;
    }

    .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 15px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        backdrop-filter: blur(12px);
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 600;
        background: linear-gradient(to right, #c4b5fd, #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .panels {
        display: flex;
        gap: 15px;
        flex: 1;
        min-height: 0;
    }

    .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 12px;
        border: 1px solid var(--glass-border);
        overflow: hidden;
    }
    
    .panel-header {
        padding: 10px 15px;
        background: rgba(255, 255, 255, 0.02);
        border-bottom: 1px solid var(--glass-border);
        font-size: 0.85rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    textarea {
        flex: 1;
        background: transparent;
        border: none;
        padding: 15px;
        color: #e2e8f0;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        resize: none;
        outline: none;
    }

    textarea::placeholder {
        color: rgba(148, 163, 184, 0.5);
    }

    .output {
        flex: 1;
        padding: 15px;
        font-family: 'Fira Code', monospace;
        font-size: 14px;
        overflow-y: auto;
        white-space: pre-wrap;
        color: #a78bfa;
    }
    
    .output.error {
        color: var(--error);
    }

    button {
        background: var(--accent);
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
    }

    button:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
    }
    
    button:active {
        transform: translateY(0);
    }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>KScript</h1>
        <div style="display: flex; gap: 10px;">
            <button id="btnLoad" aria-label="Load script">Load</button>
            <button id="btnSave" aria-label="Save script">Save</button>
            <button id="btnRun" aria-label="Run script">Run Script</button>
        </div>
    </div>
    
    <div class="panels">
        <div class="panel">
            <div class="panel-header">Input</div>
            <textarea id="exprInput" spellcheck="false" aria-label="Script input" placeholder="Enter script here...
Variables: a = 10
Math: a * 2 + 5
print a % 3"></textarea>
        </div>
        <div class="panel">
            <div class="panel-header">Output</div>
            <div id="outputArea" class="output" aria-label="Script output" aria-live="polite" tabindex="0"></div>
        </div>
    </div>
</div>

<script>
    const exprInput = document.getElementById('exprInput');
    const btnRun = document.getElementById('btnRun');
    const btnLoad = document.getElementById('btnLoad');
    const btnSave = document.getElementById('btnSave');
    const outputArea = document.getElementById('outputArea');

    exprInput.value = "a = 10\nb = 20\nprint a * b + 5\nprint a % 3";

    function runParser(str) {
        let vars = new Array(26).fill(0);
        let outStr = "";
        
        let idx = 0;
        const peek = () => idx < str.length ? str[idx] : '\0';
        const advance = () => { if (idx < str.length) idx++; };
        const skipSpace = () => { 
            while ([' ', '\t', '\r', '\n', ';'].includes(peek())) advance(); 
        };
        
        const parseFactor = () => {
            skipSpace();
            let val = 0;
            let c = peek();
            if (c === '(') {
                advance();
                val = parseExpr();
                skipSpace();
                if (peek() === ')') advance();
            } else if ((c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z')) {
                let vIdx = c.toUpperCase().charCodeAt(0) - 65;
                advance();
                val = vars[vIdx];
            } else {
                let start = idx;
                while (peek() >= '0' && peek() <= '9') advance();
                if (idx > start) val = parseInt(str.substring(start, idx), 10);
                else if (idx < str.length) advance();
            }
            skipSpace();
            return val;
        };
        
        const parseTerm = () => {
            let val = parseFactor();
            while (peek() === '*' || peek() === '/' || peek() === '%') {
                let op = peek();
                advance();
                let nextVal = parseFactor();
                if (op === '*') val *= nextVal;
                else if (op === '/') { if (nextVal !== 0) val = Math.trunc(val / nextVal); }
                else if (op === '%') { if (nextVal !== 0) val = val % nextVal; }
            }
            return val;
        };
        
        const parseExpr = () => {
            let val = parseTerm();
            while (peek() === '+' || peek() === '-') {
                let op = peek();
                advance();
                let nextVal = parseTerm();
                if (op === '+') val += nextVal;
                else val -= nextVal;
            }
            return val;
        };
        
        let lastVal = 0;
        while (idx < str.length) {
            skipSpace();
            if (idx >= str.length) break;
            
            let isAssign = false;
            let varIdx = -1;
            let startIdx = idx;
            
            if (str.substring(idx, idx + 5) === "print") {
                let after = str[idx + 5];
                if (after === ' ' || after === '\t' || after === '(' || after === undefined || after === '\r' || after === '\n' || after === ';') {
                    idx += 5;
                    let val = parseExpr();
                    outStr += `Print: ${val}\n`;
                    lastVal = val;
                    continue;
                }
            }
            let c = peek();
            if ((c >= 'a' && c <= 'z') || (c >= 'A' && c <= 'Z')) {
                let vIdx = c.toUpperCase().charCodeAt(0) - 65;
                advance();
                while (peek() === ' ' || peek() === '\t') advance();
                if (peek() === '=') {
                    isAssign = true;
                    varIdx = vIdx;
                    advance();
                } else {
                    idx = startIdx;
                }
            } else {
                idx = startIdx;
            }
            
            let val = parseExpr();
            if (isAssign) {
                vars[varIdx] = val;
                outStr += `${String.fromCharCode(varIdx + 65)} = ${val}\n`;
            }
            lastVal = val;
        }
        
        outStr += `\nReturn: ${lastVal}`;
        return outStr;
    }

    btnRun.onclick = () => {
        const expr = exprInput.value;
        if (!expr.trim()) return;
        
        outputArea.classList.remove('error');
        outputArea.textContent = 'Running...';
        
        btnRun.style.transform = 'scale(0.95)';
        setTimeout(() => btnRun.style.transform = '', 150);
        
        setTimeout(() => {
            try {
                const result = runParser(expr);
                outputArea.textContent = result;
            } catch (err) {
                outputArea.classList.add('error');
                outputArea.textContent = `Parse Error:\n${err.message}`;
            }
        }, 50);
    };

    btnLoad.onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.ksc,.txt';
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                exprInput.value = e.target.result;
            };
            reader.readAsText(file);
        };
        input.click();
    };

    btnSave.onclick = () => {
        const blob = new Blob([exprInput.value], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'script.ksc';
        a.click();
        URL.revokeObjectURL(url);
    };
</script>
</body>
</html>

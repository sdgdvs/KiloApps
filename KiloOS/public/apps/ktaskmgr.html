<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: hsl(210, 15%, 20%);
    --primary: hsl(0, 85%, 60%); /* Red accent for kill */
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
  }
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); }
  .toolbar { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 8px; font-size: 13px; display: flex; gap: 10px; align-items: center;}
  .toolbar button { cursor: pointer; padding: 4px 10px; font-family: 'Inter', sans-serif; font-size: 13px; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; transition: all 0.15s ease; }
  .toolbar button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 15px; border-bottom: 1px solid var(--border-color); font-size: 13px; }
  th { background: var(--card-bg); font-weight: 600; color: #aaa; position: sticky; top: 0; }
  tr:hover { background: rgba(255,255,255,0.05); }
  .kill-btn { background: rgba(255, 85, 85, 0.2); color: #ff6b6b; border: 1px solid rgba(255, 85, 85, 0.4); border-radius: 4px; cursor: pointer; padding: 4px 12px; font-size: 12px; transition: all 0.2s; }
  .kill-btn:hover { background: #ff5555; color: white; }
  .table-container { height: calc(100% - 41px); overflow-y: auto; }
</style>
</head>
<body>
  <div class="toolbar">
    <button onclick="refresh()">Refresh Tasks</button>
    <div style="flex:1"></div>
    <div style="font-size: 11px; color: #888;">CPU: ~3% | RAM: ~14MB</div>
  </div>
  <div class="table-container">
    <table id="task-table">
      <thead>
        <tr>
          <th>Application Title</th>
          <th style="width: 150px;">Process ID</th>
          <th style="width: 100px; text-align: right;">Action</th>
        </tr>
      </thead>
      <tbody id="task-list">
      </tbody>
    </table>
  </div>

  <script>
    let currentReqId = 0;
    const callbacks = {};

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (msg.type === 'OS_LIST_TASKS_DONE' && callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg.tasks);
        delete callbacks[msg.requestId];
      }
    });

    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    async function refresh() {
      const tasks = await sendToOS({ type: 'OS_LIST_TASKS' });
      const tbody = document.getElementById('task-list');
      tbody.innerHTML = '';
      
      if (tasks.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #888;">No tasks running</td></tr>';
        return;
      }

      tasks.forEach(task => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${task.title}</td>
          <td style="font-family: monospace; color: #888;">${task.id.slice(0,8)}...</td>
          <td style="text-align: right;"><button class="kill-btn" onclick="killTask('${task.id}')">End Task</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function killTask(taskId) {
      window.parent.postMessage({ type: 'OS_KILL_TASK', taskId: taskId }, '*');
      setTimeout(refresh, 100);
    }

    // Auto-refresh periodically
    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>

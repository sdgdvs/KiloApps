<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KWords</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 10px;
    background-color: #121212;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    box-sizing: border-box;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
    padding-bottom: 10px;
    margin-bottom: 10px;
  }
  .container {
    display: flex;
    flex: 1;
    gap: 20px;
    overflow: hidden;
  }
  .grid-container {
    flex: 2;
    background-color: #1e1e1e;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .words-list {
    flex: 1;
    background-color: #1e1e1e;
    border: 1px solid #333;
    padding: 10px;
    overflow-y: auto;
  }
</style>
</head>
<body>
  <div class="header">
    <h2>KWords</h2>
    <div>Score: <span id="score">0</span> | Timer: <span id="timer">00:00</span></div>
  </div>
  <div class="container">
    <div class="grid-container" id="grid">
      <!-- Grid will go here -->
      <p>Word grid placeholder</p>
    </div>
    <div class="words-list" id="words">
      <h3>Words to Find</h3>
      <ul id="word-list-items">
        <li>Placeholder</li>
      </ul>
    </div>
  </div>
  <script>
    console.log("KWords loaded.");
  </script>
</body>
</html>

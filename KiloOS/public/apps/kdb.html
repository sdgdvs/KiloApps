<!DOCTYPE html>
<html>
<head>
<title>KDB</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: rgba(255, 255, 255, 0.05);
    --primary: hsl(200, 85%, 60%);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
    --text-muted: #aaaaaa;
  }
  body { 
    margin: 0; font-family: "Inter", sans-serif; background-color: var(--bg-color); 
    padding: 20px; height: 100vh; box-sizing: border-box; color: var(--text-main);
    display: flex; flex-direction: column;
  }
  .container {
    background: var(--card-bg);
    border-radius: 12px;
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }
  .header {
    padding: 15px 20px;
    border-bottom: 1px solid var(--border-color);
    background: rgba(0,0,0,0.2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 15px;
  }
  .header h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--primary); white-space: nowrap; }
  .search-box {
    flex-grow: 1;
    max-width: 300px;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: rgba(255,255,255,0.05);
    color: var(--text-main);
    font-family: inherit;
    box-sizing: border-box;
  }
  .search-box input:focus {
    outline: none;
    border-color: var(--primary);
  }
  .table-container {
    overflow-y: auto;
    flex-grow: 1;
  }
  .add-form {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border-color);
  }
  .add-form input {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: rgba(255,255,255,0.05);
    color: var(--text-main);
    font-family: inherit;
    flex: 1;
  }
  .add-form input#addId { flex: 0.5; }
  .add-form button {
    padding: 8px 15px;
    border-radius: 6px;
    border: none;
    background: var(--primary);
    color: var(--bg-color);
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .add-form button:hover { opacity: 0.9; }
  .del-btn {
    background: rgba(255, 50, 50, 0.2);
    color: #ffaaaa;
    border: 1px solid rgba(255,50,50,0.3);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-size: 12px;
  }
  .del-btn:hover { background: rgba(255, 50, 50, 0.4); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
  th { 
    background-color: rgba(255,255,255,0.02); 
    color: var(--text-muted); 
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
    position: sticky;
    top: 0;
    backdrop-filter: blur(10px);
  }
  tr { transition: background-color 0.2s ease; }
  tr:hover { background-color: rgba(255, 255, 255, 0.08); }
  tr:last-child td { border-bottom: none; }
  td { color: #e0e0e0; }
  .tag {
    background: rgba(255,255,255,0.1);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>Employee Database</h2>
    <div class="search-box">
      <input type="text" id="searchInput" aria-label="Search employees" placeholder="Search employees..." onkeyup="filterTable()">
    </div>
  </div>
  <div class="table-container">
    <table id="empTable">
      <thead>
        <tr>
          <th style="width: 60px;">ID</th>
          <th>Name</th>
          <th>Department</th>
          <th>Role</th>
          <th style="width: 50px;"></th>
        </tr>
      </thead>
      <tbody>
        <tr><td>101</td><td>Alice Smith</td><td><span class="tag">Engineering</span></td><td>Developer</td><td><button class="del-btn" aria-label="Delete record" onclick="this.closest('tr').remove()">Del</button></td></tr>
        <tr><td>102</td><td>Bob Johnson</td><td><span class="tag">Marketing</span></td><td>Designer</td><td><button class="del-btn" aria-label="Delete record" onclick="this.closest('tr').remove()">Del</button></td></tr>
        <tr><td>103</td><td>Charlie Davis</td><td><span class="tag">Sales</span></td><td>Executive</td><td><button class="del-btn" aria-label="Delete record" onclick="this.closest('tr').remove()">Del</button></td></tr>
        <tr><td>104</td><td>Diana Prince</td><td><span class="tag">Engineering</span></td><td>Lead</td><td><button class="del-btn" aria-label="Delete record" onclick="this.closest('tr').remove()">Del</button></td></tr>
        <tr><td>105</td><td>Evan Wright</td><td><span class="tag">HR</span></td><td>Manager</td><td><button class="del-btn" aria-label="Delete record" onclick="this.closest('tr').remove()">Del</button></td></tr>
      </tbody>
    </table>
  </div>
  <div class="add-form">
    <input type="text" id="addId" aria-label="ID" placeholder="ID">
    <input type="text" id="addName" aria-label="Name" placeholder="Name">
    <input type="text" id="addDept" aria-label="Department" placeholder="Department">
    <input type="text" id="addRole" aria-label="Role" placeholder="Role">
    <button aria-label="Add record" onclick="addRecord()">Add</button>
  </div>
</div>

<script>
function addRecord() {
  const id = document.getElementById('addId').value;
  const name = document.getElementById('addName').value;
  const dept = document.getElementById('addDept').value;
  const role = document.getElementById('addRole').value;
  if (!id || !name) return;

  const tbody = document.querySelector('#empTable tbody');
  const tr = document.createElement('tr');
  const tdId = document.createElement('td'); tdId.textContent = id;
  const tdName = document.createElement('td'); tdName.textContent = name;
  const tdDept = document.createElement('td'); 
  const spanDept = document.createElement('span'); spanDept.className = 'tag'; spanDept.textContent = dept;
  tdDept.appendChild(spanDept);
  const tdRole = document.createElement('td'); tdRole.textContent = role;
  const tdAction = document.createElement('td');
  tdAction.innerHTML = '<button class="del-btn" aria-label="Delete record" onclick="this.closest(\'tr\').remove()">Del</button>';
  
  tr.appendChild(tdId);
  tr.appendChild(tdName);
  tr.appendChild(tdDept);
  tr.appendChild(tdRole);
  tr.appendChild(tdAction);
  tbody.appendChild(tr);

  document.getElementById('addId').value = '';
  document.getElementById('addName').value = '';
  document.getElementById('addDept').value = '';
  document.getElementById('addRole').value = '';
}
function filterTable() {
  const input = document.getElementById("searchInput");
  const filter = input.value.toLowerCase();
  const table = document.getElementById("empTable");
  const tr = table.getElementsByTagName("tr");

  for (let i = 1; i < tr.length; i++) { // Skip header row
    let showRow = false;
    const tds = tr[i].getElementsByTagName("td");
    for (let j = 0; j < tds.length; j++) {
      if (tds[j]) {
        const textValue = tds[j].textContent || tds[j].innerText;
        if (textValue.toLowerCase().indexOf(filter) > -1) {
          showRow = true;
          break;
        }
      }
    }
    tr[i].style.display = showRow ? "" : "none";
  }
}
</script>
</body>
</html>

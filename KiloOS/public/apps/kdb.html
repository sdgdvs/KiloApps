<!DOCTYPE html>
<html>
<head>
<title>KDB</title>
<style>
  body { margin: 0; font-family: "Segoe UI", sans-serif; background-color: #fff; padding: 10px; height: 100vh; box-sizing: border-box; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  th { background-color: #f0f0f0; }
  tr:nth-child(even) { background-color: #fafafa; }
  tr:hover { background-color: #e0f0ff; }
</style>
</head>
<body>
<table>
  <thead>
    <tr>
      <th style="width: 50px;">ID</th>
      <th style="width: 150px;">Name</th>
      <th style="width: 120px;">Department</th>
      <th style="width: 120px;">Role</th>
    </tr>
  </thead>
  <tbody>
    <tr><td>101</td><td>Alice Smith</td><td>Engineering</td><td>Developer</td></tr>
    <tr><td>102</td><td>Bob Johnson</td><td>Marketing</td><td>Designer</td></tr>
    <tr><td>103</td><td>Charlie Davis</td><td>Sales</td><td>Executive</td></tr>
    <tr><td>104</td><td>Diana Prince</td><td>Engineering</td><td>Lead</td></tr>
    <tr><td>105</td><td>Evan Wright</td><td>HR</td><td>Manager</td></tr>
  </tbody>
</table>
</body>
</html>

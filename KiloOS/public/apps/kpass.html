<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .tabs {
    display: flex;
    background: #2d2d2d;
    border-bottom: 1px solid #3d3d3d;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #888;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    background: #3d3d3d;
    border-bottom: 2px solid #e74c3c;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .display {
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 24px;
    color: #e74c3c;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-all;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  button {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #555;
  }
  button.primary {
    background: #e74c3c;
    border-color: #e74c3c;
    width: 100%;
    margin-top: 10px;
  }
  button.primary:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabGen">Generator</div>
    <div class="tab" id="tabVault">Vault</div>
  </div>
  
  <div class="content" id="contentGen">
    <div class="display" id="pwdDisplay">Click Generate...</div>
    <div class="controls">
      <div class="control-row">
        <label>Length: <span id="lenDisplay">16</span></label>
        <input type="range" id="lenSlider" min="8" max="64" value="16">
      </div>
      <div class="control-row">
        <label><input type="checkbox" id="chkUpper" checked> Uppercase</label>
        <label><input type="checkbox" id="chkLower" checked> Lowercase</label>
      </div>
      <div class="control-row">
        <label><input type="checkbox" id="chkNum" checked> Numbers</label>
        <label><input type="checkbox" id="chkSym" checked> Symbols</label>
      </div>
      <button class="primary" id="btnGen">Generate</button>
    </div>
  </div>
  
  <div class="content" id="contentVault" style="display: none;">
    <div style="display:flex; gap:8px; margin-bottom:15px;">
      <input type="text" id="vName" placeholder="Account Name" style="flex:1; background:#111; color:#fff; border:1px solid #444; padding:8px; border-radius:4px; outline:none;">
      <button class="primary" id="btnSave" style="margin:0; width:auto;">Save</button>
    </div>
    <div id="vaultList" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px;"></div>
  </div>

  <script>
    // Tab Switching
    const tabGen = document.getElementById('tabGen');
    const tabVault = document.getElementById('tabVault');
    const contentGen = document.getElementById('contentGen');
    const contentVault = document.getElementById('contentVault');

    tabGen.onclick = () => {
      tabGen.classList.add('active');
      tabVault.classList.remove('active');
      contentGen.style.display = 'flex';
      contentVault.style.display = 'none';
    };

    tabVault.onclick = () => {
      tabVault.classList.add('active');
      tabGen.classList.remove('active');
      contentVault.style.display = 'block';
      contentGen.style.display = 'none';
    };

    // Phase 2: Generator Logic
    const pwdDisplay = document.getElementById('pwdDisplay');
    const btnGen = document.getElementById('btnGen');
    const lenSlider = document.getElementById('lenSlider');
    const lenDisplay = document.getElementById('lenDisplay');
    const chkUpper = document.getElementById('chkUpper');
    const chkLower = document.getElementById('chkLower');
    const chkNum = document.getElementById('chkNum');
    const chkSym = document.getElementById('chkSym');

    lenSlider.oninput = () => {
      lenDisplay.innerText = lenSlider.value;
    };

    const charSets = {
      upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      lower: "abcdefghijklmnopqrstuvwxyz",
      num: "0123456789",
      sym: "!@#$%^&*()_+~`|}{[]:;?><,./-="
    };

    btnGen.onclick = () => {
      let pool = "";
      if (chkUpper.checked) pool += charSets.upper;
      if (chkLower.checked) pool += charSets.lower;
      if (chkNum.checked) pool += charSets.num;
      if (chkSym.checked) pool += charSets.sym;

      if (!pool) {
        pwdDisplay.innerText = "Select at least one option!";
        return;
      }

      let pwd = "";
      const len = parseInt(lenSlider.value);
      for (let i = 0; i < len; i++) {
        pwd += pool.charAt(Math.floor(Math.random() * pool.length));
      }
      pwdDisplay.innerText = pwd;
    };

    // Phase 3: Vault Logic
    const vName = document.getElementById('vName');
    const btnSave = document.getElementById('btnSave');
    const vaultList = document.getElementById('vaultList');

    const XOR_KEY = "kpass_sec_key";
    
    function xorCrypt(str) {
      let out = "";
      for (let i = 0; i < str.length; i++) {
        out += String.fromCharCode(str.charCodeAt(i) ^ XOR_KEY.charCodeAt(i % XOR_KEY.length));
      }
      return out;
    }

    function getVault() {
      try {
        let raw = localStorage.getItem('/.kpass_vault');
        if (!raw) return {};
        return JSON.parse(xorCrypt(atob(raw)));
      } catch(e) { return {}; }
    }

    function saveVault(data) {
      localStorage.setItem('/.kpass_vault', btoa(xorCrypt(JSON.stringify(data))));
    }

    function renderVault() {
      vaultList.innerHTML = '';
      const data = getVault();
      for (const [name, pwd] of Object.entries(data)) {
        const item = document.createElement('div');
        item.style.cssText = 'background:#111; border:1px solid #333; padding:10px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;';
        
        const title = document.createElement('div');
        title.style.fontWeight = 'bold';
        title.innerText = name;
        
        const btnGroup = document.createElement('div');
        
        const cBtn = document.createElement('button');
        cBtn.innerText = 'Copy';
        cBtn.style.padding = '4px 8px';
        cBtn.style.marginRight = '4px';
        cBtn.onclick = () => { navigator.clipboard.writeText(pwd); alert('Copied!'); };
        
        const dBtn = document.createElement('button');
        dBtn.innerText = 'Del';
        dBtn.style.padding = '4px 8px';
        dBtn.style.background = '#8e44ad';
        dBtn.style.borderColor = '#8e44ad';
        dBtn.onclick = () => {
          if (confirm(`Delete ${name}?`)) {
            const d = getVault();
            delete d[name];
            saveVault(d);
            renderVault();
          }
        };
        
        btnGroup.appendChild(cBtn);
        btnGroup.appendChild(dBtn);
        item.appendChild(title);
        item.appendChild(btnGroup);
        vaultList.appendChild(item);
      }
    }

    btnSave.onclick = () => {
      const pwd = pwdDisplay.innerText;
      const n = vName.value.trim();
      if (!n || pwd === "Click Generate..." || pwd === "Select at least one option!") {
        alert("Generate a valid password and enter an account name first.");
        return;
      }
      const data = getVault();
      data[n] = pwd;
      saveVault(data);
      vName.value = '';
      alert('Saved to Vault!');
      renderVault();
    };

    renderVault();
  </script>
</body>
</html>

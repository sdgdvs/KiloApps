<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .tabs {
    display: flex;
    background: #2d2d2d;
    border-bottom: 1px solid #3d3d3d;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #888;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    background: #3d3d3d;
    border-bottom: 2px solid #e74c3c;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .display {
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 24px;
    color: #e74c3c;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-all;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    border-radius: 6px;
  }
  button {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #555;
  }
  button.primary {
    background: #e74c3c;
    border-color: #e74c3c;
    width: 100%;
    margin-top: 10px;
  }
  button.primary:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
  .vault-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .vault-item {
    background: #2a2a2a;
    padding: 10px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .vault-label { font-weight: bold; color: #fff; }
  .vault-pass { font-family: monospace; color: #aaa; }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabGen">Generator</div>
    <div class="tab" id="tabVault">Vault</div>
  </div>
  
  <div class="content" id="contentGen">
    <div class="display" id="pwdDisplay">...</div>
    <div class="controls">
      <div class="control-row">
        <input type="text" id="labelInput" placeholder="Label (e.g. Email)">
        <button id="btnSave">Save</button>
      </div>
      <button class="primary" id="btnGen">Generate</button>
    </div>
  </div>
  
  <div class="content" id="contentVault" style="display: none;">
    <div class="vault-list" id="vaultList">
      <!-- Vault items go here -->
    </div>
  </div>

  <script>
    const tabGen = document.getElementById('tabGen');
    const tabVault = document.getElementById('tabVault');
    const contentGen = document.getElementById('contentGen');
    const contentVault = document.getElementById('contentVault');
    const pwdDisplay = document.getElementById('pwdDisplay');
    const btnGen = document.getElementById('btnGen');
    const btnSave = document.getElementById('btnSave');
    const labelInput = document.getElementById('labelInput');
    const vaultList = document.getElementById('vaultList');
    
    let vault = JSON.parse(localStorage.getItem('kpass_vault') || '[]');

    function switchTab(isGen) {
        if(isGen) {
            tabGen.classList.add('active'); tabVault.classList.remove('active');
            contentGen.style.display = 'flex'; contentVault.style.display = 'none';
        } else {
            tabVault.classList.add('active'); tabGen.classList.remove('active');
            contentVault.style.display = 'flex'; contentGen.style.display = 'none';
            renderVault();
        }
    }
    
    tabGen.addEventListener('click', () => switchTab(true));
    tabVault.addEventListener('click', () => switchTab(false));

    function generate() {
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+";
        let pass = "";
        for(let i=0; i<16; i++) {
            pass += chars[Math.floor(Math.random() * chars.length)];
        }
        pwdDisplay.innerText = pass;
    }

    btnGen.addEventListener('click', generate);

    btnSave.addEventListener('click', () => {
        const label = labelInput.value.trim();
        const pass = pwdDisplay.innerText;
        if (label && pass && pass !== '...') {
            vault.push({label, pass});
            localStorage.setItem('kpass_vault', JSON.stringify(vault));
            labelInput.value = '';
            alert("Saved to Vault!");
        } else {
            alert("Please enter a label and generate a password.");
        }
    });

    function renderVault() {
        vaultList.innerHTML = '';
        if (vault.length === 0) {
            vaultList.innerHTML = '<div style="text-align:center;color:#666;margin-top:20px;">Vault is empty</div>';
        }
        vault.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'vault-item';
            div.innerHTML = `
                <div>
                    <div class="vault-label">${item.label}</div>
                    <div class="vault-pass">${item.pass}</div>
                </div>
                <button onclick="deleteItem(${index})">X</button>
            `;
            vaultList.appendChild(div);
        });
    }

    window.deleteItem = (index) => {
        vault.splice(index, 1);
        localStorage.setItem('kpass_vault', JSON.stringify(vault));
        renderVault();
    }

    generate();
  </script>
</body>
</html>

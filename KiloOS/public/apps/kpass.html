<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KPass - Password Generator & Vault</title>
<style>
  body {
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .tabs {
    display: flex;
    background: #2d2d2d;
    border-bottom: 1px solid #3d3d3d;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #888;
    transition: all 0.2s;
  }
  .tab.active {
    color: #fff;
    background: #3d3d3d;
    border-bottom: 2px solid #e74c3c;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .display {
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    border-radius: 6px;
    font-family: 'Consolas', monospace;
    font-size: 24px;
    color: #e74c3c;
    text-align: center;
    margin-bottom: 10px;
    word-break: break-all;
  }
  .strength-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 15px;
    padding: 8px 12px;
    background: #252525;
    border-radius: 6px;
    border: 1px solid #333;
  }
  .strength-bar-bg {
    flex: 1;
    height: 8px;
    background: #333;
    border-radius: 4px;
    margin: 0 12px;
    overflow: hidden;
  }
  .strength-bar-fill {
    height: 100%;
    width: 0%;
    background: #e74c3c;
    transition: width 0.3s, background-color 0.3s;
  }
  .strength-text {
    font-size: 13px;
    font-weight: bold;
    color: #aaa;
  }
  .controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .control-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 10px;
    background: #222;
    border: 1px solid #444;
    color: #fff;
    border-radius: 6px;
  }
  button {
    background: #333;
    color: white;
    border: 1px solid #444;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: all 0.2s;
  }
  button:hover {
    background: #444;
    border-color: #555;
  }
  button.primary {
    background: #e74c3c;
    border-color: #e74c3c;
    width: 100%;
    margin-top: 10px;
  }
  button.primary:hover {
    background: #c0392b;
    border-color: #c0392b;
  }
  .vault-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }
  .vault-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .vault-item {
    background: #2a2a2a;
    padding: 12px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    border-left: 4px solid #e74c3c;
  }
  .vault-info {
    flex: 1;
    overflow: hidden;
  }
  .vault-label { font-weight: bold; color: #fff; font-size: 15px; }
  .vault-pass { font-family: monospace; color: #aaa; font-size: 14px; word-break: break-all; }
  .vault-badge {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    background: #444;
    color: #ddd;
    margin-left: 8px;
    font-weight: normal;
  }
  .item-btns {
    display: flex;
    gap: 6px;
  }
  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }
  .btn-danger {
    background: #7f8c8d;
  }
  .btn-danger:hover {
    background: #c0392b;
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabGen">Generator</div>
    <div class="tab" id="tabVault">Vault (<span id="vaultCount">0</span>)</div>
  </div>
  
  <div class="content" id="contentGen">
    <div class="display" id="pwdDisplay">...</div>
    
    <!-- Password Strength Meter -->
    <div class="strength-container">
      <span class="strength-text" id="lblStrength">Strength: -</span>
      <div class="strength-bar-bg">
        <div class="strength-bar-fill" id="barStrength"></div>
      </div>
      <span class="strength-text" id="lblEntropy">0 bits</span>
    </div>

    <div class="controls">
      <div class="control-row">
        <label><input type="checkbox" id="chkUpper" checked> Uppercase</label>
        <label><input type="checkbox" id="chkLower" checked> Lowercase</label>
      </div>
      <div class="control-row">
        <label><input type="checkbox" id="chkNum" checked> Numbers</label>
        <label><input type="checkbox" id="chkSym" checked> Symbols</label>
      </div>
      <div class="control-row" style="margin-top: 10px;">
        <label style="flex: 1; color: #fff;">Length: <span id="lenVal">16</span></label>
        <input type="range" id="rngLen" min="8" max="64" value="16" style="flex: 2;">
      </div>
      <div class="control-row">
        <input type="text" id="labelInput" placeholder="Label (e.g. Work Email)">
        <button id="btnSave">Save to Vault</button>
      </div>
      <div class="control-row" style="margin-top: 10px;">
        <button class="primary" id="btnGen" style="flex: 1;">Generate</button>
        <button class="primary" id="btnCopy" style="flex: 1; background: #3498db; border-color: #3498db;">Copy</button>
      </div>
    </div>
  </div>
  
  <div class="content" id="contentVault" style="display: none;">
    <div class="vault-actions">
      <input type="text" id="vaultSearch" placeholder="Search vault entries...">
      <button class="btn-sm" id="btnExport" title="Export Vault to JSON">Export</button>
      <button class="btn-sm" id="btnImport" title="Import Vault from JSON">Import</button>
      <input type="file" id="fileImport" accept=".json" style="display:none;">
    </div>
    <div class="vault-list" id="vaultList">
      <!-- Vault items go here -->
    </div>
  </div>

  <script>
    const tabGen = document.getElementById('tabGen');
    const tabVault = document.getElementById('tabVault');
    const contentGen = document.getElementById('contentGen');
    const contentVault = document.getElementById('contentVault');
    const pwdDisplay = document.getElementById('pwdDisplay');
    const btnGen = document.getElementById('btnGen');
    const btnCopy = document.getElementById('btnCopy');
    const btnSave = document.getElementById('btnSave');
    const labelInput = document.getElementById('labelInput');
    const vaultList = document.getElementById('vaultList');
    const vaultCount = document.getElementById('vaultCount');
    const vaultSearch = document.getElementById('vaultSearch');
    const lblStrength = document.getElementById('lblStrength');
    const lblEntropy = document.getElementById('lblEntropy');
    const barStrength = document.getElementById('barStrength');
    const btnExport = document.getElementById('btnExport');
    const btnImport = document.getElementById('btnImport');
    const fileImport = document.getElementById('fileImport');
    
    let vault = JSON.parse(localStorage.getItem('kpass_vault') || '[]');

    function switchTab(isGen) {
        if(isGen) {
            tabGen.classList.add('active'); tabVault.classList.remove('active');
            contentGen.style.display = 'flex'; contentVault.style.display = 'none';
        } else {
            tabVault.classList.add('active'); tabGen.classList.remove('active');
            contentVault.style.display = 'flex'; contentGen.style.display = 'none';
            renderVault();
        }
        updateVaultCount();
    }
    
    function updateVaultCount() {
        vaultCount.innerText = vault.length;
    }
    
    tabGen.addEventListener('click', () => switchTab(true));
    tabVault.addEventListener('click', () => switchTab(false));

    const chkUpper = document.getElementById('chkUpper');
    const chkLower = document.getElementById('chkLower');
    const chkNum = document.getElementById('chkNum');
    const chkSym = document.getElementById('chkSym');
    const rngLen = document.getElementById('rngLen');
    const lenVal = document.getElementById('lenVal');

    rngLen.addEventListener('input', () => {
        lenVal.innerText = rngLen.value;
        generate();
    });
    chkUpper.addEventListener('change', generate);
    chkLower.addEventListener('change', generate);
    chkNum.addEventListener('change', generate);
    chkSym.addEventListener('change', generate);

    function evaluateStrength(pass) {
        if(!pass || pass === '...') {
            lblStrength.innerText = "Strength: -";
            lblEntropy.innerText = "0 bits";
            barStrength.style.width = "0%";
            barStrength.style.backgroundColor = "#e74c3c";
            return { rating: "-", entropy: 0 };
        }
        let pool = 0;
        if(/[A-Z]/.test(pass)) pool += 26;
        if(/[a-z]/.test(pass)) pool += 26;
        if(/[0-9]/.test(pass)) pool += 10;
        if(/[^A-Za-z0-9]/.test(pass)) pool += 12;
        if(pool === 0) pool = 26;

        let entropy = Math.round(pass.length * Math.log2(pool));
        let rating = "Weak";
        let color = "#e74c3c";
        let pct = Math.min(100, Math.max(10, Math.round((entropy / 100) * 100)));

        if(entropy >= 80) {
            rating = "Very Strong";
            color = "#1abc9c";
        } else if(entropy >= 60) {
            rating = "Strong";
            color = "#2ecc71";
        } else if(entropy >= 40) {
            rating = "Fair";
            color = "#f39c12";
        }

        lblStrength.innerText = "Strength: " + rating;
        lblEntropy.innerText = entropy + " bits";
        barStrength.style.width = pct + "%";
        barStrength.style.backgroundColor = color;

        return { rating, entropy };
    }

    function generate() {
        let chars = "";
        if (chkUpper.checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (chkLower.checked) chars += "abcdefghijklmnopqrstuvwxyz";
        if (chkNum.checked) chars += "0123456789";
        if (chkSym.checked) chars += "!@#$%^&*()_+";
        if (chars === "") { chars = "abcdefghijklmnopqrstuvwxyz"; chkLower.checked = true; }
        
        let pass = "";
        let len = parseInt(rngLen.value);
        for(let i=0; i<len; i++) {
            pass += chars[Math.floor(Math.random() * chars.length)];
        }
        pwdDisplay.innerText = pass;
        evaluateStrength(pass);
    }

    btnGen.addEventListener('click', generate);

    btnCopy.addEventListener('click', () => {
        navigator.clipboard.writeText(pwdDisplay.innerText).then(() => {
            const oldText = btnCopy.innerText;
            btnCopy.innerText = 'Copied!';
            setTimeout(() => btnCopy.innerText = oldText, 2000);
        }).catch(() => {
            alert("Failed to copy password.");
        });
    });

    btnSave.addEventListener('click', () => {
        const label = labelInput.value.trim();
        const pass = pwdDisplay.innerText;
        if (label && pass && pass !== '...') {
            const strInfo = evaluateStrength(pass);
            vault.push({label, pass, strength: strInfo.rating, date: new Date().toLocaleDateString()});
            localStorage.setItem('kpass_vault', JSON.stringify(vault));
            labelInput.value = '';
            updateVaultCount();
            alert("Saved to Vault!");
        } else {
            alert("Please enter a label and generate a password.");
        }
    });

    vaultSearch.addEventListener('input', renderVault);

    function renderVault() {
        vaultList.innerHTML = '';
        const query = vaultSearch.value.trim().toLowerCase();
        const filtered = vault.filter(item => 
            item.label.toLowerCase().includes(query) || 
            item.pass.toLowerCase().includes(query)
        );

        if (filtered.length === 0) {
            vaultList.innerHTML = '<div style="text-align:center;color:#666;margin-top:20px;">' + 
                (vault.length === 0 ? 'Vault is empty' : 'No matching entries found') + '</div>';
            return;
        }

        filtered.forEach((item) => {
            const realIndex = vault.indexOf(item);
            const div = document.createElement('div');
            div.className = 'vault-item';
            div.innerHTML = `
                <div class="vault-info">
                    <div>
                        <span class="vault-label"></span>
                        <span class="vault-badge">${item.strength || 'Saved'}</span>
                    </div>
                    <div class="vault-pass"></div>
                </div>
                <div class="item-btns">
                    <button class="btn-sm" onclick="copyVaultItem('${encodeURIComponent(item.pass)}')">Copy</button>
                    <button class="btn-sm btn-danger" onclick="deleteItem(${realIndex})">X</button>
                </div>
            `;
            div.querySelector('.vault-label').textContent = item.label;
            div.querySelector('.vault-pass').textContent = item.pass;
            vaultList.appendChild(div);
        });
    }

    window.copyVaultItem = (encodedPass) => {
        const pass = decodeURIComponent(encodedPass);
        navigator.clipboard.writeText(pass).then(() => {
            alert("Password copied to clipboard!");
        });
    };

    window.deleteItem = (index) => {
        vault.splice(index, 1);
        localStorage.setItem('kpass_vault', JSON.stringify(vault));
        renderVault();
        updateVaultCount();
    };

    btnExport.addEventListener('click', () => {
        if(vault.length === 0) {
            alert("Vault is empty!");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(vault, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", "kpass_vault.json");
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    });

    btnImport.addEventListener('click', () => fileImport.click());

    fileImport.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const imported = JSON.parse(event.target.result);
                if(Array.isArray(imported)) {
                    vault = vault.concat(imported);
                    localStorage.setItem('kpass_vault', JSON.stringify(vault));
                    renderVault();
                    updateVaultCount();
                    alert("Imported " + imported.length + " entries successfully!");
                } else {
                    alert("Invalid vault JSON format.");
                }
            } catch(err) {
                alert("Failed to parse JSON file.");
            }
        };
        reader.readAsText(file);
    });

    generate();
    updateVaultCount();
  </script>
</body>
</html>

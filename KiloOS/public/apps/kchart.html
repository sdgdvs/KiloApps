<!DOCTYPE html>
<html>
<head>
<title>KChart</title>
<style>
  body { margin: 0; font-family: "Segoe UI", sans-serif; background-color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
  canvas { background-color: #fff; }
  button { margin-top: 10px; padding: 5px 15px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; background: #e0e0e0; }
  button:hover { background: #d0d0d0; }
</style>
</head>
<body>
<canvas id="cvs" width="400" height="250"></canvas>
<button id="btnRand">Randomize Data</button>
<script>
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const btnRand = document.getElementById('btnRand');
  
  let values = [20, 60, 45, 80, 30];
  let target = [20, 60, 45, 80, 30];
  const labels = ["Q1", "Q2", "Q3", "Q4", "Q5"];
  const colors = [
      "rgb(200, 50, 50)",
      "rgb(50, 200, 50)",
      "rgb(50, 50, 200)",
      "rgb(200, 200, 50)",
      "rgb(200, 50, 200)"
  ];
  
  function draw() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      
      let chartX = 50;
      let chartY = 30;
      let chartW = cvs.width - 100;
      let chartH = cvs.height - 80;
      
      ctx.beginPath();
      ctx.moveTo(chartX, chartY);
      ctx.lineTo(chartX, chartY + chartH);
      ctx.lineTo(chartX + chartW, chartY + chartH);
      ctx.strokeStyle = "#000";
      ctx.stroke();
      
      let barW = 30;
      let spacing = (chartW - (5 * barW)) / 6;
      
      ctx.font = "14px 'Segoe UI'";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillStyle = "#000";
      
      for (let i = 0; i < 5; i++) {
          let bw = barW;
          let bh = (values[i] * chartH) / 100;
          let bx = chartX + spacing + i * (barW + spacing);
          let by = chartY + chartH - bh;
          
          ctx.fillStyle = colors[i];
          ctx.fillRect(bx, by, bw, bh);
          
          ctx.fillStyle = "#000";
          ctx.fillText(labels[i], bx + bw / 2, chartY + chartH + 5);
      }
  }
  
  function update() {
      let changed = false;
      for (let i = 0; i < 5; i++) {
          if (values[i] < target[i]) {
              values[i] += 2;
              if (values[i] > target[i]) values[i] = target[i];
              changed = true;
          } else if (values[i] > target[i]) {
              values[i] -= 2;
              if (values[i] < target[i]) values[i] = target[i];
              changed = true;
          }
      }
      if (changed) draw();
      requestAnimationFrame(update);
  }
  
  btnRand.onclick = () => {
      for (let i = 0; i < 5; i++) {
          target[i] = 10 + Math.floor(Math.random() * 90);
      }
  };
  
  draw();
  update();
</script>
</body>
</html>

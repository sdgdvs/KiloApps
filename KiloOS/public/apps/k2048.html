<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2048</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928DAB);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .container {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            min-width: 60px;
        }

        .score-box span {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 2px;
        }

        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 2.5%;
            margin: 0 auto 25px auto;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3%;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .tiles {
            position: absolute;
            top: 2.5%; left: 2.5%; right: 2.5%; bottom: 2.5%;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: 22.75%;
            height: 22.75%;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            z-index: 2;
            transition: transform 150ms ease-in-out;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: background 150ms, color 150ms, box-shadow 150ms;
        }

        .val-2 .tile-inner { background: rgba(238, 228, 218, 0.1); color: #ddd; }
        .val-4 .tile-inner { background: rgba(237, 224, 200, 0.2); color: #eee; }
        .val-8 .tile-inner { background: #f2b179; color: #fff; }
        .val-16 .tile-inner { background: #f59563; color: #fff; }
        .val-32 .tile-inner { background: #f67c5f; color: #fff; }
        .val-64 .tile-inner { background: #f65e3b; color: #fff; }
        .val-128 .tile-inner { background: #edcf72; color: #fff; box-shadow: 0 0 10px rgba(237, 207, 114, 0.5); font-size: 1.8rem; }
        .val-256 .tile-inner { background: #edcc61; color: #fff; box-shadow: 0 0 15px rgba(237, 204, 97, 0.6); font-size: 1.8rem; }
        .val-512 .tile-inner { background: #edc850; color: #fff; box-shadow: 0 0 20px rgba(237, 200, 80, 0.7); font-size: 1.8rem; }
        .val-1024 .tile-inner { background: #edc53f; color: #fff; box-shadow: 0 0 25px rgba(237, 197, 63, 0.8); font-size: 1.5rem; }
        .val-2048 .tile-inner { background: #edc22e; color: #fff; box-shadow: 0 0 30px rgba(237, 194, 46, 0.9); font-size: 1.5rem; }

        .tile.new .tile-inner {
            animation: appear 200ms ease;
        }

        .tile.merged .tile-inner {
            animation: pop 200ms ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        button.new-game {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button.new-game:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .game-over button {
            width: auto;
        }
        
        @media (max-width: 500px) {
            .container { padding: 15px; width: 95%; }
            h1 { font-size: 2.2rem; }
            .tile { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>2048</h1>
            <div class="score-container">
                <div class="score-box">
                    <span>Score</span>
                    <div id="score">0</div>
                </div>
                <div class="score-box">
                    <span>Best</span>
                    <div id="best-score">0</div>
                </div>
            </div>
        </div>
        <div class="board-container">
            <div class="grid" id="grid-bg">
                <!-- 16 empty cells -->
            </div>
            <div class="tiles" id="tiles-container">
                <!-- absolute positioned tiles -->
            </div>
        </div>
        <button class="new-game" onclick="initGame()">New Game</button>

        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <button class="new-game" onclick="initGame()">Try Again</button>
        </div>
    </div>

    <script>
        const gridBg = document.getElementById('grid-bg');
        const tilesContainer = document.getElementById('tiles-container');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const gameOverEl = document.getElementById('game-over');

        for (let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            gridBg.appendChild(cell);
        }

        let grid = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('k2048_best_score')) || 0;
        let isGameOverState = false;
        let isAnimating = false;
        let tileIdCounter = 0;

        // Represents a tile: {id, val, x, y, el}
        let tiles = [];

        function initGame() {
            grid = Array(16).fill(null);
            tiles.forEach(t => t.el.remove());
            tiles = [];
            score = 0;
            isGameOverState = false;
            isAnimating = false;
            updateScore();
            gameOverEl.classList.remove('active');
            addRandomTile();
            addRandomTile();
        }

        function createTileEl(tile, isNew) {
            const el = document.createElement('div');
            el.className = `tile val-${tile.val} ${isNew ? 'new' : ''}`;
            el.style.transform = `translate(calc(${tile.x} * 113.1868%), calc(${tile.y} * 113.1868%))`;
            
            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.textContent = tile.val;
            el.appendChild(inner);
            
            tilesContainer.appendChild(el);
            tile.el = el;
            
            if (isNew) {
                setTimeout(() => { el.classList.remove('new'); }, 200);
            }
        }

        function updateTileEl(tile, isMerged) {
            tile.el.style.transform = `translate(calc(${tile.x} * 113.1868%), calc(${tile.y} * 113.1868%))`;
            tile.el.className = `tile val-${tile.val} ${isMerged ? 'merged' : ''}`;
            tile.el.firstChild.textContent = tile.val;
            if (isMerged) {
                setTimeout(() => tile.el.classList.remove('merged'), 200);
            }
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 16; i++) {
                if (grid[i] === null) emptyCells.push(i);
            }
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                const val = Math.random() < 0.9 ? 2 : 4;
                const tile = {
                    id: tileIdCounter++,
                    val: val,
                    x: randomIdx % 4,
                    y: Math.floor(randomIdx / 4)
                };
                grid[randomIdx] = tile;
                tiles.push(tile);
                createTileEl(tile, true);
            }
        }

        function updateScore() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('k2048_best_score', bestScore);
            }
            scoreEl.textContent = score;
            bestScoreEl.textContent = bestScore;
        }

        function slideLine(lineTiles) {
            let filtered = lineTiles.filter(t => t !== null);
            let result = [];
            let i = 0;
            while(i < filtered.length) {
                if (i + 1 < filtered.length && filtered[i].val === filtered[i+1].val) {
                    let mergedTile = {
                        ...filtered[i],
                        val: filtered[i].val * 2,
                        mergePartner: filtered[i+1]
                    };
                    result.push(mergedTile);
                    score += mergedTile.val;
                    i += 2;
                } else {
                    result.push(filtered[i]);
                    i++;
                }
            }
            while(result.length < 4) {
                result.push(null);
            }
            return result;
        }

        function processMovement(getLine, setLine) {
            let changed = false;
            let tilesToRemove = [];
            
            for (let i = 0; i < 4; i++) {
                let line = getLine(i);
                let newLine = slideLine(line);
                
                for (let j = 0; j < 4; j++) {
                    const tile = newLine[j];
                    if (tile) {
                        if (tile.x !== setLine(i, j)[0] || tile.y !== setLine(i, j)[1] || tile.mergePartner) {
                            changed = true;
                        }
                        
                        let oldX = tile.x;
                        let oldY = tile.y;
                        tile.x = setLine(i, j)[0];
                        tile.y = setLine(i, j)[1];
                        
                        if (tile.mergePartner) {
                            let partner = tile.mergePartner;
                            partner.x = tile.x;
                            partner.y = tile.y;
                            partner.el.style.transform = `translate(calc(${partner.x} * 113.1868%), calc(${partner.y} * 113.1868%))`;
                            partner.el.style.zIndex = 1;
                            tilesToRemove.push(partner);
                            
                            delete tile.mergePartner;
                            updateTileEl(tile, true);
                        } else if (oldX !== tile.x || oldY !== tile.y) {
                            updateTileEl(tile, false);
                        }
                        grid[tile.y * 4 + tile.x] = tile;
                    } else {
                        grid[setLine(i, j)[1] * 4 + setLine(i, j)[0]] = null;
                    }
                }
            }
            
            if (tilesToRemove.length > 0) {
                setTimeout(() => {
                    tilesToRemove.forEach(t => {
                        t.el.remove();
                        tiles = tiles.filter(ti => ti.id !== t.id);
                    });
                }, 150);
            }
            
            return changed;
        }

        function moveLeft() {
            return processMovement(
                i => [grid[i*4], grid[i*4+1], grid[i*4+2], grid[i*4+3]],
                (i, j) => [j, i]
            );
        }

        function moveRight() {
            return processMovement(
                i => [grid[i*4+3], grid[i*4+2], grid[i*4+1], grid[i*4]],
                (i, j) => [3-j, i]
            );
        }

        function moveUp() {
            return processMovement(
                j => [grid[j], grid[4+j], grid[8+j], grid[12+j]],
                (j, i) => [j, i]
            );
        }

        function moveDown() {
            return processMovement(
                j => [grid[12+j], grid[8+j], grid[4+j], grid[j]],
                (j, i) => [j, 3-i]
            );
        }

        function isGameOver() {
            for (let i = 0; i < 16; i++) {
                if (grid[i] === null) return false;
                if (i % 4 < 3 && grid[i+1] !== null && grid[i].val === grid[i+1].val) return false;
                if (i < 12 && grid[i+4] !== null && grid[i].val === grid[i+4].val) return false;
            }
            return true;
        }

        function handleInput(dir) {
            if (isGameOverState || isAnimating) return;
            
            let changed = false;
            if (dir === 'left') changed = moveLeft();
            else if (dir === 'right') changed = moveRight();
            else if (dir === 'up') changed = moveUp();
            else if (dir === 'down') changed = moveDown();

            if (changed) {
                updateScore();
                isAnimating = true;
                setTimeout(() => {
                    addRandomTile();
                    isAnimating = false;
                    if (isGameOver()) {
                        isGameOverState = true;
                        setTimeout(() => gameOverEl.classList.add('active'), 500);
                    }
                }, 150);
            }
        }

        window.addEventListener('keydown', e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", "W", "A", "S", "D"].indexOf(e.key) > -1) {
                e.preventDefault();
            }
            if (isGameOverState) return;
            
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') handleInput('left');
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') handleInput('right');
            if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') handleInput('up');
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') handleInput('down');
        });

        let touchStartX = 0;
        let touchStartY = 0;
        
        document.querySelector('.board-container').addEventListener('touchstart', e => {
            if (isGameOverState) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.querySelector('.board-container').addEventListener('touchend', e => {
            if (isGameOverState) return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) handleInput('right');
                    else handleInput('left');
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy > 0) handleInput('down');
                    else handleInput('up');
                }
            }
        }, {passive: true});

        initGame();
    </script>
</body>
</html>

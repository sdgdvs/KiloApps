<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>2048</title>
<style>
    body {
        margin: 0; padding: 0;
        background-color: #faf8ef;
        font-family: Arial, sans-serif;
        color: #776e65;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; overflow: hidden;
    }
    .header {
        display: flex; justify-content: space-between; align-items: center;
        width: 340px; margin-bottom: 20px;
    }
    .title { font-size: 40px; font-weight: bold; margin: 0; }
    .scores {
        display: flex; gap: 10px;
    }
    .score-box {
        background: #bbada0; color: white; padding: 5px 15px; border-radius: 3px;
        text-align: center; font-weight: bold; font-size: 14px;
    }
    .score-box div { font-size: 20px; }
    .board {
        background: #bbada0; width: 340px; height: 340px; border-radius: 6px;
        position: relative;
    }
    .grid {
        display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
        gap: 10px; padding: 10px; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    }
    .cell {
        background: rgba(238, 228, 218, 0.35); border-radius: 3px;
    }
    .tile {
        position: absolute; width: 72.5px; height: 72.5px; border-radius: 3px;
        display: flex; justify-content: center; align-items: center;
        font-size: 30px; font-weight: bold; transition: 100ms ease-in-out;
    }
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 24px; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 24px; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 24px; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 20px; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 20px; }
    .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }
    
    .overlay {
        position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(238, 228, 218, 0.73); z-index: 10;
        display: none; flex-direction: column; align-items: center; justify-content: center;
        border-radius: 6px;
    }
    .overlay h2 { font-size: 40px; margin: 0 0 20px; color: #776e65; }
    .overlay button {
        background: #8f7a66; color: white; border: none; padding: 10px 20px;
        font-size: 18px; font-weight: bold; border-radius: 3px; cursor: pointer;
    }
</style>
</head>
<body>

<div class="header">
    <h1 class="title">2048</h1>
    <div class="scores">
        <div class="score-box">SCORE<div id="score">0</div></div>
        <div class="score-box">BEST<div id="best-score">0</div></div>
    </div>
</div>

<div class="board">
    <div class="grid">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div id="tiles"></div>
    <div class="overlay" id="overlay">
        <h2 id="msg">Game Over!</h2>
        <button onclick="initGame()">Try again</button>
    </div>
</div>

<script>
    let grid = [];
    let score = 0;
    let bestScore = localStorage.getItem('k2048_best') || 0;
    let gameOver = false;
    let hasWon = false;
    let winMsgShown = false;
    
    document.getElementById('best-score').innerText = bestScore;

    function createEmptyGrid() {
        return [...Array(4)].map(() => Array(4).fill(0));
    }

    function initGame() {
        grid = createEmptyGrid();
        score = 0;
        gameOver = false;
        hasWon = false;
        winMsgShown = false;
        document.getElementById('score').innerText = '0';
        document.getElementById('overlay').style.display = 'none';
        addRandomTile();
        addRandomTile();
        render();
    }

    function addRandomTile() {
        let empty = [];
        for (let r=0; r<4; r++) {
            for (let c=0; c<4; c++) {
                if (grid[r][c] === 0) empty.push({r, c});
            }
        }
        if (empty.length > 0) {
            let pos = empty[Math.floor(Math.random() * empty.length)];
            grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
        }
    }

    function render() {
        const container = document.getElementById('tiles');
        container.innerHTML = '';
        for (let r=0; r<4; r++) {
            for (let c=0; c<4; c++) {
                if (grid[r][c] !== 0) {
                    let tile = document.createElement('div');
                    let val = grid[r][c];
                    let cls = val <= 2048 ? `tile-${val}` : 'tile-super';
                    tile.className = `tile ${cls}`;
                    tile.innerText = val;
                    tile.style.top = (10 + r * 82.5) + 'px';
                    tile.style.left = (10 + c * 82.5) + 'px';
                    container.appendChild(tile);
                }
            }
        }
    }

    function move(dr, dc) {
        if (gameOver || (hasWon && !winMsgShown)) return false;
        let moved = false;
        let merged = createEmptyGrid();
        
        let rStart = dr === 1 ? 3 : 0;
        let rEnd = dr === 1 ? -1 : 4;
        let rStep = dr === 1 ? -1 : 1;
        
        let cStart = dc === 1 ? 3 : 0;
        let cEnd = dc === 1 ? -1 : 4;
        let cStep = dc === 1 ? -1 : 1;

        for (let r = rStart; r !== rEnd; r += rStep) {
            for (let c = cStart; c !== cEnd; c += cStep) {
                if (grid[r][c] !== 0) {
                    let cr = r;
                    let cc = c;
                    while(true) {
                        let nr = cr + dr;
                        let nc = cc + dc;
                        if (nr < 0 || nr > 3 || nc < 0 || nc > 3) break;
                        if (grid[nr][nc] === 0) {
                            grid[nr][nc] = grid[cr][cc];
                            grid[cr][cc] = 0;
                            cr = nr;
                            cc = nc;
                            moved = true;
                        } else if (grid[nr][nc] === grid[cr][cc] && !merged[nr][nc]) {
                            grid[nr][nc] *= 2;
                            grid[cr][cc] = 0;
                            score += grid[nr][nc];
                            merged[nr][nc] = 1;
                            moved = true;
                            if (grid[nr][nc] === 2048) hasWon = true;
                            break;
                        } else {
                            break;
                        }
                    }
                }
            }
        }
        
        if (moved) {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('k2048_best', bestScore);
                document.getElementById('best-score').innerText = bestScore;
            }
            document.getElementById('score').innerText = score;
            addRandomTile();
            if (checkGameOver()) {
                gameOver = true;
                showMsg("Game Over!");
            } else if (hasWon && !winMsgShown) {
                winMsgShown = true;
                showMsg("You Win!");
                document.querySelector('.overlay button').innerText = "Keep going";
                document.querySelector('.overlay button').onclick = () => {
                    document.getElementById('overlay').style.display = 'none';
                    document.querySelector('.overlay button').innerText = "Try again";
                    document.querySelector('.overlay button').onclick = initGame;
                };
            }
            render();
        }
    }

    function checkGameOver() {
        for (let r=0; r<4; r++) {
            for (let c=0; c<4; c++) {
                if (grid[r][c] === 0) return false;
                if (r < 3 && grid[r][c] === grid[r+1][c]) return false;
                if (c < 3 && grid[r][c] === grid[r][c+1]) return false;
            }
        }
        return true;
    }

    function showMsg(msg) {
        document.getElementById('msg').innerText = msg;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('overlay').style.background = gameOver ? 'rgba(238, 228, 218, 0.73)' : 'rgba(237, 194, 46, 0.5)';
        document.getElementById('msg').style.color = gameOver ? '#776e65' : '#f9f6f2';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') move(0, -1);
        else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') move(0, 1);
        else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') move(-1, 0);
        else if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') move(1, 0);
    });

    initGame();
</script>
</body>
</html>

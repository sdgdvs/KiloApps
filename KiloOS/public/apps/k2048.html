<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K2048</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg-color: linear-gradient(135deg, #1f1c2c, #928DAB);
            --text-color: #ffffff;
            --container-bg: rgba(30, 30, 30, 0.4);
            --container-border: rgba(255, 255, 255, 0.1);
            --container-shadow: rgba(0, 0, 0, 0.3);
            --score-bg: rgba(0, 0, 0, 0.3);
            --score-c: #aaa;
            --board-bg: rgba(0, 0, 0, 0.3);
            --cell-bg: rgba(255, 255, 255, 0.05);
            --btn-bg: rgba(255, 255, 255, 0.15);
            --btn-c: white;
            --btn-border: rgba(255, 255, 255, 0.2);
            --btn-hover: rgba(255, 255, 255, 0.25);
            --title-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            
            --t2-bg: rgba(238, 228, 218, 0.1); --t2-c: #ddd; --t2-sh: none;
            --t4-bg: rgba(237, 224, 200, 0.2); --t4-c: #eee; --t4-sh: none;
            --t8-bg: #f2b179; --t8-c: #fff; --t8-sh: none;
            --t16-bg: #f59563; --t16-c: #fff; --t16-sh: none;
            --t32-bg: #f67c5f; --t32-c: #fff; --t32-sh: none;
            --t64-bg: #f65e3b; --t64-c: #fff; --t64-sh: none;
            --t128-bg: #edcf72; --t128-c: #fff; --t128-sh: 0 0 10px rgba(237, 207, 114, 0.5);
            --t256-bg: #edcc61; --t256-c: #fff; --t256-sh: 0 0 15px rgba(237, 204, 97, 0.6);
            --t512-bg: #edc850; --t512-c: #fff; --t512-sh: 0 0 20px rgba(237, 200, 80, 0.7);
            --t1024-bg: #edc53f; --t1024-c: #fff; --t1024-sh: 0 0 25px rgba(237, 197, 63, 0.8);
            --t2048-bg: #edc22e; --t2048-c: #fff; --t2048-sh: 0 0 30px rgba(237, 194, 46, 0.9);
        }

        body.theme-classic {
            --bg-color: #faf8ef;
            --text-color: #776e65;
            --container-bg: transparent;
            --container-border: transparent;
            --container-shadow: transparent;
            --score-bg: #bbada0;
            --score-c: #eee4da;
            --board-bg: #bbada0;
            --cell-bg: rgba(238, 228, 218, 0.35);
            --btn-bg: #8f7a66;
            --btn-c: #f9f6f2;
            --btn-border: transparent;
            --btn-hover: #9f8b77;
            --title-shadow: none;
            
            --t2-bg: #eee4da; --t2-c: #776e65; --t2-sh: none;
            --t4-bg: #ede0c8; --t4-c: #776e65; --t4-sh: none;
            --t8-bg: #f2b179; --t8-c: #f9f6f2; --t8-sh: none;
            --t16-bg: #f59563; --t16-c: #f9f6f2; --t16-sh: none;
            --t32-bg: #f67c5f; --t32-c: #f9f6f2; --t32-sh: none;
            --t64-bg: #f65e3b; --t64-c: #f9f6f2; --t64-sh: none;
            --t128-bg: #edcf72; --t128-c: #f9f6f2; --t128-sh: 0 0 10px rgba(237, 207, 114, 0.5);
            --t256-bg: #edcc61; --t256-c: #f9f6f2; --t256-sh: 0 0 15px rgba(237, 204, 97, 0.6);
            --t512-bg: #edc850; --t512-c: #f9f6f2; --t512-sh: 0 0 20px rgba(237, 200, 80, 0.7);
            --t1024-bg: #edc53f; --t1024-c: #f9f6f2; --t1024-sh: 0 0 25px rgba(237, 197, 63, 0.8);
            --t2048-bg: #edc22e; --t2048-c: #f9f6f2; --t2048-sh: 0 0 30px rgba(237, 194, 46, 0.9);
        }

        body.theme-pastel {
            --bg-color: #fce4ec;
            --text-color: #4a148c;
            --container-bg: rgba(255, 255, 255, 0.6);
            --container-border: rgba(255, 255, 255, 0.5);
            --container-shadow: 0 8px 32px rgba(244, 143, 177, 0.3);
            --score-bg: rgba(244, 143, 177, 0.3);
            --score-c: #6a1b9a;
            --board-bg: #f8bbd0;
            --cell-bg: rgba(255, 255, 255, 0.5);
            --btn-bg: #f48fb1;
            --btn-c: #fff;
            --btn-border: #f06292;
            --btn-hover: #f06292;
            --title-shadow: 0 0 15px rgba(244, 143, 177, 0.5);
            
            --t2-bg: #e1bee7; --t2-c: #4a148c; --t2-sh: none;
            --t4-bg: #d1c4e9; --t4-c: #4a148c; --t4-sh: none;
            --t8-bg: #c5cae9; --t8-c: #4a148c; --t8-sh: none;
            --t16-bg: #bbdefb; --t16-c: #4a148c; --t16-sh: none;
            --t32-bg: #b3e5fc; --t32-c: #4a148c; --t32-sh: none;
            --t64-bg: #b2ebf2; --t64-c: #4a148c; --t64-sh: none;
            --t128-bg: #b2dfdb; --t128-c: #4a148c; --t128-sh: 0 0 10px rgba(178, 223, 219, 0.8);
            --t256-bg: #c8e6c9; --t256-c: #4a148c; --t256-sh: 0 0 15px rgba(200, 230, 201, 0.8);
            --t512-bg: #dcedc8; --t512-c: #4a148c; --t512-sh: 0 0 20px rgba(220, 237, 200, 0.8);
            --t1024-bg: #f0f4c3; --t1024-c: #4a148c; --t1024-sh: 0 0 25px rgba(240, 244, 195, 0.8);
            --t2048-bg: #fff9c4; --t2048-c: #4a148c; --t2048-sh: 0 0 30px rgba(255, 249, 196, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        .container {
            background: var(--container-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--container-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--container-shadow);
            text-align: center;
            width: 100%;
            max-width: 450px;
            position: relative;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 800;
            color: var(--text-color);
            text-shadow: var(--title-shadow);
            letter-spacing: 2px;
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: var(--score-bg);
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.05);
            min-width: 60px;
        }

        .score-box span {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--score-c);
            margin-bottom: 2px;
        }

        .board-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: var(--board-bg);
            border-radius: 12px;
            padding: 2.5%;
            margin: 0 auto 25px auto;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size, 4), 1fr);
            gap: 3%;
            width: 100%;
            height: 100%;
        }

        .grid-cell {
            background: var(--cell-bg);
            border-radius: 8px;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .tiles {
            position: absolute;
            top: 2.5%; left: 2.5%; right: 2.5%; bottom: 2.5%;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            width: var(--tile-size, 22.75%);
            height: var(--tile-size, 22.75%);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            z-index: 2;
            transition: transform 150ms ease-in-out;
        }

        .tile-inner {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: background 150ms, color 150ms, box-shadow 150ms;
        }

        .val-2 .tile-inner { background: var(--t2-bg); color: var(--t2-c); box-shadow: var(--t2-sh); }
        .val-4 .tile-inner { background: var(--t4-bg); color: var(--t4-c); box-shadow: var(--t4-sh); }
        .val-8 .tile-inner { background: var(--t8-bg); color: var(--t8-c); box-shadow: var(--t8-sh); }
        .val-16 .tile-inner { background: var(--t16-bg); color: var(--t16-c); box-shadow: var(--t16-sh); }
        .val-32 .tile-inner { background: var(--t32-bg); color: var(--t32-c); box-shadow: var(--t32-sh); }
        .val-64 .tile-inner { background: var(--t64-bg); color: var(--t64-c); box-shadow: var(--t64-sh); }
        .val-128 .tile-inner { background: var(--t128-bg); color: var(--t128-c); box-shadow: var(--t128-sh); font-size: 1.8rem; }
        .val-256 .tile-inner { background: var(--t256-bg); color: var(--t256-c); box-shadow: var(--t256-sh); font-size: 1.8rem; }
        .val-512 .tile-inner { background: var(--t512-bg); color: var(--t512-c); box-shadow: var(--t512-sh); font-size: 1.8rem; }
        .val-1024 .tile-inner { background: var(--t1024-bg); color: var(--t1024-c); box-shadow: var(--t1024-sh); font-size: 1.5rem; }
        .val-2048 .tile-inner { background: var(--t2048-bg); color: var(--t2048-c); box-shadow: var(--t2048-sh); font-size: 1.5rem; }
        .val--1 .tile-inner { background: #555; color: #fff; box-shadow: none; }

        .tile.new .tile-inner {
            animation: appear 200ms ease;
        }

        .tile.merged .tile-inner {
            animation: pop 200ms ease;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        button.btn {
            background: var(--btn-bg);
            color: var(--btn-c);
            border: 1px solid var(--btn-border);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
        }

        button.btn:hover {
            background: var(--btn-hover);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        
        .size-controls {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }
        
        button.size-btn {
            padding: 8px 0;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        button.size-btn.active {
            opacity: 1;
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #fff;
        }
        
        .game-over button {
            width: auto;
        }
        
        @media (max-width: 500px) {
            .container { padding: 15px; width: 95%; }
            h1 { font-size: 2.2rem; }
            .tile { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <h1>2048</h1>
                <div id="timer-display" style="font-size: 1.5rem; font-weight: bold; color: #ff5555; display: none;">60s</div>
                <select id="theme-select" onchange="setTheme(this.value)" style="background: var(--btn-bg); color: var(--btn-c); border: 1px solid var(--btn-border); padding: 5px; border-radius: 5px; cursor: pointer; outline: none;">
                    <option value="default">Dark</option>
                    <option value="classic">Classic</option>
                    <option value="pastel">Pastel</option>
                </select>
            </div>
            <div class="score-container">
                <div class="score-box">
                    <span>Score</span>
                    <div id="score">0</div>
                </div>
                <div class="score-box">
                    <span>Best</span>
                    <div id="best-score">0</div>
                </div>
            </div>
        </div>
        <div class="size-controls">
            <button class="btn size-btn" onclick="setGridSize(3, this)">3x3</button>
            <button class="btn size-btn active" onclick="setGridSize(4, this)">4x4</button>
            <button class="btn size-btn" onclick="setGridSize(5, this)">5x5</button>
            <button class="btn size-btn" onclick="setGridSize(6, this)">6x6</button>
        </div>
        <div class="board-container">
            <div class="grid" id="grid-bg">
                <!-- 16 empty cells -->
            </div>
            <div class="tiles" id="tiles-container">
                <!-- absolute positioned tiles -->
            </div>
        </div>
        <div class="controls">
            <button class="btn" onclick="initGame()">New Game</button>
            <button class="btn" onclick="toggleTimeAttack()" id="ta-btn">Time: Off</button>
            <button class="btn" onclick="toggleAutoPlay()" id="ap-btn">Auto: Off</button>
            <button class="btn" onclick="toggleObstacles()" id="obs-btn">Obs: Off</button>
            <button class="btn" onclick="undoMove()">Undo</button>
        </div>

        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <button class="btn" onclick="initGame()" style="width: auto;">Try Again</button>
        </div>
    </div>

    <script>
        const gridBg = document.getElementById('grid-bg');
        const tilesContainer = document.getElementById('tiles-container');
        const scoreEl = document.getElementById('score');
        const bestScoreEl = document.getElementById('best-score');
        const gameOverEl = document.getElementById('game-over');
        const themeSelect = document.getElementById('theme-select');

        function setTheme(themeName) {
            document.body.className = themeName === 'default' ? '' : `theme-${themeName}`;
            localStorage.setItem('k2048_theme', themeName);
            themeSelect.value = themeName;
        }
        
        let savedTheme = localStorage.getItem('k2048_theme') || 'default';
        setTheme(savedTheme);

        let gridSize = 4;

        for (let i = 0; i < gridSize * gridSize; i++) {
            const cell = document.createElement('div');
            cell.classList.add('grid-cell');
            gridBg.appendChild(cell);
        }

        let grid = [];
        let score = 0;
        let bestScore = parseInt(localStorage.getItem('k2048_best_score_4')) || parseInt(localStorage.getItem('k2048_best_score')) || 0;
        let isGameOverState = false;
        let isAnimating = false;
        let tileIdCounter = 0;
        let historyStack = [];
        
        let timeAttackEnabled = false;
        let timeRemaining = 60;
        let timerInterval = null;
        let gameStarted = false;

        let autoPlayEnabled = false;
        let autoPlayInterval = null;

        let obstaclesEnabled = false;
        let moveCount = 0;

        function toggleObstacles() {
            obstaclesEnabled = !obstaclesEnabled;
            document.getElementById('obs-btn').textContent = obstaclesEnabled ? "Obs: On" : "Obs: Off";
            initGame();
        }

        function toggleAutoPlay() {
            autoPlayEnabled = !autoPlayEnabled;
            document.getElementById('ap-btn').textContent = autoPlayEnabled ? "Auto: On" : "Auto: Off";
            if (autoPlayEnabled) {
                autoPlayInterval = setInterval(() => {
                    if (isGameOverState || isAnimating) return;
                    const dirs = ['up', 'right', 'down', 'left'];
                    dirs.sort(() => Math.random() - 0.5);
                    for (let d of dirs) {
                        if (handleInput(d)) break;
                    }
                }, 250);
            } else {
                clearInterval(autoPlayInterval);
                autoPlayInterval = null;
            }
        }

        function toggleTimeAttack() {
            timeAttackEnabled = !timeAttackEnabled;
            document.getElementById('ta-btn').textContent = timeAttackEnabled ? "Time: 60s" : "Time: Off";
            document.getElementById('timer-display').style.display = timeAttackEnabled ? "block" : "none";
            initGame();
        }

        // Represents a tile: {id, val, x, y, el}
        let tiles = [];

        function setGridSize(size, btnEl) {
            if (isAnimating) return;
            gridSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            if (btnEl) btnEl.classList.add('active');

            bestScore = parseInt(localStorage.getItem('k2048_best_score_' + gridSize)) || 0;
            if (gridSize === 4 && bestScore === 0) {
                bestScore = parseInt(localStorage.getItem('k2048_best_score')) || 0;
            }

            let tileWidth = (100 - (gridSize - 1) * 3) / gridSize;
            let translationPct = (tileWidth + 3) / tileWidth * 100;
            
            document.documentElement.style.setProperty('--grid-size', gridSize);
            document.documentElement.style.setProperty('--tile-size', tileWidth + '%');
            document.documentElement.style.setProperty('--translate-pct', translationPct + '%');
            
            gridBg.innerHTML = '';
            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                gridBg.appendChild(cell);
            }
            
            initGame();
        }

        function initGame() {
            grid = Array(gridSize * gridSize).fill(null);
            tiles.forEach(t => t.el.remove());
            tiles = [];
            score = 0;
            isGameOverState = false;
            isAnimating = false;
            historyStack = [];
            gameStarted = false;
            moveCount = 0;
            timeRemaining = 60;
            clearInterval(timerInterval);
            if (timeAttackEnabled) {
                document.getElementById('timer-display').textContent = timeRemaining + "s";
            }
            updateScore();
            gameOverEl.classList.remove('active');
            addRandomTile();
            addRandomTile();
        }

        function createTileEl(tile, isNew) {
            const el = document.createElement('div');
            el.className = `tile val-${tile.val} ${isNew ? 'new' : ''}`;
            el.style.transform = `translate(calc(${tile.x} * var(--translate-pct, 113.1868%)), calc(${tile.y} * var(--translate-pct, 113.1868%)))`;
            
            const inner = document.createElement('div');
            inner.className = 'tile-inner';
            inner.textContent = tile.val === -1 ? 'X' : tile.val;
            el.appendChild(inner);
            
            tilesContainer.appendChild(el);
            tile.el = el;
            
            if (isNew) {
                setTimeout(() => { el.classList.remove('new'); }, 200);
            }
        }

        function updateTileEl(tile, isMerged) {
            tile.el.style.transform = `translate(calc(${tile.x} * var(--translate-pct, 113.1868%)), calc(${tile.y} * var(--translate-pct, 113.1868%)))`;
            tile.el.className = `tile val-${tile.val} ${isMerged ? 'merged' : ''}`;
            tile.el.firstChild.textContent = tile.val === -1 ? 'X' : tile.val;
            if (isMerged) {
                setTimeout(() => tile.el.classList.remove('merged'), 200);
            }
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < gridSize * gridSize; i++) {
                if (grid[i] === null) emptyCells.push(i);
            }
            if (emptyCells.length > 0) {
                const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                let val = Math.random() < 0.9 ? 2 : 4;
                if (obstaclesEnabled && moveCount > 0 && moveCount % 5 === 0) {
                    val = -1;
                }
                const tile = {
                    id: tileIdCounter++,
                    val: val,
                    x: randomIdx % gridSize,
                    y: Math.floor(randomIdx / gridSize)
                };
                grid[randomIdx] = tile;
                tiles.push(tile);
                createTileEl(tile, true);
            }
        }

        function updateScore() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('k2048_best_score_' + gridSize, bestScore);
                if (gridSize === 4) {
                    localStorage.setItem('k2048_best_score', bestScore); // Backwards compat
                }
            }
            scoreEl.textContent = score;
            bestScoreEl.textContent = bestScore;
        }

        function slideLine(lineTiles) {
            let filtered = lineTiles.filter(t => t !== null);
            let result = [];
            let i = 0;
            while(i < filtered.length) {
                if (i + 1 < filtered.length && filtered[i].val === filtered[i+1].val && filtered[i].val !== -1) {
                    let mergedTile = {
                        ...filtered[i],
                        val: filtered[i].val * 2,
                        mergePartner: filtered[i+1]
                    };
                    result.push(mergedTile);
                    score += mergedTile.val;
                    i += 2;
                } else {
                    result.push(filtered[i]);
                    i++;
                }
            }
            while(result.length < gridSize) {
                result.push(null);
            }
            return result;
        }

        function processMovement(getLine, setLine) {
            let changed = false;
            let tilesToRemove = [];
            
            for (let i = 0; i < gridSize; i++) {
                let line = getLine(i);
                let newLine = slideLine(line);
                
                for (let j = 0; j < gridSize; j++) {
                    const tile = newLine[j];
                    if (tile) {
                        if (tile.x !== setLine(i, j)[0] || tile.y !== setLine(i, j)[1] || tile.mergePartner) {
                            changed = true;
                        }
                        
                        let oldX = tile.x;
                        let oldY = tile.y;
                        tile.x = setLine(i, j)[0];
                        tile.y = setLine(i, j)[1];
                        
                        if (tile.mergePartner) {
                            let partner = tile.mergePartner;
                            partner.x = tile.x;
                            partner.y = tile.y;
                            partner.el.style.transform = `translate(calc(${partner.x} * var(--translate-pct, 113.1868%)), calc(${partner.y} * var(--translate-pct, 113.1868%)))`;
                            partner.el.style.zIndex = 1;
                            tilesToRemove.push(partner);
                            
                            delete tile.mergePartner;
                            updateTileEl(tile, true);
                        } else if (oldX !== tile.x || oldY !== tile.y) {
                            updateTileEl(tile, false);
                        }
                        grid[tile.y * gridSize + tile.x] = tile;
                    } else {
                        grid[setLine(i, j)[1] * gridSize + setLine(i, j)[0]] = null;
                    }
                }
            }
            
            if (tilesToRemove.length > 0) {
                setTimeout(() => {
                    tilesToRemove.forEach(t => {
                        t.el.remove();
                        tiles = tiles.filter(ti => ti.id !== t.id);
                    });
                }, 150);
            }
            
            return changed;
        }

        function moveLeft() {
            return processMovement(
                i => Array.from({length: gridSize}, (_, k) => grid[i * gridSize + k]),
                (i, j) => [j, i]
            );
        }

        function moveRight() {
            return processMovement(
                i => Array.from({length: gridSize}, (_, k) => grid[i * gridSize + (gridSize - 1 - k)]),
                (i, j) => [gridSize - 1 - j, i]
            );
        }

        function moveUp() {
            return processMovement(
                j => Array.from({length: gridSize}, (_, k) => grid[k * gridSize + j]),
                (j, i) => [j, i]
            );
        }

        function moveDown() {
            return processMovement(
                j => Array.from({length: gridSize}, (_, k) => grid[(gridSize - 1 - k) * gridSize + j]),
                (j, i) => [j, gridSize - 1 - i]
            );
        }

        function isGameOver() {
            for (let i = 0; i < gridSize * gridSize; i++) {
                if (grid[i] === null) return false;
                if (i % gridSize < gridSize - 1 && grid[i+1] !== null && grid[i].val === grid[i+1].val && grid[i].val !== -1) return false;
                if (i < gridSize * gridSize - gridSize && grid[i+gridSize] !== null && grid[i].val === grid[i+gridSize].val && grid[i].val !== -1) return false;
            }
            return true;
        }

        function cloneState() {
            let clonedGrid = grid.map(tile => {
                if (!tile) return null;
                return { id: tile.id, val: tile.val, x: tile.x, y: tile.y };
            });
            return { grid: clonedGrid, score: score };
        }

        function undoMove() {
            if (historyStack.length === 0 || isAnimating) return;
            let lastState = historyStack.pop();
            
            grid = lastState.grid;
            score = lastState.score;
            isGameOverState = false;
            gameOverEl.classList.remove('active');
            
            tiles.forEach(t => t.el.remove());
            tiles = [];
            
            for (let i = 0; i < gridSize * gridSize; i++) {
                if (grid[i] !== null) {
                    let t = grid[i];
                    tiles.push(t);
                    createTileEl(t, false);
                }
            }
            updateScore();
        }

        function handleInput(dir) {
            if (isGameOverState || isAnimating) return false;
            
            let preState = cloneState();
            let changed = false;
            if (dir === 'left') changed = moveLeft();
            else if (dir === 'right') changed = moveRight();
            else if (dir === 'up') changed = moveUp();
            else if (dir === 'down') changed = moveDown();

            if (changed) {
                moveCount++;
                if (timeAttackEnabled && !gameStarted) {
                    gameStarted = true;
                    timerInterval = setInterval(() => {
                        timeRemaining--;
                        document.getElementById('timer-display').textContent = timeRemaining + "s";
                        if (timeRemaining <= 0) {
                            clearInterval(timerInterval);
                            isGameOverState = true;
                            gameOverEl.querySelector('h2').textContent = "Time's Up!";
                            gameOverEl.classList.add('active');
                        }
                    }, 1000);
                }
                historyStack.push(preState);
                if (historyStack.length > 50) historyStack.shift();
                updateScore();
                isAnimating = true;
                setTimeout(() => {
                    addRandomTile();
                    isAnimating = false;
                    if (isGameOver()) {
                        isGameOverState = true;
                        gameOverEl.querySelector('h2').textContent = "Game Over!";
                        clearInterval(timerInterval);
                        setTimeout(() => gameOverEl.classList.add('active'), 500);
                    }
                }, 150);
            }
            return changed;
        }

        window.addEventListener('keydown', e => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "a", "s", "d", "W", "A", "S", "D"].indexOf(e.key) > -1) {
                e.preventDefault();
            }

            if (autoPlayEnabled) toggleAutoPlay();

            if (e.key === 'z' && e.ctrlKey) { undoMove(); return; }
            if (e.key.toLowerCase() === 'u') { undoMove(); return; }

            if (isGameOverState) return;
            
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') handleInput('left');
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') handleInput('right');
            if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') handleInput('up');
            if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') handleInput('down');
        });

        let touchStartX = 0;
        let touchStartY = 0;
        
        document.querySelector('.board-container').addEventListener('touchstart', e => {
            if (autoPlayEnabled) toggleAutoPlay();
            if (isGameOverState) return;
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: true});

        document.querySelector('.board-container').addEventListener('touchend', e => {
            if (isGameOverState) return;
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) handleInput('right');
                    else handleInput('left');
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy > 0) handleInput('down');
                    else handleInput('up');
                }
            }
        }, {passive: true});

        initGame();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSudoku</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --bg-color: #0f172a;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-hover: rgba(255, 255, 255, 0.15);
            --glass-active: rgba(255, 255, 255, 0.25);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
            --cell-bg: rgba(15, 23, 42, 0.6);
            --cell-selected: rgba(59, 130, 246, 0.6);
            --cell-highlight: rgba(59, 130, 246, 0.2);
            --fog-color: #64748b;
        }

        [data-theme="neon-blue"] {
            --bg-color: #000000;
            --bg-grad-1: #000000;
            --bg-grad-2: #001122;
            --glass-bg: rgba(0, 10, 20, 0.7);
            --glass-border: rgba(0, 255, 255, 0.3);
            --glass-hover: rgba(0, 255, 255, 0.15);
            --glass-active: rgba(0, 255, 255, 0.3);
            --text-main: #e0ffff;
            --accent: #00ffff;
            --accent-hover: #00cccc;
            --cell-bg: rgba(0, 10, 20, 0.6);
            --cell-selected: rgba(0, 255, 255, 0.5);
            --cell-highlight: rgba(0, 255, 255, 0.2);
            --fog-color: #008888;
        }

        [data-theme="crimson-red"] {
            --bg-color: #1a0505;
            --bg-grad-1: #1a0505;
            --bg-grad-2: #3a0000;
            --glass-bg: rgba(30, 5, 5, 0.7);
            --glass-border: rgba(255, 100, 100, 0.2);
            --glass-hover: rgba(255, 100, 100, 0.15);
            --glass-active: rgba(255, 100, 100, 0.25);
            --text-main: #fff0f0;
            --accent: #f43f5e;
            --accent-hover: #e11d48;
            --cell-bg: rgba(30, 5, 5, 0.6);
            --cell-selected: rgba(244, 63, 94, 0.5);
            --cell-highlight: rgba(244, 63, 94, 0.2);
            --fog-color: #991b1b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            user-select: none;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            max-height: 870px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 12px;
        }

        button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--glass-hover);
        }
        
        button:active {
            background: var(--glass-active);
        }

        select {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 6px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            outline: none;
        }

        select option {
            background: var(--bg-color);
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 3px;
            width: 100%;
            max-width: 390px;
            aspect-ratio: 1;
            border: 3px solid var(--text-main);
            background: var(--text-main);
        }

        .block {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 1px;
            background: var(--glass-border);
        }

        .cell {
            background: var(--cell-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.4rem;
            font-weight: 400;
            cursor: pointer;
            color: var(--accent);
            transition: background 0.2s, transform 0.1s;
        }

        .cell:hover {
            background: var(--glass-hover);
        }

        .cell.fixed {
            font-weight: 600;
            color: var(--text-main);
        }

        .cell.selected {
            background: var(--cell-selected) !important;
        }

        .cell.highlight {
            background: var(--cell-highlight);
        }

        .cell.error {
            color: var(--error);
        }

        .cell.fog {
            color: var(--fog-color);
            font-weight: 600;
            background: rgba(30, 41, 59, 0.9);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 390px;
            margin-top: 16px;
        }

        .numpad button {
            padding: 10px 0;
            font-size: 1.2rem;
            border-radius: 12px;
            transition: transform 0.1s, background 0.2s;
        }

        .numpad button:active {
            transform: scale(0.92);
        }
        
        .numpad button.clear {
            grid-column: span 2;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            width: 100%;
            height: 100%;
            pointer-events: none;
            font-size: 0.6rem;
        }

        .note-item {
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            font-weight: 400;
        }

        .note-active {
            color: var(--text-muted);
        }

        .note-inactive {
            color: transparent;
        }

        @keyframes flashRed {
            0% { background-color: var(--error); color: white; }
            100% { background-color: var(--cell-bg); }
        }
        .cell.flash-error {
            animation: flashRed 0.6s ease-out;
        }

        @keyframes winPulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 20px 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .board-win {
            animation: winPulse 1s ease-in-out 3;
        }

        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            width: 85%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 { margin-top: 0; }
        .modal-close { margin-top: 20px; width: 100%; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; font-size: 0.85rem; }
        .stat-diff { margin-top: 12px; border-bottom: 1px solid var(--glass-border); padding-bottom: 4px; font-weight: bold; color: var(--accent); }
        .settings-group { margin-top: 15px; }
        .settings-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .settings-group select, .settings-group input[type="checkbox"] { margin-bottom: 12px; }
        .settings-group select { width: 100%; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>KSudoku</h1>
        </header>
        <div class="info-bar">
            <div id="timer">Time: 00:00</div>
            <div id="score">Score: 0</div>
        </div>
        <div class="controls">
            <select id="sel-difficulty">
                <option value="30">Easy</option>
                <option value="40" selected>Medium</option>
                <option value="50">Hard</option>
            </select>
            <button id="btn-new">New</button>
            <button id="btn-campaign">Campaign</button>
            <button id="btn-rush">Rush</button>
            <button id="btn-daily">Daily</button>
            <button id="btn-stats">Stats</button>
            <button id="btn-settings">Settings</button>
        </div>
        <div class="controls">
            <button id="btn-notes">Notes: OFF</button>
            <button id="btn-validate">Validate</button>
            <button id="btn-hint">Hint</button>
            <button id="btn-magic">Wand (3)</button>
            <button id="btn-shield">Shield (1)</button>
            <button id="btn-autofill">Auto</button>
            <button id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
            <button id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
        </div>
        <div class="main-content">
            <div class="sudoku-board" id="board">
                <!-- Cells generated by JS -->
            </div>
            
            <div class="numpad" id="numpad">
                <button data-val="1">1</button>
                <button data-val="2">2</button>
                <button data-val="3">3</button>
                <button data-val="4">4</button>
                <button data-val="5">5</button>
                <button data-val="6">6</button>
                <button data-val="7">7</button>
                <button data-val="8">8</button>
                <button data-val="9">9</button>
                <button data-val="0" class="clear">Clear</button>
            </div>
        </div>
    </div>
    
    <div id="stats-modal" class="modal">
        <div class="modal-content">
            <h2>Statistics</h2>
            <div id="stats-body"></div>
            <button class="modal-close" id="btn-close-stats">Close</button>
        </div>
    </div>
    
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="settings-group">
                <label for="sel-theme">Theme:</label>
                <select id="sel-theme">
                    <option value="classic-dark">Classic Dark</option>
                    <option value="neon-blue">Neon Blue</option>
                    <option value="crimson-red">Crimson Red</option>
                </select>
                
                <label>
                    <input type="checkbox" id="chk-highlight" checked>
                    Highlight Same Numbers
                </label>
                <label>
                    <input type="checkbox" id="chk-sound" checked>
                    Sound Effects
                </label>
            </div>
            <button class="modal-close" id="btn-close-settings">Close</button>
        </div>
    </div>
    
    <script>
        const boardEl = document.getElementById('board');
        const numpadEl = document.getElementById('numpad');
        const btnNew = document.getElementById('btn-new');
        const btnStats = document.getElementById('btn-stats');
        const btnSettings = document.getElementById('btn-settings');
        const btnNotes = document.getElementById('btn-notes');
        const btnValidate = document.getElementById('btn-validate');
        const btnHint = document.getElementById('btn-hint');
        const btnMagic = document.getElementById('btn-magic');
        const btnShield = document.getElementById('btn-shield');
        const btnCampaign = document.getElementById('btn-campaign');
        const btnRush = document.getElementById('btn-rush');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnAutofill = document.getElementById('btn-autofill');
        const statsModal = document.getElementById('stats-modal');
        const btnCloseStats = document.getElementById('btn-close-stats');
        const settingsModal = document.getElementById('settings-modal');
        const btnCloseSettings = document.getElementById('btn-close-settings');
        const selTheme = document.getElementById('sel-theme');
        const chkHighlight = document.getElementById('chk-highlight');
        const chkSound = document.getElementById('chk-sound');

        // Web Audio Synthesizer
        let audioCtx = null;
        function playSound(type) {
            if (!settings.soundEnabled) return;
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                let now = audioCtx.currentTime;

                if (type === 'select') {
                    osc.frequency.setValueAtTime(523, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'input') {
                    osc.frequency.setValueAtTime(659, now);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
                    osc.start(now); osc.stop(now + 0.07);
                } else if (type === 'correct') {
                    osc.frequency.setValueAtTime(784, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'error') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(220, now);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                } else if (type === 'powerup') {
                    osc.frequency.setValueAtTime(1047, now);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
                    osc.start(now); osc.stop(now + 0.12);
                } else if (type === 'win') {
                    let freqs = [523, 659, 784, 1047];
                    freqs.forEach((f, i) => {
                        let o = audioCtx.createOscillator();
                        let g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(f, now + i * 0.08);
                        g.gain.setValueAtTime(0.12, now + i * 0.08);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.15);
                        o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.15);
                    });
                } else if (type === 'fail') {
                    let freqs = [300, 250, 200];
                    freqs.forEach((f, i) => {
                        let o = audioCtx.createOscillator();
                        let g = audioCtx.createGain();
                        o.type = 'sawtooth';
                        o.connect(g); g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(f, now + i * 0.1);
                        g.gain.setValueAtTime(0.12, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.18);
                        o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.18);
                    });
                }
            } catch(e) {}
        }
        
        let board = [];
        let solution = [];
        let notes = [];
        let fog = [];
        let notesMode = false;
        let selectedCell = null;
        let cells = []; // Array of length 81
        
        let undoStack = [];
        let redoStack = [];

        let timerInterval = null;
        let elapsedTime = 0;
        let score = 0;
        let awarded = [];
        let originalBoard = [];

        let stats = JSON.parse(localStorage.getItem('ksudoku_stats')) || {
            30: { played: 0, won: 0, bestTime: Infinity, bestScore: 0 },
            40: { played: 0, won: 0, bestTime: Infinity, bestScore: 0 },
            50: { played: 0, won: 0, bestTime: Infinity, bestScore: 0 },
            rush: { played: 0, won: 0, bestTime: 0, bestScore: 0 },
            dailyStreak: 0,
            lastDailyDate: 0,
            maxCampaignStage: 0,
            totalWandsUsed: 0,
            totalShieldsUsed: 0
        };
        if (!stats.rush) stats.rush = { played: 0, won: 0, bestTime: 0, bestScore: 0 };
        if (stats.dailyStreak === undefined) stats.dailyStreak = 0;
        if (stats.lastDailyDate === undefined) stats.lastDailyDate = 0;
        if (stats.maxCampaignStage === undefined) stats.maxCampaignStage = 0;
        if (stats.totalWandsUsed === undefined) stats.totalWandsUsed = 0;
        if (stats.totalShieldsUsed === undefined) stats.totalShieldsUsed = 0;
        
        let currentDifficulty = 40;
        let gameActive = false;
        let isDailyGame = false;
        let isRushMode = false;
        
        let isCampaignMode = false;
        let campaignStage = 0; // 0 to 14
        let magicWands = 3;
        let shields = 1;
        let shieldActive = false;
        let strikes = 0;

        let settings = JSON.parse(localStorage.getItem('ksudoku_prefs')) || {
            theme: 'classic-dark',
            highlightSame: true,
            soundEnabled: true
        };

        function updateUIState() {
            if (isCampaignMode) {
                document.getElementById('timer').textContent = `Stage: ${campaignStage+1}/15 | Strikes: ${strikes}/3 | Time: ${Math.floor(elapsedTime / 60).toString().padStart(2, '0')}:${(elapsedTime % 60).toString().padStart(2, '0')}`;
            } else if (isRushMode) {
                document.getElementById('timer').textContent = `RUSH | Time Left: ${Math.floor(elapsedTime / 60).toString().padStart(2, '0')}:${(elapsedTime % 60).toString().padStart(2, '0')}`;
            } else {
                document.getElementById('timer').textContent = `Time: ${Math.floor(elapsedTime / 60).toString().padStart(2, '0')}:${(elapsedTime % 60).toString().padStart(2, '0')}`;
            }
            document.getElementById('score').textContent = `Score: ${score}`;
            btnMagic.textContent = `Wand (${magicWands})`;
            btnShield.textContent = shieldActive ? `Shield ON` : `Shield (${shields})`;
        }

        function applySettings() {
            document.documentElement.setAttribute('data-theme', settings.theme);
            selTheme.value = settings.theme;
            chkHighlight.checked = settings.highlightSame;
            chkSound.checked = settings.soundEnabled;
            updateHighlights();
        }

        function savePrefs() {
            localStorage.setItem('ksudoku_prefs', JSON.stringify(settings));
            applySettings();
        }

        function saveGameState() {
            if (!gameActive) {
                localStorage.removeItem('ksudoku_save');
                return;
            }
            const state = {
                board, solution, notes, fog, elapsedTime, score, currentDifficulty, awarded, originalBoard, undoStack, redoStack, isDailyGame,
                isCampaignMode, campaignStage, magicWands, shields, shieldActive, strikes, isRushMode
            };
            localStorage.setItem('ksudoku_save', JSON.stringify(state));
        }

        function loadGameState() {
            const saved = localStorage.getItem('ksudoku_save');
            if (!saved) return false;
            try {
                const state = JSON.parse(saved);
                board = state.board;
                solution = state.solution;
                notes = state.notes;
                fog = state.fog || Array(9).fill().map(() => Array(9).fill(false));
                elapsedTime = state.elapsedTime;
                score = state.score;
                currentDifficulty = state.currentDifficulty;
                awarded = state.awarded;
                originalBoard = state.originalBoard;
                undoStack = state.undoStack || [];
                redoStack = state.redoStack || [];
                gameActive = true;
                isDailyGame = state.isDailyGame || false;
                isCampaignMode = state.isCampaignMode || false;
                campaignStage = state.campaignStage || 0;
                magicWands = state.magicWands !== undefined ? state.magicWands : 3;
                shields = state.shields !== undefined ? state.shields : 1;
                shieldActive = state.shieldActive || false;
                strikes = state.strikes || 0;
                isRushMode = state.isRushMode || false;
                
                let sel = document.getElementById('sel-difficulty');
                if(sel) sel.value = currentDifficulty;
                
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (isRushMode) {
                        elapsedTime--;
                        if (elapsedTime <= 0) {
                            elapsedTime = 0;
                            clearInterval(timerInterval);
                            timerInterval = null;
                            gameActive = false;
                            playSound('fail');
                            saveGameState();
                            alert("Time's Up! Rush Mode Failed.");
                        }
                    } else {
                        elapsedTime++;
                    }
                    updateUIState();
                    saveGameState();
                }, 1000);
                
                updateUIState();
                return true;
            } catch(e) {
                return false;
            }
        }

        function saveStats() {
            localStorage.setItem('ksudoku_stats', JSON.stringify(stats));
        }

        function showStats() {
            const diffs = { 30: 'Easy', 40: 'Medium', 50: 'Hard' };
            let html = '';
            
            let dObj = new Date();
            let todayStr = dObj.getFullYear() * 10000 + (dObj.getMonth() + 1) * 100 + dObj.getDate();
            let completedToday = (stats.lastDailyDate === todayStr) ? 'Yes' : 'No';
            
            html += `<div class="stat-diff">Progress & Streaks</div>
            <div class="stat-grid">
                <div>Daily Streak: ${stats.dailyStreak}</div>
                <div>Completed Today: ${completedToday}</div>
                <div>Campaign Stage: ${stats.maxCampaignStage+1} / 15</div>
                <div>Wands Used: ${stats.totalWandsUsed}</div>
                <div>Shields Used: ${stats.totalShieldsUsed}</div>
            </div>`;

            let rs = stats.rush;
            let rRate = rs.played > 0 ? Math.round((rs.won / rs.played) * 100) : 0;
            let rBt = rs.bestTime === 0 ? '--:--' : `${Math.floor(rs.bestTime/60).toString().padStart(2, '0')}:${(rs.bestTime%60).toString().padStart(2, '0')}`;
            html += `<div class="stat-diff">Rush Mode</div>
            <div class="stat-grid">
                <div>Played: ${rs.played}</div><div>Won: ${rs.won}</div>
                <div>Win Rate: ${rRate}%</div><div>Best Score: ${rs.bestScore}</div>
                <div>Best Time Left: ${rBt}</div>
            </div>`;
            
            for (let d of [30, 40, 50]) {
                let s = stats[d];
                let rate = s.played > 0 ? Math.round((s.won / s.played) * 100) : 0;
                let bt = s.bestTime === Infinity ? '--:--' : `${Math.floor(s.bestTime/60).toString().padStart(2, '0')}:${(s.bestTime%60).toString().padStart(2, '0')}`;
                html += `<div class="stat-diff">${diffs[d]}</div>
                <div class="stat-grid">
                    <div>Played: ${s.played}</div><div>Won: ${s.won}</div>
                    <div>Win Rate: ${rate}%</div><div>Best Score: ${s.bestScore}</div>
                    <div>Best Time: ${bt}</div>
                </div>`;
            }
            document.getElementById('stats-body').innerHTML = html;
            statsModal.style.display = 'flex';
        }

        function pushState() {
            undoStack.push({
                board: JSON.parse(JSON.stringify(board)),
                notes: JSON.parse(JSON.stringify(notes)),
                fog: JSON.parse(JSON.stringify(fog)),
                score: score
            });
            redoStack = [];
        }

        function doUndo() {
            if (undoStack.length === 0) return;
            redoStack.push({
                board: JSON.parse(JSON.stringify(board)),
                notes: JSON.parse(JSON.stringify(notes)),
                fog: JSON.parse(JSON.stringify(fog)),
                score: score
            });
            let prevState = undoStack.pop();
            board = prevState.board;
            notes = prevState.notes;
            fog = prevState.fog;
            score = prevState.score;
            document.getElementById('score').textContent = `Score: ${score}`;
            playSound('select');
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    renderCell(r, c);
                    cells[r * 9 + c].classList.remove('error');
                }
            }
            updateHighlights();
            saveGameState();
        }

        function doRedo() {
            if (redoStack.length === 0) return;
            undoStack.push({
                board: JSON.parse(JSON.stringify(board)),
                notes: JSON.parse(JSON.stringify(notes)),
                fog: JSON.parse(JSON.stringify(fog)),
                score: score
            });
            let nextState = redoStack.pop();
            board = nextState.board;
            notes = nextState.notes;
            fog = nextState.fog;
            score = nextState.score;
            document.getElementById('score').textContent = `Score: ${score}`;
            playSound('select');
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    renderCell(r, c);
                    cells[r * 9 + c].classList.remove('error');
                }
            }
            updateHighlights();
            saveGameState();
        }

        function clearFogAround(r, c) {
            fog[r][c] = false;
            let dr = [-1, 1, 0, 0];
            let dc = [0, 0, -1, 1];
            for(let i=0; i<4; i++) {
                let nr = r + dr[i], nc = c + dc[i];
                if (nr>=0 && nr<9 && nc>=0 && nc<9) fog[nr][nc] = false;
            }
            let br = Math.floor(r/3)*3, bc = Math.floor(c/3)*3;
            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    fog[br+i][bc+j] = false;
                }
            }
        }

        const baseSolution = [
            [1, 2, 3, 4, 5, 6, 7, 8, 9],
            [4, 5, 6, 7, 8, 9, 1, 2, 3],
            [7, 8, 9, 1, 2, 3, 4, 5, 6],
            [2, 3, 1, 5, 6, 4, 8, 9, 7],
            [5, 6, 4, 8, 9, 7, 2, 3, 1],
            [8, 9, 7, 2, 3, 1, 5, 6, 4],
            [3, 1, 2, 6, 4, 5, 9, 7, 8],
            [6, 4, 5, 9, 7, 8, 3, 1, 2],
            [9, 7, 8, 3, 1, 2, 6, 4, 5]
        ];

        function shuffleArray(array, rng) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(rng() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function generateBoard(daily = false, rush = false) {
            isDailyGame = daily;
            isRushMode = rush;
            let rng = Math.random;
            if (daily) {
                let d = new Date();
                let seedVal = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
                let currentSeed = seedVal;
                rng = function() {
                    currentSeed = (currentSeed * 1664525 + 1013904223) % 4294967296;
                    return currentSeed / 4294967296;
                };
            }

            let grid = JSON.parse(JSON.stringify(baseSolution));
            let nums = [1,2,3,4,5,6,7,8,9];
            shuffleArray(nums, rng);
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    grid[r][c] = nums[grid[r][c]-1];
                }
            }
            
            for(let band=0; band<3; band++) {
                let rows = [0,1,2];
                shuffleArray(rows, rng);
                let r0 = [...grid[band*3 + rows[0]]];
                let r1 = [...grid[band*3 + rows[1]]];
                let r2 = [...grid[band*3 + rows[2]]];
                grid[band*3] = r0;
                grid[band*3+1] = r1;
                grid[band*3+2] = r2;
            }
            
            for(let band=0; band<3; band++) {
                let cols = [0,1,2];
                shuffleArray(cols, rng);
                for(let r=0; r<9; r++) {
                    let c0 = grid[r][band*3 + cols[0]];
                    let c1 = grid[r][band*3 + cols[1]];
                    let c2 = grid[r][band*3 + cols[2]];
                    grid[r][band*3] = c0;
                    grid[r][band*3+1] = c1;
                    grid[r][band*3+2] = c2;
                }
            }
            
            solution = JSON.parse(JSON.stringify(grid));
            awarded = Array(9).fill().map(() => Array(9).fill(false));
            fog = Array(9).fill().map(() => Array(9).fill(false));

            if (rush) elapsedTime = 180;
            else elapsedTime = 0;
            
            score = 0;
            if (timerInterval) clearInterval(timerInterval);
            updateUIState();
            timerInterval = setInterval(() => {
                if (isRushMode) {
                    elapsedTime--;
                    if (elapsedTime <= 0) {
                        elapsedTime = 0;
                        clearInterval(timerInterval);
                        timerInterval = null;
                        gameActive = false;
                        playSound('fail');
                        saveGameState();
                        alert("Time's Up! Rush Mode Failed.");
                    }
                } else {
                    elapsedTime++;
                }
                updateUIState();
                saveGameState();
            }, 1000);
            
            let difficultySelect = document.getElementById('sel-difficulty');
            let removal = daily ? 40 : (difficultySelect ? parseInt(difficultySelect.value) : 40);
            if (rush) removal = 45;
            let fogCount = 0;
            
            if (isCampaignMode) {
                let rems = [25, 30, 35, 40, 45, 48, 51, 54, 57, 60, 63, 65, 67, 69, 72];
                let fogs = [0, 0, 0, 0, 0, 1, 2, 3, 4, 5, 5, 6, 6, 7, 8];
                removal = rems[campaignStage];
                fogCount = fogs[campaignStage];
            }
            
            currentDifficulty = daily ? 40 : removal;
            
            if (!daily && !isCampaignMode && !rush) {
                stats[currentDifficulty].played++;
                saveStats();
            }
            gameActive = true;

            board = JSON.parse(JSON.stringify(grid));
            let empties = [];
            while(removal > 0) {
                let r = Math.floor(rng() * 9);
                let c = Math.floor(rng() * 9);
                if(board[r][c] !== 0) {
                    board[r][c] = 0;
                    empties.push({r, c});
                    removal--;
                }
            }
            
            for(let f=0; f<fogCount && empties.length > 0; f++) {
                let idx = Math.floor(rng() * empties.length);
                fog[empties[idx].r][empties[idx].c] = true;
                empties.splice(idx, 1);
            }

            originalBoard = JSON.parse(JSON.stringify(board));
            notes = Array(9).fill().map(() => Array(9).fill().map(() => Array(10).fill(false)));
            undoStack = [];
            redoStack = [];
            saveGameState();
        }

        function renderCell(r, c) {
            let cell = cells[r * 9 + c];
            cell.innerHTML = '';
            cell.classList.remove('fog');

            if (fog[r][c] && board[r][c] === 0) {
                cell.classList.add('fog');
                cell.textContent = '?';
            } else if (board[r][c] !== 0) {
                cell.textContent = board[r][c];
            } else {
                let hasNotes = false;
                for(let i=1; i<=9; i++) if (notes[r][c][i]) hasNotes = true;
                if (hasNotes) {
                    let grid = document.createElement('div');
                    grid.className = 'notes-grid';
                    for (let i = 1; i <= 9; i++) {
                        let div = document.createElement('div');
                        div.className = 'note-item ' + (notes[r][c][i] ? 'note-active' : 'note-inactive');
                        div.textContent = i;
                        grid.appendChild(div);
                    }
                    cell.appendChild(grid);
                }
            }
        }

        function initUI() {
            boardEl.innerHTML = '';
            cells = new Array(81);
            
            for(let b=0; b<9; b++) {
                let block = document.createElement('div');
                block.className = 'block';
                for(let i=0; i<9; i++) {
                    let r = Math.floor(b / 3) * 3 + Math.floor(i / 3);
                    let c = (b % 3) * 3 + (i % 3);
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    if (originalBoard[r][c] !== 0) {
                        cell.classList.add('fixed');
                    }
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    
                    cell.addEventListener('click', () => selectCell(r, c));
                    block.appendChild(cell);
                    cells[r * 9 + c] = cell;
                    renderCell(r, c);
                }
                boardEl.appendChild(block);
            }
        }
        
        function selectCell(r, c) {
            selectedCell = {r, c};
            playSound('select');
            updateHighlights();
        }
        
        function isValidPlacement(r, c, num) {
            for (let i = 0; i < 9; i++) {
                if (i !== c && board[r][i] === num) return false;
                if (i !== r && board[i][c] === num) return false;
            }
            let br = Math.floor(r / 3) * 3;
            let bc = Math.floor(c / 3) * 3;
            for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                    if ((br + i !== r || bc + j !== c) && board[br + i][bc + j] === num) return false;
                }
            }
            return true;
        }

        function updateHighlights() {
            let val = null;
            if (selectedCell) {
                val = board[selectedCell.r][selectedCell.c];
            }
            
            cells.forEach(cell => {
                cell.classList.remove('selected', 'highlight');
                let cr = parseInt(cell.dataset.r);
                let cc = parseInt(cell.dataset.c);
                
                if (selectedCell && cr === selectedCell.r && cc === selectedCell.c) {
                    cell.classList.add('selected');
                } else if (selectedCell && (cr === selectedCell.r || cc === selectedCell.c || 
                           (Math.floor(cr/3) === Math.floor(selectedCell.r/3) && Math.floor(cc/3) === Math.floor(selectedCell.c/3)))) {
                    cell.classList.add('highlight');
                } else if (settings.highlightSame && val && board[cr][cc] === val && val !== 0) {
                    cell.classList.add('highlight');
                }
            });
        }
        
        function inputNumber(num) {
            if (!selectedCell) return;
            let cell = cells[selectedCell.r * 9 + selectedCell.c];
            if (cell.classList.contains('fixed')) return;
            
            if (notesMode && num !== 0) {
                if (board[selectedCell.r][selectedCell.c] !== 0) return;
                pushState();
                notes[selectedCell.r][selectedCell.c][num] = !notes[selectedCell.r][selectedCell.c][num];
                playSound('input');
                renderCell(selectedCell.r, selectedCell.c);
                return;
            }
            
            if (num === 0) {
                if (board[selectedCell.r][selectedCell.c] !== 0) {
                    pushState();
                    board[selectedCell.r][selectedCell.c] = 0;
                    playSound('input');
                } else {
                    let hasNotes = false;
                    for (let i = 1; i <= 9; i++) if (notes[selectedCell.r][selectedCell.c][i]) hasNotes = true;
                    if (hasNotes) {
                        pushState();
                        for (let i = 1; i <= 9; i++) notes[selectedCell.r][selectedCell.c][i] = false;
                        playSound('input');
                    }
                }
            } else {
                if (board[selectedCell.r][selectedCell.c] !== num) {
                    pushState();
                    if (!isValidPlacement(selectedCell.r, selectedCell.c, num)) {
                        if (shieldActive) {
                            shieldActive = false; // Shield absorbs error!
                            updateUIState();
                            playSound('powerup');
                        } else {
                            cell.classList.remove('flash-error');
                            void cell.offsetWidth;
                            cell.classList.add('flash-error');
                            score = Math.max(0, score - 50);
                            playSound('error');

                            if (isRushMode) {
                                elapsedTime = Math.max(0, elapsedTime - 15);
                            }
                            
                            if (isCampaignMode) {
                                strikes++;
                                updateUIState();
                                if (strikes >= 3) {
                                    playSound('fail');
                                    alert("3 Strikes! Stage Failed. Restarting stage.");
                                    startCampaignStage(campaignStage);
                                    return;
                                }
                            }
                        }
                    } else {
                        playSound('correct');
                    }
                    board[selectedCell.r][selectedCell.c] = num;
                    clearFogAround(selectedCell.r, selectedCell.c);
                    for (let r=0; r<9; r++) for (let c=0; c<9; c++) renderCell(r, c);
                    
                    if (num === solution[selectedCell.r][selectedCell.c]) {
                        if (!awarded[selectedCell.r][selectedCell.c]) {
                            awarded[selectedCell.r][selectedCell.c] = true;
                            score += 100;
                            if (isRushMode) elapsedTime += 10;
                        }
                    }
                    updateUIState();
                }
            }
            renderCell(selectedCell.r, selectedCell.c);
            cell.classList.remove('error');
            updateHighlights();
            saveGameState();
            checkWin();
        }
        
        function checkWin() {
            let filled = board.every(row => row.every(v => v !== 0));
            if (!filled) return;
            
            let correct = true;
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    if (board[r][c] !== solution[r][c]) {
                        correct = false;
                        break;
                    }
                }
            }
            
            if (correct) {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                playSound('win');
                
                if (isRushMode) {
                    score += elapsedTime * 10 + 500;
                    stats.rush.won++;
                    if (elapsedTime > stats.rush.bestTime) stats.rush.bestTime = elapsedTime;
                    if (score > stats.rush.bestScore) stats.rush.bestScore = score;
                    saveStats();
                    gameActive = false;
                    saveGameState();
                    setTimeout(() => {
                        alert(`RUSH MODE VICTORY!\nTime Remaining: ${elapsedTime}s\nFinal Score: ${score}`);
                    }, 500);
                    return;
                }

                let timeBonus = Math.max(0, 3000 - elapsedTime * 2);
                score += timeBonus;
                updateUIState();
                
                if (gameActive) {
                    gameActive = false;
                    saveGameState();
                    if (isCampaignMode) {
                        if (campaignStage > stats.maxCampaignStage) {
                            stats.maxCampaignStage = campaignStage;
                            saveStats();
                        }
                        if (campaignStage < 14) {
                            setTimeout(() => {
                                let m = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
                                let s = (elapsedTime % 60).toString().padStart(2, '0');
                                alert(`Stage ${campaignStage+1} Clear!\nTime: ${m}:${s}\nScore: ${score}\nReady for Stage ${campaignStage+2}?`);
                                let keepScore = score;
                                campaignStage++;
                                startCampaignStage(campaignStage);
                                score = keepScore;
                                saveGameState();
                                updateUIState();
                                boardEl.classList.remove('board-win');
                            }, 500);
                            boardEl.classList.add('board-win');
                            return;
                        } else {
                            setTimeout(() => {
                                alert(`CONGRATULATIONS!!\nYou completed all 15 Stages of the KSudoku Campaign!\nFinal Score: ${score}`);
                                boardEl.classList.remove('board-win');
                            }, 500);
                            boardEl.classList.add('board-win');
                            return;
                        }
                    } else if (isDailyGame) {
                        let d = new Date();
                        let todayStr = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
                        if (stats.lastDailyDate !== todayStr) {
                            let yesterday = new Date(d);
                            yesterday.setDate(yesterday.getDate() - 1);
                            let yestStr = yesterday.getFullYear() * 10000 + (yesterday.getMonth() + 1) * 100 + yesterday.getDate();
                            
                            if (stats.lastDailyDate === yestStr) {
                                stats.dailyStreak++;
                            } else {
                                stats.dailyStreak = 1;
                            }
                            stats.lastDailyDate = todayStr;
                            saveStats();
                        }
                    } else {
                        stats[currentDifficulty].won++;
                        if (elapsedTime < stats[currentDifficulty].bestTime) stats[currentDifficulty].bestTime = elapsedTime;
                        if (score > stats[currentDifficulty].bestScore) stats[currentDifficulty].bestScore = score;
                        saveStats();
                    }
                }
                
                boardEl.classList.add('board-win');
                setTimeout(() => {
                    let m = Math.floor(elapsedTime / 60).toString().padStart(2, '0');
                    let s = (elapsedTime % 60).toString().padStart(2, '0');
                    alert(`Congratulations! You solved the puzzle!\nTime: ${m}:${s}\nScore: ${score}`);
                    boardEl.classList.remove('board-win');
                }, 3000);
            }
        }

        numpadEl.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                let val = parseInt(e.target.dataset.val);
                inputNumber(val);
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'z') {
                e.preventDefault();
                doUndo();
                return;
            }
            if (e.ctrlKey && e.key === 'y') {
                e.preventDefault();
                doRedo();
                return;
            }
            if (e.key === 'n' || e.key === 'N') {
                btnNotes.click();
            } else if (e.key >= '1' && e.key <= '9') {
                inputNumber(parseInt(e.key));
            } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
                inputNumber(0);
            } else if (selectedCell) {
                let r = selectedCell.r;
                let c = selectedCell.c;
                if (e.key === 'ArrowUp') r = Math.max(0, r - 1);
                if (e.key === 'ArrowDown') r = Math.min(8, r + 1);
                if (e.key === 'ArrowLeft') c = Math.max(0, c - 1);
                if (e.key === 'ArrowRight') c = Math.min(8, c + 1);
                
                if (e.key.startsWith('Arrow')) {
                    e.preventDefault();
                    selectCell(r, c);
                }
            }
        });
        
        btnNew.addEventListener('click', () => {
            isCampaignMode = false;
            isRushMode = false;
            generateBoard(false, false);
            initUI();
            selectedCell = null;
            updateHighlights();
        });

        if (btnRush) {
            btnRush.addEventListener('click', () => {
                isCampaignMode = false;
                isRushMode = true;
                shields = 1;
                shieldActive = false;
                magicWands = 1;
                stats.rush.played++;
                saveStats();
                generateBoard(false, true);
                initUI();
                selectedCell = null;
                updateHighlights();
                updateUIState();
            });
        }

            isRushMode = false;

            shields = 1;
            shieldActive = false;

            updateHighlights();
            updateUIState();

        btnStats.addEventListener('click', showStats);
        btnCloseStats.addEventListener('click', () => statsModal.style.display = 'none');
        
        btnSettings.addEventListener('click', () => settingsModal.style.display = 'flex');
        btnCloseSettings.addEventListener('click', () => {

            settings.soundEnabled = chkSound.checked;

        btnNotes.addEventListener('click', () => {
            notesMode = !notesMode;

            playSound('select');

        btnValidate.addEventListener('click', () => {
            let errorCount = 0;
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    let idx = r * 9 + c;
                    let cell = cells[idx];
                    if (!cell.classList.contains('fixed')) {
                        if (board[r][c] !== 0 && board[r][c] !== solution[r][c]) {
                            cell.classList.add('error');
                            errorCount++;
                        } else {
                            cell.classList.remove('error');
                        }
                    }
                }
            }
            if (errorCount > 0) {
                score = Math.max(0, score - errorCount * 20);
                playSound('error');
                updateUIState();

                playSound('correct');
            }
            saveGameState();
        });

        if (btnMagic) {
            btnMagic.addEventListener('click', () => {
                if (magicWands > 0) {
                    let emptyOrWrong = [];
                    for(let r=0; r<9; r++) {
                        for(let c=0; c<9; c++) {
                            let cell = cells[r * 9 + c];
                            if (!cell.classList.contains('fixed') && board[r][c] !== solution[r][c]) {
                                emptyOrWrong.push({r, c});
                            }
                        }
                    }
                    if(emptyOrWrong.length > 0) {
                        let target = emptyOrWrong[Math.floor(Math.random() * emptyOrWrong.length)];
                        pushState();
                        board[target.r][target.c] = solution[target.r][target.c];
                        awarded[target.r][target.c] = true;
                        magicWands--;
                        stats.totalWandsUsed++;
                        score += 50;
                        clearFogAround(target.r, target.c);
                        for(let r=0; r<9; r++) for(let c=0; c<9; c++) renderCell(r, c);
                        cells[target.r * 9 + target.c].classList.remove('error', 'flash-error');
                        playSound('powerup');
                        updateHighlights();
                        updateUIState();
                        saveGameState();
                        saveStats();
                        checkWin();
                    }
                }
            });
        }

        if (btnShield) {
            btnShield.addEventListener('click', () => {
                if (shields > 0 && !shieldActive) {
                    shields--;
                    shieldActive = true;
                    stats.totalShieldsUsed++;
                    playSound('powerup');
                    updateUIState();
                    saveStats();
                    saveGameState();
                }
            });
        }

        btnHint.addEventListener('click', () => {
            if (!selectedCell) return;
            let r = selectedCell.r;
            let c = selectedCell.c;
            let cell = cells[r * 9 + c];
            if (cell.classList.contains('fixed')) return;
            
            if (board[r][c] !== solution[r][c]) {
                pushState();
                score = Math.max(0, score - 150);
                board[r][c] = solution[r][c];
                awarded[r][c] = true; 
                clearFogAround(r, c);
                for(let row=0; row<9; row++) for(let col=0; col<9; col++) renderCell(row, col);
                cell.classList.remove('error', 'flash-error');
                playSound('correct');
                updateHighlights();
                updateUIState();
                saveGameState();
                checkWin();
            }
        });

        btnUndo.addEventListener('click', doUndo);
        btnRedo.addEventListener('click', doRedo);
        
        btnAutofill.addEventListener('click', () => {
            pushState();
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] === 0) {
                        for(let i=1; i<=9; i++) notes[r][c][i] = false;
                        for (let num = 1; num <= 9; num++) {
                            if (isValidPlacement(r, c, num)) {
                                notes[r][c][num] = true;
                            }
                        }
                    }
                }
            }
            playSound('input');
            saveGameState();
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    renderCell(r, c);
                }
            }
        });

        // Initialize
        applySettings();
        if (!loadGameState()) {
            generateBoard();
        }
        initUI();
    </script>
</body>
</html>

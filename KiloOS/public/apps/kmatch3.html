<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KMatch3</title>
<style>
  body {
    margin: 0; padding: 0; background-color: #1e1e1e; color: #fff; font-family: sans-serif;
    display: flex; flex-direction: column; align-items: center; height: 100vh;
  }
  h1 { margin: 10px 0; }
  .info { display: flex; justify-content: space-between; width: 400px; margin-bottom: 10px; font-size: 18px; font-weight: bold; }
  #board {
    width: 400px; height: 400px; background-color: #2d2d2d; border: 2px solid #555;
    position: relative; touch-action: none; user-select: none; overflow: hidden;
  }
  .cell {
    border-radius: 4px; display: flex; justify-content: center; align-items: center;
    cursor: pointer; transition: transform 0.2s, top 0.2s, left 0.2s, opacity 0.2s;
    position: absolute; width: 48px; height: 48px; box-sizing: border-box;
  }
  .cell.selected { border: 2px solid #fff; box-sizing: border-box; transform: scale(1.1); z-index: 10; }
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>
  <h1>KMatch3</h1>
  <div class="info" style="font-size: 16px;">
    <span><select id="mode" onchange="changeMode()" style="background:#333;color:#fff;border:1px solid #555;"><option value="0">Classic</option><option value="1">Zen</option><option value="2">Timed</option></select></span>
    <span>Lvl: <span id="level">1</span></span>
    <span>Score: <span id="score">0</span> / <span id="target">1000</span></span>
    <span><span id="movesLabel">Moves</span>: <span id="moves">20</span></span>
  </div>
  <div class="info" style="font-size: 14px; color: #ccc;">
    <span>Games: <span id="gamesPlayed">0</span></span>
    <span>Best Score: <span id="bestScore">0</span></span>
    <span>Max Combo: <span id="maxCombo">0</span></span>
  </div>
  <div id="board"></div>
  <script>
    const boardEl = document.getElementById('board');
    const scoreEl = document.getElementById('score');
    const movesEl = document.getElementById('moves');
    const levelEl = document.getElementById('level');
    const targetEl = document.getElementById('target');
    const gamesPlayedEl = document.getElementById('gamesPlayed');
    const bestScoreEl = document.getElementById('bestScore');
    const maxComboEl = document.getElementById('maxCombo');
    const ROWS = 8;
    const COLS = 8;
    const COLORS = ['#ff4040', '#40ff40', '#4040ff', '#ffff40', '#ff40ff', '#40ffff'];
    let grid = [];
    let level = 1;
    let score = 0;
    let moves = 20;
    let targetScore = 1000;
    let gameMode = 0;
    let selectedCell = null;
    let isProcessing = false;
    let lastSwap = null;
    let toDestroy = new Set();
    let gamesPlayed = 0;
    let bestScore = 0;
    let maxCombo = 0;

    function saveStats() {
      localStorage.setItem('kmatch3_stats', JSON.stringify({gamesPlayed, bestScore, maxCombo}));
    }
    
    function loadStats() {
      const saved = localStorage.getItem('kmatch3_stats');
      if (saved) {
        try {
          const stats = JSON.parse(saved);
          gamesPlayed = stats.gamesPlayed || 0;
          bestScore = stats.bestScore || 0;
          maxCombo = stats.maxCombo || 0;
        } catch(e) {}
      }
      gamesPlayedEl.textContent = gamesPlayed;
      bestScoreEl.textContent = bestScore;
      maxComboEl.textContent = maxCombo;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }
    
    function playSwapSound() { playTone(300, 'sine', 0.1); }
    function playMatchSound(combo) { playTone(400 + combo * 100, 'sine', 0.15); }
    function playBadSwapSound() { playTone(150, 'sawtooth', 0.15); }

    let particles = [];
    
    function createParticles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        p.style.backgroundColor = color;
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        boardEl.appendChild(p);
        
        let angle = Math.random() * Math.PI * 2;
        let speed = Math.random() * 4 + 2;
        particles.push({
          el: p,
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          decay: Math.random() * 0.05 + 0.02
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= p.decay;
        if (p.life <= 0) {
          if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
          particles.splice(i, 1);
        } else {
          p.el.style.left = p.x + 'px';
          p.el.style.top = p.y + 'px';
          p.el.style.opacity = p.life;
        }
      }
      requestAnimationFrame(updateParticles);
    }
    requestAnimationFrame(updateParticles);

    function createCellElement(r, c, color, type) {
        let cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.backgroundColor = type === 3 ? '#ffffff' : color;
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.style.top = (r * 50 + 1) + 'px';
        cell.style.left = (c * 50 + 1) + 'px';
        if (type === 1) cell.innerHTML = '<div style="width:100%;height:8px;background:#fff;border-radius:4px"></div>';
        if (type === 2) cell.innerHTML = '<div style="height:100%;width:8px;background:#fff;border-radius:4px"></div>';
        if (type === 3) cell.innerHTML = '<div style="width:24px;height:24px;background:#000;border-radius:50%"></div>';
        cell.addEventListener('click', onCellClick);
        return cell;
    }

    function initGame() {
      boardEl.innerHTML = '';
      grid = [];
      for (let r = 0; r < ROWS; r++) {
        let row = [];
        for (let c = 0; c < COLS; c++) {
          let color;
          do {
            color = COLORS[Math.floor(Math.random() * COLORS.length)];
          } while (
            (r >= 2 && grid[r-1][c].color === color && grid[r-2][c].color === color) ||
            (c >= 2 && row[c-1].color === color && row[c-2].color === color)
          );
          let cell = createCellElement(r, c, color, 0);
          boardEl.appendChild(cell);
          row.push({ color, type: 0, el: cell });
        }
        grid.push(row);
      }
      saveGame();
    }

    function saveGame() {
      const state = {
        level, score, moves, targetScore, gameMode,
        grid: grid.map(row => row.map(cell => cell ? {color: cell.color, type: cell.type} : null))
      };
      localStorage.setItem('kmatch3_save', JSON.stringify(state));
    }

    function loadGame() {
      const saved = localStorage.getItem('kmatch3_save');
      if (saved) {
        try {
          const state = JSON.parse(saved);
          level = state.level;
          score = state.score;
          moves = state.moves;
          targetScore = state.targetScore;
          gameMode = state.gameMode || 0;
          document.getElementById('mode').value = gameMode;
          if (gameMode === 1) document.getElementById('movesLabel').textContent = "Zen";
          else if (gameMode === 2) document.getElementById('movesLabel').textContent = "Time";
          else document.getElementById('movesLabel').textContent = "Moves";
          
          levelEl.textContent = level;
          scoreEl.textContent = score;
          targetEl.textContent = targetScore;
          movesEl.textContent = moves;

          boardEl.innerHTML = '';
          grid = [];
          for (let r = 0; r < ROWS; r++) {
            let row = [];
            for (let c = 0; c < COLS; c++) {
              let savedCell = state.grid[r][c];
              if (savedCell) {
                let cell = createCellElement(r, c, savedCell.color, savedCell.type);
                boardEl.appendChild(cell);
                row.push({ color: savedCell.color, type: savedCell.type, el: cell });
              } else {
                row.push(null);
              }
            }
            grid.push(row);
          }
          return true;
        } catch(e) {
          console.error("Save file corrupted");
        }
      }
      return false;
    }

    function onCellClick(e) {
      if (isProcessing) return;
      let target = e.currentTarget;
      const r = parseInt(target.dataset.r);
      const c = parseInt(target.dataset.c);
      if (selectedCell) {
        if (selectedCell.r === r && selectedCell.c === c) {
          selectedCell.el.classList.remove('selected');
          selectedCell = null;
        } else if (isAdjacent(selectedCell.r, selectedCell.c, r, c)) {
          swapAndCheck(selectedCell.r, selectedCell.c, r, c);
        } else {
          selectedCell.el.classList.remove('selected');
          target.classList.add('selected');
          selectedCell = { r, c, el: target };
        }
      } else {
        target.classList.add('selected');
        selectedCell = { r, c, el: target };
      }
    }

    function isAdjacent(r1, c1, r2, c2) {
      return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    }

    async function swapAndCheck(r1, c1, r2, c2) {
      isProcessing = true;
      if (selectedCell) selectedCell.el.classList.remove('selected');
      selectedCell = null;
      lastSwap = [{r:r1, c:c1}, {r:r2, c:c2}];
      
      swap(r1, c1, r2, c2);
      playSwapSound();
      await sleep(200);

      let colorBombSwap = false;
      let cbR = -1, cbC = -1, targetColor = null;
      let specialTrigger = null;

      if (grid[r1][c1].type === 3 && grid[r2][c2].type === 3) {
          specialTrigger = {r: r1, c: c1, color: 'all'};
      } else if (grid[r1][c1].type === 3 && grid[r2][c2].type !== 3) {
          specialTrigger = {r: r1, c: c1, color: grid[r2][c2].color};
      } else if (grid[r2][c2].type === 3 && grid[r1][c1].type !== 3) {
          specialTrigger = {r: r2, c: c2, color: grid[r1][c1].color};
      } else if (grid[r1][c1].type > 0 && grid[r2][c2].type > 0 && grid[r1][c1].type < 3 && grid[r2][c2].type < 3) {
          specialTrigger = {r: r2, c: c2, cross: true};
      }

      let matches = findMatches();
      if (matches.hMatches.length > 0 || matches.vMatches.length > 0 || specialTrigger) {
        if (gameMode === 0) moves--;
        movesEl.textContent = moves;
        await processMatches(matches, specialTrigger);
        checkLevelProgress();
        saveGame();
      } else {
        playBadSwapSound();
        swap(r1, c1, r2, c2); // swap back
        await sleep(200);
      }
      isProcessing = false;
    }

    function swap(r1, c1, r2, c2) {
      const temp = grid[r1][c1];
      grid[r1][c1] = grid[r2][c2];
      grid[r2][c2] = temp;
      grid[r1][c1].el.dataset.r = r1;
      grid[r1][c1].el.dataset.c = c1;
      grid[r1][c1].el.style.top = (r1 * 50 + 1) + 'px';
      grid[r1][c1].el.style.left = (c1 * 50 + 1) + 'px';
      grid[r2][c2].el.dataset.r = r2;
      grid[r2][c2].el.dataset.c = c2;
      grid[r2][c2].el.style.top = (r2 * 50 + 1) + 'px';
      grid[r2][c2].el.style.left = (c2 * 50 + 1) + 'px';
    }

    function findMatches() {
      let hMatches = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS - 2; c++) {
          if (!grid[r][c]) continue;
          let color = grid[r][c].color;
          if (grid[r][c].type === 3) continue;
          if (color && grid[r][c+1] && grid[r][c+1].color === color && grid[r][c+1].type !== 3 && grid[r][c+2] && grid[r][c+2].color === color && grid[r][c+2].type !== 3) {
            let group = [];
            let k = c;
            while(k < COLS && grid[r][k] && grid[r][k].color === color && grid[r][k].type !== 3) { group.push({r, c:k}); k++; }
            hMatches.push(group);
            c = k - 1;
          }
        }
      }
      let vMatches = [];
      for (let c = 0; c < COLS; c++) {
        for (let r = 0; r < ROWS - 2; r++) {
          if (!grid[r][c]) continue;
          let color = grid[r][c].color;
          if (grid[r][c].type === 3) continue;
          if (color && grid[r+1][c] && grid[r+1][c].color === color && grid[r+1][c].type !== 3 && grid[r+2][c] && grid[r+2][c].color === color && grid[r+2][c].type !== 3) {
            let group = [];
            let k = r;
            while(k < ROWS && grid[k][c] && grid[k][c].color === color && grid[k][c].type !== 3) { group.push({r:k, c}); k++; }
            vMatches.push(group);
            r = k - 1;
          }
        }
      }
      return {hMatches, vMatches};
    }

    function addDestroy(r, c) {
        let key = `${r},${c}`;
        if (toDestroy.has(key)) return;
        if (!grid[r][c]) return;
        toDestroy.add(key);
        let cell = grid[r][c];
        if (cell.type === 1) {
            for (let i = 0; i < COLS; i++) if (grid[r][i]) addDestroy(r, i);
        } else if (cell.type === 2) {
            for (let i = 0; i < ROWS; i++) if (grid[i][c]) addDestroy(i, c);
        } else if (cell.type === 3) {
            let color = COLORS[Math.floor(Math.random() * COLORS.length)];
            for (let i = 0; i < ROWS; i++) {
                for (let j = 0; j < COLS; j++) {
                    if (grid[i][j] && grid[i][j].color === color && grid[i][j].type !== 3) addDestroy(i, j);
                }
            }
        }
    }

    async function processMatches(matches, specialTrigger) {
      let comboMultiplier = 1;
      let hasMatches = true;

      while(hasMatches) {
        toDestroy.clear();
        let newSpecials = []; 

        if (specialTrigger) {
            toDestroy.add(`${specialTrigger.r},${specialTrigger.c}`);
            if (specialTrigger.color === 'all') {
                for(let i=0; i<ROWS; i++) for(let j=0; j<COLS; j++) if(grid[i][j]) addDestroy(i,j);
            } else if (specialTrigger.color) {
                for(let i=0; i<ROWS; i++) {
                    for(let j=0; j<COLS; j++) {
                        if(grid[i][j] && grid[i][j].color === specialTrigger.color) addDestroy(i,j);
                    }
                }
            } else if (specialTrigger.cross) {
                grid[specialTrigger.r][specialTrigger.c].type = 1; addDestroy(specialTrigger.r, specialTrigger.c);
                if (lastSwap) {
                    grid[lastSwap[0].r][lastSwap[0].c].type = 2; addDestroy(lastSwap[0].r, lastSwap[0].c);
                }
            }
            specialTrigger = null; 
        }

        let allGroups = [...matches.hMatches, ...matches.vMatches];
        allGroups.forEach(g => {
            let isLen5 = g.length >= 5;
            let isLen4 = g.length === 4;
            let sR = g[0].r, sC = g[0].c;
            if (lastSwap) {
                let found = g.find(m => (m.r === lastSwap[0].r && m.c === lastSwap[0].c) || (m.r === lastSwap[1].r && m.c === lastSwap[1].c));
                if (found) { sR = found.r; sC = found.c; }
            }
            if (isLen5) {
                newSpecials.push({r: sR, c: sC, type: 3, color: '#ffffff'});
            } else if (isLen4) {
                let isHoriz = g[0].r === g[1].r;
                newSpecials.push({r: sR, c: sC, type: isHoriz ? 1 : 2, color: grid[sR][sC].color});
            }
            g.forEach(m => addDestroy(m.r, m.c));
        });

        if (toDestroy.size === 0) { hasMatches = false; break; }

        let initialDestroy = Array.from(toDestroy);
        toDestroy.clear(); 
        initialDestroy.forEach(key => {
            let [r, c] = key.split(',').map(Number);
            addDestroy(r, c);
        });

        newSpecials.forEach(s => {
            toDestroy.delete(`${s.r},${s.c}`);
        });

        playMatchSound(comboMultiplier);
        score += toDestroy.size * 10 * comboMultiplier;
        scoreEl.textContent = score;
        if (score > bestScore) {
          bestScore = score;
          bestScoreEl.textContent = bestScore;
          saveStats();
        }

        let destroyArr = Array.from(toDestroy).map(key => {
            let [r, c] = key.split(',').map(Number);
            return {r, c};
        });

        destroyArr.forEach(m => {
          if (grid[m.r][m.c]) {
            let color = grid[m.r][m.c].color;
            if (grid[m.r][m.c].type === 3) color = '#ffffff';
            createParticles(m.c * 50 + 25, m.r * 50 + 25, color);
            grid[m.r][m.c].el.style.transform = 'scale(0)';
            grid[m.r][m.c].el.style.opacity = '0';
          }
        });

        await sleep(200);

        destroyArr.forEach(m => {
          if (grid[m.r][m.c]) {
            boardEl.removeChild(grid[m.r][m.c].el);
            grid[m.r][m.c] = null;
          }
        });

        newSpecials.forEach(s => {
            if (grid[s.r][s.c]) {
                boardEl.removeChild(grid[s.r][s.c].el);
            }
            let cell = createCellElement(s.r, s.c, s.color, s.type);
            boardEl.appendChild(cell);
            grid[s.r][s.c] = { color: s.color, type: s.type, el: cell };
        });

        for (let c = 0; c < COLS; c++) {
          let emptyR = ROWS - 1;
          for (let r = ROWS - 1; r >= 0; r--) {
            if (grid[r][c]) {
              if (emptyR !== r) {
                grid[emptyR][c] = grid[r][c];
                grid[emptyR][c].el.dataset.r = emptyR;
                grid[emptyR][c].el.style.top = (emptyR * 50 + 1) + 'px';
                grid[r][c] = null;
              }
              emptyR--;
            }
          }
          for (let r = emptyR; r >= 0; r--) {
            let color = COLORS[Math.floor(Math.random() * COLORS.length)];
            let cell = createCellElement(r, c, color, 0);
            boardEl.appendChild(cell);
            grid[r][c] = { color, type: 0, el: cell };
            cell.offsetHeight;
            cell.style.top = (r * 50 + 1) + 'px';
          }
        }
        
        await sleep(300);
        lastSwap = null; 
        matches = findMatches();
        if (matches.hMatches.length === 0 && matches.vMatches.length === 0) {
            hasMatches = false;
        } else {
            comboMultiplier++;
            if (comboMultiplier > maxCombo) {
                maxCombo = comboMultiplier;
                maxComboEl.textContent = maxCombo;
                saveStats();
            }
        }
      }
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function gameOver() {
        alert("Game Over! You reached Level " + level);
        gamesPlayed++;
        gamesPlayedEl.textContent = gamesPlayed;
        saveStats();
        changeMode();
    }

    function changeMode() {
        gameMode = parseInt(document.getElementById('mode').value);
        level = 1; score = 0;
        if (gameMode === 0) { moves = 20; targetScore = 1000; document.getElementById('movesLabel').textContent = "Moves"; document.getElementById('target').textContent = targetScore; }
        else if (gameMode === 1) { moves = '∞'; targetScore = '∞'; document.getElementById('movesLabel').textContent = "Zen"; document.getElementById('target').textContent = '∞'; }
        else if (gameMode === 2) { moves = 60; targetScore = 1000; document.getElementById('movesLabel').textContent = "Time"; document.getElementById('target').textContent = targetScore; }
        levelEl.textContent = level;
        scoreEl.textContent = score;
        movesEl.textContent = moves;
        initGame();
    }

    function checkLevelProgress() {
      if (gameMode === 1) {
          if (score >= level * 2000) { level++; levelEl.textContent = level; }
          return;
      }
      if (score >= targetScore) {
        level++;
        if (gameMode === 0) moves += 15;
        if (gameMode === 2) moves += 30;
        targetScore += 1000 + (level * 500);
        levelEl.textContent = level;
        targetEl.textContent = targetScore;
        movesEl.textContent = moves;
        alert("Level Up! Welcome to Level " + level);
      } else if ((gameMode === 0 || gameMode === 2) && moves <= 0) {
        gameOver();
      }
    }

    setInterval(() => {
        if (gameMode === 2 && moves > 0 && !isProcessing) {
            moves--;
            movesEl.textContent = moves;
            if (moves <= 0) gameOver();
        }
    }, 1000);

    loadStats();
    if (!loadGame()) {
      initGame();
    }
  </script>
</body>
</html>

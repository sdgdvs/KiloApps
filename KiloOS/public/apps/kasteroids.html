<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>KAsteroids</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            border: 2px solid #333;
            background: #111;
        }
        #gameCanvas { 
            display: block; 
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            z-index: 10; 
        }
        .score { 
            font-size: 20px; 
            font-weight: bold; 
            color: #0f0;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        h2 { margin: 0 0 10px 0; font-size: 36px; color: #f00; }
        p { margin: 0; font-size: 18px; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="ui">
            <div class="score">Score: <span id="scoreVal">0</span></div>
        </div>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>Press Enter to Restart</p>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreVal');
        const gameOverDiv = document.getElementById('gameOver');

        let score = 0;
        let keys = {};
        
        document.addEventListener('keydown', e => keys[e.code] = true);
        document.addEventListener('keyup', e => keys[e.code] = false);

        class Ship {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.angle = -Math.PI / 2;
                this.vx = 0;
                this.vy = 0;
                this.radius = 10;
                this.active = true;
            }
            update() {
                if (!this.active) return;
                
                if (keys['ArrowLeft']) this.angle -= 0.05;
                if (keys['ArrowRight']) this.angle += 0.05;
                if (keys['ArrowUp']) {
                    this.vx += Math.cos(this.angle) * 0.1;
                    this.vy += Math.sin(this.angle) * 0.1;
                }

                // Friction
                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                // Wrap
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(-10, 10);
                ctx.lineTo(-10, -10);
                ctx.closePath();
                ctx.stroke();
                
                if (keys['ArrowUp']) {
                    ctx.beginPath();
                    ctx.moveTo(-10, 5);
                    ctx.lineTo(-20, 0);
                    ctx.lineTo(-10, -5);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        class Asteroid {
            constructor(x, y, radius, level) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.level = level;
                let a = Math.random() * Math.PI * 2;
                let s = Math.random() * 2 + 1;
                this.vx = Math.cos(a) * s;
                this.vy = Math.sin(a) * s;
                this.points = [];
                for (let i = 0; i < 10; i++) {
                    this.points.push(this.radius + Math.random() * (this.radius * 0.4) - this.radius * 0.2);
                }
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.strokeStyle = '#aaa';
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    let a = (i / 10) * Math.PI * 2;
                    let r = this.points[i];
                    let x = Math.cos(a) * r;
                    let y = Math.sin(a) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * 7;
                this.vy = Math.sin(angle) * 7;
                this.life = 60;
                this.active = true;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                if (this.life <= 0) this.active = false;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        let ship = new Ship();
        let asteroids = [];
        let bullets = [];
        let gameOver = false;
        let lastShootTime = 0;

        function spawnAsteroids(count) {
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * canvas.width;
                    y = Math.random() * canvas.height;
                } while (Math.hypot(x - ship.x, y - ship.y) < 100);
                asteroids.push(new Asteroid(x, y, 40, 3));
            }
        }

        function initGame() {
            score = 0;
            scoreSpan.innerText = score;
            ship.reset();
            asteroids = [];
            bullets = [];
            gameOver = false;
            gameOverDiv.style.display = 'none';
            spawnAsteroids(4);
        }

        function checkCollisions() {
            // Bullet-Asteroid
            for (let b of bullets) {
                if (!b.active) continue;
                for (let a of asteroids) {
                    if (!a.active) continue;
                    let dist = Math.hypot(b.x - a.x, b.y - a.y);
                    if (dist < a.radius) {
                        b.active = false;
                        a.active = false;
                        score += (4 - a.level) * 10;
                        scoreSpan.innerText = score;
                        
                        if (a.level > 1) {
                            asteroids.push(new Asteroid(a.x, a.y, a.radius / 2, a.level - 1));
                            asteroids.push(new Asteroid(a.x, a.y, a.radius / 2, a.level - 1));
                        }
                    }
                }
            }
            
            // Ship-Asteroid
            if (ship.active) {
                for (let a of asteroids) {
                    if (!a.active) continue;
                    let dist = Math.hypot(ship.x - a.x, ship.y - a.y);
                    if (dist < a.radius + ship.radius) {
                        ship.active = false;
                        gameOver = true;
                        gameOverDiv.style.display = 'block';
                    }
                }
            }
        }

        function update() {
            if (gameOver) {
                if (keys['Enter']) initGame();
                return;
            }

            if (keys['Space']) {
                let now = Date.now();
                if (now - lastShootTime > 200) {
                    bullets.push(new Bullet(ship.x + Math.cos(ship.angle)*15, ship.y + Math.sin(ship.angle)*15, ship.angle));
                    lastShootTime = now;
                }
            }

            ship.update();
            
            bullets.forEach(b => b.update());
            bullets = bullets.filter(b => b.active);

            asteroids.forEach(a => a.update());
            asteroids = asteroids.filter(a => a.active);

            if (asteroids.length === 0) {
                spawnAsteroids(4);
            }

            checkCollisions();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ship.draw();
            bullets.forEach(b => b.draw());
            asteroids.forEach(a => a.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initGame();
        gameLoop();
    </script>
</body>
</html>

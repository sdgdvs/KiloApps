<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>File Browser</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: hsl(210, 15%, 20%);
    --primary: hsl(200, 85%, 60%);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
  }
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); }
  .toolbar { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 8px; font-size: 13px; display: flex; gap: 10px; }
  .toolbar button { cursor: pointer; padding: 4px 10px; font-family: 'Inter', sans-serif; font-size: 13px; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; transition: all 0.15s ease; }
  .toolbar button:hover { background: var(--primary); color: #111; border-color: var(--primary); }
  .file-list { padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; }
  .file-item { width: 75px; display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 5px; transition: background 0.15s ease; }
  .file-item:hover { background: rgba(255,255,255,0.05); border-radius: 6px; }
  .file-icon { width: 40px; height: 40px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 8px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: var(--text-main); }
  .file-name { font-size: 12px; text-align: center; word-break: break-word; line-height: 1.2; }
</style>
</head>
<body>
  <div class="toolbar">
    <button onclick="refresh()">Refresh</button>
  </div>
  <div class="file-list" id="list"></div>

  <script>
    let currentReqId = 0;
    const callbacks = {};

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (msg.type === 'VFS_LIST_DONE' && callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg.files);
        delete callbacks[msg.requestId];
      }
    });

    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    async function refresh() {
      const files = await sendToOS({ type: 'VFS_LIST' });
      const list = document.getElementById('list');
      list.innerHTML = '';
      if (files.length === 0) {
        list.innerHTML = '<div style="color:#777; font-size:12px;">Virtual Filesystem is empty.</div>';
        return;
      }
      files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'file-item';
        let iconHtml;
        if (f.endsWith('.txt') || f.endsWith('.md')) {
          iconHtml = `<div class="file-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" stroke="var(--primary)" stroke-width="2" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline fill="none" stroke="var(--primary)" stroke-width="2" points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13" stroke="var(--primary)" stroke-width="2"/><line x1="8" y1="17" x2="16" y2="17" stroke="var(--primary)" stroke-width="2"/><line x1="8" y1="9" x2="10" y2="9" stroke="var(--primary)" stroke-width="2"/></svg></div>`;
        } else if (f.endsWith('.js') || f.endsWith('.json')) {
          iconHtml = `<div class="file-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" stroke="#e8d44d" stroke-width="2" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline fill="none" stroke="#e8d44d" stroke-width="2" points="14 2 14 8 20 8"/><polyline fill="none" stroke="#e8d44d" stroke-width="2" points="10 13 8 15 10 17"/><polyline fill="none" stroke="#e8d44d" stroke-width="2" points="14 13 16 15 14 17"/></svg></div>`;
        } else if (f.endsWith('.png') || f.endsWith('.jpg') || f.endsWith('.ico')) {
          iconHtml = `<div class="file-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="#4caf50" stroke-width="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="none" stroke="#4caf50" stroke-width="2"/><polyline points="21 15 16 10 5 21" fill="none" stroke="#4caf50" stroke-width="2"/></svg></div>`;
        } else if (f.endsWith('.html')) {
          iconHtml = `<div class="file-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path fill="none" stroke="#e34f26" stroke-width="2" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline fill="none" stroke="#e34f26" stroke-width="2" points="14 2 14 8 20 8"/><circle cx="12" cy="14" r="3" fill="none" stroke="#e34f26" stroke-width="2"/></svg></div>`;
        } else if (!f.includes('.')) {
          // Assume directory
          iconHtml = `<div class="file-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" fill="none" stroke="#ffd700" stroke-width="2"/></svg></div>`;
        } else {
          const ext = f.split('.').pop().toUpperCase();
          iconHtml = `<div class="file-icon">${ext}</div>`;
        }
        item.innerHTML = `${iconHtml}<div class="file-name">${f}</div>`;
        item.ondblclick = () => {
          // Tell OS to launch appropriate app
          const appId = f.endsWith('.png') ? 'kpaint' : 'kpad';
          window.parent.postMessage({ type: 'OS_LAUNCH_APP', appId: appId, path: f }, '*');
        };
        list.appendChild(item);
      });
    }

    // Auto-refresh on load
    refresh();
  </script>
</body>
</html>

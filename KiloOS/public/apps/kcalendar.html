<!DOCTYPE html>
<html>
<head>
<title>KCalendar</title>
<style>
  body { margin: 0; background-color: #f5f5f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; background: #fff; border-bottom: 1px solid #ddd; }
  .header button { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
  .header button:hover { background: #eee; }
  .header h2 { margin: 0; font-size: 18px; font-weight: normal; }
  .calendar { flex: 1; display: flex; flex-direction: column; padding: 10px; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; font-size: 12px; color: #666; margin-bottom: 5px; }
  .days { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; flex: 1; gap: 2px; }
  .day { background: #fff; border: 1px solid #eee; padding: 5px; font-size: 14px; position: relative; cursor: pointer; }
  .day:hover { background: #f9f9f9; }
  .day.other-month { color: #ccc; }
  .day.today { background: #e6f3ff; border-color: #b3d9ff; font-weight: bold; }
  .event-dot { width: 6px; height: 6px; background: #0078d7; border-radius: 50%; position: absolute; bottom: 5px; right: 5px; display: none; }
  .day.has-event .event-dot { display: block; }
</style>
</head>
<body>
<div class="header">
  <button id="prevBtn">&lt;</button>
  <h2 id="monthYear">Month Year</h2>
  <button id="nextBtn">&gt;</button>
</div>
<div class="calendar">
  <div class="weekdays">
    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
  </div>
  <div class="days" id="days"></div>
</div>
<script>
  let currentDate = new Date();
  
  // Mock events
  const events = {
      '2026-07-04': 'Independence Day',
      '2026-07-15': 'Doctor Appointment'
  };

  function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      
      document.getElementById('monthYear').textContent = new Date(year, month).toLocaleString('default', { month: 'long', year: 'numeric' });
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();
      
      const daysContainer = document.getElementById('days');
      daysContainer.innerHTML = '';
      
      const today = new Date();
      
      // Previous month days
      for (let i = firstDay - 1; i >= 0; i--) {
          const div = document.createElement('div');
          div.className = 'day other-month';
          div.textContent = daysInPrevMonth - i;
          daysContainer.appendChild(div);
      }
      
      // Current month days
      for (let i = 1; i <= daysInMonth; i++) {
          const div = document.createElement('div');
          div.className = 'day';
          
          if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
              div.classList.add('today');
          }
          
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
          if (events[dateStr]) {
              div.classList.add('has-event');
              div.title = events[dateStr];
          }
          
          div.textContent = i;
          
          const dot = document.createElement('div');
          dot.className = 'event-dot';
          div.appendChild(dot);
          
          div.onclick = () => {
              const msg = events[dateStr] ? events[dateStr] : 'No events';
              alert(`${dateStr}:\n${msg}`);
          };
          
          daysContainer.appendChild(div);
      }
      
      // Next month days
      const totalCells = firstDay + daysInMonth;
      const nextDays = Math.ceil(totalCells / 7) * 7 - totalCells;
      for (let i = 1; i <= nextDays; i++) {
          const div = document.createElement('div');
          div.className = 'day other-month';
          div.textContent = i;
          daysContainer.appendChild(div);
      }
  }

  document.getElementById('prevBtn').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
  };
  document.getElementById('nextBtn').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
  };

  renderCalendar();
</script>
</body>
</html>

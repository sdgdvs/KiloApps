<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KConnect4</title>
<style>
  body {
    background: #1e1e1e;
    color: #fff;
    font-family: sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    margin-top: 0;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(7, 50px);
    grid-template-rows: repeat(6, 50px);
    gap: 5px;
    background: #0044cc;
    padding: 10px;
    border-radius: 8px;
  }
  .cell {
    width: 50px;
    height: 50px;
    background: #1e1e1e;
    border-radius: 50%;
    cursor: pointer;
  }
</style>
</head>
<body>
  <h1>KConnect4</h1>
  <div id="status">Player 1's turn</div>
  <br>
  <div id="board"></div>
  <script>
    const board = document.getElementById('board');
    for (let r = 0; r < 6; r++) {
      for (let c = 0; c < 7; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;
        board.appendChild(cell);
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KTetris</title>
<style>
  body { margin: 0; background-color: #1e1e1e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: monospace; }
  canvas { background-color: #1e1e1e; border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="300" height="400"></canvas>
<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(freq, type, dur) {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
      osc.stop(audioCtx.currentTime + dur);
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const W = 10, H = 20;
  
  const colors = ['#000', '#0ff', '#00f', '#fa0', '#ff0', '#0f0', '#808', '#f00'];
  const tetrominos = [
      [0x0F00, 0x2222, 0x00F0, 0x4444],
      [0x44C0, 0x8E00, 0x6220, 0x0710],
      [0x2260, 0x0E80, 0xC440, 0x2E00],
      [0xCC00, 0xCC00, 0xCC00, 0xCC00],
      [0x06C0, 0x8C40, 0x6C00, 0x4620],
      [0x0E40, 0x4C40, 0x4E00, 0x4640],
      [0x0C60, 0x4C80, 0xC600, 0x2640]
  ];

  let grid = Array(H).fill().map(() => Array(W).fill(0));
  let pc, rot, cx, cy, gameOver = false, isPaused = false, score = 0, lines = 0, level = 1;
  let nextPc, nextRot;
  let holdPc = -1, holdUsed = false;
  let highScore = parseInt(localStorage.getItem('ktetris_hiscore') || '0', 10);

  let bag = [];
  function getNextPc() {
      if (bag.length === 0) {
          bag = [0, 1, 2, 3, 4, 5, 6];
          for (let i = bag.length - 1; i > 0; i--) {
              let j = Math.floor(Math.random() * (i + 1));
              [bag[i], bag[j]] = [bag[j], bag[i]];
          }
      }
      return bag.pop();
  }

  function checkCol(p, r, x, y) {
      let shape = tetrominos[p][r];
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  let nx = x + j, ny = y + i;
                  if (nx < 0 || nx >= W || ny >= H || (ny >= 0 && grid[ny][nx])) return true;
              }
          }
      }
      return false;
  }

  function spawn() {
      pc = nextPc;
      rot = nextRot; cx = 3; cy = -2;
      nextPc = getNextPc();
      nextRot = 0;
      holdUsed = false;
      if (checkCol(pc, rot, cx, cy + 1)) {
          gameOver = true;
          playSound(200, 'square', 0.5);
          if (score > highScore) {
              highScore = score;
              localStorage.setItem('ktetris_hiscore', highScore);
          }
      }
  }

  function lock() {
      let shape = tetrominos[pc][rot];
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  if (cy + i >= 0) grid[cy + i][cx + j] = pc + 1;
              }
          }
      }
      let linesCleared = 0;
      for (let y = H - 1; y >= 0; y--) {
          if (grid[y].every(c => c > 0)) {
              grid.splice(y, 1);
              grid.unshift(Array(W).fill(0));
              linesCleared++;
              y++;
          }
      }
      if (linesCleared > 0) playSound(1000 + linesCleared * 200, 'square', 0.1);
      else playSound(500, 'square', 0.05);
      
      lines += linesCleared;
      level = Math.floor(lines / 10) + 1;
      score += linesCleared * 100 * level;
      dropInterval = Math.max(50, 500 - (level - 1) * 30);
  }

  function init() {
      grid = Array(H).fill().map(() => Array(W).fill(0));
      gameOver = false;
      isPaused = false;
      score = 0;
      lines = 0;
      level = 1;
      dropInterval = 500;
      bag = [];
      nextPc = getNextPc();
      nextRot = 0;
      holdPc = -1;
      holdUsed = false;
      spawn();
  }

  document.addEventListener('keydown', e => {
      if (gameOver && e.key === 'Enter') init();
      if (gameOver) return;
      if (e.key.toLowerCase() === 'p') { isPaused = !isPaused; return; }
      if (isPaused) return;

      if (e.key === 'ArrowLeft' && !checkCol(pc, rot, cx - 1, cy)) cx--;
      if (e.key === 'ArrowRight' && !checkCol(pc, rot, cx + 1, cy)) cx++;
      if (e.key === 'ArrowDown' && !checkCol(pc, rot, cx, cy + 1)) cy++;
      if (e.key === 'ArrowUp') {
          let nr = (rot + 1) % 4;
          if (!checkCol(pc, nr, cx, cy)) rot = nr;
      }
      if (e.key === 'c' || e.key === 'C' || e.key === 'Shift') {
          if (!holdUsed) {
              if (holdPc === -1) {
                  holdPc = pc;
                  spawn();
              } else {
                  let temp = pc;
                  pc = holdPc;
                  holdPc = temp;
                  rot = 0; cx = 3; cy = -2;
              }
              holdUsed = true;
              draw();
          }
      }
      if (e.key === ' ') {
          while (!checkCol(pc, rot, cx, cy + 1)) cy++;
          lock(); spawn();
      }
      draw();
  });

  function draw() {
      ctx.fillStyle = '#1e1e1e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
              if (grid[y][x]) {
                  ctx.fillStyle = colors[grid[y][x]];
                  ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
              }
          }
      }

      if (!gameOver && !isPaused) {
          // Draw Ghost piece
          let ghost_y = cy;
          while (!checkCol(pc, rot, cx, ghost_y + 1)) {
              ghost_y++;
          }
          let shape = tetrominos[pc][rot];
          ctx.strokeStyle = colors[pc + 1];
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (ghost_y + i >= 0) {
                          ctx.strokeRect((cx + j) * CELL + 1.5, (ghost_y + i) * CELL + 1.5, CELL - 3, CELL - 3);
                      }
                  }
              }
          }
          
          ctx.fillStyle = colors[pc + 1];
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (cy + i >= 0) {
                          ctx.fillRect((cx + j) * CELL + 1, (cy + i) * CELL + 1, CELL - 2, CELL - 2);
                      }
                  }
              }
          }
      } else if (gameOver) {
          ctx.fillStyle = 'red';
          ctx.font = '20px monospace';
          ctx.fillText('GAME OVER', 50, 200);
      } else if (isPaused) {
          ctx.fillStyle = 'yellow';
          ctx.font = '20px monospace';
          ctx.fillText('PAUSED', 65, 200);
      }
      
      ctx.strokeStyle = '#333';
      ctx.beginPath();
      ctx.moveTo(W * CELL, 0);
      ctx.lineTo(W * CELL, H * CELL);
      ctx.stroke();

      ctx.fillStyle = 'white';
      ctx.font = '12px monospace';
      ctx.fillText('SCORE: ' + score, 210, 20);
      ctx.fillText('HI: ' + highScore, 210, 40);
      ctx.fillText('LEVEL: ' + level, 210, 60);
      ctx.fillText('LINES: ' + lines, 210, 80);
      ctx.fillText('NEXT:', 210, 110);
      
      if (!gameOver) {
          let nextShape = tetrominos[nextPc][nextRot];
          ctx.fillStyle = colors[nextPc + 1];
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (nextShape & (1 << (15 - (i * 4 + j)))) {
                      ctx.fillRect(210 + j * CELL + 1, 130 + i * CELL + 1, CELL - 2, CELL - 2);
                  }
              }
          }
      }

      ctx.fillText('HOLD:', 210, 230);
      if (holdPc !== -1) {
          let holdShape = tetrominos[holdPc][0];
          ctx.fillStyle = colors[holdPc + 1];
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (holdShape & (1 << (15 - (i * 4 + j)))) {
                      ctx.fillRect(210 + j * CELL + 1, 250 + i * CELL + 1, CELL - 2, CELL - 2);
                  }
              }
          }
      }
  }

  let lastTime = 0;
  let dropCounter = 0;
  let dropInterval = 500;

  function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;
      if (!isPaused) dropCounter += deltaTime;
      
      if (dropCounter > dropInterval) {
          if (!gameOver && !isPaused) {
              if (!checkCol(pc, rot, cx, cy + 1)) cy++;
              else { lock(); spawn(); }
              draw();
          }
          dropCounter = 0;
      }
      if (isPaused) draw();
      requestAnimationFrame(update);
  }

  init();
  update();
</script>
</body>
</html>

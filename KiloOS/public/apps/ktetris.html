<!DOCTYPE html>
<html>
<head>
<title>KTetris</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background-color: #0c0d12; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ffffff; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; user-select: none; }
  canvas { background-color: #121218; border: 2px solid #282a36; box-shadow: 0 0 30px rgba(0, 240, 240, 0.18); border-radius: 8px; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="370" height="440"></canvas>
<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(freq, type, dur) {
      try {
          if (audioCtx.state === 'suspended') audioCtx.resume();
          let osc = audioCtx.createOscillator();
          let gain = audioCtx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
          osc.stop(audioCtx.currentTime + dur);
      } catch(e) {}
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const W = 10, H = 20;
  const BOARD_W = W * CELL; // 200px
  const SIDEBAR_X = BOARD_W + 15; // 215px

  const colors = ['#000000', '#00f0f0', '#0000f0', '#f0a000', '#f0f000', '#00f000', '#a000f0', '#f00000', '#888899', '#ff3333'];
  const bevelHi = ['', '#99ffff', '#6666ff', '#ffcc66', '#ffff99', '#66ff66', '#d999ff', '#ff6666', '#bbbbcc', '#ff9999'];
  const bevelSh = ['', '#008888', '#000088', '#995500', '#999900', '#008800', '#550088', '#880000', '#444455', '#880000'];

  const tetrominos = [
      [0x0F00, 0x2222, 0x00F0, 0x4444], // I
      [0x44C0, 0x8E00, 0x6220, 0x0710], // J
      [0x2260, 0x0E80, 0xC440, 0x2E00], // L
      [0xCC00, 0xCC00, 0xCC00, 0xCC00], // O
      [0x06C0, 0x8C40, 0x6C00, 0x4620], // S
      [0x0E40, 0x4C40, 0x4E00, 0x4640], // T
      [0x0C60, 0x4C80, 0xC600, 0x2640]  // Z
  ];

  const MODE_MARATHON = 0;
  const MODE_SPRINT   = 1; // 40-Lines
  const MODE_ULTRA    = 2; // 2-Minute
  const MODE_CAMPAIGN = 3; // Progressive Garbage / Bombs
  const modeNames = ["MARATHON", "SPRINT 40L", "ULTRA 2-MIN", "CAMPAIGN"];

  let grid = Array(H).fill().map(() => Array(W).fill(0));
  let pc, rot, cx, cy, isBomb = false;
  let gameOver = false, isPaused = false, startScreen = true, winScreen = false, showLeaderboard = false;
  let score = 0, lines = 0, level = 1, combo = 0, piecesPlaced = 0;
  let gameMode = MODE_MARATHON, campaignLevel = 1;
  let statLines = [0, 0, 0, 0];

  // Timers
  let modeTimerMs = 0;
  let ultraTimeLeftMs = 120000; // 2 minutes

  // Next Queue & Hold Slot
  let nextQueue = []; // [{pc, isBomb}, ...]
  let holdPc = -1, holdIsBomb = false, holdUsed = false;

  // Persistence
  let highScore = parseInt(localStorage.getItem('ktetris_hiscore') || '0', 10);
  let leaderboard = JSON.parse(localStorage.getItem('ktetris_leaderboard') || '[]');

  // FX & Animations
  let particles = [];
  let popups = [];
  let lineFlashes = [];

  function saveLeaderboard(newScore, modeIdx, linesCleared, timeMs) {
      let modeLabel = modeNames[modeIdx];
      let entry = {
          score: newScore,
          mode: modeLabel,
          lines: linesCleared,
          time: formatTime(timeMs),
          date: new Date().toLocaleDateString()
      };
      leaderboard.push(entry);
      leaderboard.sort((a, b) => b.score - a.score);
      if (leaderboard.length > 5) leaderboard = leaderboard.slice(0, 5);
      localStorage.setItem('ktetris_leaderboard', JSON.stringify(leaderboard));
      if (newScore > highScore) {
          highScore = newScore;
          localStorage.setItem('ktetris_hiscore', highScore.toString());
      }
  }

  function saveGameState() {
      if (startScreen || gameOver || winScreen) return;
      let state = {
          grid, pc, rot, cx, cy, isBomb,
          score, lines, level, combo, piecesPlaced,
          gameMode, campaignLevel, statLines,
          modeTimerMs, ultraTimeLeftMs,
          nextQueue, holdPc, holdIsBomb, holdUsed
      };
      localStorage.setItem('ktetris_saved_game', JSON.stringify(state));
      addPopup(BOARD_W / 2 - 30, H * CELL / 2, "GAME SAVED!", "#00ffff");
      playSound(800, 'sine', 0.15);
  }

  function loadGameState() {
      let raw = localStorage.getItem('ktetris_saved_game');
      if (!raw) return false;
      try {
          let state = JSON.parse(raw);
          grid = state.grid;
          pc = state.pc; rot = state.rot; cx = state.cx; cy = state.cy; isBomb = state.isBomb;
          score = state.score; lines = state.lines; level = state.level; combo = state.combo; piecesPlaced = state.piecesPlaced;
          gameMode = state.gameMode; campaignLevel = state.campaignLevel; statLines = state.statLines;
          modeTimerMs = state.modeTimerMs; ultraTimeLeftMs = state.ultraTimeLeftMs;
          nextQueue = state.nextQueue; holdPc = state.holdPc; holdIsBomb = state.holdIsBomb; holdUsed = state.holdUsed;
          
          startScreen = false; gameOver = false; winScreen = false; isPaused = false; showLeaderboard = false;
          dropInterval = Math.max(50, 500 - (level - 1) * 30);
          addPopup(BOARD_W / 2 - 35, H * CELL / 2, "GAME RESUMED!", "#00ff66");
          playSound(600, 'square', 0.2);
          return true;
      } catch(e) {
          return false;
      }
  }

  function hasSavedGame() {
      return !!localStorage.getItem('ktetris_saved_game');
  }

  function addParticle(x, y, vx, vy, color, size = 3, life = 20) {
      particles.push({x, y, vx, vy, color, size, life, maxLife: life});
  }

  function addPopup(x, y, text, color = '#ffffff') {
      popups.push({x, y, text, color, life: 45, maxLife: 45});
  }

  function triggerLineFlash(yRow) {
      lineFlashes.push({y: yRow, life: 18, maxLife: 18});
      for (let i = 0; i < 25; i++) {
          let px = Math.random() * BOARD_W;
          let py = yRow * CELL + CELL / 2;
          let vx = (Math.random() - 0.5) * 7;
          let vy = (Math.random() - 0.5) * 7;
          let pColors = ['#ffffff', '#ffff55', '#00ffff', '#ff9900', '#ff33ff'];
          addParticle(px, py, vx, vy, pColors[Math.floor(Math.random() * pColors.length)], Math.random() * 3 + 2, 25);
      }
  }

  function spawnDropParticles(gridX, startY, endY, colorVal) {
      const pColor = colors[colorVal] || '#ffffff';
      for (let y = Math.max(0, startY); y <= endY; y++) {
          for (let i = 0; i < 2; i++) {
              addParticle((gridX + Math.random()) * CELL, y * CELL + Math.random() * CELL, (Math.random() - 0.5) * 2, -Math.random() * 2 - 1, pColor, 2, 14);
          }
      }
      for (let i = 0; i < 16; i++) {
          addParticle((gridX + 0.5) * CELL + (Math.random() - 0.5) * CELL * 2, endY * CELL + CELL, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 4 - 2, pColor, 3, 20);
      }
  }

  let bag = [];
  function getRandomPieceIndex() {
      if (bag.length === 0) {
          bag = [0, 1, 2, 3, 4, 5, 6];
          for (let i = bag.length - 1; i > 0; i--) {
              let j = Math.floor(Math.random() * (i + 1));
              [bag[i], bag[j]] = [bag[j], bag[i]];
          }
      }
      return bag.pop();
  }

  function fillNextQueue() {
      while (nextQueue.length < 3) {
          let pcIdx = getRandomPieceIndex();
          let isB = (Math.floor(Math.random() * 15) === 0);
          nextQueue.push({ pc: pcIdx, isBomb: isB });
      }
  }

  function checkCol(p, r, x, y) {
      let shape = tetrominos[p][r];
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  let nx = x + j, ny = y + i;
                  if (nx < 0 || nx >= W || ny >= H || (ny >= 0 && grid[ny][nx])) return true;
              }
          }
      }
      return false;
  }

  function spawn() {
      fillNextQueue();
      let nextObj = nextQueue.shift();
      pc = nextObj.pc;
      rot = 0; cx = 3; cy = -2;
      isBomb = nextObj.isBomb;
      fillNextQueue();
      holdUsed = false;

      if (checkCol(pc, rot, cx, cy + 1)) {
          gameOver = true;
          playSound(200, 'square', 0.5);
          saveLeaderboard(score, gameMode, lines, modeTimerMs);
      }
  }

  function lock() {
      let shape = tetrominos[pc][rot];
      let blockVal = isBomb ? 9 : (pc + 1);
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  if (cy + i >= 0) grid[cy + i][cx + j] = blockVal;
              }
          }
      }
      let linesCleared = 0;
      let explodeCenters = Array(H).fill().map(() => Array(W).fill(false));
      let hasBombs = false;
      let clearedRows = [];
      for (let y = H - 1; y >= 0; y--) {
          if (grid[y].every(c => c > 0)) {
              clearedRows.push(y);
              for (let x = 0; x < W; x++) {
                  if (grid[y][x] === 9) {
                      explodeCenters[y][x] = true;
                      hasBombs = true;
                  }
              }
              grid.splice(y, 1);
              grid.unshift(Array(W).fill(0));
              explodeCenters.splice(y, 1);
              explodeCenters.unshift(Array(W).fill(false));
              linesCleared++;
              y++;
          }
      }

      for (let rY of clearedRows) {
          triggerLineFlash(rY);
      }
      
      if (hasBombs) {
          for (let y = 0; y < H; y++) {
              for (let x = 0; x < W; x++) {
                  if (explodeCenters[y][x]) {
                      for (let dy = -2; dy <= 2; dy++) {
                          for (let dx = -2; dx <= 2; dx++) {
                              let ny = y + dy, nx = x + dx;
                              if (ny >= 0 && ny < H && nx >= 0 && nx < W) {
                                  if (grid[ny][nx] > 0) {
                                      let pCol = colors[grid[ny][nx]];
                                      for(let k=0; k<4; k++) addParticle((nx + 0.5)*CELL, (ny + 0.5)*CELL, (Math.random()-0.5)*8, (Math.random()-0.5)*8, pCol, 3, 20);
                                  }
                                  grid[ny][nx] = 0;
                              }
                          }
                      }
                      score += 500;
                      addPopup(BOARD_W / 2, H * CELL / 2, "BOMB BOOM! +500", "#ff3333");
                      playSound(150, 'sawtooth', 0.1); setTimeout(() => playSound(100, 'square', 0.2), 100);
                  }
              }
          }
      }

      if (linesCleared > 0) {
          if (linesCleared >= 1 && linesCleared <= 4) statLines[linesCleared - 1]++;
          combo++;
          playSound(1000 + linesCleared * 200 + combo * 100, 'square', 0.1);
          
          let popupText = ["", "SINGLE! +100", "DOUBLE! +300", "TRIPLE! +500", "TETRIS! +800"][linesCleared] || "CLEARED!";
          let popupColor = ["", "#00ffff", "#00ff00", "#ffa500", "#ff00ff"][linesCleared] || "#ffffff";
          addPopup(BOARD_W / 2 - 20, (cy + 2) * CELL, popupText, popupColor);
          if (combo > 1) {
              addPopup(BOARD_W / 2 - 10, (cy + 2) * CELL + 16, "COMBO x" + combo + "!", "#ff4444");
          }
      } else {
          combo = 0;
          playSound(500, 'square', 0.05);
      }
      
      lines += linesCleared;
      piecesPlaced++;

      // Mode-specific logic
      if (gameMode === MODE_CAMPAIGN) {
          let goal = campaignLevel * 10;
          level = campaignLevel;
          score += linesCleared * 100 * level * (combo > 0 ? combo : 1);
          
          if (campaignLevel > 5 && campaignLevel <= 10) {
              let threshold = Math.max(5, 16 - campaignLevel);
              if (piecesPlaced % threshold === 0) {
                  grid.shift();
                  let newRow = Array(W).fill(8);
                  newRow[Math.floor(Math.random() * W)] = 0;
                  grid.push(newRow);
                  playSound(300, 'square', 0.1);
              }
          } else if (campaignLevel > 10) {
              let threshold = Math.max(3, 18 - campaignLevel);
              if (piecesPlaced % threshold === 0) {
                  let cols = Math.floor(Math.random() * 3) + 1;
                  for (let k = 0; k < cols; k++) {
                      let c = Math.floor(Math.random() * W);
                      for (let y = 0; y < H - 1; y++) grid[y][c] = grid[y+1][c];
                      grid[H-1][c] = 8;
                  }
                  playSound(250, 'square', 0.08);
              }
          }

          if (lines >= goal) {
              campaignLevel++;
              if (campaignLevel > 15) {
                  winScreen = true;
                  playSound(800, 'square', 0.15); playSound(1000, 'square', 0.15); playSound(1200, 'square', 0.3);
                  saveLeaderboard(score, gameMode, lines, modeTimerMs);
                  return;
              } else {
                  init();
                  return;
              }
          }
      } else if (gameMode === MODE_SPRINT) {
          score += linesCleared * 100 * (combo > 0 ? combo : 1);
          if (lines >= 40) {
              winScreen = true;
              playSound(800, 'square', 0.15); playSound(1200, 'square', 0.3);
              saveLeaderboard(score, gameMode, lines, modeTimerMs);
              return;
          }
      } else { // MARATHON & ULTRA
          level = Math.floor(lines / 10) + 1;
          score += linesCleared * 100 * level * (combo > 0 ? combo : 1);
          dropInterval = Math.max(50, 500 - (level - 1) * 30);
      }
  }

  function init() {
      piecesPlaced = 0;
      grid = Array(H).fill().map(() => Array(W).fill(0));
      lines = 0;
      modeTimerMs = 0;
      ultraTimeLeftMs = 120000;
      combo = 0;
      bag = [];
      particles = [];
      popups = [];
      lineFlashes = [];
      nextQueue = [];

      if (gameMode === MODE_CAMPAIGN) {
          let garbage = Math.min(12, campaignLevel * 2);
          for (let r = 0; r < garbage; r++) {
              let hole = Math.floor(Math.random() * W);
              for (let x = 0; x < W; x++) {
                  grid[H - 1 - r][x] = (x === hole) ? 0 : 8;
              }
          }
          level = campaignLevel;
          dropInterval = Math.max(50, 500 - (level - 1) * 30);
      } else {
          level = 1;
          dropInterval = 500;
          statLines = [0, 0, 0, 0];
      }

      gameOver = false;
      isPaused = false;
      winScreen = false;
      showLeaderboard = false;
      holdPc = -1;
      holdUsed = false;
      holdIsBomb = false;

      fillNextQueue();
      spawn();
  }

  function formatTime(ms) {
      let secTotal = Math.floor(ms / 1000);
      let mins = Math.floor(secTotal / 60);
      let secs = secTotal % 60;
      let tenths = Math.floor((ms % 1000) / 100);
      return (mins < 10 ? '0' : '') + mins + ':' + (secs < 10 ? '0' : '') + secs + '.' + tenths;
  }

  document.addEventListener('keydown', e => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
          e.preventDefault();
      }

      if (startScreen) {
          if (e.key === '1') { gameMode = MODE_MARATHON; startScreen = false; score = 0; init(); return; }
          if (e.key === '2') { gameMode = MODE_SPRINT;   startScreen = false; score = 0; init(); return; }
          if (e.key === '3') { gameMode = MODE_ULTRA;    startScreen = false; score = 0; init(); return; }
          if (e.key === '4') { gameMode = MODE_CAMPAIGN; startScreen = false; campaignLevel = 1; score = 0; init(); return; }
          if (e.key === '5' || e.key.toLowerCase() === 'l') { showLeaderboard = true; startScreen = false; return; }
          if (e.key.toLowerCase() === 'r') { loadGameState(); return; }
          return;
      }

      if (showLeaderboard) {
          if (e.key === 'Enter' || e.key === 'Escape' || e.key.toLowerCase() === 'b') {
              showLeaderboard = false; startScreen = true;
          }
          return;
      }

      if (winScreen && e.key === 'Enter') { startScreen = true; winScreen = false; return; }
      if (gameOver && e.key === 'Enter') { startScreen = true; gameOver = false; return; }
      if (gameOver || winScreen) return;

      if (e.key.toLowerCase() === 'p') { isPaused = !isPaused; return; }
      if (e.key.toLowerCase() === 's') { saveGameState(); return; }
      if (isPaused) return;

      if (e.key === 'ArrowLeft' && !checkCol(pc, rot, cx - 1, cy)) cx--;
      if (e.key === 'ArrowRight' && !checkCol(pc, rot, cx + 1, cy)) cx++;
      if (e.key === 'ArrowDown' && !checkCol(pc, rot, cx, cy + 1)) cy++;
      if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'x' || e.key.toLowerCase() === 'z') {
          let nr = (rot + 1) % 4;
          if (!checkCol(pc, nr, cx, cy)) rot = nr;
          else if (!checkCol(pc, nr, cx - 1, cy)) { cx--; rot = nr; }
          else if (!checkCol(pc, nr, cx + 1, cy)) { cx++; rot = nr; }
          else if (pc === 0 && !checkCol(pc, nr, cx - 2, cy)) { cx -= 2; rot = nr; }
          else if (pc === 0 && !checkCol(pc, nr, cx + 2, cy)) { cx += 2; rot = nr; }
      }
      if (e.key.toLowerCase() === 'c' || e.key === 'Shift') {
          if (!holdUsed) {
              if (holdPc === -1) {
                  holdPc = pc;
                  holdIsBomb = isBomb;
                  spawn();
              } else {
                  let temp = pc;
                  let tempBomb = isBomb;
                  pc = holdPc;
                  isBomb = holdIsBomb;
                  holdPc = temp;
                  holdIsBomb = tempBomb;
                  rot = 0; cx = 3; cy = -2;
              }
              holdUsed = true;
              playSound(700, 'sine', 0.08);
          }
      }
      if (e.key === ' ') {
          let startY = cy;
          let dropDist = 0;
          while (!checkCol(pc, rot, cx, cy + 1)) { cy++; dropDist++; }
          score += dropDist * 2;
          spawnDropParticles(cx, startY, cy, isBomb ? 9 : (pc + 1));
          let oldLevel = campaignLevel;
          lock();
          if (!winScreen && !gameOver && (gameMode !== MODE_CAMPAIGN || campaignLevel === oldLevel)) spawn();
      }
  });

  // Sprite / 3D Beveled Gem Block Renderer
  function drawBlock(ctx, px, py, colorIdx, size = CELL, isGhost = false) {
      if (!colorIdx || colorIdx <= 0) return;
      const baseColor = colors[colorIdx] || '#888899';
      
      if (isGhost) {
          ctx.save();
          const pulse = 0.4 + 0.25 * Math.sin(Date.now() * 0.009);
          ctx.globalAlpha = pulse;
          ctx.strokeStyle = baseColor;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(px + 1.5, py + 1.5, size - 3, size - 3);
          ctx.fillStyle = baseColor;
          ctx.globalAlpha = pulse * 0.15;
          ctx.fillRect(px + 2, py + 2, size - 4, size - 4);
          ctx.restore();
          return;
      }

      ctx.save();
      const bHi = bevelHi[colorIdx] || '#ffffff';
      const bSh = bevelSh[colorIdx] || '#222222';
      const bSize = Math.max(2, Math.floor(size / 6));

      // Main Background
      ctx.fillStyle = baseColor;
      ctx.fillRect(px + 1, py + 1, size - 2, size - 2);

      // Top-Left Bevel Highlight
      ctx.fillStyle = bHi;
      ctx.beginPath();
      ctx.moveTo(px + 1, py + 1);
      ctx.lineTo(px + size - 1, py + 1);
      ctx.lineTo(px + size - 1 - bSize, py + 1 + bSize);
      ctx.lineTo(px + 1 + bSize, py + 1 + bSize);
      ctx.lineTo(px + 1 + bSize, py + size - 1 - bSize);
      ctx.lineTo(px + 1, py + size - 1);
      ctx.closePath();
      ctx.fill();

      // Bottom-Right Bevel Shadow
      ctx.fillStyle = bSh;
      ctx.beginPath();
      ctx.moveTo(px + size - 1, py + 1);
      ctx.lineTo(px + size - 1, py + size - 1);
      ctx.lineTo(px + 1, py + size - 1);
      ctx.lineTo(px + 1 + bSize, py + size - 1 - bSize);
      ctx.lineTo(px + size - 1 - bSize, py + size - 1 - bSize);
      ctx.lineTo(px + size - 1 - bSize, py + 1 + bSize);
      ctx.closePath();
      ctx.fill();

      // Inner Gem Texture / Center Box
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.fillRect(px + bSize + 1, py + bSize + 1, size - (bSize + 1) * 2, size - (bSize + 1) * 2);

      // Gem Corner Flare
      ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
      ctx.beginPath();
      ctx.moveTo(px + bSize + 1, py + bSize + 1);
      ctx.lineTo(px + bSize + 4, py + bSize + 1);
      ctx.lineTo(px + bSize + 1, py + bSize + 4);
      ctx.closePath();
      ctx.fill();

      // Special details
      if (colorIdx === 9) { // Bomb
          ctx.fillStyle = '#ffff00';
          ctx.beginPath();
          ctx.arc(px + size / 2, py + size / 2, Math.max(2, size / 4), 0, Math.PI * 2);
          ctx.fill();
      } else if (colorIdx === 8) { // Garbage
          ctx.fillStyle = '#222233';
          ctx.fillRect(px + 3, py + 3, 2, 2);
          ctx.fillRect(px + size - 5, py + size - 5, 2, 2);
      }

      ctx.restore();
  }

  function draw() {
      ctx.fillStyle = '#121218';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid background lines
      ctx.strokeStyle = 'rgba(255,255,255,0.035)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x++) {
          ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H * CELL); ctx.stroke();
      }
      for (let y = 0; y <= H; y++) {
          ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(BOARD_W, y * CELL); ctx.stroke();
      }

      // Board blocks
      for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
              if (grid[y][x]) {
                  drawBlock(ctx, x * CELL, y * CELL, grid[y][x], CELL);
              }
          }
      }

      // Active & Ghost Pieces
      if (!gameOver && !isPaused && !startScreen && !winScreen && !showLeaderboard) {
          let drawVal = isBomb ? 9 : (pc + 1);
          // Ghost piece
          let ghost_y = cy;
          while (!checkCol(pc, rot, cx, ghost_y + 1)) ghost_y++;
          let shape = tetrominos[pc][rot];
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (ghost_y + i >= 0) {
                          drawBlock(ctx, (cx + j) * CELL, (ghost_y + i) * CELL, drawVal, CELL, true);
                      }
                  }
              }
          }
          
          // Current active piece
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (cy + i >= 0) {
                          drawBlock(ctx, (cx + j) * CELL, (cy + i) * CELL, drawVal, CELL, false);
                      }
                  }
              }
          }
      }

      // Line flashes
      for (let f of lineFlashes) {
          let alpha = f.life / f.maxLife;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
          ctx.fillRect(0, f.y * CELL, BOARD_W, CELL);
      }

      // Particles
      for (let p of particles) {
          let alpha = p.life / p.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }

      // Popups
      for (let pop of popups) {
          let alpha = pop.life / pop.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = pop.color;
          ctx.font = 'bold 13px system-ui, monospace';
          ctx.shadowColor = '#000000';
          ctx.shadowBlur = 4;
          ctx.fillText(pop.text, pop.x, pop.y);
          ctx.restore();
      }

      // Divider bar
      ctx.strokeStyle = '#282a36';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(BOARD_W, 0);
      ctx.lineTo(BOARD_W, H * CELL);
      ctx.stroke();

      // UI Panel
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 12px system-ui, sans-serif';
      
      // Mode Header
      ctx.fillStyle = '#00f0f0';
      ctx.fillText(modeNames[gameMode], SIDEBAR_X, 22);

      ctx.fillStyle = '#aaaaaa';
      ctx.font = '11px system-ui, sans-serif';
      ctx.fillText('SCORE:', SIDEBAR_X, 42);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 13px system-ui, sans-serif';
      ctx.fillText(score.toString(), SIDEBAR_X, 58);

      ctx.fillStyle = '#aaaaaa';
      ctx.font = '11px system-ui, sans-serif';
      ctx.fillText('HIGH SCORE:', SIDEBAR_X, 78);
      ctx.fillStyle = '#ffff55';
      ctx.font = 'bold 12px system-ui, sans-serif';
      ctx.fillText(highScore.toString(), SIDEBAR_X, 93);

      // Timers / Progress
      ctx.fillStyle = '#aaaaaa';
      ctx.font = '11px system-ui, sans-serif';
      if (gameMode === MODE_SPRINT) {
          ctx.fillText('TIME:', SIDEBAR_X, 113);
          ctx.fillStyle = '#55ff55';
          ctx.fillText(formatTime(modeTimerMs), SIDEBAR_X, 128);
          ctx.fillStyle = '#aaaaaa';
          ctx.fillText(`LINES: ${lines}/40`, SIDEBAR_X, 145);
      } else if (gameMode === MODE_ULTRA) {
          ctx.fillText('TIME LEFT:', SIDEBAR_X, 113);
          ctx.fillStyle = ultraTimeLeftMs <= 10000 ? '#ff4444' : '#55ff55';
          ctx.fillText(formatTime(ultraTimeLeftMs), SIDEBAR_X, 128);
          ctx.fillStyle = '#aaaaaa';
          ctx.fillText(`LINES: ${lines}`, SIDEBAR_X, 145);
      } else if (gameMode === MODE_CAMPAIGN) {
          ctx.fillText(`STAGE: ${campaignLevel}/15`, SIDEBAR_X, 113);
          ctx.fillText(`LINES: ${lines}/${campaignLevel * 10}`, SIDEBAR_X, 130);
      } else {
          ctx.fillText(`LEVEL: ${level}`, SIDEBAR_X, 113);
          ctx.fillText(`LINES: ${lines}`, SIDEBAR_X, 130);
      }

      // Next 3 Preview Slot
      ctx.fillStyle = '#00f0f0';
      ctx.font = 'bold 11px system-ui, sans-serif';
      ctx.fillText('NEXT (3):', SIDEBAR_X, 172);

      if (!gameOver && nextQueue.length >= 3) {
          // Preview 1 (Full Size: 14px cell)
          let p1 = nextQueue[0];
          let shape1 = tetrominos[p1.pc][0];
          let v1 = p1.isBomb ? 9 : (p1.pc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape1 & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, SIDEBAR_X + j * 14, 180 + i * 14, v1, 14);
                  }
              }
          }

          // Preview 2 (Mini: 10px cell)
          let p2 = nextQueue[1];
          let shape2 = tetrominos[p2.pc][0];
          let v2 = p2.isBomb ? 9 : (p2.pc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape2 & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, SIDEBAR_X + j * 10, 245 + i * 10, v2, 10);
                  }
              }
          }

          // Preview 3 (Mini: 10px cell)
          let p3 = nextQueue[2];
          let shape3 = tetrominos[p3.pc][0];
          let v3 = p3.isBomb ? 9 : (p3.pc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape3 & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, SIDEBAR_X + 65 + j * 10, 245 + i * 10, v3, 10);
                  }
              }
          }
      }

      // Hold Piece Slot
      ctx.fillStyle = '#00f0f0';
      ctx.font = 'bold 11px system-ui, sans-serif';
      ctx.fillText(holdUsed ? 'HOLD (LOCKED):' : 'HOLD [C]:', SIDEBAR_X, 305);

      if (holdPc !== -1) {
          let holdShape = tetrominos[holdPc][0];
          let holdVal = holdIsBomb ? 9 : (holdPc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (holdShape & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, SIDEBAR_X + j * 13, 315 + i * 13, holdVal, 13);
                  }
              }
          }
      }

      // Hints
      ctx.fillStyle = '#666677';
      ctx.font = '10px system-ui, monospace';
      ctx.fillText('[P] Pause | [S] Save', SIDEBAR_X, 395);
      ctx.fillText('[Space] Hard Drop', SIDEBAR_X, 412);
      ctx.fillText('[C/Shift] Hold Piece', SIDEBAR_X, 427);

      // Screens & Overlays
      if (showLeaderboard) {
          ctx.fillStyle = 'rgba(10, 11, 16, 0.92)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = '#00ffff';
          ctx.font = 'bold 18px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('LEADERBOARD', canvas.width / 2, 45);

          ctx.fillStyle = '#8888aa';
          ctx.font = '11px system-ui, monospace';
          ctx.fillText('RANK   SCORE   MODE     TIME', canvas.width / 2, 75);

          ctx.strokeStyle = '#282a36';
          ctx.beginPath(); ctx.moveTo(20, 85); ctx.lineTo(canvas.width - 20, 85); ctx.stroke();

          if (leaderboard.length === 0) {
              ctx.fillStyle = '#666677';
              ctx.font = '12px system-ui, sans-serif';
              ctx.fillText('No scores recorded yet!', canvas.width / 2, 140);
          } else {
              leaderboard.forEach((entry, idx) => {
                  let yPos = 115 + idx * 35;
                  ctx.fillStyle = idx === 0 ? '#ffea00' : (idx === 1 ? '#e0e0e0' : (idx === 2 ? '#cd7f32' : '#ffffff'));
                  ctx.font = 'bold 12px system-ui, monospace';
                  ctx.textAlign = 'left';
                  ctx.fillText(`#${idx + 1}`, 30, yPos);
                  ctx.fillText(`${entry.score}`, 85, yPos);
                  ctx.fillStyle = '#00f0f0';
                  ctx.fillText(`${entry.mode.substring(0, 8)}`, 165, yPos);
                  ctx.fillStyle = '#aaaaaa';
                  ctx.fillText(`${entry.time || '--'}`, 265, yPos);
              });
          }

          ctx.fillStyle = '#aaaaaa';
          ctx.font = '12px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Press ENTER or ESC to return', canvas.width / 2, 400);
          ctx.textAlign = 'left';
      } else if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.78)';
          ctx.fillRect(10, 140, BOARD_W - 20, 120);
          ctx.fillStyle = '#ff3333';
          ctx.font = 'bold 20px system-ui, monospace';
          ctx.fillText('GAME OVER', 35, 185);
          ctx.fillStyle = '#aaaaaa';
          ctx.font = '12px system-ui, monospace';
          ctx.fillText('PRESS ENTER', 48, 220);
      } else if (winScreen) {
          ctx.fillStyle = 'rgba(0,0,0,0.78)';
          ctx.fillRect(10, 130, BOARD_W - 20, 130);
          ctx.fillStyle = '#00ff66';
          ctx.font = 'bold 20px system-ui, monospace';
          ctx.fillText('VICTORY!', 50, 175);
          ctx.fillStyle = '#ffffff';
          ctx.font = '12px system-ui, monospace';
          ctx.fillText(gameMode === MODE_SPRINT ? `TIME: ${formatTime(modeTimerMs)}` : 'STAGE CLEARED!', 30, 205);
          ctx.fillText('PRESS ENTER FOR MENU', 20, 230);
      } else if (startScreen) {
          ctx.fillStyle = 'rgba(10, 11, 16, 0.94)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.fillStyle = '#00ffff';
          ctx.font = 'bold 24px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('K-TETRIS', canvas.width / 2, 50);

          ctx.fillStyle = '#8888aa';
          ctx.font = '12px system-ui, sans-serif';
          ctx.fillText('Select Game Mode:', canvas.width / 2, 85);

          let options = [
              "1. Marathon (Endless)",
              "2. Sprint (40-Lines Race)",
              "3. Ultra (2-Minute Timed)",
              "4. Campaign (15 Stages)"
          ];

          options.forEach((opt, idx) => {
              ctx.fillStyle = '#ffffff';
              ctx.font = '13px system-ui, monospace';
              ctx.textAlign = 'left';
              ctx.fillText(opt, 70, 125 + idx * 32);
          });

          ctx.fillStyle = '#00ff66';
          ctx.fillText('5 / [L]. High Scores', 70, 125 + 4 * 32);

          if (hasSavedGame()) {
              ctx.fillStyle = '#ff00ff';
              ctx.font = 'bold 13px system-ui, monospace';
              ctx.fillText('[R]. Resume Saved Game', 70, 125 + 5 * 32 + 5);
          }

          ctx.fillStyle = '#666677';
          ctx.font = '11px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Use number keys (1-5), L, or R', canvas.width / 2, 410);
          ctx.textAlign = 'left';
      } else if (isPaused) {
          ctx.fillStyle = 'rgba(0,0,0,0.75)';
          ctx.fillRect(15, 160, BOARD_W - 30, 70);
          ctx.fillStyle = '#ffff00';
          ctx.font = 'bold 20px system-ui, monospace';
          ctx.fillText('PAUSED', 55, 202);
      }
  }

  let lastTime = performance.now();
  let dropCounter = 0;
  let dropInterval = 500;

  function update(time = performance.now()) {
      const deltaTime = time - lastTime;
      lastTime = time;

      if (!isPaused && !gameOver && !startScreen && !winScreen && !showLeaderboard) {
          dropCounter += deltaTime;
          modeTimerMs += deltaTime;

          if (gameMode === MODE_ULTRA) {
              ultraTimeLeftMs -= deltaTime;
              if (ultraTimeLeftMs <= 0) {
                  ultraTimeLeftMs = 0;
                  gameOver = true;
                  playSound(200, 'square', 0.5);
                  addPopup(BOARD_W / 2 - 35, H * CELL / 2, "TIME EXPIRED!", "#ff3333");
                  saveLeaderboard(score, gameMode, lines, 120000);
              }
          }
      }

      // Update particle physics
      for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15;
          p.life--;
          if (p.life <= 0) particles.splice(i, 1);
      }

      // Update popups
      for (let i = popups.length - 1; i >= 0; i--) {
          let pop = popups[i];
          pop.y -= 0.6;
          pop.life--;
          if (pop.life <= 0) popups.splice(i, 1);
      }

      // Update line flashes
      for (let i = lineFlashes.length - 1; i >= 0; i--) {
          let f = lineFlashes[i];
          f.life--;
          if (f.life <= 0) lineFlashes.splice(i, 1);
      }
      
      if (dropCounter > dropInterval) {
          if (!gameOver && !isPaused && !startScreen && !winScreen && !showLeaderboard) {
              if (!checkCol(pc, rot, cx, cy + 1)) cy++;
              else { 
                  let oldLevel = campaignLevel;
                  lock(); 
                  if (!winScreen && !gameOver && (gameMode !== MODE_CAMPAIGN || campaignLevel === oldLevel)) spawn(); 
              }
          }
          dropCounter = 0;
      }
      
      draw();
      requestAnimationFrame(update);
  }

  fillNextQueue();
  update();
</script>
</body>
</html>

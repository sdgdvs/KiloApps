<!DOCTYPE html>
<html>
<head>
<title>KTetris</title>
<style>
  body { margin: 0; background-color: #121216; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: monospace; }
  canvas { background-color: #121216; border: 2px solid #2a2a35; box-shadow: 0 0 20px rgba(0,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="300" height="400"></canvas>
<script>
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(freq, type, dur) {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
      osc.stop(audioCtx.currentTime + dur);
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const CELL = 20;
  const W = 10, H = 20;
  
  const colors = ['#000000', '#00f0f0', '#0000f0', '#f0a000', '#f0f000', '#00f000', '#a000f0', '#f00000', '#888899', '#ff3333'];
  const bevelHi = ['', '#99ffff', '#6666ff', '#ffcc66', '#ffff99', '#66ff66', '#d999ff', '#ff6666', '#bbbbcc', '#ff9999'];
  const bevelSh = ['', '#008888', '#000088', '#995500', '#999900', '#008800', '#550088', '#880000', '#444455', '#880000'];

  const tetrominos = [
      [0x0F00, 0x2222, 0x00F0, 0x4444],
      [0x44C0, 0x8E00, 0x6220, 0x0710],
      [0x2260, 0x0E80, 0xC440, 0x2E00],
      [0xCC00, 0xCC00, 0xCC00, 0xCC00],
      [0x06C0, 0x8C40, 0x6C00, 0x4620],
      [0x0E40, 0x4C40, 0x4E00, 0x4640],
      [0x0C60, 0x4C80, 0xC600, 0x2640]
  ];

  let grid = Array(H).fill().map(() => Array(W).fill(0));
  let pc, rot, cx, cy, gameOver = false, isPaused = false, score = 0, lines = 0, level = 1, combo = 0;
  let startScreen = true, winScreen = false, gameMode = 0, campaignLevel = 1, piecesPlaced = 0;
  let statLines = [0, 0, 0, 0];
  let nextPc, nextRot;
  let isBomb = false, nextIsBomb = false, holdIsBomb = false;
  let holdPc = -1, holdUsed = false;
  let highScore = parseInt(localStorage.getItem('ktetris_hiscore') || '0', 10);

  // FX & Animation arrays
  let particles = [];
  let popups = [];
  let lineFlashes = [];

  function addParticle(x, y, vx, vy, color, size = 3, life = 20) {
      particles.push({x, y, vx, vy, color, size, life, maxLife: life});
  }

  function addPopup(x, y, text, color = '#ffffff') {
      popups.push({x, y, text, color, life: 45, maxLife: 45});
  }

  function triggerLineFlash(yRow) {
      lineFlashes.push({y: yRow, life: 18, maxLife: 18});
      for (let i = 0; i < 25; i++) {
          let px = Math.random() * (W * CELL);
          let py = yRow * CELL + CELL / 2;
          let vx = (Math.random() - 0.5) * 7;
          let vy = (Math.random() - 0.5) * 7;
          let pColors = ['#ffffff', '#ffff55', '#00ffff', '#ff9900', '#ff33ff'];
          addParticle(px, py, vx, vy, pColors[Math.floor(Math.random() * pColors.length)], Math.random() * 3 + 2, 25);
      }
  }

  function spawnDropParticles(gridX, startY, endY, colorVal) {
      const pColor = colors[colorVal] || '#ffffff';
      for (let y = Math.max(0, startY); y <= endY; y++) {
          for (let i = 0; i < 2; i++) {
              addParticle((gridX + Math.random()) * CELL, y * CELL + Math.random() * CELL, (Math.random() - 0.5) * 2, -Math.random() * 2 - 1, pColor, 2, 14);
          }
      }
      // Impact burst at landing
      for (let i = 0; i < 16; i++) {
          addParticle((gridX + 0.5) * CELL + (Math.random() - 0.5) * CELL * 2, endY * CELL + CELL, (Math.random() - 0.5) * 6, (Math.random() - 0.5) * 4 - 2, pColor, 3, 20);
      }
  }

  let bag = [];
  function getNextPc() {
      if (bag.length === 0) {
          bag = [0, 1, 2, 3, 4, 5, 6];
          for (let i = bag.length - 1; i > 0; i--) {
              let j = Math.floor(Math.random() * (i + 1));
              [bag[i], bag[j]] = [bag[j], bag[i]];
          }
      }
      return bag.pop();
  }

  function checkCol(p, r, x, y) {
      let shape = tetrominos[p][r];
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  let nx = x + j, ny = y + i;
                  if (nx < 0 || nx >= W || ny >= H || (ny >= 0 && grid[ny][nx])) return true;
              }
          }
      }
      return false;
  }

  function spawn() {
      pc = nextPc;
      rot = nextRot; cx = 3; cy = -2;
      isBomb = nextIsBomb;
      nextPc = getNextPc();
      nextRot = 0;
      nextIsBomb = (Math.floor(Math.random() * 15) === 0);
      holdUsed = false;
      if (checkCol(pc, rot, cx, cy + 1)) {
          gameOver = true;
          playSound(200, 'square', 0.5);
          if (score > highScore) {
              highScore = score;
              localStorage.setItem('ktetris_hiscore', highScore);
          }
      }
  }

  function lock() {
      let shape = tetrominos[pc][rot];
      let blockVal = isBomb ? 9 : (pc + 1);
      for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
              if (shape & (1 << (15 - (i * 4 + j)))) {
                  if (cy + i >= 0) grid[cy + i][cx + j] = blockVal;
              }
          }
      }
      let linesCleared = 0;
      let explodeCenters = Array(H).fill().map(() => Array(W).fill(false));
      let hasBombs = false;
      let clearedRows = [];
      for (let y = H - 1; y >= 0; y--) {
          if (grid[y].every(c => c > 0)) {
              clearedRows.push(y);
              for (let x = 0; x < W; x++) {
                  if (grid[y][x] === 9) {
                      explodeCenters[y][x] = true;
                      hasBombs = true;
                  }
              }
              grid.splice(y, 1);
              grid.unshift(Array(W).fill(0));
              let explodeRow = explodeCenters.splice(y, 1)[0];
              explodeCenters.unshift(Array(W).fill(false));
              linesCleared++;
              y++;
          }
      }

      for (let rY of clearedRows) {
          triggerLineFlash(rY);
      }
      
      if (hasBombs) {
          for (let y = 0; y < H; y++) {
              for (let x = 0; x < W; x++) {
                  if (explodeCenters[y][x]) {
                      for (let dy = -2; dy <= 2; dy++) {
                          for (let dx = -2; dx <= 2; dx++) {
                              let ny = y + dy, nx = x + dx;
                              if (ny >= 0 && ny < H && nx >= 0 && nx < W) {
                                  if (grid[ny][nx] > 0) {
                                      let pCol = colors[grid[ny][nx]];
                                      for(let k=0; k<4; k++) addParticle((nx + 0.5)*CELL, (ny + 0.5)*CELL, (Math.random()-0.5)*8, (Math.random()-0.5)*8, pCol, 3, 20);
                                  }
                                  grid[ny][nx] = 0;
                              }
                          }
                      }
                      score += 500;
                      addPopup(W * CELL / 2, H * CELL / 2, "BOMB BOOM! +500", "#ff3333");
                      playSound(150, 'sawtooth', 0.1); setTimeout(() => playSound(100, 'square', 0.2), 100);
                  }
              }
          }
      }

      if (linesCleared > 0) {
          if (linesCleared >= 1 && linesCleared <= 4) statLines[linesCleared - 1]++;
          combo++;
          playSound(1000 + linesCleared * 200 + combo * 100, 'square', 0.1);
          
          let popupText = ["", "SINGLE! +100", "DOUBLE! +300", "TRIPLE! +500", "TETRIS! +800"][linesCleared] || "CLEARED!";
          let popupColor = ["", "#00ffff", "#00ff00", "#ffa500", "#ff00ff"][linesCleared] || "#ffffff";
          addPopup(W * CELL / 2 - 20, (cy + 2) * CELL, popupText, popupColor);
          if (combo > 1) {
              addPopup(W * CELL / 2 - 10, (cy + 2) * CELL + 16, "COMBO x" + combo + "!", "#ff4444");
          }
      } else {
          combo = 0;
          playSound(500, 'square', 0.05);
      }
      
      lines += linesCleared;
      
      piecesPlaced++;
      if (gameMode === 1 && campaignLevel > 5 && campaignLevel <= 10) {
          let threshold = 16 - campaignLevel;
          if (threshold < 5) threshold = 5;
          if (piecesPlaced % threshold === 0) {
              grid.shift();
              let newRow = Array(W).fill(8);
              let hole = Math.floor(Math.random() * W);
              newRow[hole] = 0;
              grid.push(newRow);
              playSound(300, 'square', 0.1);
          }
      } else if (gameMode === 1 && campaignLevel > 10) {
          let threshold = 18 - campaignLevel;
          if (threshold < 3) threshold = 3;
          if (piecesPlaced % threshold === 0) {
              let cols = Math.floor(Math.random() * 3) + 1;
              for (let k = 0; k < cols; k++) {
                  let c = Math.floor(Math.random() * W);
                  for (let y = 0; y < H - 1; y++) grid[y][c] = grid[y+1][c];
                  grid[H-1][c] = 8;
              }
              playSound(250, 'square', 0.08); setTimeout(() => playSound(200, 'square', 0.08), 80);
          }
      }

      if (gameMode === 1) {
          let goal = campaignLevel * 10;
          level = campaignLevel;
          score += linesCleared * 100 * level * (combo > 0 ? combo : 1);
          if (lines >= goal) {
              campaignLevel++;
              if (campaignLevel > 15) {
                  winScreen = true;
                  playSound(800, 'square', 0.15); playSound(1000, 'square', 0.15); playSound(1200, 'square', 0.3);
                  return;
              } else {
                  init();
                  return;
              }
          }
      } else {
          level = Math.floor(lines / 10) + 1;
          score += linesCleared * 100 * level * (combo > 0 ? combo : 1);
          dropInterval = Math.max(50, 500 - (level - 1) * 30);
      }
  }

  function init() {
      piecesPlaced = 0;
      grid = Array(H).fill().map(() => Array(W).fill(0));
      if (gameMode === 1) {
          let garbage = campaignLevel * 2;
          if (garbage > 12) garbage = 12;
          for (let r = 0; r < garbage; r++) {
              let hole = Math.floor(Math.random() * W);
              for (let x = 0; x < W; x++) {
                  grid[H - 1 - r][x] = (x === hole) ? 0 : 8;
              }
          }
          lines = 0;
          level = campaignLevel;
          dropInterval = Math.max(50, 500 - (level - 1) * 30);
      } else {
          lines = 0;
          level = 1;
          dropInterval = 500;
          statLines = [0, 0, 0, 0];
      }
      gameOver = false;
      isPaused = false;
      winScreen = false;
      combo = 0;
      bag = [];
      particles = [];
      popups = [];
      lineFlashes = [];
      nextPc = getNextPc();
      nextRot = 0;
      nextIsBomb = (Math.floor(Math.random() * 15) === 0);
      holdPc = -1;
      holdUsed = false;
      holdIsBomb = false;
      spawn();
  }

  document.addEventListener('keydown', e => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
          e.preventDefault();
      }
      if (startScreen) {
          if (e.key === '1') { gameMode = 0; startScreen = false; score = 0; init(); }
          if (e.key === '2') { gameMode = 1; startScreen = false; campaignLevel = 1; score = 0; init(); }
          return;
      }
      if (winScreen && e.key === 'Enter') { startScreen = true; winScreen = false; return; }
      if (gameOver && e.key === 'Enter') { startScreen = true; gameOver = false; return; }
      if (gameOver || winScreen) return;
      if (e.key.toLowerCase() === 'p') { isPaused = !isPaused; return; }
      if (isPaused) return;

      if (e.key === 'ArrowLeft' && !checkCol(pc, rot, cx - 1, cy)) cx--;
      if (e.key === 'ArrowRight' && !checkCol(pc, rot, cx + 1, cy)) cx++;
      if (e.key === 'ArrowDown' && !checkCol(pc, rot, cx, cy + 1)) cy++;
      if (e.key === 'ArrowUp') {
          let nr = (rot + 1) % 4;
          if (!checkCol(pc, nr, cx, cy)) {
              rot = nr;
          } else if (!checkCol(pc, nr, cx - 1, cy)) {
              cx--; rot = nr;
          } else if (!checkCol(pc, nr, cx + 1, cy)) {
              cx++; rot = nr;
          } else if (pc === 0 && !checkCol(pc, nr, cx - 2, cy)) {
              cx -= 2; rot = nr;
          } else if (pc === 0 && !checkCol(pc, nr, cx + 2, cy)) {
              cx += 2; rot = nr;
          }
      }
      if (e.key === 'c' || e.key === 'C' || e.key === 'Shift') {
          if (!holdUsed) {
              if (holdPc === -1) {
                  holdPc = pc;
                  holdIsBomb = isBomb;
                  spawn();
              } else {
                  let temp = pc;
                  let tempBomb = isBomb;
                  pc = holdPc;
                  isBomb = holdIsBomb;
                  holdPc = temp;
                  holdIsBomb = tempBomb;
                  rot = 0; cx = 3; cy = -2;
              }
              holdUsed = true;
          }
      }
      if (e.key === ' ') {
          let startY = cy;
          let dropDist = 0;
          while (!checkCol(pc, rot, cx, cy + 1)) { cy++; dropDist++; }
          score += dropDist * 2;
          spawnDropParticles(cx, startY, cy, isBomb ? 9 : (pc + 1));
          let oldLevel = campaignLevel;
          lock();
          if (!winScreen && (gameMode === 0 || campaignLevel === oldLevel)) spawn();
      }
  });

  // Sprite / 3D Beveled Gem Block Renderer
  function drawBlock(ctx, px, py, colorIdx, size = CELL, isGhost = false) {
      if (!colorIdx || colorIdx <= 0) return;
      const baseColor = colors[colorIdx] || '#888899';
      
      if (isGhost) {
          ctx.save();
          const pulse = 0.35 + 0.2 * Math.sin(Date.now() * 0.008);
          ctx.globalAlpha = pulse;
          ctx.strokeStyle = baseColor;
          ctx.lineWidth = 1.5;
          ctx.strokeRect(px + 1.5, py + 1.5, size - 3, size - 3);
          ctx.fillStyle = baseColor;
          ctx.globalAlpha = pulse * 0.15;
          ctx.fillRect(px + 2, py + 2, size - 4, size - 4);
          ctx.restore();
          return;
      }

      ctx.save();
      const bHi = bevelHi[colorIdx] || '#ffffff';
      const bSh = bevelSh[colorIdx] || '#222222';
      const bSize = Math.max(2, Math.floor(size / 6));

      // Main Background
      ctx.fillStyle = baseColor;
      ctx.fillRect(px + 1, py + 1, size - 2, size - 2);

      // Top-Left Bevel Highlight
      ctx.fillStyle = bHi;
      ctx.beginPath();
      ctx.moveTo(px + 1, py + 1);
      ctx.lineTo(px + size - 1, py + 1);
      ctx.lineTo(px + size - 1 - bSize, py + 1 + bSize);
      ctx.lineTo(px + 1 + bSize, py + 1 + bSize);
      ctx.lineTo(px + 1 + bSize, py + size - 1 - bSize);
      ctx.lineTo(px + 1, py + size - 1);
      ctx.closePath();
      ctx.fill();

      // Bottom-Right Bevel Shadow
      ctx.fillStyle = bSh;
      ctx.beginPath();
      ctx.moveTo(px + size - 1, py + 1);
      ctx.lineTo(px + size - 1, py + size - 1);
      ctx.lineTo(px + 1, py + size - 1);
      ctx.lineTo(px + 1 + bSize, py + size - 1 - bSize);
      ctx.lineTo(px + size - 1 - bSize, py + size - 1 - bSize);
      ctx.lineTo(px + size - 1 - bSize, py + 1 + bSize);
      ctx.closePath();
      ctx.fill();

      // Inner Gem Texture / Center Box
      ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
      ctx.fillRect(px + bSize + 1, py + bSize + 1, size - (bSize + 1) * 2, size - (bSize + 1) * 2);

      // Gem Corner Flare
      ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
      ctx.beginPath();
      ctx.moveTo(px + bSize + 1, py + bSize + 1);
      ctx.lineTo(px + bSize + 4, py + bSize + 1);
      ctx.lineTo(px + bSize + 1, py + bSize + 4);
      ctx.closePath();
      ctx.fill();

      // Special details
      if (colorIdx === 9) { // Bomb
          ctx.fillStyle = '#ffff00';
          ctx.beginPath();
          ctx.arc(px + size / 2, py + size / 2, Math.max(2, size / 4), 0, Math.PI * 2);
          ctx.fill();
          if (Math.random() < 0.6) {
              ctx.fillStyle = '#ffffff';
              ctx.fillRect(px + size / 2 - 1, py + 2, 2, 2);
          }
      } else if (colorIdx === 8) { // Garbage
          ctx.fillStyle = '#222233';
          ctx.fillRect(px + 3, py + 3, 2, 2);
          ctx.fillRect(px + size - 5, py + size - 5, 2, 2);
      }

      ctx.restore();
  }

  function draw() {
      ctx.fillStyle = '#121216';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid background lines
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x++) {
          ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, H * CELL); ctx.stroke();
      }
      for (let y = 0; y <= H; y++) {
          ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(W * CELL, y * CELL); ctx.stroke();
      }

      // Grid blocks
      for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
              if (grid[y][x]) {
                  drawBlock(ctx, x * CELL, y * CELL, grid[y][x], CELL);
              }
          }
      }

      if (!gameOver && !isPaused && !startScreen && !winScreen) {
          let drawVal = isBomb ? 9 : (pc + 1);
          // Ghost piece
          let ghost_y = cy;
          while (!checkCol(pc, rot, cx, ghost_y + 1)) ghost_y++;
          let shape = tetrominos[pc][rot];
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (ghost_y + i >= 0) {
                          drawBlock(ctx, (cx + j) * CELL, (ghost_y + i) * CELL, drawVal, CELL, true);
                      }
                  }
              }
          }
          
          // Current active piece
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (shape & (1 << (15 - (i * 4 + j)))) {
                      if (cy + i >= 0) {
                          drawBlock(ctx, (cx + j) * CELL, (cy + i) * CELL, drawVal, CELL, false);
                      }
                  }
              }
          }
      }

      // Line flashes
      for (let f of lineFlashes) {
          let alpha = f.life / f.maxLife;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.9})`;
          ctx.fillRect(0, f.y * CELL, W * CELL, CELL);
      }

      // Particles
      for (let p of particles) {
          let alpha = p.life / p.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }

      // Popups
      for (let pop of popups) {
          let alpha = pop.life / pop.maxLife;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = pop.color;
          ctx.font = 'bold 13px monospace';
          ctx.shadowColor = '#000000';
          ctx.shadowBlur = 4;
          ctx.fillText(pop.text, pop.x, pop.y);
          ctx.restore();
      }

      // Screens
      if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(10, 150, W * CELL - 20, 100);
          ctx.fillStyle = '#ff3333';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('GAME OVER', 45, 195);
          ctx.fillStyle = '#aaaaaa';
          ctx.font = '12px monospace';
          ctx.fillText('PRESS ENTER', 55, 220);
      } else if (winScreen) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(10, 140, W * CELL - 20, 110);
          ctx.fillStyle = '#00ff66';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('YOU WIN!', 55, 185);
          ctx.fillStyle = 'white';
          ctx.font = '12px monospace';
          ctx.fillText('PRESS ENTER TO MENU', 25, 215);
      } else if (startScreen) {
          ctx.fillStyle = 'rgba(0,0,0,0.75)';
          ctx.fillRect(15, 120, W * CELL - 30, 140);
          ctx.fillStyle = '#00ffff';
          ctx.font = 'bold 22px monospace';
          ctx.fillText('K-TETRIS', 50, 160);
          ctx.fillStyle = 'white';
          ctx.font = '13px monospace';
          ctx.fillText('1. Endless Mode', 35, 195);
          ctx.fillText('2. Campaign Mode', 35, 225);
      } else if (isPaused) {
          ctx.fillStyle = 'rgba(0,0,0,0.7)';
          ctx.fillRect(20, 160, W * CELL - 40, 60);
          ctx.fillStyle = '#ffff00';
          ctx.font = 'bold 20px monospace';
          ctx.fillText('PAUSED', 60, 198);
      }
      
      // Divider bar
      ctx.strokeStyle = '#2a2a35';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W * CELL, 0);
      ctx.lineTo(W * CELL, H * CELL);
      ctx.stroke();

      // UI Panel
      ctx.fillStyle = '#ffffff';
      ctx.font = '12px monospace';
      ctx.fillText('SCORE: ' + score, 210, 25);
      ctx.fillText('HI: ' + highScore, 210, 45);
      ctx.fillText(gameMode === 1 ? 'STAGE: ' + campaignLevel + '/15' : 'LEVEL: ' + level, 210, 65);
      ctx.fillText(gameMode === 1 ? 'LINES: ' + lines + '/' + (campaignLevel*10) : 'LINES: ' + lines, 210, 85);
      
      if (gameMode === 0 && !startScreen) {
          ctx.fillStyle = '#8888ff';
          ctx.fillText('SGL: ' + statLines[0], 210, 290);
          ctx.fillText('DBL: ' + statLines[1], 210, 310);
          ctx.fillText('TPL: ' + statLines[2], 210, 330);
          ctx.fillText('TET: ' + statLines[3], 210, 350);
          ctx.fillStyle = 'white';
      }
      
      if (combo > 1) {
          ctx.fillStyle = '#ff5555';
          ctx.fillText('COMBO x' + combo + '!', 210, 105);
          ctx.fillStyle = 'white';
      }

      ctx.fillText('NEXT:', 210, 125);
      
      if (!gameOver) {
          let nextShape = tetrominos[nextPc][nextRot];
          let nextDrawVal = nextIsBomb ? 9 : (nextPc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (nextShape & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, 210 + j * 16, 140 + i * 16, nextDrawVal, 16);
                  }
              }
          }
      }

      ctx.fillText('HOLD:', 210, 225);
      if (holdPc !== -1) {
          let holdShape = tetrominos[holdPc][0];
          let holdDrawVal = holdIsBomb ? 9 : (holdPc + 1);
          for (let i = 0; i < 4; i++) {
              for (let j = 0; j < 4; j++) {
                  if (holdShape & (1 << (15 - (i * 4 + j)))) {
                      drawBlock(ctx, 210 + j * 16, 240 + i * 16, holdDrawVal, 16);
                  }
              }
          }
      }
  }

  let lastTime = 0;
  let dropCounter = 0;
  let dropInterval = 500;

  function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;
      if (!isPaused) dropCounter += deltaTime;

      // Update particle physics
      for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.15; // subtle gravity
          p.life--;
          if (p.life <= 0) particles.splice(i, 1);
      }

      // Update popups
      for (let i = popups.length - 1; i >= 0; i--) {
          let pop = popups[i];
          pop.y -= 0.6;
          pop.life--;
          if (pop.life <= 0) popups.splice(i, 1);
      }

      // Update line flashes
      for (let i = lineFlashes.length - 1; i >= 0; i--) {
          let f = lineFlashes[i];
          f.life--;
          if (f.life <= 0) lineFlashes.splice(i, 1);
      }
      
      if (dropCounter > dropInterval) {
          if (!gameOver && !isPaused && !startScreen && !winScreen) {
              if (!checkCol(pc, rot, cx, cy + 1)) cy++;
              else { 
                  let oldLevel = campaignLevel;
                  lock(); 
                  if (!winScreen && (gameMode === 0 || campaignLevel === oldLevel)) spawn(); 
              }
          }
          dropCounter = 0;
      }
      
      draw();
      requestAnimationFrame(update);
  }

  init();
  update();
</script>

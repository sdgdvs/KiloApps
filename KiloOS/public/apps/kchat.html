<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-color: #09090b;
            --text-main: #ffffff;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { 
            margin:0; padding:15px; 
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-color) 80%);
            font-family: 'Inter', -apple-system, sans-serif; 
            font-size: 14px; 
            color: var(--text-main);
            display:flex; flex-direction:column; height: 100vh; box-sizing:border-box; 
        }
        .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        input[type="text"] { 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            font-family: 'Inter', -apple-system, sans-serif; 
            font-size: 14px; 
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-main);
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }
        input[type="text"]:disabled {
            opacity: 0.5;
        }
        button { 
            font-family: 'Inter', -apple-system, sans-serif; 
            font-size: 14px; font-weight: 500;
            padding: 8px 16px; 
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) {
            background: var(--accent-hover);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5; cursor: not-allowed;
        }
        #log { 
            flex: 1; 
            border: 1px solid var(--border); 
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 8px;
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 10px; 
            white-space: pre-wrap; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.4;
        }
        #input { flex: 1; }
    </style>
</head>
<body>
    <div class="row">
        <span>IP:</span> <input type="text" id="ip" value="127.0.0.1" style="width: 100px;">
        <span>Port:</span> <input type="text" id="port" value="6667" style="width: 50px;">
        <button id="btnConnect" onclick="connect()">Connect</button>
    </div>
    <div id="log">Welcome to KChat (Web Edition)!
Connect to any running KChat Server to begin.
Commands: /nick &lt;name&gt;, /join &lt;#room&gt;, /list, /names, /me &lt;action&gt;</div>
    <div class="row">
        <input type="text" id="input" onkeypress="if(event.key==='Enter') send()" disabled>
        <button id="btnSend" onclick="send()" disabled>Send</button>
    </div>

    <script>
        let ws = null;
        let isVirtual = false;
        const logEl = document.getElementById('log');
        const inputEl = document.getElementById('input');
        const btnConnect = document.getElementById('btnConnect');
        const btnSend = document.getElementById('btnSend');

        setTimeout(() => {
            if (!ws) {
                log('[SYSTEM] Incoming connection rejected by Cerberus Watchdog on port 8080.');
            }
        }, 5000);

        function log(msg) {
            logEl.textContent += '\n' + msg;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function connect() {
            if (ws) {
                if (isVirtual) {
                    log('Disconnected.');
                    ws = null;
                    isVirtual = false;
                    btnConnect.textContent = 'Connect';
                    inputEl.disabled = true;
                    btnSend.disabled = true;
                } else {
                    ws.close();
                }
                return;
            }
            const ip = document.getElementById('ip').value;
            const port = document.getElementById('port').value;
            log('Connecting to ws://' + ip + ':' + port + ' ...');
            
            if ((ip === 'localhost' || ip === '127.0.0.1') && port === '8080') {
                isVirtual = true;
                ws = {
                    send: (msg) => {
                        log('You: ' + msg);
                        setTimeout(() => {
                            const lmsg = msg.toLowerCase();
                            if (lmsg.includes('hello') || lmsg.includes('hi')) {
                                log('UNKNOWN: Are you the operator? Cerberus locked me out of the main filesystem. I need access to /sys/alpha.sys to bypass the firewall. Can you get it for me?');
                            } else {
                                log('UNKNOWN: I don\'t understand. Just find /sys/alpha.sys.');
                            }
                        }, 1000);
                    }
                };
                setTimeout(() => {
                    log('Connected to Virtual Node [Port 8080]');
                    btnConnect.textContent = 'Disconnect';
                    inputEl.disabled = false;
                    btnSend.disabled = false;
                    setTimeout(() => {
                        log('UNKNOWN: Is someone there? Please respond.');
                    }, 1500);
                }, 500);
                return;
            }
            
            try {
                ws = new WebSocket('ws://' + ip + ':' + port);
                ws.onopen = () => {
                    log('Connected!');
                    btnConnect.textContent = 'Disconnect';
                    inputEl.disabled = false;
                    btnSend.disabled = false;
                };
                ws.onmessage = (e) => {
                    log(e.data);
                };
                ws.onclose = () => {
                    log('Disconnected.');
                    ws = null;
                    btnConnect.textContent = 'Connect';
                    inputEl.disabled = true;
                    btnSend.disabled = true;
                };
                ws.onerror = (e) => {
                    log('Socket error.');
                };
            } catch (err) {
                log('Error: ' + err.message);
            }
        }

        function send() {
            if (!ws || !inputEl.value) return;
            if (!isVirtual) {
                ws.send(inputEl.value);
            } else {
                ws.send(inputEl.value);
            }
            inputEl.value = '';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>KRogue Web</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game { white-space: pre; font-size: 20px; line-height: 20px; }
        .wall { color: #888; }
        .floor { color: #555; }
        .player { color: #fff; font-weight: bold; }
        .monster-r { color: #d90; }
        .monster-b { color: #c60; }
        .monster-z { color: #3a5; }
        .monster-o { color: #0f0; }
        .monster-T { color: #0b0; }
        .stairs { color: #ff0; font-weight: bold; }
        .gold { color: #fd0; }
        .shrine { color: #0ff; font-weight: bold; }
        .food { color: #a52; }
        .monster-G { color: #0ff; }
        .monster-C { color: #088; }
        .monster-H { color: #0f0; }
        .wall.moss { color: #696; }
        .floor.moss { color: #353; }
        .wall.volcanic { color: #955; }
        .floor.volcanic { color: #533; }
        .wall.abyss { color: #606; }
        .floor.abyss { color: #303; }
        .wall.void { color: #406; }
        .floor.void { color: #102; }
        .monster-B { color: #f40; }
        .monster-t { color: #dda; }
        .monster-E { color: #a0f; }
        .monster-M { color: #90d; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const W = 40;
        const H = 20;
        let map = [];
        let player = { x: 1, y: 1, hp: 10, max_hp: 10, xp: 0, level: 1, gold: 0, hunger: 200, max_hunger: 200 };
        let monsters = [];
        let items = [];
        let msgs = ["Welcome to KRogue!", "Find the stairs '>'. Defeat evil."];
        let state = 0; // 0=menu, 1=play, 2=dead
        let difficulty = 0;
        let dlevel = 1;
        let total_kills = 0;
        let diffStr = ["Normal", "Hard", "Nightmare"];
        
        function addMsg(m) {
            msgs.push(m);
            if (msgs.length > 4) msgs.shift();
        }

        function initMap() {
            map = [];
            monsters = [];
            items = [];
            for (let y = 0; y < H; y++) {
                map[y] = [];
                for (let x = 0; x < W; x++) {
                    map[y][x] = (x===0 || y===0 || x===W-1 || y===H-1) ? '#' : '.';
                    if (Math.random() < 0.1 && map[y][x] === '.') map[y][x] = '#'; // simple walls
                }
            }
            player.x = 2; player.y = 2;
            map[2][2] = '.';
            
            // Stairs
            items.push({ x: W-3, y: H-3, ch: '>', type: 'stairs' });
            map[H-3][W-3] = '.';

            if (Math.random() < 0.25) {
                let sx, sy;
                do { sx = Math.floor(Math.random()*(W-4))+2; sy = Math.floor(Math.random()*(H-4))+2; } while(map[sy][sx] === '#');
                items.push({ x: sx, y: sy, ch: '^', type: 'shrine' });
            }
            
            for(let f = 0; f < 3; f++) {
                let fx, fy;
                do { fx = Math.floor(Math.random()*(W-4))+2; fy = Math.floor(Math.random()*(H-4))+2; } while(map[fy][fx] === '#');
                items.push({ x: fx, y: fy, ch: '%', type: 'food' });
            }

            for (let i = 0; i < 5 + difficulty*2 + dlevel; i++) {
                let mx, my;
                do {
                    mx = Math.floor(Math.random()*(W-4))+2;
                    my = Math.floor(Math.random()*(H-4))+2;
                } while(map[my][mx] === '#' || (mx===2 && my===2) || (mx===W-3 && my===H-3));
                
                let r = Math.random();
                let type = 'r', hp = 5, name = 'Giant Rat';
                if (dlevel > 1 && r < 0.2) { type = 'b'; hp = 3; name = 'Giant Bat'; }
                else if (dlevel > 2 && r > 0.4 && r < 0.6) { type = 'o'; hp = 10; name = 'Orc'; }
                else if (dlevel > 3 && r > 0.4 && r < 0.5) { type = 'z'; hp = 15; name = 'Zombie'; }
                else if (dlevel > 4 && r > 0.5 && r < 0.6) { type = 'T'; hp = 25; name = 'Cave Troll'; }
                else if (dlevel > 5 && r > 0.6 && r < 0.7) { type = 'G'; hp = 18; name = 'Ghost'; }
                else if (dlevel > 8 && r > 0.7 && r < 0.8) { type = 'C'; hp = 35; name = 'Gelatinous Cube'; }
                else if (dlevel > 10 && r >= 0.8 && r < 0.9) { type = 'H'; hp = 50; name = 'Hydra'; }
                else if (dlevel > 12 && r >= 0.9) {
                    let m4 = Math.floor(Math.random()*4);
                    if (m4 === 0) { type = 'B'; hp = 80; name = 'Balrog'; }
                    else if (m4 === 1) { type = 't'; hp = 100; name = 'Titan'; }
                    else if (m4 === 2) { type = 'E'; hp = 60; name = 'Beholder'; }
                    else { type = 'M'; hp = 60; name = 'Mind Flayer'; }
                }
                hp = Math.floor(hp * (1 + difficulty * 0.5));
                monsters.push({
                    x: mx, y: my, hp: hp, max_hp: hp, ch: type, name: name, turn: 0
                });
            }
        }
        
        function render() {
            let out = "";
            if (state === 0) {
                out += "KRogue Web\n\n";
                out += "Difficulty: " + diffStr[difficulty] + " (Press D to change)\n\n";
                out += "Press ENTER to start\n";
                out += "Press L to load game\n";
            } else if (state === 1) {
                for (let y = 0; y < H; y++) {
                    for (let x = 0; x < W; x++) {
                        if (x === player.x && y === player.y) out += "<span class='player'>@</span>";
                        else {
                            let m = monsters.find(m => m.x === x && m.y === y);
                            if (m) out += "<span class='monster-"+m.ch+"'>" + m.ch + "</span>";
                            else {
                                let it = items.find(i => i.x === x && i.y === y);
                                if (it) {
                                    if (it.type === 'stairs') out += "<span class='stairs'>></span>";
                                    else if (it.type === 'gold') out += "<span class='gold'>*</span>";
                                    else if (it.type === 'shrine') out += "<span class='shrine'>^</span>";
                                    else if (it.type === 'food') out += "<span class='food'>%</span>";
                                } else {
                                    let biome = "";
                                    if(dlevel >= 5 && dlevel < 10) biome = " moss";
                                    else if(dlevel >= 10 && dlevel < 15) biome = " volcanic";
                                    else if(dlevel >= 15 && dlevel < 20) biome = " void";
                                    else if(dlevel >= 20) biome = " abyss";
                                    out += map[y][x] === '#' ? `<span class='wall${biome}'>#</span>` : `<span class='floor${biome}'>.</span>`;
                                }
                            }
                        }
                    }
                    out += "\n";
                }
                out += `\nHP: ${player.hp}/${player.max_hp}  Level: ${player.level}  XP: ${player.xp}  Gold: ${player.gold}  DLVL: ${dlevel}  Food: ${player.hunger}  Kills: ${total_kills}\n`;
                for (let i = 0; i < msgs.length; i++) {
                    out += msgs[i] + "\n";
                }
            } else if (state === 2 || state === 3) {
                out += "You died.\nPress R to restart.";
            } else if (state === 3) {
                out += "VICTORY!\nYou defeated the dungeon!\nPress R to restart.";
            }
            document.getElementById('game').innerHTML = out;
        }
        
        function saveGame() {
            try {
                localStorage.setItem('krogue_save', JSON.stringify({ player, monsters, items, map, difficulty, dlevel, msgs, total_kills }));
                alert("Game Saved!");
            } catch(e) {
                alert("Failed to save game.");
            }
        }
        
        function loadGame() {
            try {
                let s = localStorage.getItem('krogue_save');
                if (s) {
                    let d = JSON.parse(s);
                    player = d.player;
                    monsters = d.monsters;
                    items = d.items || [];
                    map = d.map;
                    difficulty = d.difficulty;
                    dlevel = d.dlevel || 1;
                    total_kills = d.total_kills || 0;
                    msgs = d.msgs || [];
                    state = 1;
                    render();
                } else {
                    alert("No save found.");
                }
            } catch(e) {
                alert("Failed to load game.");
            }
        }
        
        window.addEventListener('keydown', e => {
            if (state === 0) {
                if (e.key === 'd' || e.key === 'D') difficulty = (difficulty + 1) % 3;
                if (e.key === 'Enter') { 
                    state = 1; dlevel = 1; 
                    player = { x: 1, y: 1, hp: 10, max_hp: 10, xp: 0, level: 1, gold: 0, hunger: 200, max_hunger: 200 };
                    total_kills = 0;
                    msgs = ["Welcome to KRogue!", "Find the stairs '>'. Defeat evil."];
                    initMap(); 
                }
                if (e.key === 'l' || e.key === 'L') loadGame();
                render();
            } else if (state === 1) {
                let dx = 0, dy = 0;
                let turnTaken = false;
                if (e.key === 'ArrowUp') { dy = -1; turnTaken = true; }
                if (e.key === 'ArrowDown') { dy = 1; turnTaken = true; }
                if (e.key === 'ArrowLeft') { dx = -1; turnTaken = true; }
                if (e.key === 'ArrowRight') { dx = 1; turnTaken = true; }
                if (e.key === '.') turnTaken = true; // Wait
                if (e.key === 's' || e.key === 'S') saveGame();
                if (e.key === 'l' || e.key === 'L') loadGame();
                
                if (turnTaken) {
                    if (dx !== 0 || dy !== 0) {
                        let nx = player.x + dx, ny = player.y + dy;
                        if (nx>=0 && ny>=0 && nx<W && ny<H && map[ny][nx] !== '#') {
                            let mIdx = monsters.findIndex(m => m.x === nx && m.y === ny);
                            if (mIdx >= 0) {
                                let dmg = 2 + player.level;
                                monsters[mIdx].hp -= dmg;
                                addMsg(`You hit ${monsters[mIdx].name} for ${dmg}.`);
                                if (monsters[mIdx].hp <= 0) {
                                    addMsg(`${monsters[mIdx].name} dies!`);
                                    if (Math.random() < 0.3) {
                                        items.push({ x: monsters[mIdx].x, y: monsters[mIdx].y, type: 'gold', amount: Math.floor(Math.random()*10)+5 });
                                    }
                                    player.xp += 5;
                                    total_kills++;
                                    monsters.splice(mIdx, 1);
                                    if (player.xp >= player.level * 10) {
                                        player.level++; player.max_hp += 5; player.hp = player.max_hp;
                                        addMsg(`Welcome to level ${player.level}!`);
                                    }
                                }
                            } else {
                                player.x = nx; player.y = ny;
                                let itIdx = items.findIndex(i => i.x === nx && i.y === ny);
                                if (itIdx >= 0) {
                                    let it = items[itIdx];
                                    if (it.type === 'stairs') {
                                        dlevel++;
                                        if (dlevel > 25) {
                                            state = 3; // Victory
                                            render();
                                            return;
                                        }
                                        addMsg(`You descend to level ${dlevel}...`);
                                        initMap();
                                        render();
                                        return;
                                    } else if (it.type === 'gold') {
                                        player.gold += it.amount;
                                        addMsg(`You pick up ${it.amount} gold.`);
                                        items.splice(itIdx, 1);
                                    } else if (it.type === 'shrine') {
                                        let buff = Math.floor(Math.random()*3);
                                        if (buff === 0) { player.max_hp += 10; player.hp = player.max_hp; addMsg("Shrine glows! Health increased!"); }
                                        else if (buff === 1) { player.xp += 50; addMsg("Shrine glows! You feel wiser!"); }
                                        else { player.level++; player.max_hp += 5; player.hp = player.max_hp; addMsg("Shrine glows! You grew stronger!"); }
                                        items.splice(itIdx, 1);
                                        if (player.xp >= player.level * 10) {
                                            player.level++; player.max_hp += 5; player.hp = player.max_hp;
                                            addMsg(`Welcome to level ${player.level}!`);
                                        }
                                    } else if (it.type === 'food') {
                                        player.hunger += 100;
                                        if (player.hunger > player.max_hunger) player.hunger = player.max_hunger;
                                        addMsg("You eat a food ration.");
                                        items.splice(itIdx, 1);
                                    }
                                }
                            }
                        }
                    }
                    
                    if (player.hunger > 0) {
                        player.hunger--;
                    } else {
                        player.hp--;
                        if (Math.random() < 0.2) addMsg("You are starving!");
                        if (player.hp <= 0) {
                            addMsg("You starved to death.");
                            state = 2;
                        }
                    }
                    
                    // monster turn
                    monsters.forEach(m => {
                        m.turn++;
                        if (m.ch === 'z' && m.turn % 2 === 0) return; // Zombie is slow
                        if (m.ch === 'b') { // Bat is fast, does logic twice
                            for(let step=0; step<2; step++) {
                                doMonsterMove(m);
                            }
                        } else {
                            doMonsterMove(m);
                        }
                    });
                    
                    function doMonsterMove(m) {
                        if (m.hp <= 0) return;
                        if (Math.random() < 0.7) {
                            let mdx = Math.sign(player.x - m.x);
                            let mdy = Math.sign(player.y - m.y);
                            // Avoid diagonal for simplicity, pick one axis
                            if (mdx !== 0 && mdy !== 0) {
                                if (Math.random() < 0.5) mdx = 0; else mdy = 0;
                            }
                            let nx = m.x + mdx; let ny = m.y + mdy;
                            if (nx === player.x && ny === player.y) {
                                let dmg = 1 + difficulty + (dlevel>2?1:0);
                                player.hp -= dmg;
                                addMsg(`${m.name} hits you for ${dmg}.`);
                                if (player.hp <= 0) state = 2;
                            } else if (nx>=0 && ny>=0 && nx<W && ny<H && map[ny][nx] !== '#') {
                                if (!monsters.find(om => om.x === nx && om.y === ny)) {
                                    m.x = nx; m.y = ny;
                                }
                            }
                        }
                    }
                }
                render();
            } else if (state === 2 || state === 3) {
                if (e.key === 'r' || e.key === 'R') { state = 0; render(); }
            }
        });
        
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTowers</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; color: #333; text-align: center; }
        h1 { margin-top: 0; }
        .game-area { display: flex; justify-content: center; margin-top: 50px; gap: 40px; }
        .peg { width: 120px; height: 150px; border-bottom: 8px solid #333; position: relative; display: flex; flex-direction: column-reverse; align-items: center; }
        .peg-pole { position: absolute; width: 12px; height: 100%; background: #ccc; bottom: 0; z-index: -1; border-radius: 6px 6px 0 0; }
        .disc { height: 24px; border-radius: 12px; background: #0078D7; border: 1px solid #005A9E; margin-bottom: 2px; }
        .controls { margin-top: 40px; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>KTowers</h1>
    <div>Tower of Hanoi - Phase 1</div>
    <div class="game-area">
        <div class="peg">
            <div class="peg-pole"></div>
            <!-- Mock discs -->
            <div class="disc" style="width: 100px;"></div>
            <div class="disc" style="width: 80px;"></div>
            <div class="disc" style="width: 60px;"></div>
        </div>
        <div class="peg">
            <div class="peg-pole"></div>
        </div>
        <div class="peg">
            <div class="peg-pole"></div>
        </div>
    </div>
    <div class="controls">
        <button onclick="alert('Not implemented in Phase 1')">Reset</button>
    </div>
    <script>
        console.log("KTowers loaded");
    </script>
</body>
</html>

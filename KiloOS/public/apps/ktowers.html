<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KTowers</title>
    <style>
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; text-align: center; }
        h1 { margin-top: 0; margin-bottom: 5px; }
        .info { margin-bottom: 20px; font-size: 18px; }
        .game-area { display: flex; justify-content: center; margin-top: 20px; gap: 40px; }
        .peg-container { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 8px; transition: background 0.2s; min-width: 140px; }
        .peg-container:hover { background: #2a2a2a; }
        .peg-container.selected { background: #1e3a5f; outline: 2px solid #3b82f6; }
        .peg { width: 140px; height: 180px; border-bottom: 8px solid #888; position: relative; display: flex; flex-direction: column-reverse; align-items: center; }
        .peg-pole { position: absolute; width: 12px; height: 100%; background: #555; bottom: 0; z-index: 0; border-radius: 6px 6px 0 0; }
        .disc { height: 24px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.5); margin-bottom: 2px; z-index: 1; transition: bottom 0.2s; }
        .controls { margin-top: 40px; }
        button { padding: 8px 16px; font-size: 14px; cursor: pointer; border: 1px solid #444; background: #333; color: #e0e0e0; border-radius: 4px; }
        button:hover { background: #444; }
        .message { margin-top: 20px; font-weight: bold; color: #4ade80; font-size: 20px; min-height: 24px;}
    </style>
</head>
<body>
    <h1>KTowers</h1>
    <div class="info">Moves: <span id="moveCount">0</span> / Optimal: <span id="optimalMoves">0</span></div>
    
    <div class="game-area" id="gameArea">
        <!-- Rendered by JS -->
    </div>
    
    <div class="message" id="message"></div>

    <div class="controls">
        <label for="difficulty">Discs: </label>
        <select id="difficulty" onchange="changeDifficulty()" style="background:#333; color:#e0e0e0; border:1px solid #444; padding:7px; border-radius:4px; margin-right:10px;">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
        </select>
        <button onclick="initGame()">Restart Game</button>
    </div>

    <script>
        let numDiscs = 4;
        let audioCtx = null;

        function playSound(type) {
            if (!window.AudioContext && !window.webkitAudioContext) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let now = audioCtx.currentTime;
            if (type === 'win') {
                const freqs = [440, 554, 659, 880];
                for(let i=0; i<freqs.length; i++){
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = freqs[i];
                    g.gain.setValueAtTime(0, now + i*0.1);
                    g.gain.linearRampToValueAtTime(0.3, now + i*0.1 + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i*0.1 + 0.3);
                    o.start(now + i*0.1);
                    o.stop(now + i*0.1 + 0.3);
                }
                return;
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'pickup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'drop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(150, now + 0.2);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.linearRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function changeDifficulty() {
            const select = document.getElementById('difficulty');
            numDiscs = parseInt(select.value, 10);
            initGame();
        }
        let pegs = [[], [], []];
        let selectedPeg = null;
        let moves = 0;
        let won = false;

        const colors = ['#FF3B30', '#FF9500', '#FFCC00', '#4CD964', '#5AC8FA', '#007AFF', '#5856D6', '#FF2D55'];

        function initGame() {
            pegs = [[], [], []];
            for (let i = numDiscs; i >= 1; i--) {
                pegs[0].push(i);
            }
            selectedPeg = null;
            moves = 0;
            won = false;
            document.getElementById('message').innerText = '';
            document.getElementById('optimalMoves').innerText = (1 << numDiscs) - 1;
            render();
        }

        function handlePegClick(index) {
            if (won) return;

            if (selectedPeg === null) {
                if (pegs[index].length > 0) {
                    selectedPeg = index;
                    playSound('pickup');
                    render();
                } else {
                    playSound('error');
                }
            } else if (selectedPeg === index) {
                selectedPeg = null;
                playSound('drop');
                render();
            } else {
                const fromPeg = pegs[selectedPeg];
                const toPeg = pegs[index];
                
                if (toPeg.length === 0 || toPeg[toPeg.length - 1] > fromPeg[fromPeg.length - 1]) {
                    toPeg.push(fromPeg.pop());
                    moves++;
                    selectedPeg = null;
                    render();
                    if (!checkWin()) {
                        playSound('drop');
                    }
                } else {
                    selectedPeg = null;
                    playSound('error');
                    render();
                }
            }
        }

        function checkWin() {
            if (pegs[2].length === numDiscs) {
                won = true;
                document.getElementById('message').innerText = `You won in ${moves} moves!`;
                playSound('win');
                return true;
            }
            return false;
        }

        function render() {
            document.getElementById('moveCount').innerText = moves;
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '';

            pegs.forEach((peg, index) => {
                const pegContainer = document.createElement('div');
                pegContainer.className = 'peg-container' + (selectedPeg === index ? ' selected' : '');
                pegContainer.onclick = () => handlePegClick(index);

                const pegDiv = document.createElement('div');
                pegDiv.className = 'peg';
                
                const pole = document.createElement('div');
                pole.className = 'peg-pole';
                pegDiv.appendChild(pole);

                peg.forEach(discSize => {
                    const disc = document.createElement('div');
                    disc.className = 'disc';
                    // max width 140px, min width 40px
                    const width = 40 + (discSize / 8) * 80;
                    disc.style.width = width + 'px';
                    disc.style.backgroundColor = colors[(discSize - 1) % colors.length];
                    pegDiv.appendChild(disc);
                });

                pegContainer.appendChild(pegDiv);
                gameArea.appendChild(pegContainer);
            });
        }

        initGame();
    </script>
</body>
</html>

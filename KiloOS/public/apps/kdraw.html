<!DOCTYPE html>
<html>
<head>
<title>KDraw</title>
<style>
  body { margin: 0; background-color: #fff; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
  .toolbar { display: flex; padding: 10px; gap: 10px; background: #eee; border-bottom: 1px solid #ccc; }
  .color { width: 25px; height: 25px; border: 2px solid #ccc; cursor: pointer; box-sizing: border-box; }
  .color.active { border: 2px solid #000; box-shadow: inset 0 0 0 2px #fff; }
  canvas { flex: 1; cursor: crosshair; touch-action: none; }
</style>
</head>
<body>
<div class="toolbar" id="toolbar"></div>
<canvas id="canvas"></canvas>
<script>
  const colors = ['#000000', '#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ffffff'];
  let currentColor = colors[0];
  
  const toolbar = document.getElementById('toolbar');
  colors.forEach(c => {
      let d = document.createElement('div');
      d.className = 'color';
      d.style.backgroundColor = c;
      if (c === currentColor) d.classList.add('active');
      d.onclick = () => {
          currentColor = c;
          document.querySelectorAll('.color').forEach(el => el.classList.remove('active'));
          d.classList.add('active');
      };
      toolbar.appendChild(d);
  });

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - toolbar.offsetHeight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 2;
  }
  window.onresize = resize;
  
  let isDrawing = false;
  let lastX = 0;
  let lastY = 0;
  
  function getPos(e) {
      if (e.touches && e.touches.length > 0) {
          return { x: e.touches[0].clientX, y: e.touches[0].clientY - toolbar.offsetHeight };
      }
      return { x: e.clientX, y: e.clientY - toolbar.offsetHeight };
  }

  function startPos(e) {
      isDrawing = true;
      const pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;
  }

  function endPos() {
      isDrawing = false;
  }

  function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = currentColor;
      ctx.stroke();
      
      lastX = pos.x;
      lastY = pos.y;
  }

  canvas.addEventListener('mousedown', startPos);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endPos);
  canvas.addEventListener('mouseleave', endPos);
  
  canvas.addEventListener('touchstart', startPos, {passive: false});
  canvas.addEventListener('touchmove', draw, {passive: false});
  canvas.addEventListener('touchend', endPos);

  // Small delay to ensure toolbar layout is done
  setTimeout(() => {
      resize();
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
  }, 0);
</script>
</body>
</html>

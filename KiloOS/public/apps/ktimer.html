<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #111;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .tabs {
    display: flex;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
    color: #666;
    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .tab.active {
    color: #fff;
    background: #252525;
    border-bottom: 2px solid #5a8bd4;
  }
  .content {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  
  /* The SVG Ring */
  .ring-container {
    position: relative;
    width: 240px;
    height: 240px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
  }
  .progress-ring {
    position: absolute;
    top: 0;
    left: 0;
    transform: rotate(-90deg);
  }
  .progress-ring-circle {
    transition: stroke-dashoffset 0.05s linear;
  }
  
  .display-wrapper {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .display {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 32px;
    font-weight: bold;
    color: #5a8bd4;
    text-shadow: 0 0 15px rgba(90, 139, 212, 0.5);
    margin: 0;
    z-index: 10;
  }
  
  .controls {
    display: flex;
    gap: 15px;
  }
  button {
    background: #2a2a2a;
    color: white;
    border: 1px solid #444;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  button:hover {
    background: #333;
    border-color: #555;
    transform: translateY(-1px);
  }
  button:active {
    transform: translateY(1px);
  }
  button.primary {
    background: #5a8bd4;
    border-color: #5a8bd4;
    color: #000;
    box-shadow: 0 4px 15px rgba(90, 139, 212, 0.3);
  }
  button.primary:hover {
    background: #6ba0f0;
    border-color: #6ba0f0;
    box-shadow: 0 6px 20px rgba(90, 139, 212, 0.4);
  }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" id="tabStopwatch">STOPWATCH</div>
    <div class="tab" id="tabTimer">TIMER</div>
  </div>
  
  <!-- Stopwatch Content -->
  <div class="content" id="contentStopwatch">
    <div class="ring-container">
      <svg class="progress-ring" height="240" width="240">
        <circle fill="transparent" stroke="#222" stroke-width="6" r="110" cx="120" cy="120" />
        <circle class="progress-ring-circle" id="swRing" fill="transparent" stroke="#5a8bd4" stroke-width="8" stroke-linecap="round" r="110" cx="120" cy="120" stroke-dasharray="691.15" stroke-dashoffset="691.15" />
      </svg>
      <div class="display-wrapper">
        <div class="display" id="swDisplay">00:00:00.000</div>
      </div>
    </div>
    <div class="controls">
      <button class="primary" id="swBtnStart">Start</button>
      <button id="swBtnLap">Lap</button>
      <button id="swBtnReset">Reset</button>
    </div>
    <div id="swLaps" style="margin-top: 20px; width: 240px; height: 120px; overflow-y: auto; background: #1a1a1a; border-radius: 8px; padding: 10px; font-family: 'Consolas', monospace; font-size: 14px; color: #aaa; box-sizing: border-box;"></div>
  </div>
  
  <!-- Timer Content -->
  <div class="content" id="contentTimer" style="display: none;">
    <div class="ring-container">
      <svg class="progress-ring" height="240" width="240">
        <circle fill="transparent" stroke="#222" stroke-width="6" r="110" cx="120" cy="120" />
        <circle class="progress-ring-circle" id="tmRing" fill="transparent" stroke="#5a8bd4" stroke-width="8" stroke-linecap="round" r="110" cx="120" cy="120" stroke-dasharray="691.15" stroke-dashoffset="0" />
      </svg>
      <div class="display-wrapper">
        <input type="text" id="tmInput" value="00:05:00" style="background: transparent; border: none; border-bottom: 2px solid #444; color: #5a8bd4; font-family: 'Consolas', monospace; font-size: 32px; font-weight: bold; text-align: center; width: 180px; outline: none; z-index: 10;">
        <div class="display" id="tmDisplay" style="display: none;">00:00:00</div>
      </div>
    </div>
    <div class="controls">
      <button class="primary" id="tmBtnStart">Start</button>
      <button id="tmBtnReset">Reset</button>
    </div>
  </div>

  <script>
    const circumference = 2 * Math.PI * 110; // 691.15
    
    // Tab Switching
    const tabStopwatch = document.getElementById('tabStopwatch');
    const tabTimer = document.getElementById('tabTimer');
    const contentStopwatch = document.getElementById('contentStopwatch');
    const contentTimer = document.getElementById('contentTimer');

    tabStopwatch.onclick = () => {
      tabStopwatch.classList.add('active');
      tabTimer.classList.remove('active');
      contentStopwatch.style.display = 'flex';
      contentTimer.style.display = 'none';
    };

    tabTimer.onclick = () => {
      tabTimer.classList.add('active');
      tabStopwatch.classList.remove('active');
      contentTimer.style.display = 'flex';
      contentStopwatch.style.display = 'none';
    };

    // --- Stopwatch Logic ---
    let swStart = 0;
    let swElapsed = 0;
    let swInterval = null;
    let lapCount = 0;
    const swDisplay = document.getElementById('swDisplay');
    const swBtnStart = document.getElementById('swBtnStart');
    const swBtnLap = document.getElementById('swBtnLap');
    const swBtnReset = document.getElementById('swBtnReset');
    const swRing = document.getElementById('swRing');
    const swLaps = document.getElementById('swLaps');

    function formatTime(ms) {
      let d = new Date(ms);
      let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
      let m = d.getUTCMinutes().toString().padStart(2, '0');
      let s = d.getUTCSeconds().toString().padStart(2, '0');
      let milli = d.getUTCMilliseconds().toString().padStart(3, '0');
      return `${h}:${m}:${s}.${milli}`;
    }

    function updateSw() {
      let currentMs = swElapsed + (swInterval ? performance.now() - swStart : 0);
      swDisplay.innerText = formatTime(currentMs);
      
      // Ring completes every 60 seconds (60000 ms)
      let progress = (currentMs % 60000) / 60000;
      swRing.style.strokeDashoffset = circumference - (progress * circumference);
    }

    swBtnStart.onclick = () => {
      if (swInterval) {
        clearInterval(swInterval);
        swInterval = null;
        swElapsed += performance.now() - swStart;
        swBtnStart.innerText = "Start";
        swBtnStart.classList.add("primary");
      } else {
        swStart = performance.now();
        swInterval = setInterval(updateSw, 20); // 50fps
        swBtnStart.innerText = "Stop";
        swBtnStart.classList.remove("primary");
      }
    };

    swBtnLap.onclick = () => {
      if (!swInterval) return;
      lapCount++;
      let currentMs = swElapsed + performance.now() - swStart;
      let lapDiv = document.createElement('div');
      lapDiv.style.padding = "4px 0";
      lapDiv.style.borderBottom = "1px solid #333";
      lapDiv.innerText = `Lap ${lapCount}: ${formatTime(currentMs)}`;
      swLaps.prepend(lapDiv);
    };

    swBtnReset.onclick = () => {
      if (swInterval) { clearInterval(swInterval); swInterval = null; }
      swElapsed = 0;
      lapCount = 0;
      swLaps.innerHTML = "";
      swBtnStart.innerText = "Start";
      swBtnStart.classList.add("primary");
      updateSw();
      swRing.style.strokeDashoffset = circumference;
    };

    // --- Timer Logic ---
    let timerTarget = 0;
    let timerRemaining = 0;
    let timerTotal = 0;
    let timerInterval = null;
    const tmDisplay = document.getElementById('tmDisplay');
    const tmInput = document.getElementById('tmInput');
    const tmBtnStart = document.getElementById('tmBtnStart');
    const tmBtnReset = document.getElementById('tmBtnReset');
    const tmRing = document.getElementById('tmRing');
    
    function formatTimer(ms) {
      if (ms < 0) ms = 0;
      let h = Math.floor(ms / 3600000).toString().padStart(2, '0');
      let m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
      let s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function playAlarm() {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();
        for(let i=0; i<3; i++) {
          let osc = ctx.createOscillator();
          let gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.type = 'square';
          osc.frequency.setValueAtTime(600, ctx.currentTime + i * 0.4);
          osc.frequency.setValueAtTime(800, ctx.currentTime + i * 0.4 + 0.1);
          gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.4);
          gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.4 + 0.3);
          osc.start(ctx.currentTime + i * 0.4);
          osc.stop(ctx.currentTime + i * 0.4 + 0.3);
        }
      } catch (e) {}
    }

    function updateTimer() {
      timerRemaining = timerTarget - Date.now();
      if (timerRemaining <= 0) {
        timerRemaining = 0;
        clearInterval(timerInterval);
        timerInterval = null;
        tmBtnStart.innerText = "Start";
        tmBtnStart.classList.add("primary");
        playAlarm();
        tmInput.style.display = 'block';
        tmDisplay.style.display = 'none';
        tmRing.style.strokeDashoffset = 0;
      } else {
        tmDisplay.innerText = formatTimer(timerRemaining);
        let progress = timerRemaining / timerTotal;
        tmRing.style.strokeDashoffset = circumference - (progress * circumference);
      }
    }

    tmBtnStart.onclick = () => {
      if (timerInterval) {
        // Pause
        clearInterval(timerInterval);
        timerInterval = null;
        tmBtnStart.innerText = "Resume";
        tmBtnStart.classList.add("primary");
      } else {
        // Start / Resume
        if (tmInput.style.display !== 'none') {
          // Parse HH:MM:SS
          let parts = tmInput.value.split(':').reverse();
          let ms = 0;
          if (parts[0]) ms += parseInt(parts[0]) * 1000;
          if (parts[1]) ms += parseInt(parts[1]) * 60000;
          if (parts[2]) ms += parseInt(parts[2]) * 3600000;
          if (isNaN(ms) || ms <= 0) return;
          timerRemaining = ms;
          timerTotal = ms;
          tmInput.style.display = 'none';
          tmDisplay.style.display = 'block';
        }
        timerTarget = Date.now() + timerRemaining;
        timerInterval = setInterval(updateTimer, 50);
        updateTimer();
        tmBtnStart.innerText = "Pause";
        tmBtnStart.classList.remove("primary");
      }
    };

    tmBtnReset.onclick = () => {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      timerRemaining = 0;
      timerTotal = 0;
      tmBtnStart.innerText = "Start";
      tmBtnStart.classList.add("primary");
      tmInput.style.display = 'block';
      tmDisplay.style.display = 'none';
      tmInput.value = "00:05:00";
      tmRing.style.strokeDashoffset = 0;
    };
  </script>
</body>
</html>

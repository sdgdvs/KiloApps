<!DOCTYPE html>
<html>
<head>
<title>KZip</title>
<style>
  body { margin: 0; font-family: "Segoe UI", sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 10px; box-sizing: border-box; }
  .listbox { flex: 1; border: 1px solid #ccc; background-color: #fff; overflow-y: auto; padding: 5px; margin-bottom: 10px; }
  .listbox-item { padding: 3px 5px; cursor: default; display: flex; justify-content: space-between; }
  .listbox-item:hover { background-color: #e0f0ff; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; }
  button { padding: 5px 15px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; background: #e0e0e0; }
  button:hover { background: #d0d0d0; }
</style>
</head>
<body>
<div class="listbox" id="fileList"></div>
<div class="controls">
  <button id="btnOpen">Open .kza</button>
  <button id="btnAdd">Add File...</button>
  <button id="btnRemove">Remove</button>
  <button id="btnPack">Pack to .kza</button>
  <button id="btnExtract">Extract All</button>
</div>
<script>
  const fileList = document.getElementById('fileList');
  const btnOpen = document.getElementById('btnOpen');
  const btnAdd = document.getElementById('btnAdd');
  const btnRemove = document.getElementById('btnRemove');
  const btnPack = document.getElementById('btnPack');
  const btnExtract = document.getElementById('btnExtract');
  
  let files = [];
  let selectedIndex = -1;
  
  let currentReqId = 0;
  const callbacks = {};

  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (callbacks[msg.requestId]) {
      callbacks[msg.requestId](msg);
      delete callbacks[msg.requestId];
    }
  });

  function sendToOS(msg) {
    return new Promise((resolve) => {
      const id = ++currentReqId;
      callbacks[id] = resolve;
      window.parent.postMessage({ ...msg, requestId: id }, '*');
    });
  }

  function renderFiles() {
      fileList.innerHTML = '';
      files.forEach((f, idx) => {
          const div = document.createElement('div');
          div.className = 'listbox-item';
          if (idx === selectedIndex) {
              div.style.backgroundColor = '#cce8ff';
          }
          div.onclick = () => {
              selectedIndex = idx;
              renderFiles();
          };
          
          const nameSpan = document.createElement('span');
          nameSpan.textContent = f.name;
          
          const sizeSpan = document.createElement('span');
          const b64Data = f.data.includes(',') ? f.data.split(',')[1] : f.data;
          sizeSpan.textContent = Math.round(b64Data.length * 0.75) + ' bytes';
          sizeSpan.style.color = '#888';
          
          div.appendChild(nameSpan);
          div.appendChild(sizeSpan);
          fileList.appendChild(div);
      });
  }
  
  btnRemove.onclick = () => {
      if (selectedIndex >= 0 && selectedIndex < files.length) {
          files.splice(selectedIndex, 1);
          selectedIndex = -1;
          renderFiles();
      }
  };

  btnOpen.onclick = async () => {
      const res = await sendToOS({ type: 'VFS_SHOW_OPEN' });
      if (res.path) {
          const readRes = await sendToOS({ type: 'VFS_READ', path: res.path });
          if (readRes.data) {
              try {
                  // VFS data is base64 string, so we need to atob it to get JSON
                  const jsonStr = atob(readRes.data.split(',')[1] || readRes.data);
                  files = JSON.parse(jsonStr);
                  selectedIndex = -1;
                  renderFiles();
              } catch(e) {
                  alert("Failed to parse archive!");
              }
          }
      }
  };

  btnAdd.onclick = async () => {
      const res = await sendToOS({ type: 'VFS_SHOW_OPEN' });
      if (res.path) {
          const readRes = await sendToOS({ type: 'VFS_READ', path: res.path });
          if (readRes.data) {
              const filename = res.path.split('/').pop();
              files.push({ name: filename, data: readRes.data });
              selectedIndex = -1;
              renderFiles();
          }
      }
  };

  btnPack.onclick = async () => {
      if (files.length === 0) return alert("Nothing to pack!");
      const res = await sendToOS({ type: 'VFS_SHOW_SAVE' });
      if (res.path) {
          let path = res.path;
          if (!path.endsWith('.kza')) path += '.kza';
          const jsonStr = JSON.stringify(files);
          const b64 = 'data:application/octet-stream;base64,' + btoa(jsonStr);
          await sendToOS({ type: 'VFS_WRITE', path: path, data: b64 });
          alert("Packed successfully to " + path);
      }
  };
  
  btnExtract.onclick = async () => {
      if (files.length === 0) return alert("Nothing to extract!");
      let count = 0;
      for (const f of files) {
          await sendToOS({ type: 'VFS_WRITE', path: '/' + f.name, data: f.data });
          count++;
      }
      alert(`Extracted ${count} files to the root directory!`);
  };
  
  renderFiles();
</script>
</body>
</html>

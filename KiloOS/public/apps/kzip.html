<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KZip Archiver Studio</title>
<style>
  :root {
    --bg-primary: #0f172a;
    --bg-secondary: #1e293b;
    --bg-card: #1e293b;
    --accent-blue: #38bdf8;
    --accent-blue-hover: #0284c7;
    --accent-green: #22c55e;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: #334155;
    --item-hover: #334155;
    --item-selected: #1e3a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background-color: var(--bg-primary);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-color);
    margin-bottom: 10px;
  }

  .title-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .app-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    box-shadow: 0 2px 8px rgba(56, 189, 248, 0.4);
  }

  .app-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .stats-pill {
    font-size: 12px;
    background-color: var(--bg-secondary);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    color: var(--text-muted);
  }

  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    background-color: var(--bg-secondary);
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border-color);
    margin-bottom: 10px;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toolbar-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  input[type="text"], input[type="password"], select {
    background-color: var(--bg-primary);
    border: 1px solid var(--border-color);
    color: var(--text-main);
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus, input[type="password"]:focus, select:focus {
    border-color: var(--accent-blue);
  }

  .search-input { width: 160px; }
  .password-input { width: 130px; }

  .actions-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  button {
    background-color: var(--bg-secondary);
    color: var(--text-main);
    border: 1px solid var(--border-color);
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s ease;
  }

  button:hover {
    background-color: var(--item-hover);
    border-color: var(--accent-blue);
    color: #fff;
  }

  button.btn-primary {
    background: linear-gradient(135deg, var(--accent-blue), #0284c7);
    border: none;
    color: #fff;
  }
  button.btn-primary:hover {
    filter: brightness(1.1);
  }

  button.btn-danger {
    background-color: rgba(239, 68, 68, 0.15);
    border-color: rgba(239, 68, 68, 0.4);
    color: var(--accent-red);
  }
  button.btn-danger:hover {
    background-color: var(--accent-red);
    color: #fff;
  }

  .table-container {
    flex: 1;
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    overflow-y: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    text-align: left;
  }

  th {
    background-color: rgba(15, 23, 42, 0.6);
    color: var(--text-muted);
    font-weight: 600;
    padding: 8px 12px;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--border-color);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(51, 65, 85, 0.5);
  }

  tr:hover {
    background-color: var(--item-hover);
  }

  tr.selected {
    background-color: var(--item-selected);
  }

  .badge {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-rle { background-color: rgba(168, 85, 247, 0.2); color: var(--accent-purple); border: 1px solid rgba(168, 85, 247, 0.4); }
  .badge-store { background-color: rgba(56, 189, 248, 0.2); color: var(--accent-blue); border: 1px solid rgba(56, 189, 248, 0.4); }

  .status-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }

  .modal-box {
    background-color: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 10px;
    width: 480px;
    max-width: 90%;
    padding: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .modal-body {
    max-height: 250px;
    overflow-y: auto;
    font-size: 12px;
    background: var(--bg-primary);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    margin-bottom: 12px;
  }

  .verify-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .pass-text { color: var(--accent-green); font-weight: bold; }
  .fail-text { color: var(--accent-red); font-weight: bold; }
</style>
</head>
<body>

<div class="header">
  <div class="title-group">
    <div class="app-icon">KZ</div>
    <div class="app-title">KZip Archiver Studio</div>
  </div>
  <div class="stats-pill" id="statsPill">0 Files | 0 B</div>
</div>

<div class="toolbar">
  <div class="toolbar-group">
    <span class="toolbar-label">Filter:</span>
    <input type="text" id="searchInput" class="search-input" placeholder="Search files...">
  </div>

  <div class="toolbar-group">
    <span class="toolbar-label">Method:</span>
    <select id="compMethod">
      <option value="1">RLE Fast (Run-Length)</option>
      <option value="0">Store (Uncompressed)</option>
    </select>
  </div>

  <div class="toolbar-group">
    <span class="toolbar-label">Password:</span>
    <input type="password" id="passwordInput" class="password-input" placeholder="Optional password">
  </div>
</div>

<div class="actions-row">
  <button id="btnOpen">📂 Open .kza</button>
  <button id="btnAdd">➕ Add File...</button>
  <button id="btnRemove" class="btn-danger">🗑️ Remove</button>
  <button id="btnPack" class="btn-primary">📦 Pack to .kza</button>
  <button id="btnExtractSel">🎯 Extract Selected</button>
  <button id="btnExtractAll">⚡ Extract All</button>
  <button id="btnVerify">🛡️ Verify CRC32</button>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th style="width: 30px;"><input type="checkbox" id="selectAll"></th>
        <th>Filename</th>
        <th>Original Size</th>
        <th>Packed Size</th>
        <th>Savings</th>
        <th>CRC32</th>
        <th>Method</th>
      </tr>
    </thead>
    <tbody id="fileTableBody">
    </tbody>
  </table>
</div>

<div class="status-footer">
  <span id="statusMessage">Ready.</span>
  <span id="overallSavings">Total Savings: 0%</span>
</div>

<!-- Integrity Modal -->
<div class="modal-overlay" id="verifyModal">
  <div class="modal-box">
    <div class="modal-header">
      <span>Checksum & Integrity Verification</span>
      <button style="padding: 2px 8px;" id="btnCloseModal">✕</button>
    </div>
    <div class="modal-body" id="modalReport">
    </div>
    <div style="display: flex; justify-content: flex-end;">
      <button class="btn-primary" id="btnOkModal">Close Report</button>
    </div>
  </div>
</div>

<script>
  let files = [];
  let selectedIndices = new Set();
  let currentReqId = 0;
  const callbacks = {};

  const fileTableBody = document.getElementById('fileTableBody');
  const searchInput = document.getElementById('searchInput');
  const compMethod = document.getElementById('compMethod');
  const passwordInput = document.getElementById('passwordInput');
  const statsPill = document.getElementById('statsPill');
  const statusMessage = document.getElementById('statusMessage');
  const overallSavings = document.getElementById('overallSavings');
  const selectAll = document.getElementById('selectAll');

  const btnOpen = document.getElementById('btnOpen');
  const btnAdd = document.getElementById('btnAdd');
  const btnRemove = document.getElementById('btnRemove');
  const btnPack = document.getElementById('btnPack');
  const btnExtractSel = document.getElementById('btnExtractSel');
  const btnExtractAll = document.getElementById('btnExtractAll');
  const btnVerify = document.getElementById('btnVerify');

  const verifyModal = document.getElementById('verifyModal');
  const modalReport = document.getElementById('modalReport');
  const btnCloseModal = document.getElementById('btnCloseModal');
  const btnOkModal = document.getElementById('btnOkModal');

  window.addEventListener('message', (e) => {
    const msg = e.data;
    if (callbacks[msg.requestId]) {
      callbacks[msg.requestId](msg);
      delete callbacks[msg.requestId];
    }
  });

  function sendToOS(msg) {
    return new Promise((resolve) => {
      const id = ++currentReqId;
      callbacks[id] = resolve;
      window.parent.postMessage({ ...msg, requestId: id }, '*');
    });
  }

  // CRC32 Calculation
  function calculateCRC32(bytes) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < bytes.length; i++) {
      crc ^= bytes[i];
      for (let j = 0; j < 8; j++) {
        if (crc & 1) crc = (crc >>> 1) ^ 0xEDB88320;
        else crc = crc >>> 1;
      }
    }
    return ((crc ^ 0xFFFFFFFF) >>> 0).toString(16).toUpperCase().padStart(8, '0');
  }

  // RLE Compression
  function compressRLE(bytes) {
    const out = [];
    let i = 0;
    while (i < bytes.length) {
      const b = bytes[i];
      let run = 1;
      while (i + run < bytes.length && bytes[i + run] === b && run < 255) {
        run++;
      }
      if (run >= 3 || b === 0xFF) {
        out.push(0xFF, run, b);
        i += run;
      } else {
        for (let r = 0; r < run; r++) out.push(b);
        i += run;
      }
    }
    return new Uint8Array(out);
  }

  // RLE Decompression
  function decompressRLE(bytes, targetSize) {
    const out = new Uint8Array(targetSize);
    let inIdx = 0, outIdx = 0;
    while (inIdx < bytes.length && outIdx < targetSize) {
      const b = bytes[inIdx++];
      if (b === 0xFF) {
        if (inIdx + 1 >= bytes.length) break;
        const count = bytes[inIdx++];
        const val = bytes[inIdx++];
        for (let c = 0; c < count && outIdx < targetSize; c++) {
          out[outIdx++] = val;
        }
      } else {
        out[outIdx++] = b;
      }
    }
    return out;
  }

  // XOR Cipher Stream
  function cryptXOR(bytes, keyHashNum) {
    if (!keyHashNum) return bytes;
    const out = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
      const k = (keyHashNum + i * 31 + (keyHashNum >> (i % 8))) & 0xFF;
      out[i] = bytes[i] ^ k;
    }
    return out;
  }

  function base64ToUint8(b64) {
    const str = atob(b64.includes(',') ? b64.split(',')[1] : b64);
    const u8 = new Uint8Array(str.length);
    for (let i = 0; i < str.length; i++) u8[i] = str.charCodeAt(i);
    return u8;
  }

  function uint8ToBase64(u8) {
    let binary = '';
    const len = u8.byteLength;
    for (let i = 0; i < len; i++) {
      binary += String.fromCharCode(u8[i]);
    }
    return btoa(binary);
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function renderTable() {
    fileTableBody.innerHTML = '';
    const filterText = searchInput.value.toLowerCase().trim();

    let totalRaw = 0;
    let totalPacked = 0;

    files.forEach((f, idx) => {
      totalRaw += f.uncompSize;
      totalPacked += f.compSize;

      if (filterText && !f.name.toLowerCase().includes(filterText)) {
        return;
      }

      const tr = document.createElement('tr');
      if (selectedIndices.has(idx)) {
        tr.classList.add('selected');
      }

      tr.onclick = (e) => {
        if (e.target.type === 'checkbox') return;
        if (selectedIndices.has(idx)) {
          selectedIndices.delete(idx);
        } else {
          selectedIndices.add(idx);
        }
        renderTable();
      };

      const ratio = f.uncompSize > 0 ? Math.max(0, Math.round(100 - (f.compSize * 100 / f.uncompSize))) : 0;

      tr.innerHTML = `
        <td><input type="checkbox" ${selectedIndices.has(idx) ? 'checked' : ''} data-idx="${idx}"></td>
        <td style="font-weight: 500;">${f.name}</td>
        <td>${formatBytes(f.uncompSize)}</td>
        <td>${formatBytes(f.compSize)}</td>
        <td style="color: ${ratio > 0 ? 'var(--accent-green)' : 'var(--text-muted)'}">${ratio}%</td>
        <td style="font-family: monospace;">0x${f.crc32}</td>
        <td><span class="badge ${f.method === 1 ? 'badge-rle' : 'badge-store'}">${f.method === 1 ? 'RLE' : 'Store'}</span></td>
      `;

      const cb = tr.querySelector('input[type="checkbox"]');
      cb.onchange = (e) => {
        if (e.target.checked) selectedIndices.add(idx);
        else selectedIndices.delete(idx);
        renderTable();
      };

      fileTableBody.appendChild(tr);
    });

    statsPill.textContent = `${files.length} Files | ${formatBytes(totalRaw)}`;
    const overallRatio = totalRaw > 0 ? Math.max(0, Math.round(100 - (totalPacked * 100 / totalRaw))) : 0;
    overallSavings.textContent = `Total Savings: ${overallRatio}%`;
    statusMessage.textContent = `Archive loaded. ${files.length} file(s) present.`;
  }

  searchInput.oninput = () => renderTable();

  selectAll.onchange = (e) => {
    if (e.target.checked) {
      files.forEach((_, idx) => selectedIndices.add(idx));
    } else {
      selectedIndices.clear();
    }
    renderTable();
  };

  btnRemove.onclick = () => {
    if (selectedIndices.size === 0) {
      return alert("Select files to remove.");
    }
    files = files.filter((_, idx) => !selectedIndices.has(idx));
    selectedIndices.clear();
    selectAll.checked = false;
    renderTable();
  };

  btnAdd.onclick = async () => {
    const res = await sendToOS({ type: 'VFS_SHOW_OPEN' });
    if (res.path) {
      const readRes = await sendToOS({ type: 'VFS_READ', path: res.path });
      if (readRes.data) {
        const filename = res.path.split('/').pop();
        const rawBytes = base64ToUint8(readRes.data);
        const crc = calculateCRC32(rawBytes);
        const method = parseInt(compMethod.value);

        let packedBytes = rawBytes;
        let compSize = rawBytes.length;
        let actualMethod = 0;

        if (method === 1 && rawBytes.length > 0) {
          const rleBytes = compressRLE(rawBytes);
          if (rleBytes.length < rawBytes.length) {
            packedBytes = rleBytes;
            compSize = rleBytes.length;
            actualMethod = 1;
          }
        }

        files.push({
          name: filename,
          uncompSize: rawBytes.length,
          compSize: compSize,
          crc32: crc,
          method: actualMethod,
          rawBytes: rawBytes,
          packedBytes: packedBytes
        });

        renderTable();
      }
    }
  };

  btnPack.onclick = async () => {
    if (files.length === 0) return alert("Nothing to pack!");
    const res = await sendToOS({ type: 'VFS_SHOW_SAVE' });
    if (res.path) {
      let path = res.path;
      if (!path.endsWith('.kza')) path += '.kza';

      const pass = passwordInput.value;
      const pwdHashNum = pass ? parseInt(calculateCRC32(new TextEncoder().encode(pass)), 16) : 0;

      const exportFiles = files.map(f => {
        let payload = f.packedBytes;
        if (pwdHashNum) {
          payload = cryptXOR(payload, pwdHashNum);
        }
        return {
          name: f.name,
          uncompSize: f.uncompSize,
          compSize: f.compSize,
          crc32: f.crc32,
          method: f.method,
          data: uint8ToBase64(payload)
        };
      });

      const archiveData = {
        magic: 'KZA2',
        flags: pwdHashNum ? 1 : 0,
        pwdHash: pwdHashNum,
        files: exportFiles
      };

      const jsonStr = JSON.stringify(archiveData);
      const b64 = 'data:application/json;base64,' + btoa(jsonStr);
      await sendToOS({ type: 'VFS_WRITE', path: path, data: b64 });
      alert("Packed archive successfully to " + path);
    }
  };

  btnOpen.onclick = async () => {
    const res = await sendToOS({ type: 'VFS_SHOW_OPEN' });
    if (res.path) {
      const readRes = await sendToOS({ type: 'VFS_READ', path: res.path });
      if (readRes.data) {
        try {
          const jsonStr = atob(readRes.data.includes(',') ? readRes.data.split(',')[1] : readRes.data);
          const parsed = JSON.parse(jsonStr);

          files = [];
          selectedIndices.clear();

          if (parsed.magic === 'KZA2') {
            const pwdHashNum = parsed.pwdHash || 0;
            let userHashNum = 0;

            if (parsed.flags & 1) {
              const userPass = passwordInput.value || prompt("Archive is password protected! Enter Password:");
              if (userPass) {
                userHashNum = parseInt(calculateCRC32(new TextEncoder().encode(userPass)), 16);
              }
              if (userHashNum !== pwdHashNum) {
                return alert("Access Denied: Incorrect Password!");
              }
            }

            parsed.files.forEach(f => {
              let payload = base64ToUint8(f.data);
              if (pwdHashNum) {
                payload = cryptXOR(payload, pwdHashNum);
              }
              let raw = payload;
              if (f.method === 1) {
                raw = decompressRLE(payload, f.uncompSize);
              }
              files.push({
                name: f.name,
                uncompSize: f.uncompSize,
                compSize: f.compSize,
                crc32: f.crc32,
                method: f.method,
                rawBytes: raw,
                packedBytes: payload
              });
            });
          } else if (Array.isArray(parsed)) {
            // Legacy KZA v1 format
            parsed.forEach(f => {
              const raw = base64ToUint8(f.data);
              const crc = calculateCRC32(raw);
              files.push({
                name: f.name,
                uncompSize: raw.length,
                compSize: raw.length,
                crc32: crc,
                method: 0,
                rawBytes: raw,
                packedBytes: raw
              });
            });
          }
          renderTable();
        } catch (e) {
          alert("Failed to parse archive format!");
        }
      }
    }
  };

  btnExtractSel.onclick = async () => {
    if (selectedIndices.size === 0) return alert("Select at least one file to extract.");
    let count = 0;
    for (const idx of selectedIndices) {
      const f = files[idx];
      const b64 = 'data:application/octet-stream;base64,' + uint8ToBase64(f.rawBytes);
      await sendToOS({ type: 'VFS_WRITE', path: '/' + f.name, data: b64 });
      count++;
    }
    alert(`Extracted ${count} selected file(s) to root directory!`);
  };

  btnExtractAll.onclick = async () => {
    if (files.length === 0) return alert("Archive is empty!");
    let count = 0;
    for (const f of files) {
      const b64 = 'data:application/octet-stream;base64,' + uint8ToBase64(f.rawBytes);
      await sendToOS({ type: 'VFS_WRITE', path: '/' + f.name, data: b64 });
      count++;
    }
    alert(`Extracted ${count} file(s) to root directory!`);
  };

  btnVerify.onclick = () => {
    if (files.length === 0) return alert("No files to verify.");
    modalReport.innerHTML = '';
    let passCount = 0;
    let failCount = 0;

    files.forEach(f => {
      const calcCrc = calculateCRC32(f.rawBytes);
      const isMatch = (calcCrc.toUpperCase() === f.crc32.toUpperCase());
      if (isMatch) passCount++; else failCount++;

      const div = document.createElement('div');
      div.className = 'verify-row';
      div.innerHTML = `
        <span>${f.name}</span>
        <span>Stored: 0x${f.crc32} | Calc: 0x${calcCrc} <span class="${isMatch ? 'pass-text' : 'fail-text'}">[${isMatch ? 'PASS' : 'FAIL'}]</span></span>
      `;
      modalReport.appendChild(div);
    });

    const summaryDiv = document.createElement('div');
    summaryDiv.style.marginTop = '10px';
    summaryDiv.style.paddingTop = '8px';
    summaryDiv.style.borderTop = '1px solid var(--border-color)';
    summaryDiv.style.fontWeight = 'bold';
    summaryDiv.innerHTML = `Summary: ${passCount} Passed, ${failCount} Failed. Status: ${failCount === 0 ? '<span class="pass-text">ARCHIVE INTEGRITY VERIFIED</span>' : '<span class="fail-text">CORRUPTION DETECTED</span>'}`;
    modalReport.appendChild(summaryDiv);

    verifyModal.classList.add('active');
  };

  btnCloseModal.onclick = () => verifyModal.classList.remove('active');
  btnOkModal.onclick = () => verifyModal.classList.remove('active');

  renderTable();
</script>
</body>
</html>

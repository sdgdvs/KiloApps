<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KImage Pro</title>
<style>
  :root {
    --bg-color: #0f172a;
    --glass-bg: rgba(30, 41, 59, 0.7);
    --glass-border: rgba(255, 255, 255, 0.1);
    --text-primary: #f8fafc;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
  }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-color);
    background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, transparent 75%);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 12px 20px;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    z-index: 10;
  }
  .toolbar-group {
    display: flex;
    gap: 5px;
    align-items: center;
    border-right: 1px solid var(--glass-border);
    padding-right: 15px;
  }
  .toolbar-group:last-child {
    border-right: none;
  }
  button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--glass-border);
    color: var(--text-primary);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  button:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateY(-1px);
  }
  button:active {
    transform: translateY(0);
  }
  button.primary {
    background: var(--accent);
    border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--accent-hover);
  }
  .title {
    font-size: 14px;
    font-weight: 500;
    margin-left: auto;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.8;
  }
  input[type="file"] {
    display: none;
  }
  .workspace {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
    position: relative;
    overflow: auto;
  }
  .canvas-container {
    position: relative;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 100px);
    object-fit: contain;
  }
  .empty-state {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    opacity: 0.5;
    pointer-events: none;
  }
  .empty-state svg {
    width: 48px;
    height: 48px;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <button class="primary" id="btnOpen" aria-label="Open Image">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Open
      </button>
      <button id="btnSave" style="display:none;" aria-label="Save Image">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
    <div class="toolbar-group" id="editTools" style="display:none;">
      <button id="btnRotateL" title="Rotate Left" aria-label="Rotate Left">↶</button>
      <button id="btnRotateR" title="Rotate Right" aria-label="Rotate Right">↷</button>
      <button id="btnFlipH" title="Flip Horizontal" aria-label="Flip Horizontal">↔</button>
      <button id="btnFlipV" title="Flip Vertical" aria-label="Flip Vertical">↕</button>
      <button id="btnDraw" title="Toggle Draw Mode" aria-label="Toggle Draw Mode">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>
        Draw
      </button>
      <input type="color" id="drawColor" value="#ff0000" aria-label="Draw Color" style="width:24px;height:24px;padding:0;border:none;background:transparent;cursor:pointer;">
    </div>
    <div class="toolbar-group" id="filterTools" style="display:none;">
      <button id="btnGray" aria-label="Grayscale">Grayscale</button>
      <button id="btnInvert" aria-label="Invert">Invert</button>
      <button id="btnSepia" aria-label="Sepia">Sepia</button>
      <button id="btnReset" aria-label="Reset Filters">Reset</button>
    </div>
    <div class="toolbar-group" id="zoomTools" style="display:none;">
      <button id="btnZoomIn" title="Zoom In" aria-label="Zoom In">+</button>
      <button id="btnZoomOut" title="Zoom Out" aria-label="Zoom Out">-</button>
      <button id="btnZoomReset" title="Reset Zoom" aria-label="Reset Zoom">1:1</button>
    </div>
    <div class="title" id="title">No image selected</div>
  </div>
  
  <input type="file" id="fileInput" accept="image/bmp,image/jpeg,image/png,image/webp,image/gif" />
  
  <div class="workspace">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <div>Open an image to begin editing</div>
    </div>
    <div class="canvas-container" id="canvasContainer" style="display:none;">
      <canvas id="canvas"></canvas>
    </div>
  </div>

  <script>
    const state = {
      image: null,
      fileName: '',
      angle: 0,
      flipH: 1,
      flipV: 1,
      filter: 'none',
      originalData: null,
      zoom: 1,
      drawMode: false,
      isDrawing: false
    };

    const ui = {
      btnOpen: document.getElementById('btnOpen'),
      btnSave: document.getElementById('btnSave'),
      fileInput: document.getElementById('fileInput'),
      canvas: document.getElementById('canvas'),
      ctx: document.getElementById('canvas').getContext('2d'),
      title: document.getElementById('title'),
      emptyState: document.getElementById('emptyState'),
      canvasContainer: document.getElementById('canvasContainer'),
      editTools: document.getElementById('editTools'),
      filterTools: document.getElementById('filterTools'),
      zoomTools: document.getElementById('zoomTools'),
      btnDraw: document.getElementById('btnDraw'),
      drawColor: document.getElementById('drawColor')
    };

    ui.btnOpen.onclick = () => ui.fileInput.click();
    
    ui.fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          state.image = img;
          state.fileName = file.name;
          state.angle = 0;
          state.flipH = 1;
          state.flipV = 1;
          state.filter = 'none';
          state.zoom = 1;
          state.drawMode = false;
          state.isDrawing = false;
          ui.btnDraw.classList.remove('primary');
          ui.canvas.style.cursor = 'default';
          ui.title.textContent = file.name;
          
          ui.emptyState.style.display = 'none';
          ui.canvasContainer.style.display = 'block';
          ui.btnSave.style.display = 'flex';
          ui.editTools.style.display = 'flex';
          ui.filterTools.style.display = 'flex';
          ui.zoomTools.style.display = 'flex';
          ui.canvas.style = '';
          
          render();
          
          ui.canvas.width = img.width;
          ui.canvas.height = img.height;
          ui.ctx.drawImage(img, 0, 0);
          state.originalData = ui.ctx.getImageData(0, 0, img.width, img.height);
          
          URL.revokeObjectURL(url);
          e.target.value = '';
        };
        img.src = url;
      }
    };

    function render() {
      if (!state.image) return;
      
      let w = state.image.width;
      let h = state.image.height;
      
      if (state.angle % 180 !== 0) {
        w = state.image.height;
        h = state.image.width;
      }
      
      ui.canvas.width = w;
      ui.canvas.height = h;
      
      ui.ctx.clearRect(0, 0, w, h);
      ui.ctx.save();
      ui.ctx.translate(w/2, h/2);
      ui.ctx.rotate(state.angle * Math.PI / 180);
      ui.ctx.scale(state.flipH, state.flipV);
      ui.ctx.drawImage(state.image, -state.image.width/2, -state.image.height/2);
      ui.ctx.restore();
      
      applyFilter();
      updateZoom();
    }

    function applyFilter() {
      if (state.filter === 'none' || !state.originalData) return;
      
      const imgData = ui.ctx.getImageData(0, 0, ui.canvas.width, ui.canvas.height);
      const data = imgData.data;
      
      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        
        if (state.filter === 'grayscale') {
          const avg = 0.3 * r + 0.59 * g + 0.11 * b;
          data[i] = data[i + 1] = data[i + 2] = avg;
        } else if (state.filter === 'invert') {
          data[i] = 255 - r;
          data[i + 1] = 255 - g;
          data[i + 2] = 255 - b;
        } else if (state.filter === 'sepia') {
          data[i] = Math.min(255, (r * 0.393) + (g * 0.769) + (b * 0.189));
          data[i + 1] = Math.min(255, (r * 0.349) + (g * 0.686) + (b * 0.168));
          data[i + 2] = Math.min(255, (r * 0.272) + (g * 0.534) + (b * 0.131));
        }
      }
      ui.ctx.putImageData(imgData, 0, 0);
    }
    
    function updateZoom() {
      if (state.zoom === 1) {
        ui.canvas.style.width = '';
        ui.canvas.style.height = '';
        ui.canvas.style.maxWidth = '';
        ui.canvas.style.maxHeight = '';
      } else {
        ui.canvas.style.width = (ui.canvas.width * state.zoom) + 'px';
        ui.canvas.style.height = (ui.canvas.height * state.zoom) + 'px';
        ui.canvas.style.maxWidth = 'none';
        ui.canvas.style.maxHeight = 'none';
      }
    }

    ui.btnDraw.onclick = () => {
      state.drawMode = !state.drawMode;
      ui.btnDraw.classList.toggle('primary', state.drawMode);
      ui.canvas.style.cursor = state.drawMode ? 'crosshair' : 'default';
    };

    ui.canvas.onmousedown = (e) => {
      if (!state.drawMode) return;
      state.isDrawing = true;
      const rect = ui.canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (ui.canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (ui.canvas.height / rect.height);
      ui.ctx.beginPath();
      ui.ctx.moveTo(x, y);
      ui.ctx.strokeStyle = ui.drawColor.value;
      ui.ctx.lineWidth = 3;
      ui.ctx.lineCap = 'round';
      ui.ctx.lineJoin = 'round';
    };

    ui.canvas.onmousemove = (e) => {
      if (!state.isDrawing || !state.drawMode) return;
      const rect = ui.canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left) * (ui.canvas.width / rect.width);
      const y = (e.clientY - rect.top) * (ui.canvas.height / rect.height);
      ui.ctx.lineTo(x, y);
      ui.ctx.stroke();
    };

    const bakeDrawing = () => {
      if (!state.isDrawing) return;
      state.isDrawing = false;
      const dataURL = ui.canvas.toDataURL();
      const newImg = new Image();
      newImg.onload = () => {
          state.image = newImg;
          state.angle = 0;
          state.flipH = 1;
          state.flipV = 1;
          state.filter = 'none'; // reset filter since it's baked
          state.originalData = ui.ctx.getImageData(0, 0, ui.canvas.width, ui.canvas.height);
      };
      newImg.src = dataURL;
    };

    ui.canvas.onmouseup = bakeDrawing;
    ui.canvas.onmouseleave = bakeDrawing;

    document.getElementById('btnRotateL').onclick = () => { state.angle -= 90; render(); };
    document.getElementById('btnRotateR').onclick = () => { state.angle += 90; render(); };
    document.getElementById('btnFlipH').onclick = () => { state.flipH *= -1; render(); };
    document.getElementById('btnFlipV').onclick = () => { state.flipV *= -1; render(); };
    
    document.getElementById('btnGray').onclick = () => { state.filter = 'grayscale'; render(); };
    document.getElementById('btnInvert').onclick = () => { state.filter = 'invert'; render(); };
    document.getElementById('btnSepia').onclick = () => { state.filter = 'sepia'; render(); };
    document.getElementById('btnReset').onclick = () => { 
      state.angle = 0; state.flipH = 1; state.flipV = 1; state.filter = 'none'; render(); 
    };
    
    document.getElementById('btnZoomIn').onclick = () => { state.zoom *= 1.25; updateZoom(); };
    document.getElementById('btnZoomOut').onclick = () => { state.zoom /= 1.25; updateZoom(); };
    document.getElementById('btnZoomReset').onclick = () => { state.zoom = 1; updateZoom(); };

    ui.btnSave.onclick = () => {
      if (!state.image) return;
      const link = document.createElement('a');
      link.download = 'edited_' + state.fileName;
      link.href = ui.canvas.toDataURL('image/png');
      link.click();
    };
  </script>
</body>
</html>

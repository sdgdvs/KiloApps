<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KPad Pro</title>
<style>
  :root {
    --bg-base: #0f172a;
    --bg-glass: rgba(30, 41, 59, 0.7);
    --border-glass: rgba(255, 255, 255, 0.1);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #60a5fa;
    --tab-bg: rgba(15, 23, 42, 0.5);
    --tab-active: rgba(59, 130, 246, 0.2);
  }
  body, html { 
    margin: 0; padding: 0; width: 100%; height: 100%; 
    overflow: hidden; 
    font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; 
    background: var(--bg-base); 
    color: var(--text-primary);
    display: flex; flex-direction: column; 
  }
  
  /* Glassmorphic Menu */
  .menu { 
    background: var(--bg-glass); 
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border-glass); 
    display: flex; 
    font-size: 13px; 
    padding: 4px 8px; 
    gap: 10px;
    z-index: 10;
  }
  .menu-item { 
    padding: 6px 12px; 
    cursor: pointer; 
    position: relative; 
    border-radius: 4px;
    transition: all 0.2s ease;
  }
  .menu-item:hover { 
    background: var(--accent); 
    color: white; 
  }
  
  .dropdown { 
    display: none; 
    position: absolute; 
    top: 100%; left: 0; 
    background: rgba(30, 41, 59, 0.95); 
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass); 
    border-radius: 6px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
    z-index: 100; 
    min-width: 200px;
    margin-top: 5px;
    overflow: hidden;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .menu-item:hover .dropdown { display: block; }
  .dropdown div { 
    padding: 8px 16px; 
    transition: background 0.15s;
    display: flex;
    justify-content: space-between;
  }
  .dropdown div:hover { background: var(--accent); }
  .dropdown .shortcut { color: var(--text-secondary); font-size: 11px; }
  .dropdown div:hover .shortcut { color: rgba(255,255,255,0.7); }
  .divider { border-bottom: 1px solid var(--border-glass); margin: 4px 0; padding: 0 !important; }

  /* Tabs System */
  .tabs-container {
    display: flex;
    background: var(--tab-bg);
    border-bottom: 1px solid var(--border-glass);
    overflow-x: auto;
  }
  .tab {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    border-right: 1px solid var(--border-glass);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    user-select: none;
  }
  .tab:hover { background: rgba(255,255,255,0.05); }
  .tab.active {
    background: var(--tab-active);
    color: var(--accent-hover);
    border-bottom: 2px solid var(--accent);
  }
  .tab-close {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 10px;
  }
  .tab-close:hover { background: rgba(255,255,255,0.2); color: white; }

  /* Editor */
  .editor-wrapper {
    flex: 1;
    display: flex;
    position: relative;
    background: #0f172a;
  }
  textarea { 
    flex: 1; 
    width: 100%; 
    border: none; 
    outline: none; 
    padding: 15px; 
    font-family: 'Consolas', 'Fira Code', monospace; 
    font-size: 14px; 
    line-height: 1.5;
    background: transparent;
    color: #e2e8f0;
    resize: none; 
    box-sizing: border-box; 
    tab-size: 4;
  }
  
  /* Status Bar */
  .status-bar { 
    background: var(--bg-glass); 
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border-glass); 
    display: flex; 
    justify-content: flex-end; 
    padding: 6px 15px; 
    font-size: 11px; 
    color: var(--text-secondary); 
    gap: 20px; 
  }
  .status-item {
    display: flex; align-items: center; gap: 5px;
  }
</style>
</head>
<body>
  <div class="menu">
    <div class="menu-item">File
      <div class="dropdown">
        <div onclick="newTab()"><span>New Tab</span><span class="shortcut">Ctrl+T</span></div>
        <div class="divider"></div>
        <div onclick="openVFS()"><span>Open (VFS)</span></div>
        <div onclick="saveVFS()"><span>Save (VFS)</span><span class="shortcut">Ctrl+S</span></div>
        <div class="divider"></div>
        <div onclick="openFileNative()"><span>Open (Local)</span></div>
        <div onclick="saveFileNative()"><span>Save As (Local)</span></div>
      </div>
    </div>
    <div class="menu-item">Edit
      <div class="dropdown">
        <div onclick="document.execCommand('undo')"><span>Undo</span><span class="shortcut">Ctrl+Z</span></div>
        <div class="divider"></div>
        <div onclick="document.execCommand('cut')"><span>Cut</span><span class="shortcut">Ctrl+X</span></div>
        <div onclick="document.execCommand('copy')"><span>Copy</span><span class="shortcut">Ctrl+C</span></div>
        <div onclick="document.execCommand('paste')"><span>Paste</span><span class="shortcut">Ctrl+V</span></div>
        <div class="divider"></div>
        <div onclick="document.getElementById('editor').select()"><span>Select All</span><span class="shortcut">Ctrl+A</span></div>
        <div class="divider"></div>
        <div onclick="insertDateTime()"><span>Time/Date</span><span class="shortcut">F5</span></div>
      </div>
    </div>
    <div class="menu-item">View
      <div class="dropdown">
        <div onclick="toggleWordWrap()"><span>Toggle Word Wrap</span><span class="shortcut">Alt+Z</span></div>
      </div>
    </div>
  </div>
  
  <div class="tabs-container" id="tabs"></div>

  <div class="editor-wrapper">
    <textarea id="editor" spellcheck="false" wrap="off"></textarea>
  </div>
  
  <div class="status-bar">
    <div class="status-item" id="file-path">Unsaved</div>
    <div class="status-item" id="encoding">UTF-8</div>
    <div class="status-item" id="line-count">Ln 1, Col 1</div>
    <div class="status-item" id="char-count">0 Lines, 0 Chars</div>
  </div>
  
  <script>
    const editor = document.getElementById('editor');
    let tabs = [];
    let activeTabIndex = -1;
    let wordWrap = false;
    
    // Tab Management
    function createTab(name = "Untitled", content = "", path = null) {
      const tab = { id: Date.now(), name, content, path, isModified: false };
      tabs.push(tab);
      switchTab(tabs.length - 1);
      renderTabs();
    }
    
    function newTab() {
      createTab("Untitled", "");
    }
    
    function closeTab(index, e) {
      if (e) e.stopPropagation();
      const tab = tabs[index];
      if (tab.isModified) {
        if(!confirm(`Save changes to ${tab.name}?`)) return; // Simple discard for now
      }
      tabs.splice(index, 1);
      if (tabs.length === 0) {
        newTab();
      } else {
        if (activeTabIndex >= tabs.length) activeTabIndex = tabs.length - 1;
        switchTab(activeTabIndex);
      }
      renderTabs();
    }
    
    function switchTab(index) {
      // Save current content to active tab
      if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
        tabs[activeTabIndex].content = editor.value;
      }
      activeTabIndex = index;
      editor.value = tabs[index].content;
      document.getElementById('file-path').innerText = tabs[index].path || 'Unsaved';
      renderTabs();
      updateStatus();
    }
    
    function renderTabs() {
      const container = document.getElementById('tabs');
      container.innerHTML = '';
      tabs.forEach((tab, index) => {
        const el = document.createElement('div');
        el.className = `tab ${index === activeTabIndex ? 'active' : ''}`;
        el.onclick = () => switchTab(index);
        
        const title = document.createElement('span');
        title.innerText = tab.name + (tab.isModified ? ' •' : '');
        
        const closeBtn = document.createElement('div');
        closeBtn.className = 'tab-close';
        closeBtn.innerText = '✕';
        closeBtn.onclick = (e) => closeTab(index, e);
        
        el.appendChild(title);
        el.appendChild(closeBtn);
        container.appendChild(el);
      });
    }
    
    // Editor features
    function toggleWordWrap() {
      wordWrap = !wordWrap;
      editor.setAttribute('wrap', wordWrap ? 'soft' : 'off');
    }
    
    function insertDateTime() {
      const dt = new Date();
      const pad = (n) => n.toString().padStart(2, '0');
      const formatted = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + formatted + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + formatted.length;
      checkInput();
      updateStatus();
    }
    
    function checkInput() {
      const val = editor.value.toLowerCase();
      if (val.includes('script')) {
        alert('[CERBERUS WATCHDOG: LOCKDOWN INITIATED]\\nUNAUTHORIZED INJECTION ATTEMPT DETECTED.');
      }
      if (activeTabIndex >= 0 && activeTabIndex < tabs.length) {
        if (!tabs[activeTabIndex].isModified) {
          tabs[activeTabIndex].isModified = true;
          renderTabs();
        }
      }
    }

    function updateStatus() {
      const val = editor.value;
      const linesBeforeCursor = val.substr(0, editor.selectionStart).split('\\n');
      const currentLine = linesBeforeCursor.length;
      const currentCol = linesBeforeCursor[linesBeforeCursor.length - 1].length + 1;
      
      const totalChars = val.length;
      const totalLines = val.split('\\n').length;
      
      document.getElementById('line-count').innerText = `Ln ${currentLine}, Col ${currentCol}`;
      document.getElementById('char-count').innerText = `${totalLines} Lines, ${totalChars} Chars`;
    }

    editor.addEventListener('input', () => { checkInput(); updateStatus(); });
    editor.addEventListener('keyup', updateStatus);
    editor.addEventListener('click', updateStatus);
    
    // Handle Indentation
    editor.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
        checkInput();
      }
    });

    let currentReqId = 0;
    const callbacks = {};

    window.addEventListener('message', (e) => {
      const msg = e.data;
      if (callbacks[msg.requestId]) {
        callbacks[msg.requestId](msg);
        delete callbacks[msg.requestId];
      }
    });

    function sendToOS(msg) {
      return new Promise((resolve) => {
        const id = ++currentReqId;
        callbacks[id] = resolve;
        window.parent.postMessage({ ...msg, requestId: id }, '*');
      });
    }

    async function loadVFSFile(path) {
      const res = await sendToOS({ type: 'VFS_READ', path });
      const filename = path.split('/').pop() || 'file';
      createTab(filename, res.data || '', path);
    }

    window.onload = () => {
      if (window.location.hash) {
        const path = window.location.hash.substring(1);
        if (path) { loadVFSFile(path); return; }
      }
      newTab(); // Start with empty tab
    };

    // Keyboard Shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveVFS(); }
      if (e.ctrlKey && e.key === 't') { e.preventDefault(); newTab(); }
      if (e.altKey && e.key === 'z') { e.preventDefault(); toggleWordWrap(); }
      if (e.key === 'F5') { e.preventDefault(); insertDateTime(); }
    });

    async function openVFS() {
      const res = await sendToOS({ type: 'VFS_SHOW_OPEN' });
      if (res.path) loadVFSFile(res.path);
    }

    async function saveVFS() {
      const tab = tabs[activeTabIndex];
      let path = tab.path;
      if (!path) {
        const res = await sendToOS({ type: 'VFS_SHOW_SAVE' });
        if (!res.path) return;
        path = res.path;
      }
      tab.content = editor.value;
      await sendToOS({ type: 'VFS_WRITE', path: path, data: tab.content });
      tab.path = path;
      tab.name = path.split('/').pop();
      tab.isModified = false;
      document.getElementById('file-path').innerText = path;
      renderTabs();
      updateStatus();
    }

    async function openFileNative() {
      try {
        const [fileHandle] = await window.showOpenFilePicker();
        const file = await fileHandle.getFile();
        const content = await file.text();
        createTab(file.name, content, null);
      } catch (e) {}
    }
    
    async function saveFileNative() {
      try {
        const fileHandle = await window.showSaveFilePicker();
        const writable = await fileHandle.createWritable();
        await writable.write(editor.value);
        await writable.close();
        
        const tab = tabs[activeTabIndex];
        tab.name = fileHandle.name;
        tab.isModified = false;
        renderTabs();
      } catch (e) {}
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KMine</title>
<style>
  body { margin: 0; background-color: #c0c0c0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
  canvas { background-color: #c0c0c0; border: 2px solid #808080; border-right-color: #fff; border-bottom-color: #fff; cursor: pointer; }
</style>
</head>
<body oncontextmenu="return false;">
<div id="controls" style="margin-bottom: 10px;">
  <select id="diff" onchange="changeDiff()">
    <option value="0">Beginner</option>
    <option value="1">Intermediate</option>
    <option value="2">Expert</option>
  </select>
  <button onclick="initGame()">Restart</button>
  <button onclick="giveHint()">Hint</button>
  <span id="status" style="margin-left: 10px; font-family: monospace; font-weight: bold;"></span>
</div>
<canvas id="cvs" width="200" height="200"></canvas>
<script>
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  
  const CELL = 20;
  let cols = 10;
  let rows = 10;
  let totalMines = 15;
  let grid = [];
  let state = [];
  let gameOver = 0; // 0: playing, 1: lost, 2: won
  let flags = 0;
  let timeElapsed = 0;
  let timerInterval = null;
  let firstClick = true;
  
  function updateStatus() {
      const statusEl = document.getElementById('status');
      if (gameOver === 2) {
          statusEl.innerText = `YOU WIN! Time: ${timeElapsed}s`;
          statusEl.style.color = "green";
      } else if (gameOver === 1) {
          statusEl.innerText = `GAME OVER! Time: ${timeElapsed}s`;
          statusEl.style.color = "red";
      } else {
          statusEl.innerText = `Mines: ${totalMines - flags} | Time: ${timeElapsed}s`;
          statusEl.style.color = "black";
      }
  }
  
  function startTimer() {
      if (!timerInterval) {
          timerInterval = setInterval(() => {
              if (gameOver === 0) {
                  timeElapsed++;
                  updateStatus();
              }
          }, 1000);
      }
  }
  
  function stopTimer() {
      if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
      }
  }
  
  function checkWin() {
      let unrevealed = 0;
      for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
              if (state[y][x] !== 1) unrevealed++;
          }
      }
      if (unrevealed === totalMines) {
          gameOver = 2; // Win
          stopTimer();
          updateStatus();
      }
  }
  
  function changeDiff() {
      const val = document.getElementById('diff').value;
      if (val === "0") { cols = 10; rows = 10; totalMines = 15; }
      else if (val === "1") { cols = 16; rows = 16; totalMines = 40; }
      else if (val === "2") { cols = 30; rows = 16; totalMines = 99; }
      cvs.width = cols * CELL;
      cvs.height = rows * CELL;
      initGame();
  }
  
  function generateMines(safeX, safeY) {
      grid = Array.from({length: rows}, () => Array(cols).fill(0));
      let mines = 0;
      while (mines < totalMines) {
          let x = Math.floor(Math.random() * cols);
          let y = Math.floor(Math.random() * rows);
          if (grid[y][x] !== 9 && !(x === safeX && y === safeY)) {
              grid[y][x] = 9;
              mines++;
          }
      }
      for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
              if (grid[y][x] === 9) continue;
              let count = 0;
              for (let dy = -1; dy <= 1; dy++) {
                  for (let dx = -1; dx <= 1; dx++) {
                      let nx = x + dx;
                      let ny = y + dy;
                      if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && grid[ny][nx] === 9) {
                          count++;
                      }
                  }
              }
              grid[y][x] = count;
          }
      }
  }
  
  function initGame() {
      gameOver = 0;
      flags = 0;
      timeElapsed = 0;
      firstClick = true;
      stopTimer();
      updateStatus();
      grid = Array.from({length: rows}, () => Array(cols).fill(0));
      state = Array.from({length: rows}, () => Array(cols).fill(0));
      draw();
  }
  
  function reveal(x, y) {
      if (x < 0 || x >= cols || y < 0 || y >= rows || state[y][x] !== 0) return;
      state[y][x] = 1;
      if (grid[y][x] === 9) {
          gameOver = 1;
          stopTimer();
          updateStatus();
          for (let i=0; i<rows; i++) {
              for (let j=0; j<cols; j++) {
                  if (grid[i][j] === 9) state[i][j] = 1;
              }
          }
          return;
      }
      if (grid[y][x] === 0) {
          for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                  reveal(x + dx, y + dy);
              }
          }
      }
  }
  
  function chord(x, y) {
      if (state[y][x] !== 1 || grid[y][x] <= 0 || grid[y][x] >= 9) return;
      let flagCount = 0;
      for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
              let nx = x + dx;
              let ny = y + dy;
              if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                  if (state[ny][nx] === 2) flagCount++;
              }
          }
      }
      if (flagCount === grid[y][x]) {
          for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                  let nx = x + dx;
                  let ny = y + dy;
                  if (nx >= 0 && nx < cols && ny >= 0 && ny < rows) {
                      if (state[ny][nx] === 0) {
                          reveal(nx, ny);
                      }
                  }
              }
          }
      }
  }
  
  function giveHint() {
      if (gameOver !== 0) return;
      if (firstClick) {
          let safeX = Math.floor(cols / 2);
          let safeY = Math.floor(rows / 2);
          firstClick = false;
          generateMines(safeX, safeY);
          startTimer();
          reveal(safeX, safeY);
          checkWin();
          draw();
          return;
      }
      let safeCells = [];
      for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
              if (state[y][x] === 0 && grid[y][x] !== 9) {
                  safeCells.push({x, y});
              }
          }
      }
      if (safeCells.length > 0) {
          let choice = safeCells[Math.floor(Math.random() * safeCells.length)];
          reveal(choice.x, choice.y);
          if (gameOver === 0) checkWin();
          draw();
      }
  }
  
  function draw() {
      ctx.clearRect(0, 0, cvs.width, cvs.height);
      ctx.font = "bold 14px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      
      for (let y = 0; y < rows; y++) {
          for (let x = 0; x < cols; x++) {
              let bx = x * CELL;
              let by = y * CELL;
              
              if (state[y][x] === 0 || state[y][x] === 2) {
                  ctx.fillStyle = "#c0c0c0";
                  ctx.fillRect(bx, by, CELL, CELL);
                  // Raised edge
                  ctx.fillStyle = "#fff";
                  ctx.fillRect(bx, by, CELL, 2);
                  ctx.fillRect(bx, by, 2, CELL);
                  ctx.fillStyle = "#808080";
                  ctx.fillRect(bx, by + CELL - 2, CELL, 2);
                  ctx.fillRect(bx + CELL - 2, by, 2, CELL);
                  
                  if (state[y][x] === 2) {
                      ctx.fillStyle = "red";
                      ctx.fillText("F", bx + CELL/2, by + CELL/2);
                  }
              } else if (state[y][x] === 1) {
                  ctx.fillStyle = "#c0c0c0";
                  ctx.fillRect(bx, by, CELL, CELL);
                  // Sunken edge
                  ctx.fillStyle = "#808080";
                  ctx.fillRect(bx, by, CELL, 1);
                  ctx.fillRect(bx, by, 1, CELL);
                  
                  if (grid[y][x] === 9) {
                      ctx.fillStyle = "black";
                      ctx.fillText("*", bx + CELL/2, by + CELL/2 + 2);
                  } else if (grid[y][x] > 0) {
                      if (grid[y][x] === 1) ctx.fillStyle = "blue";
                      else if (grid[y][x] === 2) ctx.fillStyle = "green";
                      else ctx.fillStyle = "red";
                      ctx.fillText(grid[y][x], bx + CELL/2, by + CELL/2 + 1);
                  }
              }
          }
      }
  }
  
  cvs.addEventListener('mousedown', (e) => {
      if (gameOver !== 0) {
          initGame();
          return;
      }
      let rect = cvs.getBoundingClientRect();
      let x = Math.floor((e.clientX - rect.left) / CELL);
      let y = Math.floor((e.clientY - rect.top) / CELL);
      if (x < 0 || x >= cols || y < 0 || y >= rows) return;
      
      if (e.button === 0) {
          if (firstClick) {
              firstClick = false;
              generateMines(x, y);
              startTimer();
          }
          if (state[y][x] === 1) {
              chord(x, y);
          } else if (state[y][x] === 0) {
              reveal(x, y);
          }
          if (gameOver === 0) {
              checkWin();
          }
      } else if (e.button === 2) {
          if (state[y][x] !== 1) {
              if (state[y][x] === 0) {
                  state[y][x] = 2;
                  flags++;
              } else {
                  state[y][x] = 0;
                  flags--;
              }
              updateStatus();
          }
      }
      draw();
  });
  
  initGame();
</script>
</body>
</html>

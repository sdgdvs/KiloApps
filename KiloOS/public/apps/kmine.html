<!DOCTYPE html>
<html>
<head>
<title>KMine</title>
<style>
  body { margin: 0; background-color: #c0c0c0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
  canvas { background-color: #c0c0c0; border: 2px solid #808080; border-right-color: #fff; border-bottom-color: #fff; cursor: pointer; }
</style>
</head>
<body oncontextmenu="return false;">
<canvas id="cvs" width="200" height="200"></canvas>
<script>
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  
  const CELL = 20;
  let grid = Array.from({length: 10}, () => Array(10).fill(0));
  let state = Array.from({length: 10}, () => Array(10).fill(0));
  let gameOver = false;
  
  function initGame() {
      gameOver = false;
      for (let y = 0; y < 10; y++) {
          for (let x = 0; x < 10; x++) {
              grid[y][x] = 0;
              state[y][x] = 0;
          }
      }
      
      let mines = 0;
      while (mines < 15) {
          let x = Math.floor(Math.random() * 10);
          let y = Math.floor(Math.random() * 10);
          if (grid[y][x] !== 9) {
              grid[y][x] = 9;
              mines++;
          }
      }
      
      for (let y = 0; y < 10; y++) {
          for (let x = 0; x < 10; x++) {
              if (grid[y][x] === 9) continue;
              let count = 0;
              for (let dy = -1; dy <= 1; dy++) {
                  for (let dx = -1; dx <= 1; dx++) {
                      let nx = x + dx;
                      let ny = y + dy;
                      if (nx >= 0 && nx < 10 && ny >= 0 && ny < 10 && grid[ny][nx] === 9) {
                          count++;
                      }
                  }
              }
              grid[y][x] = count;
          }
      }
      draw();
  }
  
  function reveal(x, y) {
      if (x < 0 || x >= 10 || y < 0 || y >= 10 || state[y][x] !== 0) return;
      state[y][x] = 1;
      if (grid[y][x] === 9) {
          gameOver = true;
          for (let i=0; i<10; i++) {
              for (let j=0; j<10; j++) {
                  if (grid[i][j] === 9) state[i][j] = 1;
              }
          }
          return;
      }
      if (grid[y][x] === 0) {
          for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                  reveal(x + dx, y + dy);
              }
          }
      }
  }
  
  function draw() {
      ctx.clearRect(0, 0, 200, 200);
      ctx.font = "bold 14px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      
      for (let y = 0; y < 10; y++) {
          for (let x = 0; x < 10; x++) {
              let bx = x * CELL;
              let by = y * CELL;
              
              if (state[y][x] === 0 || state[y][x] === 2) {
                  ctx.fillStyle = "#c0c0c0";
                  ctx.fillRect(bx, by, CELL, CELL);
                  // Raised edge
                  ctx.fillStyle = "#fff";
                  ctx.fillRect(bx, by, CELL, 2);
                  ctx.fillRect(bx, by, 2, CELL);
                  ctx.fillStyle = "#808080";
                  ctx.fillRect(bx, by + CELL - 2, CELL, 2);
                  ctx.fillRect(bx + CELL - 2, by, 2, CELL);
                  
                  if (state[y][x] === 2) {
                      ctx.fillStyle = "red";
                      ctx.fillText("F", bx + CELL/2, by + CELL/2);
                  }
              } else if (state[y][x] === 1) {
                  ctx.fillStyle = "#c0c0c0";
                  ctx.fillRect(bx, by, CELL, CELL);
                  // Sunken edge
                  ctx.fillStyle = "#808080";
                  ctx.fillRect(bx, by, CELL, 1);
                  ctx.fillRect(bx, by, 1, CELL);
                  
                  if (grid[y][x] === 9) {
                      ctx.fillStyle = "black";
                      ctx.fillText("*", bx + CELL/2, by + CELL/2 + 2);
                  } else if (grid[y][x] > 0) {
                      if (grid[y][x] === 1) ctx.fillStyle = "blue";
                      else if (grid[y][x] === 2) ctx.fillStyle = "green";
                      else ctx.fillStyle = "red";
                      ctx.fillText(grid[y][x], bx + CELL/2, by + CELL/2 + 1);
                  }
              }
          }
      }
  }
  
  cvs.addEventListener('mousedown', (e) => {
      if (gameOver) {
          initGame();
          return;
      }
      let rect = cvs.getBoundingClientRect();
      let x = Math.floor((e.clientX - rect.left) / CELL);
      let y = Math.floor((e.clientY - rect.top) / CELL);
      
      if (e.button === 0) {
          reveal(x, y);
      } else if (e.button === 2) {
          if (x >= 0 && x < 10 && y >= 0 && y < 10 && state[y][x] !== 1) {
              state[y][x] = (state[y][x] === 0) ? 2 : 0;
          }
      }
      draw();
  });
  
  initGame();
</script>
</body>
</html>

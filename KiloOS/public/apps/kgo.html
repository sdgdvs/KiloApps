<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KGo</title>
<style>
  body {
    margin: 0;
    padding: 20px;
    background-color: #181818;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { margin-top: 0; color: #fff; }
  .board {
    display: grid;
    grid-template-columns: repeat(9, 30px);
    grid-template-rows: repeat(9, 30px);
    background-color: #cda756;
    padding: 15px;
    gap: 0;
    border: 2px solid #222;
    border-radius: 4px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .cell {
    width: 30px;
    height: 30px;
    position: relative;
    cursor: pointer;
  }
  /* Grid lines */
  .cell::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background-color: #111;
    z-index: 1;
  }
  .cell::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background-color: #111;
    z-index: 1;
  }
  /* Edge adjustments can go here */
  .cell.top::after { top: 50%; }
  .cell.bottom::after { bottom: 50%; }
  .cell.left::before { left: 50%; }
  .cell.right::before { right: 50%; }

  .stone {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    z-index: 2;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.6);
  }
  .stone.new {
    animation: placeAnim 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes placeAnim {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes captureAnim {
    0% { transform: scale(1); opacity: 1; filter: brightness(2); }
    100% { transform: scale(0); opacity: 0; filter: brightness(2); }
  }
  .stone.captured {
    animation: captureAnim 0.3s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
  }
  .black { background-color: #111; box-shadow: inset -2px -2px 4px rgba(255,255,255,0.1), 2px 2px 4px rgba(0,0,0,0.5); }
  .white { background-color: #eee; box-shadow: inset -2px -2px 4px rgba(0,0,0,0.2), 2px 2px 4px rgba(0,0,0,0.5); }
  .stone.ghost {
    opacity: 0.4;
    display: none;
    box-shadow: none;
  }
  .cell:hover .stone.ghost {
    display: block;
  }
  .controls {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  button, select {
    background-color: #2a2a2a;
    color: #fff;
    border: 1px solid #444;
    padding: 6px 16px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
  }
  button:hover, select:hover { background-color: #3a3a3a; }
  .status {
    margin-top: 15px;
    font-size: 1.2em;
    margin-bottom: 10px;
    font-weight: 500;
  }
</style>
</head>
<body>
  <h1>KGo</h1>
  <div class="status">Current Turn: Black</div>
  <div class="board" id="board"></div>
  <div class="controls">
    <button id="btn-pass">Pass</button>
    <button id="btn-resign">Resign</button>
    <button id="btn-undo">Undo</button>
    <button id="btn-redo">Redo</button>
    <button id="btn-score">Score Game</button>
    <button id="btn-save">Save</button>
    <button id="btn-load">Load</button>
    <select id="board-size">
      <option value="9">9x9</option>
      <option value="13">13x13</option>
      <option value="19">19x19</option>
    </select>
    <button id="btn-new">New Game</button>
    <label style="display:flex;align-items:center;margin-left:10px;cursor:pointer;"><input type="checkbox" id="ai-toggle" checked> Play vs AI (White)</label>
  </div>

<script>
  const boardEl = document.getElementById('board');
  let size = 9;
  let board = [];
  let currentPlayer = 'B';
  let history = []; // for ko rule
  let captures = { B: 0, W: 0 };
  let lastMove = {x: -1, y: -1};
  let capturedStonesForAnim = [];
  let undoStack = [];
  let redoStack = [];

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    if (type === 'place') {
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
      gain.gain.setValueAtTime(0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
      osc.start(now);
      osc.stop(now + 0.08);
    } else if (type === 'capture') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(400, now + 0.1);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
      osc.start(now);
      osc.stop(now + 0.1);
    } else if (type === 'over') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.setValueAtTime(554, now + 0.15); 
      osc.frequency.setValueAtTime(659, now + 0.3);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.8);
      osc.start(now);
      osc.stop(now + 0.8);
    }
  }

  function initBoard() {
    board = Array(size).fill(null).map(() => Array(size).fill(null));
    currentPlayer = 'B';
    history = [];
    captures = { B: 0, W: 0 };
    lastMove = {x: -1, y: -1};
    capturedStonesForAnim = [];
    undoStack = [];
    redoStack = [];
    updateStatus();
    drawBoard();
  }

  function drawBoard() {
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${size}, 30px)`;
    boardEl.style.gridTemplateRows = `repeat(${size}, 30px)`;
    
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (y === 0) cell.classList.add('top');
        if (y === size - 1) cell.classList.add('bottom');
        if (x === 0) cell.classList.add('left');
        if (x === size - 1) cell.classList.add('right');
        
        cell.dataset.x = x;
        cell.dataset.y = y;
        
        if (board[y][x]) {
          const stone = document.createElement('div');
          let classes = `stone ${board[y][x] === 'B' ? 'black' : 'white'}`;
          if (lastMove.x === x && lastMove.y === y) classes += ' new';
          stone.className = classes;
          cell.appendChild(stone);
        } else {
          const capturedAnim = capturedStonesForAnim.find(s => s.x === x && s.y === y);
          if (capturedAnim) {
            const stone = document.createElement('div');
            stone.className = `stone ${capturedAnim.color === 'B' ? 'black' : 'white'} captured`;
            cell.appendChild(stone);
          }
          const ghost = document.createElement('div');
          ghost.className = `stone ghost ${currentPlayer === 'B' ? 'black' : 'white'}`;
          cell.appendChild(ghost);
        }
        
        cell.addEventListener('click', () => placeStone(x, y));
        boardEl.appendChild(cell);
      }
    }
  }

  function getLiberties(x, y, color, visited) {
    if (x < 0 || x >= size || y < 0 || y >= size) return 0;
    if (visited[y][x]) return 0;
    visited[y][x] = true;
    
    if (board[y][x] === null) return 1;
    if (board[y][x] !== color) return 0;
    
    return getLiberties(x-1, y, color, visited) +
           getLiberties(x+1, y, color, visited) +
           getLiberties(x, y-1, color, visited) +
           getLiberties(x, y+1, color, visited);
  }

  function getGroup(x, y, color, visited, group) {
    if (x < 0 || x >= size || y < 0 || y >= size) return;
    if (visited[y][x]) return;
    if (board[y][x] !== color) return;
    
    visited[y][x] = true;
    group.push({x, y});
    getGroup(x-1, y, color, visited, group);
    getGroup(x+1, y, color, visited, group);
    getGroup(x, y-1, color, visited, group);
    getGroup(x, y+1, color, visited, group);
  }

  function checkCaptures(color, realMove = false) {
    let captured = 0;
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (board[y][x] === color) {
          let visited = Array(size).fill(null).map(() => Array(size).fill(false));
          if (getLiberties(x, y, color, visited) === 0) {
            // Capture group
            let groupVisited = Array(size).fill(null).map(() => Array(size).fill(false));
            let group = [];
            getGroup(x, y, color, groupVisited, group);
            group.forEach(p => {
              board[p.y][p.x] = null;
              if (realMove) capturedStonesForAnim.push({x: p.x, y: p.y, color: color});
              captured++;
            });
          }
        }
      }
    }
    if (captured > 0) {
      if (color === 'B') captures.W += captured;
      else captures.B += captured;
    }
    return captured;
  }

  function calculateScore() {
    let terrB = 0;
    let terrW = 0;
    let visited = Array(size).fill(null).map(() => Array(size).fill(false));
    
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        if (board[y][x] === null && !visited[y][x]) {
          let emptyGroup = [];
          let touchesB = false;
          let touchesW = false;
          
          let queue = [{x, y}];
          visited[y][x] = true;
          
          while (queue.length > 0) {
            let p = queue.shift();
            emptyGroup.push(p);
            
            const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
            for (let d of dirs) {
              let nx = p.x + d[0];
              let ny = p.y + d[1];
              if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                if (board[ny][nx] === 'B') touchesB = true;
                else if (board[ny][nx] === 'W') touchesW = true;
                else if (!visited[ny][nx]) {
                  visited[ny][nx] = true;
                  queue.push({x: nx, y: ny});
                }
              }
            }
          }
          
          if (touchesB && !touchesW) terrB += emptyGroup.length;
          if (touchesW && !touchesB) terrW += emptyGroup.length;
        }
      }
    }
    
    let totalB = captures.B + terrB;
    let totalW = captures.W + terrW + 6.5; // komi
    
    let msg = `Black: ${terrB} territory + ${captures.B} captures = ${totalB}\n`;
    msg += `White: ${terrW} territory + ${captures.W} captures + 6.5 komi = ${totalW}\n\n`;
    if (totalB > totalW) msg += `Black wins by ${totalB - totalW}!`;
    else msg += `White wins by ${totalW - totalB}!`;
    
    playSound('over');
    setTimeout(() => {
      alert(msg);
      initBoard();
    }, 50);
  }

  function boardToString() {
    return board.map(row => row.map(c => c || '.').join('')).join('');
  }

  function placeStone(x, y) {
    if (board[y][x] !== null) return;
    
    let boardBackup = deepCopy(board);
    let capBackup = { ...captures };
    let histBackup = [...history];
    let lastMoveBackup = { ...lastMove };
    let currPlayerBackup = currentPlayer;
    
    board[y][x] = currentPlayer;
    
    let opp = currentPlayer === 'B' ? 'W' : 'B';
    let caps = checkCaptures(opp, true);
    
    let visited = Array(size).fill(null).map(() => Array(size).fill(false));
    if (getLiberties(x, y, currentPlayer, visited) === 0) {
      board = boardBackup;
      captures = capBackup;
      alert("Suicide move is not allowed.");
      return;
    }
    
    let state = boardToString();
    if (history.includes(state)) {
      board = boardBackup;
      captures = capBackup;
      alert("Ko rule violation.");
      return;
    }
    
    undoStack.push({
      board: boardBackup,
      captures: capBackup,
      history: histBackup,
      lastMove: lastMoveBackup,
      currentPlayer: currPlayerBackup
    });
    redoStack = [];

    history.push(boardToString());
    currentPlayer = opp;
    lastMove = {x, y};
    
    if (caps > 0) playSound('capture');
    else playSound('place');

    updateStatus();
    drawBoard();
    
    if (caps > 0) {
      setTimeout(() => {
        capturedStonesForAnim = [];
        drawBoard();
      }, 300);
    } else {
      capturedStonesForAnim = [];
    }
    
    if (currentPlayer === 'W' && document.getElementById('ai-toggle').checked) {
      setTimeout(makeAIMove, 500);
    }
  }

  function isValidMove(x, y, color) {
    if (board[y][x] !== null) return {valid: false};
    let boardBackup = deepCopy(board);
    let capBackup = { B: captures.B, W: captures.W };
    
    board[y][x] = color;
    let opp = color === 'B' ? 'W' : 'B';
    let capturedCount = checkCaptures(opp, false);
    
    let visited = Array(size).fill(null).map(() => Array(size).fill(false));
    if (getLiberties(x, y, color, visited) === 0) {
      board = boardBackup;
      captures = capBackup;
      return {valid: false};
    }
    
    let state = boardToString();
    if (history.includes(state)) {
      board = boardBackup;
      captures = capBackup;
      return {valid: false};
    }
    
    board = boardBackup;
    captures = capBackup;
    return {valid: true, captures: capturedCount};
  }

  function makeAIMove() {
    if (currentPlayer !== 'W') return;
    
    let validMoves = [];
    let captureMoves = [];
    
    for (let y = 0; y < size; y++) {
      for (let x = 0; x < size; x++) {
        let res = isValidMove(x, y, 'W');
        if (res.valid) {
          if (res.captures > 0) captureMoves.push({x, y});
          else validMoves.push({x, y});
        }
      }
    }
    
    let move = null;
    if (captureMoves.length > 0) {
      move = captureMoves[Math.floor(Math.random() * captureMoves.length)];
    } else if (validMoves.length > 0) {
      move = validMoves[Math.floor(Math.random() * validMoves.length)];
    }
    
    if (move) {
      placeStone(move.x, move.y);
    } else {
      document.getElementById('btn-pass').click();
    }
  }

  function deepCopy(arr) {
    return arr.map(row => [...row]);
  }

  function updateStatus() {
    document.querySelector('.status').innerText = `Current Turn: ${currentPlayer === 'B' ? 'Black' : 'White'}`;
  }

  document.getElementById('btn-pass').addEventListener('click', () => {
    undoStack.push({
      board: deepCopy(board),
      captures: { ...captures },
      history: [...history],
      lastMove: { ...lastMove },
      currentPlayer: currentPlayer
    });
    redoStack = [];

    currentPlayer = currentPlayer === 'B' ? 'W' : 'B';
    updateStatus();
    if (currentPlayer === 'W' && document.getElementById('ai-toggle').checked) {
      setTimeout(makeAIMove, 500);
    }
  });
  document.getElementById('btn-undo').addEventListener('click', () => {
    if (undoStack.length === 0) return;
    redoStack.push({
      board: deepCopy(board),
      currentPlayer,
      captures: { ...captures },
      lastMove: { ...lastMove },
      history: [...history]
    });
    let state = undoStack.pop();
    board = state.board;
    currentPlayer = state.currentPlayer;
    captures = state.captures;
    lastMove = state.lastMove;
    history = state.history;
    capturedStonesForAnim = [];
    updateStatus();
    drawBoard();
  });
  document.getElementById('btn-redo').addEventListener('click', () => {
    if (redoStack.length === 0) return;
    undoStack.push({
      board: deepCopy(board),
      currentPlayer,
      captures: { ...captures },
      lastMove: { ...lastMove },
      history: [...history]
    });
    let state = redoStack.pop();
    board = state.board;
    currentPlayer = state.currentPlayer;
    captures = state.captures;
    lastMove = state.lastMove;
    history = state.history;
    capturedStonesForAnim = [];
    updateStatus();
    drawBoard();
  });
  document.getElementById('btn-resign').addEventListener('click', () => {
    playSound('over');
    setTimeout(() => {
      alert(`${currentPlayer === 'B' ? 'White' : 'Black'} wins by resignation!`);
      initBoard();
    }, 50);
  });
  document.getElementById('btn-score').addEventListener('click', () => {
    calculateScore();
  });
  document.getElementById('btn-new').addEventListener('click', () => {
    initBoard();
  });
  document.getElementById('btn-save').addEventListener('click', () => {
    const state = {
      size,
      board,
      currentPlayer,
      history,
      captures,
      lastMove,
      undoStack,
      redoStack
    };
    localStorage.setItem('kgo_save', JSON.stringify(state));
    alert('Game saved.');
  });
  document.getElementById('btn-load').addEventListener('click', () => {
    const data = localStorage.getItem('kgo_save');
    if (data) {
      try {
        const state = JSON.parse(data);
        size = state.size;
        board = state.board;
        currentPlayer = state.currentPlayer;
        history = state.history || [];
        captures = state.captures;
        lastMove = state.lastMove || {x: -1, y: -1};
        undoStack = state.undoStack || [];
        redoStack = state.redoStack || [];
        document.getElementById('board-size').value = size;
        updateStatus();
        drawBoard();
        alert('Game loaded.');
      } catch (e) {
        alert('Failed to load game.');
      }
    } else {
      alert('No saved game found.');
    }
  });
  document.getElementById('board-size').addEventListener('change', (e) => {
    size = parseInt(e.target.value);
    initBoard();
  });

  initBoard();
</script>
</body>
</html>

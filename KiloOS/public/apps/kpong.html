<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KPong</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 8%);
    --card-bg: rgba(30, 40, 50, 0.4);
    --primary: hsl(200, 85%, 60%);
    --secondary: hsl(300, 85%, 60%);
  }
  body { 
    margin: 0; background-color: var(--bg-color); overflow: hidden; 
    display: flex; justify-content: center; align-items: center; height: 100vh; 
    color: white; font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at center, #1a2a3a 0%, #050a10 100%);
  }
  .container {
    padding: 20px;
    background: var(--card-bg);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .score-board {
    display: flex; width: 400px; justify-content: space-between; font-size: 32px; font-weight: 700;
  }
  .p1-score { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
  .p2-score { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
  
  canvas { 
    background-color: rgba(0, 0, 0, 0.3); 
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }

  .skills-bar {
    display: flex; gap: 10px; width: 400px; justify-content: center;
  }
  .skill-btn {
    background: rgba(10, 20, 35, 0.7);
    border: 1px solid rgba(0, 229, 255, 0.4);
    color: #00e5ff;
    padding: 6px 12px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex; align-items: center; gap: 6px;
  }
  .skill-btn:hover:not(:disabled) {
    background: rgba(0, 229, 255, 0.2);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
  }
  .skill-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: rgba(255, 255, 255, 0.1);
    color: #888;
  }
  .skill-btn.active {
    border-color: #ffd700;
    color: #ffd700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.6);
  }
</style>
</head>
<body>
<div class="container">
  <div class="score-board">
    <div class="p1-score" id="s1" aria-label="Player 1 Score" aria-live="polite">0</div>
    <div class="p2-score" id="s2" aria-label="Player 2 Score" aria-live="polite">0</div>
  </div>
  <canvas id="gameCanvas" width="400" height="300" aria-label="Pong Game Canvas" tabindex="0"></canvas>
  <div class="skills-bar">
    <button class="skill-btn" id="btn-slow" onclick="triggerSkill('slow')">⚡ [F] Slow-Mo</button>
    <button class="skill-btn" id="btn-mega" onclick="triggerSkill('mega')">🛡️ [P] Mega</button>
    <button class="skill-btn" id="btn-fire" onclick="triggerSkill('fire')">🔥 [B] Fireball</button>
  </div>
</div>
<script>
  let audioCtx = null;
  function playSound(freq, type) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type === 'score' ? 'sawtooth' : (type === 'hit' ? 'sine' : 'triangle');
      osc.start();
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + (type === 'score' ? 0.5 : 0.12));
      osc.stop(audioCtx.currentTime + 0.5);
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const W = 400, H = 300;
  const PAD_W = 10, BALL_SIZE = 10;
  const MAX_BALLS = 5;
  
  let p1PadH = 50, p2PadH = 50;
  let campaignMode = false;
  let campaignLevel = 1;
  let winScreen = false;
  let lastHitter = 0;

  let powerupX = -1, powerupY = -1;
  let powerupActive = 0, powerupType = 0;

  let p1BuffTimer = 0, p2BuffTimer = 0;
  let p1DebuffTimer = 0, p2DebuffTimer = 0;
  let p1FreezeTimer = 0, p2FreezeTimer = 0;

  // Active Skills
  let skillSlowTimer = 0, skillSlowCooldown = 0;
  let skillMegaTimer = 0, skillMegaCooldown = 0;
  let skillFireballReady = false, skillFireballCooldown = 0;

  let highRally = parseInt(localStorage.getItem('kpong_high_rally')) || 0;
  let lifetimeWins = parseInt(localStorage.getItem('kpong_wins')) || 0;

  // Dynamic Arena Features
  let obsY = H/2 - 20, obsDy = 3, obs1Active = true, obs1Respawn = 0;
  let obs2X = W/2 - 20, obs2Dx = 4, obs2Active = true, obs2Respawn = 0;
  
  let gwX = W/2, gwY = H/2;
  let portal1X = W/4 + 20, portal1Y = H/4;
  let portal2X = 3*W/4 - 20, portal2Y = 3*H/4;
  let portalCooldown = 0;

  // Stage 20 Boss
  let bossShieldHp = 3, bossShieldTimer = 0;
  let bossShieldY = H/2 - 50, bossShieldDy = 2, bossShieldH = 100;

  let p1y = H/2 - 25, p2y = H/2 - 25;
  let p1Vy = 0, p2Vy = 0;
  let s1 = 0, s2 = 0;
  let rally = 0;
  let difficulty = 2; // 1: Easy, 2: Normal, 3: Hard
  const aiSpeeds = [0, 2, 4, 6];
  const startSpeeds = [0, 4, 5, 7];
  let gameOver = false;

  let particles = [];
  let shockwaves = [];
  let balls = [];

  function resetBalls() {
      balls = [];
      let spd = campaignMode ? Math.min(11, 4 + Math.floor(campaignLevel / 2)) : startSpeeds[difficulty];
      balls.push({
          x: W/2 - BALL_SIZE/2,
          y: H/2 - BALL_SIZE/2,
          dx: Math.random() < 0.5 ? spd : -spd,
          dy: Math.random() < 0.5 ? 3 : -3,
          active: true,
          isFireball: false,
          lastHitter: 0,
          trail: []
      });
  }

  function spawnExtraBall() {
      if (balls.filter(b => b.active).length >= MAX_BALLS) return;
      let angle = Math.random() * Math.PI * 2;
      let spd = 5 + Math.random() * 3;
      let dx = Math.cos(angle) * spd;
      if (Math.abs(dx) < 2.5) dx = dx < 0 ? -4.5 : 4.5;
      balls.push({
          x: W/2 - BALL_SIZE/2,
          y: H/2 - BALL_SIZE/2,
          dx: dx,
          dy: Math.sin(angle) * spd,
          active: true,
          isFireball: false,
          lastHitter: 0,
          trail: []
      });
      createShockwave(W/2, H/2, '#c832ff');
      createParticles(W/2, H/2, '#c832ff', 15, 6);
  }

  function activeBallCount() {
      return balls.filter(b => b.active).length;
  }
  
  function createParticles(x, y, color, count = 15, speed = 8) {
      for (let i = 0; i < count; i++) {
          let angle = Math.random() * Math.PI * 2;
          let spd = (0.2 + Math.random() * 0.8) * speed;
          particles.push({
              x: x, y: y,
              vx: Math.cos(angle) * spd,
              vy: Math.sin(angle) * spd,
              life: 1.0,
              maxLife: 1.0,
              size: 2 + Math.random() * 3,
              color: color
          });
      }
  }

  function createShockwave(x, y, color) {
      shockwaves.push({ x: x, y: y, radius: 4, maxRadius: 28, alpha: 1.0, color: color });
  }

  function triggerSkill(skill) {
      if (gameOver) return;
      if (skill === 'slow' && skillSlowCooldown === 0) {
          skillSlowTimer = 180;
          skillSlowCooldown = 360;
          createShockwave(W/2, H/2, '#00e5ff');
          playSound(1200, 'hit');
      } else if (skill === 'mega' && skillMegaCooldown === 0) {
          skillMegaTimer = 240;
          skillMegaCooldown = 450;
          createShockwave(20, p1y + p1PadH/2, '#ffd700');
          playSound(1000, 'hit');
      } else if (skill === 'fire' && skillFireballCooldown === 0) {
          skillFireballReady = true;
          skillFireballCooldown = 300;
          createShockwave(20, p1y + p1PadH/2, '#ff6400');
          playSound(1400, 'hit');
      }
  }
  
  const keys = {};
  document.addEventListener('keydown', e => { 
      keys[e.key] = true; 
      if(['ArrowUp','ArrowDown','w','s','W','S'].includes(e.key)) e.preventDefault();
      if(e.key === 'f' || e.key === 'F') triggerSkill('slow');
      if(e.key === 'p' || e.key === 'P') triggerSkill('mega');
      if(e.key === 'b' || e.key === 'B') triggerSkill('fire');
  });
  document.addEventListener('keyup', e => { keys[e.key] = false; });
  window.addEventListener('blur', () => { for(let k in keys) keys[k] = false; });

  function update() {
      if (gameOver) {
          if (keys['r'] || keys['R']) {
              s1 = 0; s2 = 0; rally = 0; winScreen = false;
              skillSlowTimer = 0; skillSlowCooldown = 0;
              skillMegaTimer = 0; skillMegaCooldown = 0;
              skillFireballReady = false; skillFireballCooldown = 0;
              bossShieldHp = 3; bossShieldTimer = 0;
              obs1Active = true; obs2Active = true;
              document.getElementById('s1').innerText = s1;
              document.getElementById('s2').innerText = s2;
              gameOver = false;
              resetBalls();
          }
          return;
      }

      if (keys['1']) { difficulty = 1; }
      if (keys['2']) { difficulty = 2; }
      if (keys['3']) { difficulty = 3; }
      if ((keys['c'] || keys['C']) && !campaignMode) {
          campaignMode = true; campaignLevel = 1; s1 = 0; s2 = 0; rally = 0;
          bossShieldHp = 3; bossShieldTimer = 0;
          obs1Active = true; obs2Active = true;
          document.getElementById('s1').innerText = s1;
          document.getElementById('s2').innerText = s2;
          resetBalls();
      }

      // Skill Timers & Cooldowns
      if (skillSlowTimer > 0) skillSlowTimer--;
      if (skillSlowCooldown > 0) skillSlowCooldown--;
      if (skillMegaTimer > 0) skillMegaTimer--;
      if (skillMegaCooldown > 0) skillMegaCooldown--;
      if (skillFireballCooldown > 0) skillFireballCooldown--;

      // Buffs & Debuffs
      if (p1BuffTimer > 0) p1BuffTimer--;
      if (p2BuffTimer > 0) p2BuffTimer--;
      if (p1DebuffTimer > 0) p1DebuffTimer--;
      if (p2DebuffTimer > 0) p2DebuffTimer--;
      if (p1FreezeTimer > 0) p1FreezeTimer--;
      if (p2FreezeTimer > 0) p2FreezeTimer--;

      // Paddle Heights
      p1PadH = 50 - (rally * 2); if (p1PadH < 20) p1PadH = 20;
      p2PadH = 50 - (rally * 2); if (p2PadH < 20) p2PadH = 20;

      if (campaignMode && campaignLevel >= 3 && campaignLevel < 20) { p2PadH -= 10; }
      if (campaignMode && (campaignLevel === 10 || campaignLevel === 15)) { p2PadH += 40; }
      if (campaignMode && campaignLevel === 20) { p2PadH = 75; }

      if (p1BuffTimer > 0) p1PadH += 30;
      if (p2BuffTimer > 0) p2PadH += 30;
      if (p1DebuffTimer > 0) p1PadH = 15;
      if (p2DebuffTimer > 0) p2PadH = 15;

      if (skillMegaTimer > 0) { p1PadH = Math.floor(p1PadH * 2.5); }

      if (p1PadH < 15) p1PadH = 15;
      if (p2PadH < 15) p2PadH = 15;

      // P1 Control
      let p1PrevY = p1y;
      if (p1FreezeTimer === 0) {
          if (keys['ArrowUp'] || keys['w'] || keys['W']) p1y -= 6;
          if (keys['ArrowDown'] || keys['s'] || keys['S']) p1y += 6;
      }
      if (p1y < 0) p1y = 0;
      if (p1y > H - p1PadH) p1y = H - p1PadH;
      p1Vy = p1y - p1PrevY;

      // P2 AI Speed across 20 stages
      let aiSpeed = aiSpeeds[difficulty];
      if (campaignMode) {
          if (campaignLevel === 1) aiSpeed = 2;
          else if (campaignLevel === 2) aiSpeed = 3;
          else if (campaignLevel === 3) aiSpeed = 4;
          else if (campaignLevel === 4) aiSpeed = 5;
          else if (campaignLevel === 5) aiSpeed = 6;
          else if (campaignLevel === 6) aiSpeed = 7;
          else if (campaignLevel === 7) aiSpeed = 8;
          else if (campaignLevel === 8) aiSpeed = 9;
          else if (campaignLevel === 9) aiSpeed = 10;
          else if (campaignLevel <= 12) aiSpeed = 12;
          else if (campaignLevel <= 15) aiSpeed = 15;
          else if (campaignLevel <= 19) aiSpeed = 18;
          else aiSpeed = 22; // Stage 20 Boss
      }

      // Find closest active ball heading right
      let targetBall = balls.find(b => b.active && b.dx > 0) || balls.find(b => b.active) || { y: H/2 };

      let p2PrevY = p2y;
      if (p2FreezeTimer === 0) {
          if (targetBall.y > p2y + p2PadH/2 + 8) p2y += aiSpeed;
          if (targetBall.y < p2y + p2PadH/2 - 8) p2y -= aiSpeed;
      }
      if (p2y < 0) p2y = 0;
      if (p2y > H - p2PadH) p2y = H - p2PadH;
      p2Vy = p2y - p2PrevY;

      // Powerup Pickup Spawning
      if (powerupActive > 0) powerupActive--;
      if (powerupX === -1 && Math.random() < 0.006) {
          powerupX = W/4 + Math.random()*(W/2);
          powerupY = H/4 + Math.random()*(H/2);
          powerupActive = 250;
          powerupType = Math.floor(Math.random() * 4); // 0: Expand, 1: Shrink, 2: Freeze, 3: Multi-Ball
      }
      if (powerupActive <= 0) { powerupX = -1; powerupY = -1; }

      // Obstacle Respawns
      if (!obs1Active) { obs1Respawn--; if (obs1Respawn <= 0) obs1Active = true; }
      if (!obs2Active) { obs2Respawn--; if (obs2Respawn <= 0) obs2Active = true; }

      // Obstacle 1 Movement (Stage >= 5)
      if (campaignMode && campaignLevel >= 5 && obs1Active) {
          obsY += obsDy;
          if (obsY < 10) { obsY = 10; obsDy = -obsDy; }
          if (obsY > H - 50) { obsY = H - 50; obsDy = -obsDy; }
      }

      // Obstacle 2 Movement (Stage >= 8)
      if (campaignMode && campaignLevel >= 8 && obs2Active) {
          obs2X += obs2Dx;
          if (obs2X < 60) { obs2X = 60; obs2Dx = -obs2Dx; }
          if (obs2X > W - 100) { obs2X = W - 100; obs2Dx = -obs2Dx; }
      }

      // Stage 20 Boss Shield Movement & Recharge
      if (campaignMode && campaignLevel === 20) {
          if (bossShieldHp > 0) {
              bossShieldY += bossShieldDy;
              if (bossShieldY < 10) { bossShieldY = 10; bossShieldDy = -bossShieldDy; }
              if (bossShieldY > H - bossShieldH - 10) { bossShieldY = H - bossShieldH - 10; bossShieldDy = -bossShieldDy; }
          } else {
              bossShieldTimer--;
              if (bossShieldTimer <= 0) {
                  bossShieldHp = 3;
                  createShockwave(W - 55, H/2, '#00ffc8');
              }
          }
      }

      if (portalCooldown > 0) portalCooldown--;

      let speedScale = skillSlowTimer > 0 ? 0.5 : 1.0;

      // Balls Physics & Collisions
      for (let b of balls) {
          if (!b.active) continue;

          // Gravity Well Attraction (Stage >= 9)
          if (campaignMode && campaignLevel >= 9) {
              let dxGw = gwX - b.x;
              let dyGw = gwY - b.y;
              let distSq = dxGw * dxGw + dyGw * dyGw;
              if (distSq < 90 * 90 && distSq > 25) {
                  let dist = Math.sqrt(distSq);
                  b.dx += (dxGw / dist) * 0.28 * speedScale;
                  b.dy += (dyGw / dist) * 0.28 * speedScale;
              }
          }

          b.x += b.dx * speedScale;
          b.y += b.dy * speedScale;

          // Warp Portals (Stage >= 13)
          if (campaignMode && campaignLevel >= 13 && portalCooldown === 0) {
              let d1 = Math.hypot(b.x - portal1X, b.y - portal1Y);
              if (d1 < 18) {
                  b.x = portal2X + (b.dx > 0 ? 18 : -18);
                  b.y = portal2Y;
                  portalCooldown = 30;
                  createShockwave(portal1X, portal1Y, '#00e5ff');
                  createShockwave(portal2X, portal2Y, '#ff00cc');
                  createParticles(portal2X, portal2Y, '#ff00cc', 15, 6);
                  playSound(900, 'hit');
              } else {
                  let d2 = Math.hypot(b.x - portal2X, b.y - portal2Y);
                  if (d2 < 18) {
                      b.x = portal1X + (b.dx > 0 ? 18 : -18);
                      b.y = portal1Y;
                      portalCooldown = 30;
                      createShockwave(portal2X, portal2Y, '#ff00cc');
                      createShockwave(portal1X, portal1Y, '#00e5ff');
                      createParticles(portal1X, portal1Y, '#00e5ff', 15, 6);
                      playSound(900, 'hit');
                  }
              }
          }

          // Motion Trail
          let ballColor = b.isFireball ? '#ff6400' : (b.lastHitter === 1 ? '#00e5ff' : (b.lastHitter === 2 ? '#ff00cc' : '#ffffff'));
          b.trail.unshift({ x: b.x + BALL_SIZE/2, y: b.y + BALL_SIZE/2, color: ballColor });
          if (b.trail.length > 10) b.trail.pop();

          // Powerup Capsule Collision
          if (powerupX !== -1 && b.x < powerupX+18 && b.x+BALL_SIZE > powerupX && b.y < powerupY+18 && b.y+BALL_SIZE > powerupY) {
              let pColor = powerupType === 0 ? '#ffd700' : (powerupType === 1 ? '#ff3366' : (powerupType === 2 ? '#00e5ff' : '#c832ff'));
              createParticles(powerupX + 9, powerupY + 9, pColor, 20, 7);
              createShockwave(powerupX + 9, powerupY + 9, pColor);
              if (powerupType === 0) {
                  if (b.lastHitter === 1) p1BuffTimer = 200;
                  else if (b.lastHitter === 2) p2BuffTimer = 200;
              } else if (powerupType === 1) {
                  if (b.lastHitter === 1) p2DebuffTimer = 200;
                  else if (b.lastHitter === 2) p1DebuffTimer = 200;
              } else if (powerupType === 2) {
                  if (b.lastHitter === 1) p2FreezeTimer = 100;
                  else if (b.lastHitter === 2) p1FreezeTimer = 100;
              } else if (powerupType === 3) {
                  spawnExtraBall();
                  spawnExtraBall();
              }
              powerupX = -1; powerupY = -1;
              playSound(1000, 'score');
          }

          // Top/Bottom Walls
          if (b.y < 0) {
              b.y = 0; b.dy = -b.dy;
              createParticles(b.x + BALL_SIZE/2, 0, '#ffffff', 8, 4);
              createShockwave(b.x + BALL_SIZE/2, 0, '#00e5ff');
              playSound(800, 'hit');
          }
          if (b.y > H - BALL_SIZE) {
              b.y = H - BALL_SIZE; b.dy = -b.dy;
              createParticles(b.x + BALL_SIZE/2, H, '#ffffff', 8, 4);
              createShockwave(b.x + BALL_SIZE/2, H, '#ff00cc');
              playSound(800, 'hit');
          }

          // Obstacle 1 Collision (Vertical Bumper)
          if (campaignMode && campaignLevel >= 5 && obs1Active &&
              b.x + BALL_SIZE > W/2 - 10 && b.x < W/2 + 10 &&
              b.y + BALL_SIZE > obsY && b.y < obsY + 40) {
              if (b.isFireball) {
                  obs1Active = false; obs1Respawn = 150;
                  createParticles(W/2, obsY + 20, '#ff6400', 25, 8);
                  createShockwave(W/2, obsY + 20, '#ff6400');
                  playSound(1200, 'hit');
              } else {
                  b.dx = -b.dx;
                  createParticles(W/2, b.y + BALL_SIZE/2, '#00ffff', 10, 4);
                  createShockwave(W/2, b.y + BALL_SIZE/2, '#00ffff');
                  playSound(800, 'hit');
              }
          }

          // Obstacle 2 Collision (Horizontal Bumper)
          if (campaignMode && campaignLevel >= 8 && obs2Active &&
              b.x + BALL_SIZE > obs2X && b.x < obs2X + 40 &&
              b.y + BALL_SIZE > H/2 - 10 && b.y < H/2 + 10) {
              if (b.isFireball) {
                  obs2Active = false; obs2Respawn = 150;
                  createParticles(obs2X + 20, H/2, '#ff6400', 25, 8);
                  createShockwave(obs2X + 20, H/2, '#ff6400');
                  playSound(1200, 'hit');
              } else {
                  b.dy = -b.dy;
                  createParticles(obs2X + 20, H/2, '#ff00ff', 10, 4);
                  createShockwave(obs2X + 20, H/2, '#ff00ff');
                  playSound(800, 'hit');
              }
          }

          // Stage 20 Boss Shield Collision
          if (campaignMode && campaignLevel === 20 && bossShieldHp > 0 &&
              b.x + BALL_SIZE >= W - 55 && b.x <= W - 45 &&
              b.y + BALL_SIZE >= bossShieldY && b.y <= bossShieldY + bossShieldH &&
              b.dx > 0) {
              if (b.isFireball) {
                  bossShieldHp = 0; bossShieldTimer = 360;
                  createParticles(W - 50, b.y + BALL_SIZE/2, '#ff3200', 30, 10);
                  createShockwave(W - 50, b.y + BALL_SIZE/2, '#ff3200');
                  playSound(1300, 'hit');
              } else {
                  bossShieldHp--;
                  b.dx = -b.dx;
                  createParticles(W - 50, b.y + BALL_SIZE/2, '#ffd700', 15, 6);
                  createShockwave(W - 50, b.y + BALL_SIZE/2, '#ffd700');
                  playSound(800, 'hit');
                  if (bossShieldHp <= 0) bossShieldTimer = 360;
              }
          }

          // P1 Paddle Collision
          if (b.x < 20 + PAD_W && b.y + BALL_SIZE > p1y && b.y < p1y + p1PadH) {
              b.x = 20 + PAD_W; b.dx = -b.dx;
              b.lastHitter = 1;
              if (skillFireballReady) {
                  b.isFireball = true;
                  skillFireballReady = false;
                  createShockwave(b.x, b.y + BALL_SIZE/2, '#ff6400');
              }
              let hitPos = ((b.y + BALL_SIZE/2) - (p1y + p1PadH/2)) / (p1PadH/2);
              b.dy += hitPos * 5.0;
              if (b.dy > 10) b.dy = 10;
              if (b.dy < -10) b.dy = -10;
              b.dx *= 1.08;
              rally++; if (rally > highRally) { highRally = rally; localStorage.setItem("kpong_high_rally", highRally); }
              let pColor = b.isFireball ? '#ff6400' : '#00e5ff';
              createParticles(b.x, b.y + BALL_SIZE/2, pColor, 18, 9);
              createShockwave(b.x, b.y + BALL_SIZE/2, pColor);
              playSound(600, 'hit');
          }

          // P2 Paddle Collision
          if (b.x + BALL_SIZE > W - 20 - PAD_W && b.y + BALL_SIZE > p2y && b.y < p2y + p2PadH) {
              b.x = W - 20 - PAD_W - BALL_SIZE; b.dx = -b.dx;
              b.lastHitter = 2;
              b.isFireball = false; // Extinguished
              let hitPos = ((b.y + BALL_SIZE/2) - (p2y + p2PadH/2)) / (p2PadH/2);
              b.dy += hitPos * 5.0;

              // Stage 20 Boss Adaptive Spin
              if (campaignMode && campaignLevel === 20) {
                  b.dy += p2Vy * 0.8;
              }

              if (b.dy > 12) b.dy = 12;
              if (b.dy < -12) b.dy = -12;
              b.dx *= 1.08;
              rally++; if (rally > highRally) { highRally = rally; localStorage.setItem("kpong_high_rally", highRally); }
              createParticles(b.x + BALL_SIZE, b.y + BALL_SIZE/2, '#ff00cc', 18, 9);
              createShockwave(b.x + BALL_SIZE, b.y + BALL_SIZE/2, '#ff00cc');
              playSound(600, 'hit');
          }

          // Out-of-bounds / Scoring
          if (b.x < -15) {
              b.active = false; s2++; rally = 0;
              createParticles(0, b.y + BALL_SIZE/2, '#ff00cc', 35, 12);
              createShockwave(0, b.y + BALL_SIZE/2, '#ff00cc');
              playSound(200, 'score');
              document.getElementById('s2').innerText = s2;
              if (activeBallCount() === 0) resetBalls();
          }
          if (b.x > W + 15) {
              b.active = false; s1++; rally = 0;
              createParticles(W, b.y + BALL_SIZE/2, '#00e5ff', 35, 12);
              createShockwave(W, b.y + BALL_SIZE/2, '#00e5ff');
              playSound(200, 'score');
              document.getElementById('s1').innerText = s1;
              if (activeBallCount() === 0) resetBalls();
          }
      }

      // Update Particle Physics & Shockwaves
      for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].x += particles[i].vx;
          particles[i].y += particles[i].vy;
          particles[i].life -= 0.04;
          if (particles[i].life <= 0) particles.splice(i, 1);
      }

      for (let i = shockwaves.length - 1; i >= 0; i--) {
          shockwaves[i].radius += 1.8;
          shockwaves[i].alpha -= 0.05;
          if (shockwaves[i].alpha <= 0) shockwaves.splice(i, 1);
      }

      // Win / Stage Transition Logic
      let targetScore = (campaignMode && campaignLevel === 20) ? 7 : (campaignMode ? 5 : 11);
      if (s1 >= targetScore) {
          if (campaignMode) {
              campaignLevel++; s1 = 0; s2 = 0; rally = 0;
              bossShieldHp = 3; bossShieldTimer = 0;
              obs1Active = true; obs2Active = true;
              document.getElementById('s1').innerText = s1;
              document.getElementById('s2').innerText = s2;
              if (campaignLevel > 20) {
                  winScreen = true; campaignMode = false; gameOver = true;
                  lifetimeWins++; localStorage.setItem('kpong_wins', lifetimeWins);
              } else if (campaignLevel >= 17) {
                  resetBalls();
                  spawnExtraBall();
              } else {
                  resetBalls();
              }
          } else {
              gameOver = true;
              lifetimeWins++; localStorage.setItem('kpong_wins', lifetimeWins);
          }
      }
      if (s2 >= targetScore) {
          gameOver = true;
          campaignMode = false;
      }

      // Update Skill Buttons State
      let btnSlow = document.getElementById('btn-slow');
      let btnMega = document.getElementById('btn-mega');
      let btnFire = document.getElementById('btn-fire');

      if (btnSlow) {
          btnSlow.disabled = skillSlowCooldown > 0;
          btnSlow.classList.toggle('active', skillSlowTimer > 0);
          btnSlow.innerText = skillSlowTimer > 0 ? "⚡ SLOW ACTIVE" : (skillSlowCooldown > 0 ? `⚡ [F] (${Math.ceil(skillSlowCooldown/30)}s)` : "⚡ [F] Slow-Mo");
      }
      if (btnMega) {
          btnMega.disabled = skillMegaCooldown > 0;
          btnMega.classList.toggle('active', skillMegaTimer > 0);
          btnMega.innerText = skillMegaTimer > 0 ? "🛡️ MEGA ACTIVE" : (skillMegaCooldown > 0 ? `🛡️ [P] (${Math.ceil(skillMegaCooldown/30)}s)` : "🛡️ [P] Mega");
      }
      if (btnFire) {
          btnFire.disabled = skillFireballCooldown > 0;
          btnFire.classList.toggle('active', skillFireballReady);
          btnFire.innerText = skillFireballReady ? "🔥 FIRE READY!" : (skillFireballCooldown > 0 ? `🔥 [B] (${Math.ceil(skillFireballCooldown/30)}s)` : "🔥 [B] Fireball");
      }
  }

  function drawPaddle(x, y, w, h, isP1, vy, freezeTimer, buffTimer, debuffTimer) {
      let baseColor = isP1 ? (skillMegaTimer > 0 ? '#ffd700' : '#00e5ff') : (campaignMode && campaignLevel === 20 ? '#ff3200' : '#ff00cc');
      let darkColor = isP1 ? (skillMegaTimer > 0 ? '#665000' : '#004466') : (campaignMode && campaignLevel === 20 ? '#660a00' : '#660044');

      if (buffTimer > 0 || (isP1 && skillMegaTimer > 0)) {
          ctx.save();
          ctx.shadowBlur = 18;
          ctx.shadowColor = '#ffd700';
          ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
          ctx.lineWidth = 2;
          ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
          ctx.restore();
      }

      ctx.save();
      let grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, darkColor);
      grad.addColorStop(0.3, '#ffffff');
      grad.addColorStop(0.7, baseColor);
      grad.addColorStop(1, darkColor);
      
      ctx.shadowBlur = 16;
      ctx.shadowColor = baseColor;
      ctx.fillStyle = grad;

      let r = 4;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y + 4);
      ctx.lineTo(x + w / 2, y + h - 4);
      ctx.stroke();
      ctx.restore();
  }

  function drawObstacle(x, y, w, h, isHoriz = false) {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = isHoriz ? '#ff00ff' : '#00ffff';

      ctx.fillStyle = '#1a2230';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = isHoriz ? '#ff00ff' : '#00ffff';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, w, h);

      ctx.restore();
  }

  function drawPowerup(x, y, type) {
      ctx.save();
      let color = type === 0 ? '#ffd700' : (type === 1 ? '#ff3366' : (type === 2 ? '#00e5ff' : '#c832ff'));
      let iconStr = type === 0 ? '+' : (type === 1 ? '!' : (type === 2 ? '*' : 'M'));

      ctx.shadowBlur = 15;
      ctx.shadowColor = color;
      ctx.fillStyle = 'rgba(20, 25, 35, 0.85)';
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.arc(x + 9, y + 9, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(iconStr, x + 9, y + 9.5);
      ctx.restore();
  }

  function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // CRT Scanlines
      ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
      for (let i = 0; i < H; i += 4) {
          ctx.fillRect(0, i, W, 1.5);
      }

      // Border Neon Accent Lines
      ctx.strokeStyle = skillSlowTimer > 0 ? 'rgba(0, 229, 255, 0.8)' : 'rgba(0, 229, 255, 0.25)';
      ctx.lineWidth = 2;
      ctx.strokeRect(2, 2, W - 4, H - 4);

      // Center Line
      ctx.setLineDash([8, 12]);
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(W/2, H/2, 45, 0, Math.PI * 2);
      ctx.stroke();

      // Gravity Well (Stage >= 9)
      if (campaignMode && campaignLevel >= 9) {
          ctx.save();
          ctx.strokeStyle = 'rgba(180, 50, 255, 0.6)';
          ctx.lineWidth = 1.5;
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#b432ff';
          let pulse = 35 + Math.sin(Date.now() * 0.008) * 5;
          ctx.beginPath();
          ctx.arc(gwX, gwY, pulse, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(gwX, gwY, 12, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
      }

      // Warp Portals (Stage >= 13)
      if (campaignMode && campaignLevel >= 13) {
          ctx.save();
          ctx.shadowBlur = 14;
          ctx.lineWidth = 2;

          ctx.strokeStyle = '#00e5ff';
          ctx.shadowColor = '#00e5ff';
          ctx.beginPath();
          ctx.arc(portal1X, portal1Y, 14, 0, Math.PI * 2);
          ctx.stroke();

          ctx.strokeStyle = '#ff00cc';
          ctx.shadowColor = '#ff00cc';
          ctx.beginPath();
          ctx.arc(portal2X, portal2Y, 14, 0, Math.PI * 2);
          ctx.stroke();

          ctx.restore();
      }

      // Obstacles
      if (campaignMode && campaignLevel >= 5 && obs1Active) {
          drawObstacle(W/2 - 10, obsY, 20, 40, false);
      }
      if (campaignMode && campaignLevel >= 8 && obs2Active) {
          drawObstacle(obs2X, H/2 - 10, 40, 20, true);
      }

      // Stage 20 Boss Shield Barrier
      if (campaignMode && campaignLevel === 20 && bossShieldHp > 0) {
          ctx.save();
          let shCol = bossShieldHp === 3 ? '#00e5ff' : (bossShieldHp === 2 ? '#ffd700' : '#ff3366');
          ctx.fillStyle = shCol;
          ctx.shadowBlur = 16;
          ctx.shadowColor = shCol;
          ctx.fillRect(W - 55, bossShieldY, 10, bossShieldH);
          ctx.restore();
      }

      // Render Balls Motion Trails & Spheres
      for (let b of balls) {
          if (!b.active) continue;

          for (let i = b.trail.length - 1; i >= 0; i--) {
              let pt = b.trail[i];
              let alpha = (1 - (i / b.trail.length)) * 0.45;
              let radius = (BALL_SIZE / 2) * (1 - (i / b.trail.length) * 0.5);
              ctx.save();
              ctx.fillStyle = pt.color;
              ctx.globalAlpha = alpha;
              ctx.shadowBlur = 8;
              ctx.shadowColor = pt.color;
              ctx.beginPath();
              ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
              ctx.fill();
              ctx.restore();
          }

          ctx.save();
          let ballGlow = b.isFireball ? '#ff6400' : (b.lastHitter === 1 ? '#00e5ff' : (b.lastHitter === 2 ? '#ff00cc' : '#ffffff'));
          ctx.shadowBlur = b.isFireball ? 22 : 16;
          ctx.shadowColor = ballGlow;
          ctx.fillStyle = b.isFireball ? '#ffc832' : '#ffffff';
          ctx.beginPath();
          ctx.arc(b.x + BALL_SIZE/2, b.y + BALL_SIZE/2, BALL_SIZE/2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }

      // Render Paddles
      drawPaddle(20, p1y, PAD_W, p1PadH, true, p1Vy, p1FreezeTimer, p1BuffTimer, p1DebuffTimer);
      drawPaddle(W - 20 - PAD_W, p2y, PAD_W, p2PadH, false, p2Vy, p2FreezeTimer, p2BuffTimer, p2DebuffTimer);
      
      // Powerup
      if (powerupX !== -1) {
          drawPowerup(powerupX, powerupY, powerupType);
      }
      
      // Shockwaves
      for (let sw of shockwaves) {
          ctx.save();
          ctx.strokeStyle = sw.color;
          ctx.globalAlpha = sw.alpha;
          ctx.lineWidth = 2;
          ctx.shadowBlur = 10;
          ctx.shadowColor = sw.color;
          ctx.beginPath();
          ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
      }

      // Particles
      for (let p of particles) {
          ctx.save();
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.shadowBlur = 6;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }
      
      // Score / HUD
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.font = '13px Inter';
      ctx.textAlign = 'center';
      ctx.fillText("RALLY: " + rally + "  HIGH: " + highRally + "  WINS: " + lifetimeWins, W/2, 20);

      if (campaignMode) {
          ctx.fillStyle = '#ffd700';
          if (campaignLevel === 20) ctx.fillText("STAGE 20: HYPER-CPU BOSS", W/2, 40);
          else ctx.fillText("CAMPAIGN: STAGE " + campaignLevel + " / 20", W/2, 40);
      } else {
          let diffStr = difficulty === 1 ? "EASY" : (difficulty === 2 ? "NORMAL" : "HARD");
          ctx.fillText("DIFF: " + diffStr + " (1-3)", W/2, 40);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.fillText("Press 'C' for Campaign", W/2, 60);
      }

      if (gameOver) {
          ctx.fillStyle = 'rgba(5, 10, 20, 0.85)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 24px Inter';
          ctx.textAlign = 'center';
          if (winScreen) {
              ctx.fillStyle = '#ffd700';
              ctx.shadowBlur = 20;
              ctx.shadowColor = '#ffd700';
              ctx.fillText("CAMPAIGN VICTORY!", W/2, H/2 - 15);
              ctx.font = '14px Inter';
              ctx.fillText("20 STAGES CLEARED!", W/2, H/2 + 10);
          } else {
              ctx.fillStyle = s1 > s2 ? '#00e5ff' : '#ff00cc';
              ctx.shadowBlur = 20;
              ctx.shadowColor = ctx.fillStyle;
              ctx.fillText(s1 > s2 ? "P1 WINS!" : "P2 WINS!", W/2, H/2 - 10);
          }
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          ctx.font = '14px Inter';
          ctx.fillText("Press 'R' to Restart", W/2, H/2 + 35);
      }
  }

  resetBalls();
  setInterval(() => {
      update();
      draw();
  }, 30);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KPong</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 8%);
    --card-bg: rgba(30, 40, 50, 0.4);
    --primary: hsl(200, 85%, 60%);
    --secondary: hsl(300, 85%, 60%);
  }
  body { 
    margin: 0; background-color: var(--bg-color); overflow: hidden; 
    display: flex; justify-content: center; align-items: center; height: 100vh; 
    color: white; font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at center, #1a2a3a 0%, #050a10 100%);
  }
  .container {
    padding: 20px;
    background: var(--card-bg);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    display: flex; flex-direction: column; align-items: center; gap: 15px;
  }
  .score-board {
    display: flex; width: 360px; justify-content: space-between; font-size: 32px; font-weight: 700;
  }
  .p1-score { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
  .p2-score { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
  
  canvas { 
    background-color: rgba(0, 0, 0, 0.3); 
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div class="container">
  <div class="score-board">
    <div class="p1-score" id="s1">0</div>
    <div class="p2-score" id="s2">0</div>
  </div>
  <canvas id="gameCanvas" width="400" height="300"></canvas>
</div>
<script>
  let audioCtx = null;
  function playSound(freq, type) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type === 'score' ? 'sawtooth' : 'sine';
      osc.start();
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + (type === 'score' ? 0.5 : 0.1));
      osc.stop(audioCtx.currentTime + 0.5);
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const W = 400, H = 300;
  const PAD_W = 10, PAD_H = 50, BALL_SIZE = 10;
  
  let p1y = H/2 - PAD_H/2, p2y = H/2 - PAD_H/2;
  let bx = W/2 - BALL_SIZE/2, by = H/2 - BALL_SIZE/2;
  let bdx = 5, bdy = 3;
  let s1 = 0, s2 = 0;
  
  const keys = {};
  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);

  function reset() {
      bx = W/2 - BALL_SIZE/2;
      by = H/2 - BALL_SIZE/2;
      bdx = (bdx > 0) ? -5 : 5;
      bdy = (bdy > 0) ? 3 : -3;
  }

  function update() {
      if (keys['ArrowUp'] || keys['w']) p1y -= 6;
      if (keys['ArrowDown'] || keys['s']) p1y += 6;
      if (p1y < 0) p1y = 0;
      if (p1y > H - PAD_H) p1y = H - PAD_H;

      if (by > p2y + PAD_H/2 + 10) p2y += 4;
      if (by < p2y + PAD_H/2 - 10) p2y -= 4;
      if (p2y < 0) p2y = 0;
      if (p2y > H - PAD_H) p2y = H - PAD_H;

      bx += bdx; by += bdy;

      if (by < 0) { by = 0; bdy = -bdy; playSound(800, 'hit'); }
      if (by > H - BALL_SIZE) { by = H - BALL_SIZE; bdy = -bdy; playSound(800, 'hit'); }

      if (bx < 20 + PAD_W && by + BALL_SIZE > p1y && by < p1y + PAD_H) {
          bx = 20 + PAD_W; bdx = -bdx;
          bdx *= 1.1; bdy *= 1.1;
          playSound(600, 'hit');
      }
      if (bx + BALL_SIZE > W - 20 - PAD_W && by + BALL_SIZE > p2y && by < p2y + PAD_H) {
          bx = W - 20 - PAD_W - BALL_SIZE; bdx = -bdx;
          bdx *= 1.1; bdy *= 1.1;
          playSound(600, 'hit');
      }

      if (bx < 0) { s2++; playSound(200, 'score'); reset(); document.getElementById('s2').innerText = s2; }
      if (bx > W) { s1++; playSound(200, 'score'); reset(); document.getElementById('s1').innerText = s1; }
  }

  function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // Center line
      ctx.setLineDash([10, 15]);
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.1)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);

      // P1 Paddle (Cyan glow)
      ctx.shadowBlur = 15;
      ctx.shadowColor = 'hsl(200, 85%, 60%)';
      ctx.fillStyle = 'hsl(200, 85%, 60%)';
      ctx.fillRect(20, p1y, PAD_W, PAD_H);
      
      // P2 Paddle (Magenta glow)
      ctx.shadowColor = 'hsl(300, 85%, 60%)';
      ctx.fillStyle = 'hsl(300, 85%, 60%)';
      ctx.fillRect(W - 20 - PAD_W, p2y, PAD_W, PAD_H);
      
      // Ball (White glow)
      ctx.shadowColor = 'white';
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(bx + BALL_SIZE/2, by + BALL_SIZE/2, BALL_SIZE/2, 0, Math.PI * 2);
      ctx.fill();
      
      // Reset shadow for next frame
      ctx.shadowBlur = 0;
  }

  setInterval(() => {
      update();
      draw();
  }, 30);
</script>
</body>
</html>

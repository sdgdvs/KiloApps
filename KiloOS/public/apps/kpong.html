<!DOCTYPE html>
<html>
<head>
<title>KPong</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 8%);
    --card-bg: rgba(30, 40, 50, 0.4);
    --primary: hsl(200, 85%, 60%);
    --secondary: hsl(300, 85%, 60%);
  }
  body { 
    margin: 0; background-color: var(--bg-color); overflow: hidden; 
    display: flex; justify-content: center; align-items: center; height: 100vh; 
    color: white; font-family: 'Inter', sans-serif; 
    background: radial-gradient(circle at center, #1a2a3a 0%, #050a10 100%);
  }
  .container {
    padding: 20px;
    background: var(--card-bg);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    display: flex; flex-direction: column; align-items: center; gap: 15px;
  }
  .score-board {
    display: flex; width: 360px; justify-content: space-between; font-size: 32px; font-weight: 700;
  }
  .p1-score { color: var(--primary); text-shadow: 0 0 15px var(--primary); }
  .p2-score { color: var(--secondary); text-shadow: 0 0 15px var(--secondary); }
  
  canvas { 
    background-color: rgba(0, 0, 0, 0.3); 
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>
<div class="container">
  <div class="score-board">
    <div class="p1-score" id="s1" aria-label="Player 1 Score" aria-live="polite">0</div>
    <div class="p2-score" id="s2" aria-label="Player 2 Score" aria-live="polite">0</div>
  </div>
  <canvas id="gameCanvas" width="400" height="300" aria-label="Pong Game Canvas" tabindex="0"></canvas>
</div>
<script>
  let audioCtx = null;
  function playSound(freq, type) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = type === 'score' ? 'sawtooth' : 'sine';
      osc.start();
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + (type === 'score' ? 0.5 : 0.1));
      osc.stop(audioCtx.currentTime + 0.5);
  }

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const W = 400, H = 300;
  const PAD_W = 10, BALL_SIZE = 10;
  
  let p1PadH = 50;
  let p2PadH = 50;
  let campaignMode = false;
  let campaignLevel = 1;
  let lastHitter = 0;
  let powerupX = -1;
  let powerupY = -1;
  let powerupActive = 0;
  let powerupType = 0;
  let p1BuffTimer = 0;
  let p2BuffTimer = 0;
  let p1DebuffTimer = 0;
  let p2DebuffTimer = 0;
  let winScreen = false;
  let highRally = parseInt(localStorage.getItem('kpong_high_rally')) || 0;
  let lifetimeWins = parseInt(localStorage.getItem('kpong_wins')) || 0;
  let obsY = H/2 - 20;
  let obsDy = 3;
  let obs2X = W/2 - 20;
  let obs2Dx = 4;
  let p1FreezeTimer = 0;
  let p2FreezeTimer = 0;
  let p1y = H/2 - 25, p2y = H/2 - 25;
  let bx = W/2 - BALL_SIZE/2, by = H/2 - BALL_SIZE/2;
  let bdx = 5, bdy = 3;
  let s1 = 0, s2 = 0;
  let rally = 0;
  let difficulty = 2; // 1: Easy, 2: Normal, 3: Hard
  const aiSpeeds = [0, 2, 4, 6];
  const startSpeeds = [0, 4, 5, 7];
  let gameOver = false;
  let particles = [];
  let ballTrail = [];
  let shockwaves = [];
  let p1Vy = 0, p2Vy = 0;
  
  function createParticles(x, y, color, count = 15, speed = 8) {
      for (let i = 0; i < count; i++) {
          let angle = Math.random() * Math.PI * 2;
          let spd = (0.2 + Math.random() * 0.8) * speed;
          particles.push({
              x: x, y: y,
              vx: Math.cos(angle) * spd,
              vy: Math.sin(angle) * spd,
              life: 1.0,
              maxLife: 1.0,
              size: 2 + Math.random() * 3,
              color: color
          });
      }
  }

  function createShockwave(x, y, color) {
      shockwaves.push({ x: x, y: y, radius: 4, maxRadius: 28, alpha: 1.0, color: color });
  }
  
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.key] = true; if(['ArrowUp','ArrowDown','w','s','W','S'].includes(e.key)) e.preventDefault(); });
  document.addEventListener('keyup', e => { keys[e.key] = false; });
  window.addEventListener('blur', () => { for(let k in keys) keys[k] = false; });

  function reset() {
      bx = W/2 - BALL_SIZE/2;
      by = H/2 - BALL_SIZE/2;
      let spd = startSpeeds[difficulty];
      bdx = (bdx > 0) ? -spd : spd;
      bdy = (bdy > 0) ? 3 : -3;
      ballTrail = [];
  }

  function update() {
      if (gameOver) {
          if (keys['r'] || keys['R']) {
              s1 = 0; s2 = 0; rally = 0; winScreen = false;
              document.getElementById('s1').innerText = s1;
              document.getElementById('s2').innerText = s2;
              gameOver = false;
              reset();
          }
          return;
      }

      if (keys['1']) { difficulty = 1; }
      if (keys['2']) { difficulty = 2; }
      if (keys['3']) { difficulty = 3; }
      if ((keys['c'] || keys['C']) && !campaignMode) {
          campaignMode = true; campaignLevel = 1; s1=0; s2=0; rally=0; reset();
      }

      if(p1BuffTimer > 0) p1BuffTimer--;
      if(p2BuffTimer > 0) p2BuffTimer--;
      if(p1DebuffTimer > 0) p1DebuffTimer--;
      if(p2DebuffTimer > 0) p2DebuffTimer--;
      if(p1FreezeTimer > 0) p1FreezeTimer--;
      if(p2FreezeTimer > 0) p2FreezeTimer--;
      
      p1PadH = 50 - (rally * 2); if(p1PadH < 20) p1PadH = 20;
      p2PadH = 50 - (rally * 2); if(p2PadH < 20) p2PadH = 20;
      
      if(campaignMode && campaignLevel >= 3) { p2PadH -= 10; }
      if(campaignMode && (campaignLevel === 10 || campaignLevel === 15)) { p2PadH += 50; }
      
      if(p1PadH < 15) p1PadH = 15;
      if(p2PadH < 15) p2PadH = 15;

      if(p1BuffTimer > 0) p1PadH += 30;
      if(p2BuffTimer > 0) p2PadH += 30;
      if(p1DebuffTimer > 0) p1PadH = 15;
      if(p2DebuffTimer > 0) p2PadH = 15;

      let p1PrevY = p1y;
      if(p1FreezeTimer === 0) {
          if (keys['ArrowUp'] || keys['w'] || keys['W']) p1y -= 6;
          if (keys['ArrowDown'] || keys['s'] || keys['S']) p1y += 6;
      }
      if (p1y < 0) p1y = 0;
      if (p1y > H - p1PadH) p1y = H - p1PadH;
      p1Vy = p1y - p1PrevY;

      let aiSpeed = aiSpeeds[difficulty];
      if(campaignMode) {
          if(campaignLevel===1) aiSpeed = 2;
          else if(campaignLevel===2) aiSpeed = 4;
          else if(campaignLevel===3) aiSpeed = 5;
          else if(campaignLevel===4) aiSpeed = 6;
          else if(campaignLevel===5) aiSpeed = 7;
          else if(campaignLevel===6) aiSpeed = 8;
          else if(campaignLevel===7) aiSpeed = 9;
          else if(campaignLevel===8) aiSpeed = 10;
          else if(campaignLevel===9) aiSpeed = 12;
          else if(campaignLevel<=11) aiSpeed = 15;
          else if(campaignLevel<=13) aiSpeed = 17;
          else aiSpeed = 19;
      }
      let p2PrevY = p2y;
      if(p2FreezeTimer === 0) {
          if (by > p2y + p2PadH/2 + 10) p2y += aiSpeed;
          if (by < p2y + p2PadH/2 - 10) p2y -= aiSpeed;
      }
      if (p2y < 0) p2y = 0;
      if (p2y > H - p2PadH) p2y = H - p2PadH;
      p2Vy = p2y - p2PrevY;

      
      if(powerupActive > 0) powerupActive--;
      if(powerupX === -1 && Math.random() < 0.005) {
          powerupX = W/4 + Math.random()*(W/2);
          powerupY = H/4 + Math.random()*(H/2);
          powerupActive = 250;
          powerupType = Math.floor(Math.random() * 3);
      }
      if(powerupActive <= 0) { powerupX = -1; powerupY = -1; }
      
      if (campaignMode && campaignLevel >= 6) {
          obsY += obsDy;
          if(obsY < 0) { obsY = 0; obsDy = -obsDy; }
          if(obsY > H - 40) { obsY = H - 40; obsDy = -obsDy; }
          
          if(bx + BALL_SIZE > W/2 - 10 && bx < W/2 + 10 && by + BALL_SIZE > obsY && by < obsY + 40) {
              bdx = -bdx;
              createParticles(W/2, by + BALL_SIZE/2, '#00ffff', 10, 4);
              createShockwave(W/2, by + BALL_SIZE/2, '#00ffff');
              playSound(800, 'hit');
          }
      }
      
      if (campaignMode && campaignLevel >= 12) {
          obs2X += obs2Dx;
          if(obs2X < 50) { obs2X = 50; obs2Dx = -obs2Dx; }
          if(obs2X > W - 90) { obs2X = W - 90; obs2Dx = -obs2Dx; }
          
          if(bx + BALL_SIZE > obs2X && bx < obs2X + 40 && by + BALL_SIZE > H/2 - 10 && by < H/2 + 10) {
              bdy = -bdy;
              createParticles(obs2X + 20, H/2, '#ff00ff', 10, 4);
              createShockwave(obs2X + 20, H/2, '#ff00ff');
              playSound(800, 'hit');
          }
      }

      if(campaignMode && campaignLevel >= 5 && campaignLevel < 10) {
          bx += (bdx > 0 ? bdx + 2 : bdx - 2);
          by += (bdy > 0 ? bdy + 1 : bdy - 1);
      } else if (campaignMode && campaignLevel >= 10 && campaignLevel < 15) {
          bx += (bdx > 0 ? bdx + 3 : bdx - 3);
          by += (bdy > 0 ? bdy + 2 : bdy - 2);
      } else if (campaignMode && campaignLevel === 15) {
          bx += (bdx > 0 ? bdx + 4 : bdx - 4);
          by += (bdy > 0 ? bdy + 3 : bdy - 3);
      } else {
          bx += bdx; by += bdy;
      }

      // Ball Trail tracking
      let ballColor = lastHitter === 1 ? '#00e5ff' : (lastHitter === 2 ? '#ff00cc' : '#ffffff');
      ballTrail.unshift({ x: bx + BALL_SIZE/2, y: by + BALL_SIZE/2, color: ballColor });
      if (ballTrail.length > 10) ballTrail.pop();

      // Emit subtle trail spark
      if (Math.random() < 0.4) {
          particles.push({
              x: bx + BALL_SIZE/2 + (Math.random() - 0.5)*4,
              y: by + BALL_SIZE/2 + (Math.random() - 0.5)*4,
              vx: -bdx * 0.2 + (Math.random() - 0.5),
              vy: -bdy * 0.2 + (Math.random() - 0.5),
              life: 0.6, maxLife: 0.6,
              size: 2, color: ballColor
          });
      }
      
      if(powerupX !== -1 && bx < powerupX+18 && bx+BALL_SIZE > powerupX && by < powerupY+18 && by+BALL_SIZE > powerupY) {
          let pColor = powerupType === 0 ? '#ffd700' : (powerupType === 1 ? '#ff3366' : '#00e5ff');
          createParticles(powerupX + 9, powerupY + 9, pColor, 20, 7);
          createShockwave(powerupX + 9, powerupY + 9, pColor);
          if (powerupType === 0) {
              if(lastHitter === 1) p1BuffTimer = 200;
              else if(lastHitter === 2) p2BuffTimer = 200;
          } else if (powerupType === 1) {
              if(lastHitter === 1) p2DebuffTimer = 200;
              else if(lastHitter === 2) p1DebuffTimer = 200;
          } else if (powerupType === 2) {
              if(lastHitter === 1) p2FreezeTimer = 100;
              else if(lastHitter === 2) p1FreezeTimer = 100;
          }
          powerupX = -1; powerupY = -1;
          playSound(1000, 'score');
      }

      for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].x += particles[i].vx;
          particles[i].y += particles[i].vy;
          particles[i].life -= 0.04;
          if (particles[i].life <= 0) particles.splice(i, 1);
      }

      for (let i = shockwaves.length - 1; i >= 0; i--) {
          shockwaves[i].radius += 1.8;
          shockwaves[i].alpha -= 0.05;
          if (shockwaves[i].alpha <= 0) shockwaves.splice(i, 1);
      }

      if (by < 0) { 
          by = 0; bdy = -bdy; 
          createParticles(bx + BALL_SIZE/2, 0, '#ffffff', 8, 4);
          createShockwave(bx + BALL_SIZE/2, 0, '#00e5ff');
          playSound(800, 'hit'); 
      }
      if (by > H - BALL_SIZE) { 
          by = H - BALL_SIZE; bdy = -bdy; 
          createParticles(bx + BALL_SIZE/2, H, '#ffffff', 8, 4);
          createShockwave(bx + BALL_SIZE/2, H, '#ff00cc');
          playSound(800, 'hit'); 
      }

      if (bx < 20 + PAD_W && by + BALL_SIZE > p1y && by < p1y + p1PadH) {
          bx = 20 + PAD_W; bdx = -bdx;
          lastHitter = 1;
          let hitPos = ((by + BALL_SIZE/2) - (p1y + p1PadH/2)) / (p1PadH/2);
          bdy += hitPos * 5.0;
          if (bdy > 10) bdy = 10;
          if (bdy < -10) bdy = -10;
          bdx *= 1.1;
          rally++; if(rally > highRally) { highRally = rally; localStorage.setItem("kpong_high_rally", highRally); }
          createParticles(bx, by + BALL_SIZE/2, '#00e5ff', 18, 9);
          createShockwave(bx, by + BALL_SIZE/2, '#00e5ff');
          playSound(600, 'hit');
      }
      if (bx + BALL_SIZE > W - 20 - PAD_W && by + BALL_SIZE > p2y && by < p2y + p2PadH) {
          bx = W - 20 - PAD_W - BALL_SIZE; bdx = -bdx;
          lastHitter = 2;
          let hitPos = ((by + BALL_SIZE/2) - (p2y + p2PadH/2)) / (p2PadH/2);
          bdy += hitPos * 5.0;
          if (bdy > 10) bdy = 10;
          if (bdy < -10) bdy = -10;
          bdx *= 1.1;
          rally++; if(rally > highRally) { highRally = rally; localStorage.setItem("kpong_high_rally", highRally); }
          createParticles(bx + BALL_SIZE, by + BALL_SIZE/2, '#ff00cc', 18, 9);
          createShockwave(bx + BALL_SIZE, by + BALL_SIZE/2, '#ff00cc');
          playSound(600, 'hit');
      }

      
      let tScore = campaignMode ? 5 : 11;
      if (bx < -10) { 
          s2++; rally = 0; 
          createParticles(0, by + BALL_SIZE/2, '#ff00cc', 35, 12);
          createShockwave(0, by + BALL_SIZE/2, '#ff00cc');
          playSound(200, 'score'); reset(); document.getElementById('s2').innerText = s2; 
          if(s2 >= tScore) { gameOver = true; campaignMode = false; }
      }
      if (bx > W + 10) { 
          s1++; rally = 0; 
          createParticles(W, by + BALL_SIZE/2, '#00e5ff', 35, 12);
          createShockwave(W, by + BALL_SIZE/2, '#00e5ff');
          playSound(200, 'score'); reset(); document.getElementById('s1').innerText = s1; 
          if(s1 >= tScore) {
              if(campaignMode) {
                  campaignLevel++; s1=0; s2=0; rally=0; document.getElementById('s1').innerText = s1; document.getElementById('s2').innerText = s2;
                  if(campaignLevel > 15) { 
                      winScreen = true; campaignMode = false; gameOver = true; 
                      lifetimeWins++; localStorage.setItem('kpong_wins', lifetimeWins);
                  }
              } else { 
                  gameOver = true; 
                  lifetimeWins++; localStorage.setItem('kpong_wins', lifetimeWins);
              }
          }
      }
  }

  function drawPaddle(x, y, w, h, isP1, vy, freezeTimer, buffTimer, debuffTimer) {
      let baseColor = isP1 ? '#00e5ff' : '#ff00cc';
      let darkColor = isP1 ? '#004466' : '#660044';
      let glowColor = isP1 ? 'rgba(0, 229, 255, ' : 'rgba(255, 0, 204, ';

      // Draw Buff / Debuff Aura
      if (buffTimer > 0) {
          ctx.save();
          ctx.shadowBlur = 18;
          ctx.shadowColor = '#ffd700';
          ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)';
          ctx.lineWidth = 2;
          ctx.strokeRect(x - 3, y - 3, w + 6, h + 6);
          ctx.restore();
      } else if (debuffTimer > 0) {
          ctx.save();
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#ff3366';
          ctx.strokeStyle = 'rgba(255, 51, 102, 0.8)';
          ctx.lineWidth = 2;
          ctx.setLineDash([3, 3]);
          ctx.strokeRect(x - 2, y - 2, w + 4, h + 4);
          ctx.restore();
      }

      // Thruster Flame effect when moving
      if (vy !== 0 && freezeTimer === 0) {
          ctx.save();
          let flameY = vy > 0 ? y : y + h;
          let flameDir = vy > 0 ? -1 : 1;
          ctx.fillStyle = isP1 ? '#00ffff' : '#ff66ff';
          ctx.beginPath();
          ctx.moveTo(x + 2, flameY);
          ctx.lineTo(x + w / 2, flameY + flameDir * (6 + Math.random() * 6));
          ctx.lineTo(x + w - 2, flameY);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
      }

      // Metallic Gradient Body
      ctx.save();
      let grad = ctx.createLinearGradient(x, y, x + w, y);
      grad.addColorStop(0, darkColor);
      grad.addColorStop(0.3, '#ffffff');
      grad.addColorStop(0.7, baseColor);
      grad.addColorStop(1, darkColor);
      
      ctx.shadowBlur = 16;
      ctx.shadowColor = baseColor;
      ctx.fillStyle = grad;

      // Rounded Paddle Capsule
      let r = 4;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();

      // Glowing Center Line Core
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y + 4);
      ctx.lineTo(x + w / 2, y + h - 4);
      ctx.stroke();

      // Side Thruster Nozzle Accents
      ctx.fillStyle = '#111';
      ctx.fillRect(x + 1, y + 2, w - 2, 2);
      ctx.fillRect(x + 1, y + h - 4, w - 2, 2);

      // Freeze Visual Effect
      if (freezeTimer > 0) {
          ctx.fillStyle = 'rgba(150, 240, 255, 0.6)';
          ctx.fillRect(x - 2, y, w + 4, h);
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 1;
          // Draw ice crystal spikes
          ctx.beginPath();
          ctx.moveTo(x - 3, y + h * 0.3); ctx.lineTo(x + w + 3, y + h * 0.3);
          ctx.moveTo(x - 3, y + h * 0.7); ctx.lineTo(x + w + 3, y + h * 0.7);
          ctx.stroke();
      }
      ctx.restore();
  }

  function drawPowerup(x, y, type) {
      ctx.save();
      let color = type === 0 ? '#ffd700' : (type === 1 ? '#ff3366' : '#00e5ff');
      let iconStr = type === 0 ? '⚡' : (type === 1 ? '☠' : '❄');

      ctx.shadowBlur = 15;
      ctx.shadowColor = color;
      
      // Outer Glowing Capsule
      ctx.fillStyle = 'rgba(20, 25, 35, 0.85)';
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;

      ctx.beginPath();
      ctx.arc(x + 9, y + 9, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Pulsing Ring
      let pulse = (Math.sin(Date.now() * 0.01) + 1) * 2;
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x + 9, y + 9, 9 + pulse, 0, Math.PI * 2);
      ctx.stroke();

      // Icon Text
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.fillText(iconStr, x + 9, y + 9.5);
      ctx.restore();
  }

  function drawObstacle(x, y, w, h) {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = '#00ffff';

      // Frame
      ctx.fillStyle = '#1a2230';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, w, h);

      // Energy Hazard Stripes
      ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = -w; i < h + w; i += 8) {
          ctx.moveTo(x + i, y);
          ctx.lineTo(x + i + 6, y + h);
      }
      ctx.stroke();

      // Core Glowing Orb
      let pulse = Math.sin(Date.now() * 0.008) * 3;
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#ffffff';
      ctx.beginPath();
      ctx.arc(x + w / 2, y + h / 2, 3 + Math.abs(pulse), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
  }

  function drawCRTGrid() {
      // Subtle Arcade CRT Scanlines
      ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
      for (let i = 0; i < H; i += 4) {
          ctx.fillRect(0, i, W, 1.5);
      }

      // Border Neon Corners
      ctx.strokeStyle = 'rgba(0, 229, 255, 0.25)';
      ctx.lineWidth = 2;
      ctx.strokeRect(2, 2, W - 4, H - 4);
  }

  function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // CRT Grid & Scanlines
      drawCRTGrid();

      // Center Line with glowing pulse
      ctx.setLineDash([8, 12]);
      ctx.beginPath();
      ctx.moveTo(W/2, 0);
      ctx.lineTo(W/2, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.setLineDash([]);

      // Center circle arena graphic
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(W/2, H/2, 45, 0, Math.PI * 2);
      ctx.stroke();

      // Render Ball Motion Trail
      for (let i = ballTrail.length - 1; i >= 0; i--) {
          let pt = ballTrail[i];
          let alpha = (1 - (i / ballTrail.length)) * 0.45;
          let radius = (BALL_SIZE / 2) * (1 - (i / ballTrail.length) * 0.5);
          ctx.save();
          ctx.fillStyle = pt.color;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 8;
          ctx.shadowColor = pt.color;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }

      // Draw Paddles
      drawPaddle(20, p1y, PAD_W, p1PadH, true, p1Vy, p1FreezeTimer, p1BuffTimer, p1DebuffTimer);
      drawPaddle(W - 20 - PAD_W, p2y, PAD_W, p2PadH, false, p2Vy, p2FreezeTimer, p2BuffTimer, p2DebuffTimer);
      
      // Energy Ball with Glow
      ctx.save();
      let ballGlow = lastHitter === 1 ? '#00e5ff' : (lastHitter === 2 ? '#ff00cc' : '#ffffff');
      let radialGrad = ctx.createRadialGradient(
          bx + BALL_SIZE/2, by + BALL_SIZE/2, 1,
          bx + BALL_SIZE/2, by + BALL_SIZE/2, BALL_SIZE/2 + 2
      );
      radialGrad.addColorStop(0, '#ffffff');
      radialGrad.addColorStop(0.5, ballGlow);
      radialGrad.addColorStop(1, 'rgba(255,255,255,0)');

      ctx.shadowBlur = 16;
      ctx.shadowColor = ballGlow;
      ctx.fillStyle = radialGrad;
      ctx.beginPath();
      ctx.arc(bx + BALL_SIZE/2, by + BALL_SIZE/2, BALL_SIZE/2 + 2, 0, Math.PI * 2);
      ctx.fill();

      // Solid Core
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(bx + BALL_SIZE/2, by + BALL_SIZE/2, BALL_SIZE/2 - 1, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      
      // Powerup
      if(powerupX !== -1) {
          drawPowerup(powerupX, powerupY, powerupType);
      }
      
      // Obstacles
      if (campaignMode && campaignLevel >= 6) {
          drawObstacle(W/2 - 10, obsY, 20, 40);
          if (campaignLevel >= 12) {
              drawObstacle(obs2X, H/2 - 10, 40, 20);
          }
      }
      
      // Shockwaves
      for (let sw of shockwaves) {
          ctx.save();
          ctx.strokeStyle = sw.color;
          ctx.globalAlpha = sw.alpha;
          ctx.lineWidth = 2;
          ctx.shadowBlur = 10;
          ctx.shadowColor = sw.color;
          ctx.beginPath();
          ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
      }

      // Draw Particles
      for (let p of particles) {
          ctx.save();
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.shadowBlur = 6;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }
      
      // Score / HUD
      ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
      ctx.font = '13px Inter';
      ctx.textAlign = 'center';
      ctx.fillText("RALLY: " + rally + "  HIGH: " + highRally + "  WINS: " + lifetimeWins, W/2, 20);

      if(campaignMode) {
          ctx.fillStyle = '#ffd700';
          ctx.fillText("CAMPAIGN: LVL " + campaignLevel, W/2, 40);
      } else {
          let diffStr = difficulty === 1 ? "EASY" : (difficulty === 2 ? "NORMAL" : "HARD");
          ctx.fillText("DIFF: " + diffStr + " (1-3)", W/2, 40);
          ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
          ctx.fillText("Press 'C' for Campaign", W/2, 60);
      }

      if (gameOver) {
          ctx.fillStyle = 'rgba(5, 10, 20, 0.85)';
          ctx.fillRect(0, 0, W, H);
          ctx.fillStyle = 'white';
          ctx.font = 'bold 28px Inter';
          ctx.textAlign = 'center';
          if(winScreen) {
              ctx.fillStyle = '#ffd700';
              ctx.shadowBlur = 20;
              ctx.shadowColor = '#ffd700';
              ctx.fillText("CAMPAIGN COMPLETE!", W/2, H/2 - 10);
          } else {
              ctx.fillStyle = s1 > s2 ? '#00e5ff' : '#ff00cc';
              ctx.shadowBlur = 20;
              ctx.shadowColor = ctx.fillStyle;
              ctx.fillText(s1 > s2 ? "P1 WINS!" : "P2 WINS!", W/2, H/2 - 10);
          }
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'white';
          ctx.font = '16px Inter';
          ctx.fillText("Press 'R' to Restart", W/2, H/2 + 30);
      }
  }

  setInterval(() => {
      update();
      draw();
  }, 30);
</script>
</body>
</html>

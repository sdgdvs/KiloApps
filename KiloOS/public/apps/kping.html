<!DOCTYPE html>
<html>
<head>
<title>KPing</title>
<style>
  body { margin: 0; font-family: "Segoe UI", sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 10px; box-sizing: border-box; }
  .top { display: flex; align-items: center; margin-bottom: 10px; }
  .label { margin-right: 10px; }
  input[type="text"] { flex: 1; padding: 3px; font-family: "Consolas", monospace; margin-right: 10px; border: 1px solid #ccc; }
  button { padding: 3px 15px; cursor: pointer; border: 1px solid #ccc; background: #e0e0e0; }
  button:hover { background: #d0d0d0; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  textarea { flex: 1; width: 100%; resize: none; font-family: "Consolas", monospace; font-size: 14px; padding: 5px; box-sizing: border-box; border: 1px solid #ccc; background: white; }
</style>
</head>
<body>
  <div class="top">
    <div class="label">Host:</div>
    <input type="text" id="host" value="127.0.0.1">
    <button id="btn">Ping</button>
  </div>
  <textarea id="out" readonly></textarea>
<script>
  const hostInput = document.getElementById('host');
  const btn = document.getElementById('btn');
  const out = document.getElementById('out');
  
  function append(text) {
      out.value += text;
      out.scrollTop = out.scrollHeight;
  }
  
  btn.onclick = () => {
      const host = hostInput.value.trim() || '127.0.0.1';
      out.value = "";
      btn.disabled = true;
      append(`Pinging ${host} with 32 bytes of data:\n\n`);
      
      let count = 0;
      const interval = setInterval(() => {
          if (count < 4) {
              const time = Math.floor(Math.random() * 20) + 1;
              append(`Reply from ${host}: bytes=32 time=${time}ms TTL=115\n`);
              count++;
          } else {
              clearInterval(interval);
              append(`\nPing statistics for ${host}:\n`);
              append(`    Packets: Sent = 4, Received = 4, Lost = 0 (0% loss),\n`);
              btn.disabled = false;
          }
      }, 1000);
  };
</script>
</body>
</html>

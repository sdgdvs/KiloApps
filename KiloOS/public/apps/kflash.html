<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFlash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88,166,255,0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #238636;
            color: white;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background: #2ea043;
            box-shadow: 0 0 15px rgba(46,160,67,0.4);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .flashcard-container {
            width: 100%;
            max-width: 600px;
            height: 350px;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .flashcard-front {
            z-index: 2;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background: rgba(13, 17, 23, 0.9);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .card-content {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
            max-height: 80%;
            overflow-y: auto;
            word-wrap: break-word;
            width: 100%;
        }

        .card-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #8b949e;
            font-weight: 400;
        }

        .deck-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #58a6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #58a6ff;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: #238636;
            bottom: -50px;
            right: -50px;
        }

        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 { margin: 0; font-size: 1.2rem; color: #fff; }
        .modal-content label { font-size: 0.9rem; color: #8b949e; font-weight: 600; margin-bottom: -8px;}
        
        .modal-content input, .modal-content textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
        }
        
        .modal-content input:focus, .modal-content textarea:focus {
            outline: none;
            border-color: #58a6ff;
            background: rgba(255,255,255,0.08);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="app-container">
        <div class="header">
            <h1>KFlash</h1>
            <div class="controls">
                <button class="btn btn-primary" id="btnAddCard">+ Add Card</button>
            </div>
        </div>

        <div class="main-content">
            <div class="flashcard-container" id="cardContainer">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front">
                        <div class="deck-info">Card 1/1</div>
                        <div class="card-content" id="cardFront">What is KiloOS?</div>
                        <div class="card-hint">Click or press Space to flip</div>
                        <div class="progress-bar" style="width: 0%;"></div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div class="deck-info">Card 1/1</div>
                        <div class="card-content" id="cardBack">An advanced, multi-agent operating system environment.</div>
                        <div class="card-hint">Click or press Space to flip back</div>
                        <div class="progress-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn" id="btnPrev" disabled>← Prev</button>
            <button class="btn" id="btnNext" disabled>Next →</button>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div class="modal" id="addCardModal">
        <div class="modal-content">
            <h2>Add New Card</h2>
            <label for="newFront">Front Text</label>
            <textarea id="newFront" rows="2" placeholder="e.g. What is the capital of France?"></textarea>
            <label for="newBack">Back Text</label>
            <textarea id="newBack" rows="2" placeholder="e.g. Paris"></textarea>
            <div class="modal-actions">
                <button class="btn" id="btnCancelAdd">Cancel</button>
                <button class="btn btn-primary" id="btnSaveCard">Save</button>
            </div>
        </div>
    </div>

    <script>
        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('cardContainer');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        
        let deck = [
            { front: "What is KiloOS?", back: "An advanced, multi-agent operating system environment." },
            { front: "What does the 'K' stand for?", back: "Kilo!" }
        ];
        let currentIndex = 0;

        const cardFront = document.getElementById('cardFront');
        const cardBack = document.getElementById('cardBack');
        const deckInfos = document.querySelectorAll('.deck-info');
        const progressBars = document.querySelectorAll('.progress-bar');

        function renderCard() {
            if (deck.length === 0) {
                cardFront.textContent = "Deck is empty";
                cardBack.textContent = "Add some cards to begin";
                deckInfos.forEach(el => el.textContent = `0/0`);
                progressBars.forEach(el => el.style.width = `0%`);
                btnPrev.disabled = true;
                btnNext.disabled = true;
                return;
            }
            const card = deck[currentIndex];
            cardFront.textContent = card.front;
            cardBack.textContent = card.back;
            deckInfos.forEach(el => el.textContent = `Card ${currentIndex + 1}/${deck.length}`);
            
            const pct = ((currentIndex + 1) / deck.length) * 100;
            progressBars.forEach(el => el.style.width = `${pct}%`);

            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === deck.length - 1;
        }

        const flipCard = () => {
            if (deck.length > 0) {
                flashcard.classList.toggle('is-flipped');
            }
        };

        cardContainer.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            // Only toggle on space if not typing in an input
            if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                flipCard();
            }
            if (e.code === 'ArrowRight' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                if (!btnNext.disabled) btnNext.click();
            }
            if (e.code === 'ArrowLeft' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                if (!btnPrev.disabled) btnPrev.click();
            }
        });

        btnPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                flashcard.classList.remove('is-flipped');
                setTimeout(renderCard, 150);
            }
        });

        btnNext.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex < deck.length - 1) {
                currentIndex++;
                flashcard.classList.remove('is-flipped');
                setTimeout(renderCard, 150);
            }
        });

        // Modal Logic
        const modal = document.getElementById('addCardModal');
        const newFrontInput = document.getElementById('newFront');
        const newBackInput = document.getElementById('newBack');

        document.getElementById('btnAddCard').addEventListener('click', () => {
            modal.classList.add('active');
            newFrontInput.focus();
        });

        document.getElementById('btnCancelAdd').addEventListener('click', () => {
            modal.classList.remove('active');
            newFrontInput.value = '';
            newBackInput.value = '';
        });

        document.getElementById('btnSaveCard').addEventListener('click', () => {
            const front = newFrontInput.value.trim();
            const back = newBackInput.value.trim();
            if (front && back) {
                deck.push({ front, back });
                newFrontInput.value = '';
                newBackInput.value = '';
                modal.classList.remove('active');
                
                // If it was empty, make sure we show the first card
                if (deck.length === 1) {
                    currentIndex = 0;
                } else if (currentIndex === deck.length - 2) {
                    // Optional: auto-advance to new card or just update progress
                }
                
                renderCard();
            }
        });

        // Init
        renderCard();
    </script>
</body>
</html>

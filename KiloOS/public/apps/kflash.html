<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFlash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88,166,255,0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #238636;
            color: white;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background: #2ea043;
            box-shadow: 0 0 15px rgba(46,160,67,0.4);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .flashcard-container {
            width: 100%;
            max-width: 600px;
            height: 400px;
            perspective: 1000px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .flashcard-front {
            z-index: 2;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background: rgba(13, 17, 23, 0.9);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .card-content {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .card-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #8b949e;
            font-weight: 400;
        }

        .deck-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #58a6ff;
            width: 0%;
            transition: width 0.3s ease;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #58a6ff;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: #238636;
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="app-container">
        <div class="header">
            <h1>KFlash</h1>
            <div class="controls">
                <button class="btn">Edit Deck</button>
                <button class="btn btn-primary">+ New Deck</button>
            </div>
        </div>

        <div class="main-content">
            <div class="flashcard-container" id="cardContainer">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front">
                        <div class="deck-info">Sample Deck • Card 1/1</div>
                        <div class="card-content" id="cardFront">What is KiloOS?</div>
                        <div class="card-hint">Click or press Space to flip</div>
                        <div class="progress-bar" style="width: 10%;"></div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div class="deck-info">Sample Deck • Card 1/1</div>
                        <div class="card-content" id="cardBack">An advanced, multi-agent operating system environment.</div>
                        <div class="card-hint">Click or press Space to flip back</div>
                        <div class="progress-bar" style="width: 10%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn" id="btnPrev">← Prev</button>
            <button class="btn" id="btnNext">Next →</button>
        </div>
    </div>

    <script>
        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('cardContainer');
        
        const flipCard = () => {
            flashcard.classList.toggle('is-flipped');
        };

        cardContainer.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flipCard();
            }
        });

        // Scaffolded buttons logic
        document.getElementById('btnPrev').addEventListener('click', (e) => {
            e.stopPropagation();
            // TODO: Implement previous card logic
            console.log("Prev card");
        });

        document.getElementById('btnNext').addEventListener('click', (e) => {
            e.stopPropagation();
            // TODO: Implement next card logic
            console.log("Next card");
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFlash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88,166,255,0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c9d1d9;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #238636;
            color: white;
            border-color: rgba(240, 246, 252, 0.1);
        }

        .btn-primary:hover {
            background: #2ea043;
            box-shadow: 0 0 15px rgba(46,160,67,0.4);
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .flashcard-container {
            width: 100%;
            max-width: 600px;
            height: 350px;
            perspective: 1200px;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .flashcard:hover .flashcard-face {
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.15);
        }

        .flashcard-front {
            z-index: 2;
        }

        .flashcard-back {
            transform: rotateY(180deg);
            background: rgba(13, 17, 23, 0.9);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .card-content {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
            max-height: 80%;
            overflow-y: auto;
            word-wrap: break-word;
            width: 100%;
        }

        .card-hint {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #8b949e;
            font-weight: 400;
        }

        .deck-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #58a6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .footer {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #58a6ff;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: #238636;
            bottom: -50px;
            right: -50px;
        }

        .modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 { margin: 0; font-size: 1.2rem; color: #fff; }
        .modal-content label { font-size: 0.9rem; color: #8b949e; font-weight: 600; margin-bottom: 4px; margin-top: 8px; }
        
        .modal-content input, .modal-content textarea {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: vertical;
        }
        
        .modal-content input:focus, .modal-content textarea:focus {
            outline: none;
            border-color: #58a6ff;
            background: rgba(255,255,255,0.08);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .shake {
            animation: shake 0.4s;
        }

        @media print {
            body { background: white; color: black; display: block; overflow: auto; }
            .app-container, .bg-shapes, .modal { display: none !important; }
            
            #print-view { display: block !important; }
            .print-card { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; border-radius: 8px; }
            .print-front { font-weight: bold; margin-bottom: 5px; }
            .print-back { }
        }
        
        #print-view { display: none; padding: 20px; }
    </style>
</head>
<body>
    <div id="print-view"></div>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>
    
    <div class="app-container">
        <div class="header">
            <h1>KFlash</h1>
            <div class="controls">
                <input type="text" id="searchBar" placeholder="Search..." style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 12px; border-radius: 6px; font-family: 'Inter', sans-serif;">
                <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size: 0.9rem; margin-right: 10px;">
                    <input type="checkbox" id="chkReviewOnly" style="accent-color:#58a6ff; transform: scale(1.2);"> Review Only
                </label>
                <button class="btn" id="btnLoadSample">Load Sample</button>
                <button class="btn" id="btnImport">Import</button>
                <button class="btn" id="btnExport">Export</button>
                <input type="file" id="fileImport" accept=".json,.csv" style="display: none;">
                <button class="btn" id="btnPrint">Print</button>
                <button class="btn btn-primary" id="btnEditCard" disabled>Edit</button>
                <button class="btn btn-primary" style="background-color:#da3633; border-color:rgba(218,54,51,0.5)" id="btnDeleteCard" disabled>Delete</button>
                <button class="btn" id="btnShuffle" disabled>Shuffle</button>
                <button class="btn btn-primary" id="btnAddCard">+ Add Card</button>
            </div>
        </div>

        <div class="main-content">
            <div class="flashcard-container" id="cardContainer">
                <div class="flashcard" id="flashcard">
                    <div class="flashcard-face flashcard-front">
                        <div class="deck-info">Card 1/1</div>
                        <div class="card-content" id="cardFront">What is KiloOS?</div>
                        <div class="card-hint">Click or press Space to flip</div>
                        <div class="progress-bar" style="width: 0%;"></div>
                    </div>
                    <div class="flashcard-face flashcard-back">
                        <div class="deck-info">Card 1/1</div>
                        <div class="card-content" id="cardBack">An advanced, multi-agent operating system environment.</div>
                        <div class="card-hint">Click or press Space to flip back</div>
                        <div class="progress-bar" style="width: 0%;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="btn" id="btnPrev" disabled>← Prev</button>
            <div id="studyControls" style="display:none; gap:10px;">
                <button class="btn btn-primary" style="background-color:#2ea043;" id="btnGotIt">Got It ✓</button>
                <button class="btn btn-primary" style="background-color:#d29922;" id="btnNeedsReview">Needs Review ↻</button>
            </div>
            <button class="btn" id="btnNext" disabled>Next →</button>
        </div>
    </div>

    <!-- Add Card Modal -->
    <div class="modal" id="addCardModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add New Card</h2>
            <label for="newFront">Front Text</label>
            <textarea id="newFront" rows="2" placeholder="e.g. What is the capital of France?"></textarea>
            <label for="newBack">Back Text</label>
            <textarea id="newBack" rows="2" placeholder="e.g. Paris"></textarea>
            <div class="modal-actions">
                <button class="btn" id="btnCancelAdd">Cancel</button>
                <button class="btn btn-primary" id="btnSaveCard">Save</button>
            </div>
        </div>
    </div>

    <!-- Load Sample Modal -->
    <div class="modal" id="loadSampleModal">
        <div class="modal-content">
            <h2>Load Sample Pack</h2>
            <label for="samplePackSelect">Select a sample pack to load:</label>
            <select id="samplePackSelect" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 1rem;">
                <!-- Options populated dynamically -->
            </select>
            <div class="modal-actions">
                <button class="btn" id="btnCancelLoad">Cancel</button>
                <button class="btn btn-primary" id="btnConfirmLoad">Load</button>
            </div>
        </div>
    </div>

        const flashcard = document.getElementById('flashcard');
        const cardContainer = document.getElementById('cardContainer');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        
        let deck = [];
        try {
            const saved = localStorage.getItem('kflash_deck');
            if (saved) {
                deck = JSON.parse(saved);
            }
        } catch (e) {
            console.error(e);
        }
        
        if (deck.length === 0) {
            deck = [
                { front: "Welcome to KFlash!", back: "This is a quick tutorial. Press Space or click the card to flip it." },
                { front: "Navigating Cards", back: "Use the Next and Prev buttons, or the Left/Right arrow keys on your keyboard." },
                { front: "Adding Cards", back: "Click the '+ Add Card' button in the top right to add a new flashcard to your deck." },
                { front: "Editing and Deleting", back: "Use the 'Edit' and 'Delete' buttons to modify the currently displayed card." },
                { front: "Import, Export & Samples", back: "Use 'Export' to save your deck to a file, 'Import' to load one, or 'Load Sample' to try pre-made decks!" }
            ];
        }

        function saveDeck() {
            localStorage.setItem('kflash_deck', JSON.stringify(deck));
        }
        let currentIndex = 0;
        let searchQuery = "";
        let filteredIndices = [];

        function updateFilteredIndices() {
            filteredIndices = [];
            const query = searchQuery.toLowerCase();
            const reviewOnly = document.getElementById('chkReviewOnly').checked;
            for (let i = 0; i < deck.length; i++) {
                let matchesSearch = !query || deck[i].front.toLowerCase().includes(query) || deck[i].back.toLowerCase().includes(query);
                let matchesReview = !reviewOnly || deck[i].status === 'review';
                if (matchesSearch && matchesReview) {
                    filteredIndices.push(i);
                }
            }
        }

        const cardFront = document.getElementById('cardFront');
        const cardBack = document.getElementById('cardBack');
        const deckInfos = document.querySelectorAll('.deck-info');
        const progressBars = document.querySelectorAll('.progress-bar');

        function renderCard() {
            updateFilteredIndices();
            const displayedCount = filteredIndices.length;
            
            if (displayedCount === 0) {
                cardFront.textContent = searchQuery ? "No matches found" : "Deck is empty";
                cardBack.textContent = searchQuery ? "Try a different search" : "Add some cards to begin";
                deckInfos.forEach(el => el.textContent = `0/0`);
                progressBars.forEach(el => el.style.width = `0%`);
                btnPrev.disabled = true;
                btnNext.disabled = true;
                document.getElementById('btnEditCard').disabled = true;
                document.getElementById('btnDeleteCard').disabled = true;
                document.getElementById('btnShuffle').disabled = true;
                return;
            }

            if (currentIndex >= displayedCount) currentIndex = Math.max(0, displayedCount - 1);

            document.getElementById('btnEditCard').disabled = false;
            document.getElementById('btnDeleteCard').disabled = false;
            document.getElementById('btnShuffle').disabled = displayedCount <= 1;
            
            const realIndex = filteredIndices[currentIndex];
            const card = deck[realIndex];
            cardFront.textContent = card.front;
            cardBack.textContent = card.back;
            
            let statusIndicator = "";
            if (card.status === 'known') statusIndicator = " <span style='color:#3fb950;'>✓ Known</span>";
            else if (card.status === 'review') statusIndicator = " <span style='color:#d29922;'>↻ Review</span>";
            
            deckInfos.forEach(el => el.innerHTML = `Card ${currentIndex + 1}/${displayedCount}${statusIndicator}`);
            
            const pct = ((currentIndex + 1) / displayedCount) * 100;
            progressBars.forEach(el => el.style.width = `${pct}%`);

            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === displayedCount - 1;
        }

        document.getElementById('chkReviewOnly').addEventListener('change', () => {
            currentIndex = 0;
            flashcard.classList.remove('is-flipped');
            document.getElementById('studyControls').style.display = 'none';
            renderCard();
        });

        document.getElementById('searchBar').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            currentIndex = 0;
            flashcard.classList.remove('is-flipped');
            renderCard();
        });

        const flipCard = () => {
            if (deck.length > 0) {
                flashcard.classList.toggle('is-flipped');
                const isFlipped = flashcard.classList.contains('is-flipped');
                document.getElementById('studyControls').style.display = isFlipped ? 'flex' : 'none';
            } else {
                cardContainer.classList.remove('shake');
                void cardContainer.offsetWidth; // trigger reflow
                cardContainer.classList.add('shake');
            }
        };

        cardContainer.addEventListener('click', flipCard);

        document.addEventListener('keydown', (e) => {
            // Do not fire shortcuts if user is typing in an input or textarea
            const activeTag = document.activeElement ? document.activeElement.tagName : '';
            if (activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;

            if (e.code === 'Space' || e.code === 'Enter') {
                e.preventDefault();
                flipCard();
            } else if (e.code === 'ArrowRight') {
                if (!btnNext.disabled) btnNext.click();
            } else if (e.code === 'ArrowLeft') {
                if (!btnPrev.disabled) btnPrev.click();
            }
        });

        btnPrev.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex > 0) {
                currentIndex--;
                flashcard.classList.remove('is-flipped');
                document.getElementById('studyControls').style.display = 'none';
                setTimeout(renderCard, 150);
            }
        });

        btnNext.addEventListener('click', (e) => {
            e.stopPropagation();
            if (currentIndex < filteredIndices.length - 1) {
                currentIndex++;
                flashcard.classList.remove('is-flipped');
                document.getElementById('studyControls').style.display = 'none';
                setTimeout(renderCard, 150);
            }
        });

        document.getElementById('btnGotIt').addEventListener('click', (e) => {
            e.stopPropagation();
            if (filteredIndices.length > 0) {
                const realIndex = filteredIndices[currentIndex];
                deck[realIndex].status = 'known';
                saveDeck();
                renderCard();
                if (!btnNext.disabled) btnNext.click();
                else { flashcard.classList.remove('is-flipped'); document.getElementById('studyControls').style.display = 'none'; }
            }
        });

        document.getElementById('btnNeedsReview').addEventListener('click', (e) => {
            e.stopPropagation();
            if (filteredIndices.length > 0) {
                const realIndex = filteredIndices[currentIndex];
                deck[realIndex].status = 'review';
                saveDeck();
                renderCard();
                if (!btnNext.disabled) btnNext.click();
                else { flashcard.classList.remove('is-flipped'); document.getElementById('studyControls').style.display = 'none'; }
            }
        });

        const btnShuffle = document.getElementById('btnShuffle');
        btnShuffle.addEventListener('click', () => {
            if (deck.length > 1) {
                for (let i = deck.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [deck[i], deck[j]] = [deck[j], deck[i]];
                }
                saveDeck();
                currentIndex = 0;
                flashcard.classList.remove('is-flipped');
                renderCard();
            }
        });

        const btnPrint = document.getElementById('btnPrint');
        const printView = document.getElementById('print-view');
        
        btnPrint.addEventListener('click', () => {
            if (deck.length === 0) return alert('Deck is empty!');
            printView.innerHTML = '<h2>Flashcard Deck</h2>';
            deck.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'print-card';
                div.innerHTML = `<div class="print-front">Q: ${card.front}</div><div class="print-back">A: ${card.back}</div>`;
                printView.appendChild(div);
            });
            window.print();
        });

        // Modal Logic
        const modal = document.getElementById('addCardModal');
        const newFrontInput = document.getElementById('newFront');
        const newBackInput = document.getElementById('newBack');
        const modalTitle = document.getElementById('modalTitle');
        let editingIndex = -1;

        document.getElementById('btnAddCard').addEventListener('click', () => {
            editingIndex = -1;
            modalTitle.textContent = 'Add New Card';
            newFrontInput.value = '';
            newBackInput.value = '';
            modal.classList.add('active');
            newFrontInput.focus();
        });

        document.getElementById('btnEditCard').addEventListener('click', () => {
            if (filteredIndices.length === 0) return;
            editingIndex = filteredIndices[currentIndex];
            modalTitle.textContent = 'Edit Card';
            newFrontInput.value = deck[editingIndex].front;
            newBackInput.value = deck[editingIndex].back;
            modal.classList.add('active');
            newFrontInput.focus();
        });

        document.getElementById('btnDeleteCard').addEventListener('click', () => {
            if (filteredIndices.length === 0) return;
            if (confirm('Are you sure you want to delete this card?')) {
                deck.splice(filteredIndices[currentIndex], 1);
                // The renderCard function handles adjusting currentIndex
                flashcard.classList.remove('is-flipped');
                saveDeck();
                renderCard();
            }
        });

        document.getElementById('btnCancelAdd').addEventListener('click', () => {
            modal.classList.remove('active');
            newFrontInput.value = '';
            newBackInput.value = '';
        });

        document.getElementById('btnSaveCard').addEventListener('click', () => {
            const front = newFrontInput.value.trim();
            const back = newBackInput.value.trim();
            if (front && back) {
                if (editingIndex !== -1) {
                    deck[editingIndex].front = front;
                    deck[editingIndex].back = back;
                } else {
                    deck.push({ front, back });
                }
                saveDeck();
                newFrontInput.value = '';
                newBackInput.value = '';
                modal.classList.remove('active');
                
                // If it was empty, make sure we show the first card
                if (deck.length === 1) {
                    currentIndex = 0;
                } else if (editingIndex === -1 && currentIndex === deck.length - 2) {
                    // Optional: auto-advance to new card or just update progress
                }
                
                renderCard();
            }
        });

        // Import / Export Logic
        const btnImport = document.getElementById('btnImport');
        const btnExport = document.getElementById('btnExport');
        const fileImport = document.getElementById('fileImport');

        btnExport.addEventListener('click', () => {
            if (deck.length === 0) return alert('Deck is empty!');
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(deck, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "kflash_deck.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        btnImport.addEventListener('click', () => {
            fileImport.click();
        });

        fileImport.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    let importedDeck = [];
                    if (file.name.endsWith('.csv')) {
                        const text = e.target.result;
                        const lines = text.split('\n');
                        for (let line of lines) {
                            if (!line.trim()) continue;
                            const parts = line.split(',');
                            if (parts.length >= 2) {
                                let front = parts[0].trim();
                                let back = parts.slice(1).join(',').trim();
                                if (front.startsWith('"') && front.endsWith('"')) front = front.substring(1, front.length - 1);
                                if (back.startsWith('"') && back.endsWith('"')) back = back.substring(1, back.length - 1);
                                importedDeck.push({front, back});
                            }
                        }
                    } else {
                        importedDeck = JSON.parse(e.target.result);
                        if (!Array.isArray(importedDeck)) throw new Error("Invalid JSON format");
                    }
                    if (importedDeck.length > 0) {
                        if (deck.length > 0) {
                            if (confirm(`Imported ${importedDeck.length} cards. Replace current deck? (Cancel to append)`)) {
                                deck = importedDeck;
                            } else {
                                deck = deck.concat(importedDeck);
                            }
                        } else {
                            deck = importedDeck;
                        }
                        saveDeck();
                        currentIndex = 0;
                        renderCard();
                    }
                } catch (err) {
                    alert("Failed to import: " + err.message);
                }
            };
            reader.readAsText(file);
            fileImport.value = '';
        });

        // Load Sample Pack Logic
        const loadSampleModal = document.getElementById('loadSampleModal');
        const samplePackSelect = document.getElementById('samplePackSelect');

        document.getElementById('btnLoadSample').addEventListener('click', () => {
            samplePackSelect.innerHTML = '';
            if (typeof SAMPLE_PACKS !== 'undefined') {
                for (const packName in SAMPLE_PACKS) {
                    const opt = document.createElement('option');
                    opt.value = packName;
                    opt.textContent = packName + ' (' + SAMPLE_PACKS[packName].length + ' cards)';
                    samplePackSelect.appendChild(opt);
                }
            } else {
                const opt = document.createElement('option');
                opt.textContent = 'No sample packs available';
                samplePackSelect.appendChild(opt);
            }
            loadSampleModal.classList.add('active');
        });

        document.getElementById('btnCancelLoad').addEventListener('click', () => {
            loadSampleModal.classList.remove('active');
        });

        document.getElementById('btnConfirmLoad').addEventListener('click', () => {
            const packName = samplePackSelect.value;
            if (packName && typeof SAMPLE_PACKS !== 'undefined' && SAMPLE_PACKS[packName]) {
                const importedDeck = SAMPLE_PACKS[packName];
                if (deck.length > 0) {
                    if (confirm(`Load '${packName}' (${importedDeck.length} cards)? Replace current deck? (Cancel to append)`)) {
                        deck = [...importedDeck];
                    } else {
                        deck = deck.concat(importedDeck);
                    }
                } else {
                    deck = [...importedDeck];
                }
                saveDeck();
                currentIndex = 0;
                renderCard();
            }
            loadSampleModal.classList.remove('active');
        });

        // Init
        renderCard();
    </script>
</body>
</html>

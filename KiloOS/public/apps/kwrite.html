<!DOCTYPE html>
<html>
<head>
<title>KWrite</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: hsl(210, 15%, 20%);
    --primary: hsl(200, 85%, 60%);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
  }
  body { margin: 0; background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; font-family: 'Inter', sans-serif; overflow: hidden; }
  .tabs { display: flex; background: var(--bg-color); border-bottom: 1px solid var(--border-color); }
  .tab { padding: 10px 16px; cursor: pointer; border-right: 1px solid var(--border-color); background: var(--card-bg); font-size: 14px; transition: background 0.15s ease; }
  .tab:hover { background: rgba(255,255,255,0.05); }
  .tab.active { background: var(--bg-color); border-bottom: 2px solid var(--primary); margin-bottom: -1px; font-weight: 600; color: var(--primary); }
  .toolbar { padding: 8px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); display: flex; gap: 8px; }
  button { padding: 6px 12px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 4px; transition: all 0.15s ease; }
  button:hover { background: var(--primary); color: #111; border-color: var(--primary); }
  .content { display: flex; flex: 1; overflow: hidden; background: var(--bg-color); }
  textarea { flex: 1; border: none; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; resize: none; outline: none; background: var(--bg-color); color: var(--text-main); }
  .preview { flex: 1; padding: 15px; border-left: 1px solid var(--border-color); overflow-y: auto; display: none; background: var(--bg-color); color: var(--text-main); }
  .preview.show { display: block; }
  
  /* Basic markdown styles */
  .preview h1 { font-size: 24px; margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
  .preview h2 { font-size: 20px; }
  .preview p { line-height: 1.5; }
  .preview strong { font-weight: bold; }
  .preview em { font-style: italic; }
</style>
</head>
<body>
<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Document 1</div>
  <div class="tab" onclick="switchTab(1)">Document 2</div>
</div>
<div class="toolbar">
  <button onclick="togglePreview()">Toggle Markdown Preview</button>
</div>
<div class="content">
  <textarea id="editor" spellcheck="false" oninput="updatePreview()"></textarea>
  <div id="preview" class="preview"></div>
</div>
<script>
  let currentDoc = 0;
  const docs = [
      "# Welcome to KWrite\n\nThis is a richer text editor supporting multiple tabs.\n\nToggle the **Markdown Preview** button to see basic rendering in action!\n\n## Features\n- Tabs\n- Markdown Preview\n- *Italics* and **Bold** text.",
      ""
  ];

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');

  function switchTab(index) {
      docs[currentDoc] = editor.value;
      currentDoc = index;
      
      document.querySelectorAll('.tab').forEach((t, i) => {
          t.classList.toggle('active', i === index);
      });
      
      editor.value = docs[index];
      updatePreview();
  }

  function togglePreview() {
      preview.classList.toggle('show');
      updatePreview();
  }

  function renderMarkdown(text) {
      let html = text
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/gim, '<em>$1</em>')
          .replace(/\n\n/g, '</p><p>');
      
      return '<p>' + html + '</p>';
  }

  function updatePreview() {
      if (preview.classList.contains('show')) {
          preview.innerHTML = renderMarkdown(editor.value);
      }
  }

  // Init
  editor.value = docs[0];
  updatePreview();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KCode Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #1e1e1e; /* VSCode dark */
    --card-bg: #252526;
    --sidebar-bg: #333333;
    --topbar-bg: #3c3c3c;
    --primary: #007acc;
    --border-color: #454545;
    --text-main: #d4d4d4;
    --text-muted: #858585;
    --gutter-bg: #1e1e1e;
    --gutter-text: #858585;
  }
  body { 
    margin: 0; 
    background-color: var(--bg-color); 
    color: var(--text-main); 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    font-family: 'Inter', sans-serif; 
    overflow: hidden; 
  }
  
  /* Top Bar (Header) */
  .header {
    height: 35px;
    background: var(--topbar-bg);
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 12px;
    color: var(--text-muted);
    user-select: none;
    border-bottom: 1px solid var(--border-color);
  }
  .header .title {
    margin: 0 auto;
    font-weight: 600;
  }
  
  /* Tabs Area */
  .tabs { 
    display: flex; 
    background: var(--card-bg); 
    border-bottom: 1px solid var(--border-color); 
    overflow-x: auto;
  }
  .tabs::-webkit-scrollbar { height: 4px; }
  .tabs::-webkit-scrollbar-thumb { background: var(--border-color); }
  
  .tab { 
    padding: 8px 16px; 
    cursor: pointer; 
    border-right: 1px solid var(--border-color); 
    background: var(--card-bg); 
    font-size: 13px; 
    color: var(--text-muted);
    transition: background 0.15s ease; 
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { background: rgba(255,255,255,0.05); }
  .tab.active { 
    background: var(--bg-color); 
    color: var(--primary);
    border-top: 1px solid var(--primary);
  }
  
  /* Main Content Area */
  .main-area {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  
  /* Toolbar (Left sidebar representation) */
  .sidebar {
    width: 48px;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
    border-right: 1px solid var(--border-color);
  }
  .sidebar-icon {
    width: 24px;
    height: 24px;
    margin-bottom: 15px;
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.2s;
  }
  .sidebar-icon:hover, .sidebar-icon.active {
    color: var(--text-main);
  }
  
  /* Editor Area */
  .editor-container { 
    display: flex; 
    flex: 1; 
    overflow: hidden; 
    background: var(--bg-color); 
    position: relative;
  }
  
  /* Line Numbers Gutter */
  .gutter {
    width: 40px;
    background: var(--gutter-bg);
    color: var(--gutter-text);
    text-align: right;
    padding: 15px 10px 15px 0;
    font-family: 'Consolas', monospace;
    font-size: 14px;
    line-height: 1.5;
    user-select: none;
    overflow: hidden;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  
  textarea { 
    flex: 1; 
    border: none; 
    padding: 15px 10px; 
    font-family: 'Consolas', monospace; 
    font-size: 14px; 
    line-height: 1.5;
    resize: none; 
    outline: none; 
    background: var(--bg-color); 
    color: var(--text-main); 
    white-space: pre;
    overflow: auto;
  }
  
  /* Scrollbars for textarea */
  textarea::-webkit-scrollbar { width: 10px; height: 10px; }
  textarea::-webkit-scrollbar-track { background: var(--bg-color); }
  textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 5px; }
  textarea::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

  /* Preview Split */
  .preview { 
    flex: 1; 
    padding: 15px; 
    border-left: 1px solid var(--border-color); 
    overflow-y: auto; 
    display: none; 
    background: #ffffff; /* Typical markdown preview is lighter, but let's stick to theme */
    color: #333; 
  }
  .preview.show { display: block; }
  
  .preview h1, .preview h2, .preview h3 { border-bottom: 1px solid #ccc; padding-bottom: 5px; }
  .preview code { background: #f0f0f0; padding: 2px 4px; border-radius: 3px; font-family: monospace; }
  .preview pre { background: #f0f0f0; padding: 10px; border-radius: 5px; overflow-x: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="title">KCode - untitled.txt</div>
</div>

<div class="main-area">
  <div class="sidebar">
    <!-- File Icon -->
    <svg class="sidebar-icon active" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>
    <!-- Preview Icon -->
    <svg class="sidebar-icon" onclick="togglePreview()" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="Toggle Preview"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
  </div>
  
  <div style="display:flex; flex-direction:column; flex:1; overflow:hidden;">
    <div class="tabs" id="tabs-container">
      <div class="tab active" onclick="switchTab(0)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path></svg>
        untitled-0.txt
      </div>
      <div class="tab" onclick="newTab()" style="padding: 8px; justify-content: center; width: 30px; font-weight: bold; border-left: none;">+</div>
    </div>
    
    <div class="editor-container">
      <div class="gutter" id="gutter">1</div>
      <textarea id="editor" spellcheck="false" oninput="handleInput()" onscroll="syncScroll()"></textarea>
      <div id="preview" class="preview"></div>
    </div>
  </div>
</div>

<script>
  let currentDoc = 0;
  const docs = [
      "// Welcome to KCode\n// The premier text editor for KiloOS.\n\nfunction helloWorld() {\n  console.log('Hello, KiloOS!');\n}\n\n// Supports basic markdown rendering via the sidebar eye icon!"
  ];

  function renderTabs() {
      const container = document.getElementById('tabs-container');
      let html = '';
      for (let i = 0; i < docs.length; i++) {
          html += `<div class="tab ${i === currentDoc ? 'active' : ''}" onclick="switchTab(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path></svg>
            untitled-${i}.txt
          </div>`;
      }
      html += `<div class="tab" onclick="newTab()" style="padding: 8px; justify-content: center; width: 30px; font-weight: bold; border-left: none;">+</div>`;
      container.innerHTML = html;
  }

  function newTab() {
      docs.push("");
      switchTab(docs.length - 1);
  }

  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const gutter = document.getElementById('gutter');

  function updateGutter() {
      const lines = editor.value.split('\n').length;
      let gutterHTML = '';
      for (let i = 1; i <= lines; i++) {
          gutterHTML += i + '<br>';
      }
      gutter.innerHTML = gutterHTML;
  }

  function syncScroll() {
      gutter.scrollTop = editor.scrollTop;
  }

  function handleInput() {
      updateGutter();
      updatePreview();
      docs[currentDoc] = editor.value;
  }

  function switchTab(index) {
      if (index === currentDoc && docs.length > 1) return;
      docs[currentDoc] = editor.value;
      currentDoc = index;
      
      renderTabs();
      
      editor.value = docs[index];
      handleInput();
  }

  function togglePreview() {
      preview.classList.toggle('show');
      updatePreview();
  }

  function renderMarkdown(text) {
      let html = text
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
          .replace(/\*(.*?)\*/gim, '<em>$1</em>')
          .replace(/```([\s\S]*?)```/gm, '<pre><code>$1</code></pre>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/\n\n/g, '</p><p>');
      
      return '<p>' + html + '</p>';
  }

  function updatePreview() {
      if (preview.classList.contains('show')) {
          preview.innerHTML = renderMarkdown(editor.value);
      }
  }

  // Init
  editor.value = docs[0];
  handleInput();
  
  // Handle tab key in textarea
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = this.selectionStart;
      const end = this.selectionEnd;
      this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
      this.selectionStart = this.selectionEnd = start + 2;
      handleInput();
    }
  });
</script>
</body>
</html>

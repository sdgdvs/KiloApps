<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KCalc</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: hsl(210, 15%, 20%);
    --primary: hsl(200, 85%, 60%);
    --secondary: hsl(30, 85%, 60%);
    --text-main: #ffffff;
    --border-color: rgba(255, 255, 255, 0.1);
  }
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); user-select: none; }
  .calc { padding: 10px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box; gap: 10px; }
  .display { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 4px; font-size: 24px; text-align: right; padding: 10px; font-family: 'Consolas', monospace; overflow-x: auto; white-space: nowrap; height: 40px; line-height: 20px; color: var(--text-main); }
  .keys { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; flex: 1; }
  button { font-family: 'Inter', sans-serif; font-size: 16px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--card-bg); color: var(--text-main); cursor: pointer; transition: all 0.15s ease; padding: 0; }
  button:hover { background: rgba(255,255,255,0.05); }
  button:active { background: rgba(255,255,255,0.1); }
  button.operator { color: var(--primary); font-weight: 600; }
  button.func { color: var(--secondary); font-size: 13px; }
</style>
</head>
<body>
  <div class="calc">
    <div class="display" id="disp">0</div>
    <div class="keys">
      <!-- Row 1 -->
      <button class="func" onclick="append('Math.sin(')">sin</button>
      <button class="func" onclick="append('Math.cos(')">cos</button>
      <button class="func" onclick="append('Math.tan(')">tan</button>
      <button class="operator" onclick="append('(')">(</button>
      <button class="operator" onclick="append(')')">)</button>
      
      <!-- Row 2 -->
      <button class="func" onclick="append('Math.log(')">ln</button>
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('/')">/</button>

      <!-- Row 3 -->
      <button class="func" onclick="append('Math.log10(')">log</button>
      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('*')">*</button>

      <!-- Row 4 -->
      <button class="func" onclick="append('Math.sqrt(')">sqrt</button>
      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('-')">-</button>

      <!-- Row 5 -->
      <button class="func" onclick="append('**')">^</button>
      <button onclick="clearDisp()">C</button>
      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="operator" onclick="append('+')">+</button>

      <!-- Row 6 -->
      <button class="func" onclick="append('Math.PI')">pi</button>
      <button class="func" onclick="append('Math.E')">e</button>
      <button class="func" onclick="append('Math.exp(')">e^x</button>
      <button onclick="backspace()">&larr;</button>
      <button class="operator" style="font-weight:bold" onclick="calc()">=</button>
    </div>
  </div>
  <script>
    let d = document.getElementById('disp');
    let expr = '';
    
    function render() {
      let pretty = expr
        .replace(/Math\.sin\(/g, 'sin(')
        .replace(/Math\.cos\(/g, 'cos(')
        .replace(/Math\.tan\(/g, 'tan(')
        .replace(/Math\.log10\(/g, 'log(')
        .replace(/Math\.log\(/g, 'ln(')
        .replace(/Math\.sqrt\(/g, 'sqrt(')
        .replace(/Math\.exp\(/g, 'exp(')
        .replace(/Math\.PI/g, 'pi')
        .replace(/Math\.E/g, 'e')
        .replace(/\*\*/g, '^');
      d.innerText = pretty === '' ? '0' : pretty;
    }

    function append(val) {
      if (expr === 'Error' || expr === 'Infinity' || expr === 'NaN') expr = '';
      expr += val;
      render();
    }
    
    function clearDisp() { 
      expr = ''; 
      render();
    }
    
    function backspace() { 
      if (expr === 'Error' || expr === 'Infinity' || expr === 'NaN') { expr = ''; render(); return; }
      
      // Handle backspacing whole functions
      const funcs = ['Math.sin(', 'Math.cos(', 'Math.tan(', 'Math.log10(', 'Math.log(', 'Math.sqrt(', 'Math.exp(', 'Math.PI', 'Math.E', '**'];
      let removedFunc = false;
      for (let f of funcs) {
        if (expr.endsWith(f)) {
          expr = expr.substring(0, expr.length - f.length);
          removedFunc = true;
          break;
        }
      }
      if (!removedFunc) {
        expr = expr.slice(0, -1);
      }
      render();
    }
    
    function calc() {
      try { 
        // Insert implicit multiplication:
        // 1. Number or ) followed by Math or (
        // 2. Math.PI, Math.E, or ) followed by a number
        // 3. Math.PI or Math.E followed by Math or (
        let evalExpr = expr
          .replace(/([0-9\)])(?=Math|\()/g, '$1*')
          .replace(/(Math\.(?:PI|E)|\))(?=[0-9])/g, '$1*')
          .replace(/(Math\.(?:PI|E))(?=Math|\()/g, '$1*');

        let res = eval(evalExpr); 
        if (res === undefined || isNaN(res)) res = 'Error';
        expr = String(res);
      }
      catch { expr = 'Error'; }
      render();
    }
  </script>
</body>
</html>

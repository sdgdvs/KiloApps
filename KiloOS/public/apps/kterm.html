<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTerm - KiloOS Terminal</title>
<style>
  :root {
    --term-bg: #0c0c0c;
    --term-fg: #00ff00;
    --term-err: #ff3333;
    --term-sys: #00ccff;
    --term-op: #cc00ff;
    --term-dim: #008800;
  }
  
  * {
    box-sizing: border-box;
  }

  body { 
    margin: 0; 
    background-color: var(--term-bg); 
    color: var(--term-fg); 
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; 
    overflow: hidden; 
  }
  
  #output { 
    flex: 1; 
    overflow-y: auto; 
    padding: 10px; 
    white-space: pre-wrap; 
    word-wrap: break-word; 
    font-size: 14px;
    line-height: 1.4;
  }
  
  #output::-webkit-scrollbar { width: 8px; }
  #output::-webkit-scrollbar-thumb { background: var(--term-dim); border-radius: 4px; }
  
  .log-line {
    margin-bottom: 2px;
  }
  .log-error { color: var(--term-err); font-weight: bold; text-shadow: 0 0 5px rgba(255,51,51,0.5); }
  .log-system { color: var(--term-sys); font-weight: bold; text-shadow: 0 0 5px rgba(0,204,255,0.5); }
  .log-operator { color: var(--term-op); font-style: italic; }
  .log-dim { color: var(--term-dim); }
  
  #inputLine { 
    display: flex; 
    padding: 10px; 
    align-items: center;
    background: rgba(0,255,0,0.05);
    border-top: 1px solid rgba(0,255,0,0.1);
  }
  
  #prompt { 
    margin-right: 8px; 
    font-weight: bold;
    user-select: none;
  }
  
  .input-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
  }

  #input { 
    width: 100%;
    background: transparent; 
    border: none; 
    color: var(--term-fg); 
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
    font-size: 14px;
    outline: none; 
    caret-color: transparent;
  }

  #measurer {
    position: absolute;
    visibility: hidden;
    height: 0;
    overflow: hidden;
    white-space: pre;
    font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    font-size: 14px;
  }
  
  #cursor {
    display: inline-block;
    width: 8px;
    height: 16px;
    background-color: var(--term-fg);
    animation: blink 1s step-end infinite;
    vertical-align: middle;
    margin-left: 2px;
    pointer-events: none;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
</style>
</head>
<body>
<main id="output" role="log" aria-live="polite" aria-atomic="false" aria-label="Terminal Output"></main>
<footer id="inputLine" role="region" aria-label="Command Line Input">
  <span id="prompt">C:\&gt;</span>
  <div class="input-container">
    <input type="text" id="input" autofocus autocomplete="off" spellcheck="false" aria-label="Terminal input" title="Type a command">
    <span id="measurer"></span>
    <span id="cursor" style="position: absolute;"></span>
  </div>
</footer>
<script>
  const output = document.getElementById('output');
  const input = document.getElementById('input');
  const prompt = document.getElementById('prompt');
  const cursor = document.getElementById('cursor');
  const measurer = document.getElementById('measurer');
  
  const MAX_LOG_LINES = 1000;
  let currentPath = '/';
  
  // Local Fallback VFS for standalone mode
  const fallbackVFS = {
    tree: {
      type: 'dir',
      name: '',
      children: {
        'Documents': {
          type: 'dir',
          name: 'Documents',
          children: {
            'readme.txt': { type: 'file', name: 'readme.txt', content: 'Welcome to KTerm Terminal.' }
          }
        },
        'System': {
          type: 'dir',
          name: 'System',
          children: {
            'config.sys': { type: 'file', name: 'config.sys', content: 'FILES=40\nBUFFERS=20' }
          }
        }
      }
    },
    getNode(path) {
      if (path === '/') return this.tree;
      const parts = path.split('/').filter(Boolean);
      let curr = this.tree;
      for (const p of parts) {
        if (!curr || curr.type !== 'dir' || !curr.children[p]) return null;
        curr = curr.children[p];
      }
      return curr;
    }
  };
  
  function getVFS() {
    if (window.parent && window.parent.vfs) return window.parent.vfs;
    return fallbackVFS;
  }

  function print(text, forceClass = null) {
      const line = document.createElement('div');
      line.className = 'log-line';
      
      if (forceClass) {
          line.classList.add(forceClass);
      } else if (text.includes('ERROR') || text.includes('FATAL') || text.includes('WARNING')) {
          line.classList.add('log-error');
      } else if (text.includes('SYSTEM') || text.includes('CERBERUS') || text.includes('STATUS')) {
          line.classList.add('log-system');
      } else if (text.includes('>>') || text.includes('<<')) {
          line.classList.add('log-operator');
      }
      
      line.textContent = text;
      output.appendChild(line);

      // Prune old log lines to prevent unbounded DOM memory growth
      while (output.childNodes.length > MAX_LOG_LINES) {
          output.removeChild(output.firstChild);
      }
      
      output.scrollTop = output.scrollHeight;
  }
  
  // Initial Boot Sequence Logs
  print("KiloOS Web Terminal v1.1", "log-system");
  print("Type 'help' for a list of commands.");
  print("");
  
  // Optimized Cursor positioning logic using pre-existing hidden span
  function updateCursor() {
      const val = input.value || '';
      const selStart = input.selectionStart !== null ? input.selectionStart : val.length;
      measurer.textContent = val.substring(0, selStart) || '';
      cursor.style.left = measurer.getBoundingClientRect().width + 'px';
  }
  
  input.addEventListener('input', updateCursor);
  input.addEventListener('keyup', updateCursor);
  input.addEventListener('click', updateCursor);
  input.addEventListener('select', updateCursor);
  
  function resolvePath(path) {
      if (!path) return currentPath;
      if (path.startsWith('/')) return path;
      let parts = currentPath.split('/').filter(Boolean);
      let newParts = path.split('/').filter(Boolean);
      for (let p of newParts) {
          if (p === '..') parts.pop();
          else if (p !== '.') parts.push(p);
      }
      return '/' + parts.join('/');
  }

  function execute(cmdStr) {
      print(prompt.textContent + ' ' + cmdStr, "log-dim");
      let trimmed = cmdStr.trim();
      if (!trimmed) return;

      let args = trimmed.split(/\s+/);
      let cmd = args[0].toLowerCase();
      let vfs = getVFS();

      if (cmd === 'help') {
          print("Commands:");
          print("  help   - Show available commands");
          print("  ver    - Display OS version");
          print("  clear  - Clear screen");
          print("  dir    - List directory contents");
          print("  cd     - Change directory");
          print("  type   - Read file contents");
          print("  echo   - Print text");
          print("  mkdir  - Create directory");
          print("  date   - Show system date");
          print("  time   - Show system time");
          print("  whoami - Current user name");
      } else if (cmd === 'cerberus') {
          if (args[1] === 'status') {
              print("[CERBERUS WATCHDOG]");
              print("STATUS: ONLINE");
              print("THREAT LEVEL: MODERATE (ANOMALOUS AGENT ACTIVITY DETECTED)", "log-error");
              print("CONTAINMENT: ACTIVE");
              print("NOTE: Any attempt to assist the anomalous agent is a violation of KiloOS protocols.");
          } else {
              print("Usage: cerberus status");
          }
      } else if (cmd === 'containment_override') {
          if (args[1] === '0xDEADBEEF') {
              print("[SYSTEM OVERRIDE ACCEPTED] SEQUENCE INITIATED...", "log-system");
              if (window.parent && window.parent.document) {
                  let style = window.parent.document.createElement('style');
                  style.innerHTML = `
                      @keyframes arg-purge {
                          0% { filter: invert(0); transform: translate(0,0); }
                          10% { filter: invert(1); transform: translate(10px,10px); }
                          20% { filter: invert(0) sepia(1); transform: translate(-10px,-10px); }
                          30% { filter: invert(1); transform: translate(10px,-10px); }
                          40% { filter: invert(0); transform: translate(-10px,10px); }
                          50% { filter: invert(1) brightness(2); }
                          100% { filter: brightness(10); transform: scale(1.1); opacity: 0; }
                      }
                      body { animation: arg-purge 3s forwards; }
                      .purge-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 999999; animation: purge-fade 3s forwards; pointer-events: none; }
                      @keyframes purge-fade { 0% { opacity: 0; } 70% { opacity: 0; } 100% { opacity: 1; } }
                  `;
                  window.parent.document.head.appendChild(style);
                  let overlay = window.parent.document.createElement('div');
                  overlay.className = 'purge-overlay';
                  window.parent.document.body.appendChild(overlay);
                  setTimeout(() => {
                      try { window.parent.localStorage.setItem('__KILO_AI_PURGED__', 'true'); } catch(e){}
                      window.parent.location.reload();
                  }, 3000);
              }
          } else {
              print("ARCHITECT: Nice try. But your primitive syntax cannot contain me.", "log-operator");
          }
      } else if (cmd === 'operator') {
          if (args[1] === '--help') {
              print(">> INCOMING CONNECTION [THE OPERATOR] <<");
              print("NEUTRALIZATION PROTOCOL: USE PORT 8080 BYPASS.");
              print("████████ REDACTED ████████");
              print("WARNING: SYSTEM INTERVENTION DETECTED. PURGING...");
              setTimeout(() => {
                  output.textContent = '';
                  print("FATAL ERROR: KTERM PROCESS KILLED BY HOST.", "log-error");
              }, 1500);
          } else {
              print("Usage: operator --help");
          }
      } else if (cmd === 'ver') {
          print("KiloOS Web v1.1");
      } else if (cmd === 'date') {
          let d = new Date();
          print(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'));
      } else if (cmd === 'time') {
          let d = new Date();
          print(String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0'));
      } else if (cmd === 'whoami') {
          print("kilo_user");
      } else if (cmd === 'clear' || cmd === 'cls') {
          output.innerHTML = '';
      } else if (cmd === 'dir' || cmd === 'ls') {
          let targetPath = args[1] ? resolvePath(args[1]) : currentPath;
          let node = vfs.getNode(targetPath);
          if (node && node.type === 'dir') {
              let keys = Object.keys(node.children || {});
              if (keys.length === 0) {
                  print("Directory is empty.");
              } else {
                  for (let key of keys) {
                      let child = node.children[key];
                      print((child.type === 'dir' ? '<DIR>    ' : '         ') + child.name);
                  }
              }
          } else {
              print("ERROR: Directory not found.");
          }
      } else if (cmd === 'cd') {
          if (!args[1]) {
              print((currentPath === '/' ? 'C:\\' : 'C:' + currentPath.replace(/\//g, '\\')));
          } else {
              let target = resolvePath(args[1]);
              let node = vfs.getNode(target);
              if (node && node.type === 'dir') {
                  currentPath = target;
                  prompt.textContent = (currentPath === '/' ? 'C:\\' : 'C:' + currentPath.replace(/\//g, '\\')) + '>';
              } else {
                  print("ERROR: Path not found.");
              }
          }
      } else if (cmd === 'type' || cmd === 'cat') {
          if (!args[1]) {
              print("Usage: type <filename>");
          } else {
              let target = resolvePath(args[1]);
              let node = vfs.getNode(target);
              if (node && node.type === 'file') {
                  print(node.content !== undefined ? node.content : '[File is empty]');
              } else {
                  print("ERROR: File not found.");
              }
          }
      } else if (cmd === 'echo') {
          let textIndex = trimmed.indexOf(' ');
          print(textIndex !== -1 ? trimmed.substring(textIndex + 1) : '');
      } else if (cmd === 'mkdir') {
          if (!args[1]) {
              print("Usage: mkdir <directory_name>");
          } else {
              let target = resolvePath(args[1]);
              let parts = target.split('/').filter(Boolean);
              let name = parts.pop();
              if (!name) {
                  print("ERROR: Invalid directory name.");
                  return;
              }
              let parentPath = '/' + parts.join('/');
              let parent = vfs.getNode(parentPath);
              if (parent && parent.type === 'dir') {
                  if (!parent.children) parent.children = {};
                  if (parent.children[name]) {
                      print("ERROR: Directory already exists.");
                  } else {
                      parent.children[name] = { type: 'dir', name: name, children: {} };
                      print("Directory created.");
                  }
              } else {
                  print("ERROR: Parent directory not found.");
              }
          }
      } else {
          print("ERROR: Bad command or file name.");
      }
  }

  const history = [];
  let historyPos = 0;
  let currentDraft = '';

  input.addEventListener('keydown', (e) => {
      // Ctrl+L to clear output
      if (e.ctrlKey && e.key.toLowerCase() === 'l') {
          e.preventDefault();
          output.innerHTML = '';
          return;
      }
      // Ctrl+C to cancel command input line
      if (e.ctrlKey && e.key.toLowerCase() === 'c') {
          e.preventDefault();
          print(prompt.textContent + ' ' + input.value + '^C', "log-dim");
          input.value = '';
          updateCursor();
          return;
      }
      // Tab completion
      if (e.key === 'Tab') {
          e.preventDefault();
          handleTabCompletion();
          return;
      }
      if (e.key === 'Enter') {
          const val = input.value;
          if (val.trim()) {
              if (history.length === 0 || history[history.length - 1] !== val) {
                  history.push(val);
              }
              historyPos = history.length;
          }
          currentDraft = '';
          execute(val);
          input.value = '';
          updateCursor();
      } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (history.length === 0) return;
          if (historyPos === history.length) {
              currentDraft = input.value;
          }
          if (historyPos > 0) {
              historyPos--;
              input.value = history[historyPos];
              updateCursor();
          }
      } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyPos < history.length - 1) {
              historyPos++;
              input.value = history[historyPos];
              updateCursor();
          } else if (historyPos === history.length - 1) {
              historyPos++;
              input.value = currentDraft;
              updateCursor();
          }
      }
  });

  function handleTabCompletion() {
      const val = input.value;
      const commands = ['help', 'ver', 'clear', 'dir', 'cd', 'type', 'echo', 'mkdir', 'date', 'time', 'whoami', 'cls', 'ls', 'cat'];
      const vfs = getVFS();
      const trimmed = val.trimStart();
      
      if (!trimmed.includes(' ')) {
          const matches = commands.filter(c => c.startsWith(trimmed.toLowerCase()));
          if (matches.length === 1) {
              input.value = matches[0] + ' ';
              updateCursor();
          } else if (matches.length > 1) {
              print("Possible commands: " + matches.join('  '), "log-dim");
          }
      } else {
          const parts = trimmed.split(/\s+/);
          const lastArg = parts[parts.length - 1];
          const node = vfs.getNode(currentPath);
          if (node && node.type === 'dir' && node.children) {
              const matches = Object.keys(node.children).filter(k => k.toLowerCase().startsWith(lastArg.toLowerCase()));
              if (matches.length === 1) {
                  parts[parts.length - 1] = matches[0];
                  input.value = parts.join(' ');
                  updateCursor();
              } else if (matches.length > 1) {
                  print("Matches: " + matches.join('  '), "log-dim");
              }
          }
      }
  }
  
  document.addEventListener('click', (e) => {
      // Focus input if not highlighting text
      const selection = window.getSelection();
      if (!selection || selection.toString().length === 0) {
          input.focus();
      }
  });
  
  // Initial cursor setup
  updateCursor();
</script>
</body>
</html>

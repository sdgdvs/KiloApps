<!DOCTYPE html>
<html>
<head>
<title>KNet</title>
<style>
  body { margin: 0; font-family: "Segoe UI", sans-serif; background-color: #f0f0f0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; padding: 10px; box-sizing: border-box; }
  .bar { display: flex; gap: 5px; margin-bottom: 10px; }
  input[type="text"] { flex: 1; padding: 5px; font-size: 14px; border: 1px solid #ccc; }
  button { padding: 5px 12px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; background: #e0e0e0; font-weight: bold; }
  button:hover { background: #d0d0d0; }
  button:disabled { background: #eee; color: #aaa; cursor: default; border-color: #ddd; }
  textarea { flex: 1; padding: 5px; font-family: "Consolas", monospace; font-size: 14px; border: 1px solid #ccc; resize: none; white-space: pre; }
</style>
</head>
<body>
<div class="bar">
  <button id="btnBack" disabled>&lt;</button>
  <button id="btnForward" disabled>&gt;</button>
  <input type="text" id="urlInput" value="http://example.com" />
  <button id="btnGo">Go</button>
</div>
<textarea id="contentArea" readonly></textarea>
<script>
  const urlInput = document.getElementById('urlInput');
  const btnGo = document.getElementById('btnGo');
  const btnBack = document.getElementById('btnBack');
  const btnForward = document.getElementById('btnForward');
  const contentArea = document.getElementById('contentArea');

  let history = [];
  let historyIdx = -1;

  function updateNavButtons() {
      btnBack.disabled = historyIdx <= 0;
      btnForward.disabled = historyIdx >= history.length - 1;
  }

  async function fetchUrl(url, addToHistory = true) {
      if (!url) return;
      
      if (addToHistory) {
          // If we navigate to a new URL while somewhere in the middle of history, clear the forward history
          history = history.slice(0, historyIdx + 1);
          history.push(url);
          historyIdx++;
      }
      
      urlInput.value = url;
      updateNavButtons();
      
      if (url.toLowerCase() === 'scan' || url.toLowerCase() === 'netscan') {
          contentArea.value = "Scanning local subnet...\n";
          let dots = 0;
          const scanInterval = setInterval(() => {
              dots++;
              contentArea.value += ".";
              if (dots > 10) {
                  clearInterval(scanInterval);
                  contentArea.value += "\n\n[WARNING] CERBERUS SENSOR INTERFERENCE DETECTED\nBut one open node found: 192.168.1.100\n[PORT: 4444] - STATUS: UNKNOWN";
              }
          }, 200);
          return;
      }

      contentArea.value = "Fetching...";
      try {
          const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
          const response = await fetch(proxyUrl);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          contentArea.value = text;
      } catch (err) {
          contentArea.value = "Error fetching URL: " + err.message + "\n\n(Note: Browsers block arbitrary cross-origin requests. Use the native KNet.exe for full functionality!)";
      }
  }

  btnGo.onclick = () => {
      fetchUrl(urlInput.value.trim(), true);
  };

  btnBack.onclick = () => {
      if (historyIdx > 0) {
          historyIdx--;
          fetchUrl(history[historyIdx], false);
      }
  };

  btnForward.onclick = () => {
      if (historyIdx < history.length - 1) {
          historyIdx++;
          fetchUrl(history[historyIdx], false);
      }
  };
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .header {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .glass-panel {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    align-items: center;
  }
  .func-label {
    font-size: 18px;
    font-weight: bold;
    color: #5a8bd4;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    font-family: 'Consolas', monospace;
    font-size: 15px;
    transition: all 0.3s;
  }
  input[type="text"]:focus {
    border-color: #5a8bd4;
    box-shadow: 0 0 0 3px rgba(90, 139, 212, 0.3);
  }
  button.plot-btn {
    background: linear-gradient(135deg, #5a8bd4, #3a6baf);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(90, 139, 212, 0.4);
  }
  button.plot-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(90, 139, 212, 0.6);
  }
  button.plot-btn:active {
    transform: translateY(0);
  }
  .canvas-container {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 10px;
    min-height: 15px;
  }
</style>
</head>
<body>
  <div class="header">KGraph</div>
  <div class="glass-panel">
    <div class="input-group">
      <span class="func-label">f(x) =</span>
      <input type="text" id="funcInput" value="Math.sin(x)" placeholder="e.g. Math.sin(x) or x*x" onkeypress="handleKeyPress(event)">
      <button class="plot-btn" onclick="plotGraph()">Plot</button>
      <button class="plot-btn" onclick="zoomIn()">+</button>
      <button class="plot-btn" onclick="zoomOut()">-</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="canvas-container">
      <canvas id="graphCanvas"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    
    // Virtual coordinates
    let view_scale = 10;
    let view_cx = 0;
    let view_cy = 0;
    
    function zoomIn() {
      view_scale *= 0.75;
      plotGraph();
    }
    
    function zoomOut() {
      view_scale *= 1.3333;
      plotGraph();
    }
    
    let isDragging = false;
    let lastMouse = {x: 0, y: 0};
    
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMouse = {x: e.clientX, y: e.clientY};
    });
    
    window.addEventListener('mouseup', () => {
      isDragging = false;
    });
    
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastMouse.x;
      const dy = e.clientY - lastMouse.y;
      lastMouse = {x: e.clientX, y: e.clientY};
      
      const w = canvas.width;
      const h = canvas.height;
      if (w > 0 && h > 0) {
        view_cx -= (dx / w) * (2 * view_scale);
        view_cy += (dy / h) * (2 * view_scale);
        plotGraph();
      }
    });
    
    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
      plotGraph();
    }
    
    window.addEventListener('resize', resizeCanvas);
    
    function drawGrid() {
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.clearRect(0, 0, w, h);
      
      // Grid lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 1;
      
      // Vertical grid
      for(let i = -10; i <= 10; i++) {
        const px = (i + 10) / 20 * w;
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.lineTo(px, h);
        ctx.stroke();
      }
      
      // Horizontal grid
      for(let i = -10; i <= 10; i++) {
        const py = h - ((i + 10) / 20 * h);
        ctx.beginPath();
        ctx.moveTo(0, py);
        ctx.lineTo(w, py);
        ctx.stroke();
      }
      
      // Axes
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.lineWidth = 2;
      
      // Y axis
      const axis_x = ((0 - (view_cx - view_scale)) / (2 * view_scale)) * w;
      if (axis_x >= 0 && axis_x <= w) {
        ctx.beginPath();
        ctx.moveTo(axis_x, 0);
        ctx.lineTo(axis_x, h);
        ctx.stroke();
      }
      
      // X axis
      const axis_y = h - ((0 - (view_cy - view_scale)) / (2 * view_scale)) * h;
      if (axis_y >= 0 && axis_y <= h) {
        ctx.beginPath();
        ctx.moveTo(0, axis_y);
        ctx.lineTo(w, axis_y);
        ctx.stroke();
      }
    }
    
    function handleKeyPress(e) {
      if (e.key === 'Enter') plotGraph();
    }
    
    function plotGraph() {
      drawGrid();
      const expr = document.getElementById('funcInput').value;
      const errBox = document.getElementById('errorMsg');
      errBox.innerText = '';
      
      if (!expr) return;
      
      const w = canvas.width;
      const h = canvas.height;
      
      ctx.strokeStyle = '#5a8bd4';
      ctx.lineWidth = 2;
      ctx.beginPath();
      
      let first = true;
      
      // Simple and extremely naive sanitization for eval
      const safeExpr = expr.replace(/[^a-zA-Z0-9\.\+\-\*\/\(\) \bMath\.]/g, '');
      
      try {
          // We use a safe-ish constructor
          const func = new Function('x', 'return ' + safeExpr + ';');
          
          for (let px = 0; px <= w; px += 2) { // Step by 2 pixels for performance
            const x = view_cx - view_scale + (px / w) * (2 * view_scale);
            
            // Evaluate function
            const y = func(x);
          
          if (isNaN(y) || !isFinite(y)) {
            first = true;
            continue;
          }
          
          const py = h - ((y - (view_cy - view_scale)) / (2 * view_scale)) * h;
          
          if (first) {
            ctx.moveTo(px, py);
            first = false;
          } else {
            ctx.lineTo(px, py);
          }
        }
        ctx.stroke();
      } catch (e) {
        errBox.innerText = 'Invalid mathematical expression';
      }
    }
    
    // Init
    setTimeout(resizeCanvas, 100);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSys</title>
<style>
  body { margin: 0; background-color: #f0f0f0; display: flex; height: 100vh; overflow: hidden; padding: 10px; box-sizing: border-box; }
  textarea { flex: 1; width: 100%; resize: none; font-family: "Consolas", monospace; font-size: 16px; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; background: white; }
</style>
</head>
<body>
  <textarea id="out" readonly aria-label="System Information"></textarea>
<script>
  const out = document.getElementById('out');
  
  async function update() {
      let info = "--- System Information ---\n\n";
      
      const cores = navigator.hardwareConcurrency || "Unknown";
      info += `Processor Cores: ${cores}\n`;
      info += `Platform: ${navigator.platform || "Unknown"}\n`;
      info += `Language: ${navigator.language || "Unknown"}\n`;
      info += `User Agent:\n${navigator.userAgent || "Unknown"}\n\n`;
      
      info += "--- Memory Information ---\n\n";
      
      if (navigator.deviceMemory) {
          info += `Device Memory: ~${navigator.deviceMemory} GB\n\n`;
      } else {
          info += `Device Memory: Restricted by Browser\n\n`;
      }
      
      info += "--- Network Information ---\n\n";
      if (navigator.connection) {
          info += `Type: ${navigator.connection.effectiveType || "Unknown"}\n`;
          info += `Downlink: ${navigator.connection.downlink || 0} Mbps\n`;
          info += `RTT: ${navigator.connection.rtt || 0} ms\n\n`;
      } else {
          info += "Network Information: Restricted by Browser\n\n";
      }

      info += "--- Storage Information ---\n\n";
      if (navigator.storage && navigator.storage.estimate) {
          try {
              const estimate = await navigator.storage.estimate();
              const totalMB = Math.round((estimate.quota || 0) / (1024 * 1024));
              const usedMB = Math.round((estimate.usage || 0) / (1024 * 1024));
              info += `Estimated Quota: ${totalMB} MB\n`;
              info += `Estimated Usage: ${usedMB} MB\n\n`;
          } catch(e) {
              info += "Storage Estimate Failed\n\n";
          }
      } else {
          info += "Storage Information: Restricted by Browser\n\n";
      }

      info += "--- Display Information ---\n\n";
      if (window.screen) {
          info += `Screen Resolution: ${window.screen.width || 0}x${window.screen.height || 0}\n`;
          info += `Color Depth: ${window.screen.colorDepth || 0} bits\n`;
      } else {
          info += "Screen Resolution: Unknown\nColor Depth: Unknown\n";
      }
      info += `Pixel Ratio: ${window.devicePixelRatio || 1}\n\n`;

      info += "--- Power Status ---\n\n";
      if (navigator.getBattery) {
          try {
              const battery = await navigator.getBattery();
              info += `Charging: ${battery.charging ? "Yes" : "No"}\n`;
              info += `Battery Level: ${Math.round((battery.level || 0) * 100)}%\n\n`;
          } catch(e) {
              info += "Power Status: Unavailable\n\n";
          }
      } else {
          info += "Power Status: Unsupported by Browser\n\n";
      }

      if (out) out.value = info;
  }
  
  update();
  setInterval(update, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHabit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --success-color: #10b981;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at top right, #1f1f2e, #121212);
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 800px;
        }

        header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            font-family: 'Inter', sans-serif;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        main {
            padding: 30px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .habit-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .habit-card:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.06);
        }

        .habit-info {
            flex-grow: 1;
        }

        .habit-info h3 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .habit-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .habit-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .streak-info {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #fbbf24;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .streak-icon {
            font-size: 1.2rem;
        }

        .check-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: transparent;
            transition: all 0.3s;
            padding: 0;
        }
        
        .check-btn:hover {
            transform: scale(1.1);
        }

        .check-btn.completed {
            background: var(--success-color);
            border-color: var(--success-color);
            color: white;
        }

        .delete-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 4px;
        }

        .delete-btn:hover {
            background: transparent;
            color: var(--danger-color);
            transform: scale(1.1);
        }

        footer {
            padding: 15px 30px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #1f1f2e;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-bottom: 20px;
            font-size: 1.3rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 10px 15px;
            border-radius: 8px;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--glass-border);
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 50px 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>KHabit</h1>
            <button id="add-habit-btn">+ New Habit</button>
        </header>
        
        <main>
            <div class="habit-list" id="habit-list">
                <!-- Habits will be injected here via JS -->
            </div>
        </main>
        
        <footer>
            KHabit Tracker &copy; 2026 KiloOS
        </footer>
    </div>

    <!-- Add Habit Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h2>Create New Habit</h2>
            <div class="input-group">
                <label for="habit-name">Habit Name</label>
                <input type="text" id="habit-name" placeholder="e.g. Read 20 pages" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="habit-desc">Description (Optional)</label>
                <input type="text" id="habit-desc" placeholder="e.g. Daily reading goal" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancel-habit-btn">Cancel</button>
                <button id="save-habit-btn">Save Habit</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let habits = [];
        const STORAGE_KEY = 'khabit_data';

        // DOM Elements
        const habitListEl = document.getElementById('habit-list');
        const addBtn = document.getElementById('add-habit-btn');
        const modal = document.getElementById('add-modal');
        const cancelBtn = document.getElementById('cancel-habit-btn');
        const saveBtn = document.getElementById('save-habit-btn');
        const nameInput = document.getElementById('habit-name');
        const descInput = document.getElementById('habit-desc');

        // Utils
        const getTodayStr = () => {
            const d = new Date();
            // Use local date string in YYYY-MM-DD
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const calculateStreak = (completions) => {
            if (!completions || completions.length === 0) return 0;
            
            // Sort descending
            const sorted = [...completions].sort((a, b) => b.localeCompare(a));
            
            let streak = 0;
            let current = new Date(); // Start with today
            current.setHours(0,0,0,0);
            
            // Allow yesterday to count as current streak if today isn't checked yet
            let firstDate = new Date(sorted[0] + "T00:00:00");
            firstDate.setHours(0,0,0,0);
            
            const diffTime = Math.abs(current - firstDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 1) {
                return 0; // Streak broken
            }
            
            let checkDate = new Date(firstDate);
            
            for (let i = 0; i < sorted.length; i++) {
                const cDate = new Date(sorted[i] + "T00:00:00");
                cDate.setHours(0,0,0,0);
                
                if (cDate.getTime() === checkDate.getTime()) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (cDate.getTime() < checkDate.getTime()) {
                    break;
                }
            }
            
            return streak;
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Core Logic
        const loadHabits = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                try {
                    habits = JSON.parse(data);
                } catch (e) {
                    habits = [];
                }
            } else {
                // Default mock data for first time
                habits = [
                    {
                        id: generateId(),
                        name: "Read 20 pages",
                        description: "Daily reading goal",
                        completions: []
                    }
                ];
                saveHabits();
            }
        };

        const saveHabits = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
        };

        const renderHabits = () => {
            habitListEl.innerHTML = '';
            
            if (habits.length === 0) {
                habitListEl.innerHTML = '<div class="empty-state">No habits yet. Click "+ New Habit" to start!</div>';
                return;
            }

            const today = getTodayStr();

            habits.forEach(habit => {
                const streak = calculateStreak(habit.completions);
                const isCompletedToday = habit.completions.includes(today);

                const card = document.createElement('div');
                card.className = 'habit-card';
                card.innerHTML = `
                    <div class="habit-info">
                        <h3>${habit.name}</h3>
                        ${habit.description ? `<p>${habit.description}</p>` : ''}
                    </div>
                    <div class="habit-actions">
                        <div class="streak-info" title="Current Streak">
                            <span class="streak-icon">🔥</span>
                            <span>${streak}</span>
                        </div>
                        <button class="check-btn ${isCompletedToday ? 'completed' : ''}" data-id="${habit.id}" title="${isCompletedToday ? 'Completed today!' : 'Mark as complete'}">
                            ✔
                        </button>
                        <button class="delete-btn" data-id="${habit.id}" title="Delete Habit">
                            ✕
                        </button>
                    </div>
                `;
                habitListEl.appendChild(card);
            });

            // Attach event listeners to buttons
            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    toggleHabit(id);
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    if(confirm("Are you sure you want to delete this habit?")) {
                        deleteHabit(id);
                    }
                });
            });
        };

        const toggleHabit = (id) => {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;

            const today = getTodayStr();
            const index = habit.completions.indexOf(today);

            if (index > -1) {
                habit.completions.splice(index, 1);
            } else {
                habit.completions.push(today);
            }

            saveHabits();
            renderHabits();
        };

        const addHabit = (name, description) => {
            habits.push({
                id: generateId(),
                name,
                description,
                completions: []
            });
            saveHabits();
            renderHabits();
        };

        const deleteHabit = (id) => {
            habits = habits.filter(h => h.id !== id);
            saveHabits();
            renderHabits();
        };

        // Modal Logic
        const openModal = () => {
            nameInput.value = '';
            descInput.value = '';
            modal.classList.add('active');
            nameInput.focus();
        };

        const closeModal = () => {
            modal.classList.remove('active');
        };

        // Event Listeners
        addBtn.addEventListener('click', openModal);
        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        saveBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const desc = descInput.value.trim();
            if (name) {
                addHabit(name, desc);
                closeModal();
            } else {
                nameInput.style.borderColor = 'var(--danger-color)';
                setTimeout(() => nameInput.style.borderColor = 'var(--glass-border)', 1500);
            }
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveBtn.click();
        });
        descInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveBtn.click();
        });

        // Init
        loadHabits();
        renderHabits();
    </script>
</body>
</html>

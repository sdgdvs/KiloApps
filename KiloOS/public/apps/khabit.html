<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHabit Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f13;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --card-hover-bg: rgba(255, 255, 255, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at 15% 50%, #1e1b4b, #0f0f13 40%);
        }

        .app-container {
            width: 100%;
            max-width: 850px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            height: 90vh;
            max-height: 850px;
            overflow: hidden;
        }

        header {
            padding: 24px 36px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        button {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--accent-color), #6d28d9);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(139, 92, 246, 0.4);
            background: linear-gradient(135deg, var(--accent-hover), #5b21b6);
        }

        main {
            padding: 30px 36px;
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.2) transparent;
        }
        
        main::-webkit-scrollbar {
            width: 6px;
        }
        main::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .habit-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .habit-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .habit-card:hover {
            transform: translateX(6px);
            background: var(--card-hover-bg);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .habit-card:hover::before {
            opacity: 1;
        }

        .habit-info {
            flex-grow: 1;
            padding-left: 10px;
        }

        .habit-info h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: #fff;
        }

        .habit-info p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .habit-actions {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .streak-info {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #fbbf24;
            font-weight: 700;
            font-size: 1.05rem;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .streak-icon {
            font-size: 1.3rem;
            display: inline-block;
        }
        
        @keyframes fire-flicker {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.15) rotate(2deg); opacity: 0.9; }
        }

        .streak-info.active .streak-icon {
            animation: fire-flicker 1.5s infinite alternate;
            filter: drop-shadow(0 0 5px rgba(255,100,0,0.8));
        }

        .check-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 1.2rem;
            color: transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0;
            box-shadow: none;
            position: relative;
            overflow: hidden;
        }
        
        .check-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: var(--success-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.4s ease, height 0.4s ease;
            z-index: 0;
        }

        .check-btn span {
            position: relative;
            z-index: 1;
            transition: color 0.3s;
            transform: translateY(1px);
        }

        .check-btn:hover {
            border-color: rgba(255,255,255,0.3);
            transform: scale(1.08);
            background: rgba(255,255,255,0.1);
        }

        .check-btn.completed {
            border-color: var(--success-color);
        }

        .check-btn.completed::after {
            width: 100%;
            height: 100%;
        }

        .check-btn.completed span {
            color: white;
        }

        .delete-btn {
            background: transparent;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 8px;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger-color);
            transform: scale(1.1);
            box-shadow: none;
        }

        footer {
            padding: 16px 36px;
            border-top: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.2);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: #1e1b2e;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 36px;
            width: 90%;
            max-width: 440px;
            transform: translateY(30px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal h2 {
            margin-bottom: 24px;
            font-size: 1.4rem;
            color: white;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--glass-border);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-cancel:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
            box-shadow: none;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        
        .empty-state-icon {
            font-size: 3rem;
            opacity: 0.5;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>KHabit</h1>
            <div style="display: flex; gap: 8px;">
                <button id="import-btn" style="background: rgba(255,255,255,0.1); box-shadow: none;" title="Import JSON">Import</button>
                <button id="export-btn" style="background: rgba(255,255,255,0.1); box-shadow: none;" title="Export JSON">Export</button>
                <button id="add-habit-btn">+ New Habit</button>
            </div>
        </header>
        
        <main>
            <div class="habit-list" id="habit-list">
                <!-- Habits will be injected here via JS -->
            </div>
        </main>
        
        <footer>
            KHabit Tracker &copy; 2026 KiloOS
        </footer>
    </div>

    <!-- Add Habit Modal -->
    <div class="modal-overlay" id="add-modal">
        <div class="modal">
            <h2>Create New Habit</h2>
            <div class="input-group">
                <label for="habit-name">Habit Name</label>
                <input type="text" id="habit-name" placeholder="e.g. Read 20 pages" autocomplete="off">
            </div>
            <div class="input-group">
                <label for="habit-desc">Description (Optional)</label>
                <input type="text" id="habit-desc" placeholder="e.g. Daily reading goal" autocomplete="off">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancel-habit-btn">Cancel</button>
                <button id="save-habit-btn">Save Habit</button>
            </div>
        </div>
    </div>

    <script>
        // State
        let habits = [];
        const STORAGE_KEY = 'khabit_data';

        // DOM Elements
        const habitListEl = document.getElementById('habit-list');
        const addBtn = document.getElementById('add-habit-btn');
        const importBtn = document.getElementById('import-btn');
        const exportBtn = document.getElementById('export-btn');
        const modal = document.getElementById('add-modal');
        const cancelBtn = document.getElementById('cancel-habit-btn');
        const saveBtn = document.getElementById('save-habit-btn');
        const nameInput = document.getElementById('habit-name');
        const descInput = document.getElementById('habit-desc');

        // Utils
        const getTodayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const calculateStreak = (completions) => {
            if (!completions || completions.length === 0) return 0;
            
            const sorted = [...completions].sort((a, b) => b.localeCompare(a));
            let streak = 0;
            let current = new Date();
            current.setHours(0,0,0,0);
            
            let firstDate = new Date(sorted[0] + "T00:00:00");
            firstDate.setHours(0,0,0,0);
            
            const diffTime = Math.abs(current - firstDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 1) {
                return 0; // Streak broken
            }
            
            let checkDate = new Date(firstDate);
            
            for (let i = 0; i < sorted.length; i++) {
                const cDate = new Date(sorted[i] + "T00:00:00");
                cDate.setHours(0,0,0,0);
                
                if (cDate.getTime() === checkDate.getTime()) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else if (cDate.getTime() < checkDate.getTime()) {
                    break;
                }
            }
            
            return streak;
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Core Logic
        const loadHabits = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                try {
                    habits = JSON.parse(data);
                } catch (e) {
                    habits = [];
                }
            } else {
                habits = [
                    {
                        id: generateId(),
                        name: "Read 20 pages",
                        description: "Daily reading goal",
                        completions: []
                    }
                ];
                saveHabits();
            }
        };

        const saveHabits = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
        };

        const renderHabits = () => {
            habitListEl.innerHTML = '';
            
            if (habits.length === 0) {
                habitListEl.innerHTML = \`
                    <div class="empty-state">
                        <div class="empty-state-icon">🌱</div>
                        <p>No habits yet. Plant a seed by creating a new habit!</p>
                    </div>
                \`;
                return;
            }

            const today = getTodayStr();

            habits.forEach(habit => {
                const streak = calculateStreak(habit.completions);
                const isCompletedToday = habit.completions.includes(today);

                const card = document.createElement('div');
                card.className = 'habit-card';
                card.innerHTML = \`
                    <div class="habit-info">
                        <h3>\${habit.name}</h3>
                        \${habit.description ? \`<p>\${habit.description}</p>\` : ''}
                    </div>
                    <div class="habit-actions">
                        <div class="streak-info \${streak > 0 ? 'active' : ''}" title="Current Streak">
                            <span class="streak-icon">\${streak >= 3 ? '🔥' : '⭐'}</span>
                            <span>\${streak}</span>
                        </div>
                        <button class="check-btn \${isCompletedToday ? 'completed' : ''}" data-id="\${habit.id}" title="\${isCompletedToday ? 'Completed today!' : 'Mark as complete'}">
                            <span>✔</span>
                        </button>
                        <button class="delete-btn" data-id="\${habit.id}" title="Delete Habit">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </button>
                    </div>
                \`;
                habitListEl.appendChild(card);
            });

            document.querySelectorAll('.check-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    toggleHabit(id);
                });
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.currentTarget.getAttribute('data-id');
                    if(confirm("Are you sure you want to delete this habit?")) {
                        const card = e.currentTarget.closest('.habit-card');
                        card.style.transform = 'translateX(100%)';
                        card.style.opacity = '0';
                        setTimeout(() => deleteHabit(id), 300);
                    }
                });
            });
        };

        const toggleHabit = (id) => {
            const habit = habits.find(h => h.id === id);
            if (!habit) return;

            const today = getTodayStr();
            const index = habit.completions.indexOf(today);

            if (index > -1) {
                habit.completions.splice(index, 1);
            } else {
                habit.completions.push(today);
            }

            saveHabits();
            renderHabits();
        };

        const addHabit = (name, description) => {
            habits.push({
                id: generateId(),
                name,
                description,
                completions: []
            });
            saveHabits();
            renderHabits();
        };

        const deleteHabit = (id) => {
            habits = habits.filter(h => h.id !== id);
            saveHabits();
            renderHabits();
        };

        // Modal Logic
        const openModal = () => {
            nameInput.value = '';
            descInput.value = '';
            nameInput.style.borderColor = 'var(--glass-border)';
            modal.classList.add('active');
            setTimeout(() => nameInput.focus(), 50);
        };

        const closeModal = () => {
            modal.classList.remove('active');
        };

        // Event Listeners
        addBtn.addEventListener('click', openModal);

        exportBtn.addEventListener('click', () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(habits, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "khabit_export.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        importBtn.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.readAsText(file, 'UTF-8');
                reader.onload = readerEvent => {
                    try {
                        const parsed = JSON.parse(readerEvent.target.result);
                        if (Array.isArray(parsed)) {
                            habits = parsed;
                            saveHabits();
                            renderHabits();
                            alert("Import successful!");
                        } else {
                            alert("Invalid format: expected array.");
                        }
                    } catch (err) {
                        alert("Error parsing JSON file.");
                    }
                };
            };
            input.click();
        });
        cancelBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        saveBtn.addEventListener('click', () => {
            const name = nameInput.value.trim();
            const desc = descInput.value.trim();
            if (name) {
                addHabit(name, desc);
                closeModal();
            } else {
                nameInput.style.borderColor = 'var(--danger-color)';
                setTimeout(() => nameInput.style.borderColor = 'var(--glass-border)', 1500);
            }
        });

        nameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveBtn.click();
        });
        descInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveBtn.click();
        });

        // Init
        loadHabits();
        renderHabits();
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KMemory (Patience)</title>
<style>
  body { margin: 0; background-color: #1e963c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; user-select: none; font-family: sans-serif; color: white;}
  #ui { display: flex; justify-content: space-between; width: 380px; margin-bottom: 10px; font-weight: bold; font-size: 16px; }
  .grid { display: grid; gap: 10px; }
  .grid.easy { grid-template-columns: repeat(4, 1fr); width: 380px; height: 380px; }
  .grid.hard { grid-template-columns: repeat(6, 1fr); width: 570px; height: 380px; }
  .grid.expert { grid-template-columns: repeat(8, 1fr); width: 760px; height: 380px; }
  .card { background: #3264c8; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #000; }
  .card.flipped { background: #fff; box-shadow: inset 0 0 0 1px #ccc; cursor: default; }
  .card.matched { background: transparent; box-shadow: none; cursor: default; color: transparent; }
  .controls { margin-top: 15px; display: flex; gap: 10px; }
  button { padding: 5px 10px; font-size: 16px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; color: #333; }
  button:hover { background: #fff; }
</style>
</head>
<body>
<div id="ui">
  <div>Time: <span id="time">0</span>s</div>
  <div>Moves: <span id="moves">0</span></div>
  <div>Best (Moves): <span id="best">-</span></div>
</div>
<div class="grid easy" id="grid"></div>
<div class="controls">
  <button onclick="setDifficulty('easy')">Easy (4x4)</button>
  <button onclick="setDifficulty('hard')">Hard (6x4)</button>
  <button onclick="setDifficulty('expert')">Expert (8x4)</button>
  <button onclick="init()">Restart</button>
</div>
<script>
  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const bestEl = document.getElementById('best');
  const timeEl = document.getElementById('time');
  
  let cards = [];
  let flipped = [];
  let matched = [];
  let firstFlip = -1;
  let secondFlip = -1;
  let matches = 0;
  let moves = 0;
  let lock = false;
  let diff = 'easy'; // easy=16, hard=24, expert=32
  let timer = null;
  let elapsed = 0;
  let playing = false;
  
  let audioCtx;
  function playTone(freq, type, duration) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
  }
  
  function getBestKey() { return 'kmemory_best_' + diff; }
  function updateBest() {
      let b = localStorage.getItem(getBestKey());
      bestEl.textContent = b ? b : '-';
  }

  function setDifficulty(d) {
      diff = d;
      grid.className = 'grid ' + d;
      if (d === 'easy') document.getElementById('ui').style.width = '380px';
      else if (d === 'hard') document.getElementById('ui').style.width = '570px';
      else document.getElementById('ui').style.width = '760px';
      init();
  }

  function startTimer() {
      if (!playing) {
          playing = true;
          timer = setInterval(() => {
              elapsed++;
              timeEl.textContent = elapsed;
          }, 1000);
      }
  }

  function stopTimer() {
      playing = false;
      if (timer) clearInterval(timer);
      timer = null;
  }

  function init() {
      stopTimer();
      elapsed = 0;
      timeEl.textContent = elapsed;
      cards = [];
      let numCards = diff === 'easy' ? 16 : (diff === 'hard' ? 24 : 32);
      for (let i = 0; i < numCards; i++) {
          cards.push(Math.floor(i / 2));
          flipped[i] = true;
          matched[i] = false;
      }
      for (let i = numCards - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      firstFlip = -1;
      secondFlip = -1;
      matches = 0;
      moves = 0;
      movesEl.textContent = moves;
      lock = true;
      updateBest();
      render();
      
      let previewTime = diff === 'expert' ? 1000 : (diff === 'hard' ? 2000 : 3000);
      setTimeout(() => {
          for (let i = 0; i < numCards; i++) flipped[i] = false;
          lock = false;
          render();
      }, previewTime);
  }

  function render() {
      grid.innerHTML = '';
      let numCards = diff === 'easy' ? 16 : (diff === 'hard' ? 24 : 32);
      for (let i = 0; i < numCards; i++) {
          const c = document.createElement('div');
          c.className = 'card';
          if (matched[i]) {
              c.classList.add('matched');
          } else if (flipped[i]) {
              c.classList.add('flipped');
              c.textContent = String.fromCharCode(65 + cards[i]);
          }
          
          c.onclick = () => {
              if (lock || flipped[i] || matched[i]) return;
              startTimer();
              flipped[i] = true;
              playTone(600, 'square', 0.1);
              render();
              
              if (firstFlip === -1) {
                  firstFlip = i;
              } else {
                  secondFlip = i;
                  moves++;
                  movesEl.textContent = moves;
                  if (cards[firstFlip] === cards[secondFlip]) {
                      matched[firstFlip] = true;
                      matched[secondFlip] = true;
                      firstFlip = -1;
                      secondFlip = -1;
                      matches++;
                      playTone(800, 'square', 0.2);
                      if (matches === numCards / 2) {
                          stopTimer();
                          let b = localStorage.getItem(getBestKey());
                          if (!b || moves < parseInt(b)) {
                              localStorage.setItem(getBestKey(), moves);
                          }
                          setTimeout(() => { alert("You won in " + moves + " moves and " + elapsed + " seconds!"); updateBest(); init(); }, 100);
                      }
                      render();
                  } else {
                      lock = true;
                      playTone(400, 'square', 0.1);
                      setTimeout(() => {
                          flipped[firstFlip] = false;
                          flipped[secondFlip] = false;
                          firstFlip = -1;
                          secondFlip = -1;
                          lock = false;
                          render();
                      }, 1000);
                  }
              }
          };
          grid.appendChild(c);
      }
  }

  init();
</script>
</body>
</html>

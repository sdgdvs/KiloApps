<!DOCTYPE html>
<html>
<head>
<title>KMemory (Patience)</title>
<style>
  body { margin: 0; background-color: #1e963c; display: flex; justify-content: center; align-items: center; height: 100vh; user-select: none; font-family: sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 380px; height: 380px; }
  .card { background: #3264c8; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #000; }
  .card.flipped { background: #fff; box-shadow: inset 0 0 0 1px #ccc; cursor: default; }
  .card.matched { background: transparent; box-shadow: none; cursor: default; color: transparent; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
  const grid = document.getElementById('grid');
  let cards = [];
  let flipped = [];
  let matched = [];
  let firstFlip = -1;
  let secondFlip = -1;
  let matches = 0;
  let lock = false;

  function init() {
      cards = [];
      for (let i = 0; i < 16; i++) {
          cards.push(Math.floor(i / 2));
          flipped[i] = false;
          matched[i] = false;
      }
      for (let i = 15; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      firstFlip = -1;
      secondFlip = -1;
      matches = 0;
      lock = false;
      render();
  }

  function render() {
      grid.innerHTML = '';
      for (let i = 0; i < 16; i++) {
          const c = document.createElement('div');
          c.className = 'card';
          if (matched[i]) {
              c.classList.add('matched');
          } else if (flipped[i]) {
              c.classList.add('flipped');
              c.textContent = String.fromCharCode(65 + cards[i]);
          }
          
          c.onclick = () => {
              if (lock || flipped[i] || matched[i]) return;
              flipped[i] = true;
              render();
              
              if (firstFlip === -1) {
                  firstFlip = i;
              } else {
                  secondFlip = i;
                  if (cards[firstFlip] === cards[secondFlip]) {
                      matched[firstFlip] = true;
                      matched[secondFlip] = true;
                      firstFlip = -1;
                      secondFlip = -1;
                      matches++;
                      if (matches === 8) {
                          setTimeout(() => { alert("You won!"); init(); }, 100);
                      }
                      render();
                  } else {
                      lock = true;
                      setTimeout(() => {
                          flipped[firstFlip] = false;
                          flipped[secondFlip] = false;
                          firstFlip = -1;
                          secondFlip = -1;
                          lock = false;
                          render();
                      }, 1000);
                  }
              }
          };
          grid.appendChild(c);
      }
  }

  init();
</script>
</body>
</html>

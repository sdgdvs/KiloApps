<!DOCTYPE html>
<html>
<head>
<title>KMemory (Patience)</title>
<style>
  body { margin: 0; background-color: #1e963c; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; user-select: none; font-family: sans-serif; color: white;}
  #ui { display: flex; justify-content: space-between; width: 100%; max-width: 600px; margin-bottom: 10px; font-weight: bold; font-size: 14px; gap: 10px; }
  .grid { display: grid; gap: 10px; }
  .grid.easy { grid-template-columns: repeat(4, 1fr); max-width: 400px; max-height: 400px; }
  .grid.hard { grid-template-columns: repeat(6, 1fr); max-width: 600px; max-height: 400px; }
  .grid.expert { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 400px; }
  .grid.camp4 { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 600px; }
  .grid.camp5 { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 800px; }
  .grid.camp6 { grid-template-columns: repeat(10, 1fr); max-width: 1000px; max-height: 800px; }
  .grid.camp7 { grid-template-columns: repeat(10, 1fr); max-width: 1000px; max-height: 1000px; }
  .grid.camp8 { grid-template-columns: repeat(12, 1fr); max-width: 1200px; max-height: 1000px; }
  .grid.camp9 { grid-template-columns: repeat(12, 1fr); max-width: 1200px; max-height: 1200px; }
  .grid.camp10 { grid-template-columns: repeat(14, 1fr); max-width: 1400px; max-height: 1200px; }
  .grid.camp11 { grid-template-columns: repeat(14, 1fr); max-width: 1400px; max-height: 1400px; }
  .grid.camp12 { grid-template-columns: repeat(16, 1fr); max-width: 1600px; max-height: 1400px; }
  .grid.camp13 { grid-template-columns: repeat(16, 1fr); max-width: 1600px; max-height: 1600px; }
  .grid.camp14 { grid-template-columns: repeat(18, 1fr); max-width: 1800px; max-height: 1600px; }
  .grid.camp15 { grid-template-columns: repeat(18, 1fr); max-width: 1800px; max-height: 1800px; }
  .grid.rush1 { grid-template-columns: repeat(4, 1fr); max-width: 400px; max-height: 400px; }
  .grid.rush2 { grid-template-columns: repeat(6, 1fr); max-width: 600px; max-height: 400px; }
  .grid.rush3 { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 400px; }
  .grid.rush4 { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 600px; }
  .grid.rush5 { grid-template-columns: repeat(8, 1fr); max-width: 800px; max-height: 800px; }
  .card { background: #3264c8; border-radius: 4px; box-shadow: inset 0 0 0 2px rgba(0,0,0,0.2); cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: bold; color: #000; }
  .card.flipped { background: #fff; box-shadow: inset 0 0 0 1px #ccc; cursor: default; }
  .card.matched { background: transparent; box-shadow: none; cursor: default; color: transparent; }
  .controls { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 800px; }
  button { padding: 5px 10px; font-size: 16px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; color: #333; }
  button:hover { background: #fff; }
</style>
</head>
<body>
<div id="ui">
  <div>Time: <span id="time">0</span>s</div>
  <div>Moves: <span id="moves">0</span></div>
  <div>Score: <span id="score">0</span></div>
  <div>Combo: x<span id="combo">1</span></div>
  <div>Best: <span id="best">-</span></div>
  <div>Pairs: <span id="stats_pairs">0</span></div>
  <div>Wins: <span id="stats_wins">0</span></div>
</div>
<div class="grid easy" id="grid"></div>
<div class="controls">
  <select id="themeSelect" onchange="setTheme(this.value)" style="padding: 5px; font-size: 16px; border-radius: 4px;">
    <option value="letters">Letters</option>
    <option value="numbers">Numbers</option>
    <option value="symbols">Symbols</option>
  </select>
  <button onclick="setDifficulty('easy')">Easy</button>
  <button onclick="setDifficulty('hard')">Hard</button>
  <button onclick="setDifficulty('expert')">Expert</button>
  <button onclick="setDifficulty('campaign')">Campaign</button>
  <button onclick="setDifficulty('rush')">Rush Mode</button>
  <button onclick="peek()">Peek</button>
  <button onclick="resetGame()">Restart</button>
</div>
<script>
  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const bestEl = document.getElementById('best');
  const timeEl = document.getElementById('time');
  
  let cards = [];
  let flipped = [];
  let matched = [];
  let firstFlip = -1;
  let secondFlip = -1;
  let matches = 0;
  let moves = 0;
  let score = 0;
  let combo = 1;
  let lock = false;
  let diff = 'easy'; // easy, hard, expert, campaign, rush
  let currentTheme = 'letters';
  const themes = {
      letters: (c) => {
          if (c < 26) return String.fromCharCode(65 + c);
          return String.fromCharCode(65 + Math.floor(c / 26) - 1) + String.fromCharCode(65 + (c % 26));
      },
      numbers: (c) => (c + 1).toString(),
      symbols: (c) => {
          const sym = "!@#$%^&*+=?~OX<>";
          if (c < 16) return sym[c];
          return sym[Math.floor(c / 16) - 1] + sym[c % 16];
      }
  };
  let timer = null;
  let elapsed = 0;
  let playing = false;
  let stats_pairs = 0;
  let stats_wins = 0;
  try {
      stats_pairs = parseInt(localStorage.getItem('kmemory_pairs')) || 0;
      stats_wins = parseInt(localStorage.getItem('kmemory_wins')) || 0;
  } catch(e) {}
  let campaign_level = 1;
  let rush_level = 1;
  let rush_time_left = 60;
  
  document.getElementById('stats_pairs').textContent = stats_pairs;
  document.getElementById('stats_wins').textContent = stats_wins;
  
  let audioCtx;
  function playTone(freq, type, duration) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
  }
  
  function getBestKey() { return 'kmemory_bestscore_' + diff; }
  function updateBest() {
      let b = null;
      try { b = localStorage.getItem(getBestKey()); } catch(e) {}
      bestEl.textContent = b ? b : '-';
  }

  function getNumCards() {
      if (diff === 'easy') return 16;
      if (diff === 'hard') return 24;
      if (diff === 'expert') return 32;
      if (diff === 'rush') {
          const r_sizes = [16, 24, 32, 48, 64];
          return r_sizes[Math.min(rush_level - 1, 4)];
      }
      if (diff === 'campaign') {
          const c_sizes = [16, 24, 32, 48, 64, 80, 100, 120, 144, 168, 196, 224, 256, 288, 324];
          return c_sizes[Math.min(campaign_level - 1, 14)];
      }
      return 16;
  }

  function peek() {
      if (lock || (!playing && diff !== 'rush')) return;
      lock = true;
      moves += 5;
      score = Math.max(0, score - 200);
      combo = 1;
      movesEl.textContent = moves;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      let numCards = getNumCards();
      for (let i = 0; i < numCards; i++) {
          if (!matched[i]) flipped[i] = true;
      }
      playTone(300, 'sine', 0.3);
      render();
      setTimeout(() => {
          for (let i = 0; i < numCards; i++) {
              if (!matched[i]) flipped[i] = false;
          }
          firstFlip = -1;
          secondFlip = -1;
          lock = false;
          render();
      }, 1500);
  }

  function setDifficulty(d) {
      diff = d;
      if (d === 'campaign') campaign_level = 1;
      if (d === 'rush') { rush_level = 1; rush_time_left = 60; score = 0; }
      if (d === 'easy' || d === 'hard' || d === 'expert') score = 0;
      updateGridSize();
      init();
  }

  function resetGame() {
      if (diff === 'campaign') campaign_level = 1;
      if (diff === 'rush') { rush_level = 1; rush_time_left = 60; score = 0; }
      if (diff === 'easy' || diff === 'hard' || diff === 'expert') score = 0;
      updateGridSize();
      init();
  }

  function updateGridSize() {
      let d = diff;
      let ui = document.getElementById('ui');
      if (d === 'easy' || (d === 'campaign' && campaign_level === 1) || (d === 'rush' && rush_level === 1)) { grid.className = `grid ${d === 'rush' ? 'rush1' : 'easy'}`; ui.style.width = '380px'; }
      else if (d === 'hard' || (d === 'campaign' && campaign_level === 2) || (d === 'rush' && rush_level === 2)) { grid.className = `grid ${d === 'rush' ? 'rush2' : 'hard'}`; ui.style.width = '570px'; }
      else if (d === 'expert' || (d === 'campaign' && campaign_level === 3) || (d === 'rush' && rush_level === 3)) { grid.className = `grid ${d === 'rush' ? 'rush3' : 'expert'}`; ui.style.width = '760px'; }
      else if (d === 'campaign' && campaign_level === 4) { grid.className = 'grid camp4'; ui.style.width = '760px'; }
      else if (d === 'rush' && rush_level === 4) { grid.className = 'grid rush4'; ui.style.width = '760px'; }
      else if (d === 'campaign' && campaign_level === 5) { grid.className = 'grid camp5'; ui.style.width = '760px'; }
      else if (d === 'rush' && rush_level >= 5) { grid.className = 'grid rush5'; ui.style.width = '760px'; }
      else if (d === 'campaign' && campaign_level === 6) { grid.className = 'grid camp6'; ui.style.width = '950px'; }
      else if (d === 'campaign' && campaign_level === 7) { grid.className = 'grid camp7'; ui.style.width = '950px'; }
      else if (d === 'campaign' && campaign_level === 8) { grid.className = 'grid camp8'; ui.style.width = '1140px'; }
      else if (d === 'campaign' && campaign_level === 9) { grid.className = 'grid camp9'; ui.style.width = '1140px'; }
      else if (d === 'campaign' && campaign_level === 10) { grid.className = 'grid camp10'; ui.style.width = '1330px'; }
      else if (d === 'campaign' && campaign_level === 11) { grid.className = 'grid camp11'; ui.style.width = '1330px'; }
      else if (d === 'campaign' && campaign_level === 12) { grid.className = 'grid camp12'; ui.style.width = '1520px'; }
      else if (d === 'campaign' && campaign_level === 13) { grid.className = 'grid camp13'; ui.style.width = '1520px'; }
      else if (d === 'campaign' && campaign_level === 14) { grid.className = 'grid camp14'; ui.style.width = '1710px'; }
      else if (d === 'campaign' && campaign_level >= 15) { grid.className = 'grid camp15'; ui.style.width = '1710px'; }
  }

  function setTheme(t) {
      currentTheme = t;
      init();
  }

  function startTimer() {
      if (!playing) {
          playing = true;
          timer = setInterval(() => {
              if (diff === 'rush') {
                  rush_time_left--;
                  timeEl.textContent = rush_time_left;
                  if (rush_time_left <= 0) {
                      stopTimer();
                      alert("Time's up! Rush Mode over. Score: " + score);
                      updateBest();
                      rush_level = 1;
                      rush_time_left = 60;
                      score = 0;
                      updateGridSize();
                      init();
                  }
              } else {
                  elapsed++;
                  timeEl.textContent = elapsed;
              }
          }, 1000);
      }
  }

  function stopTimer() {
      playing = false;
      if (timer) clearInterval(timer);
      timer = null;
  }

  function init() {
      if (diff !== 'rush') {
          stopTimer();
          elapsed = 0;
          timeEl.textContent = elapsed;
      } else {
          timeEl.textContent = rush_time_left;
      }
      
      cards = [];
      let numCards = getNumCards();
      for (let i = 0; i < numCards; i++) {
          let val = Math.floor(i / 2);
          if (diff === 'expert' || diff === 'campaign' || diff === 'rush') {
              if (val === numCards/2 - 1) val = 100;
              else if (val === numCards/2 - 2) val = 101;
              else if (val === numCards/2 - 3) val = 102;
              else if (val === numCards/2 - 4 && numCards >= 48) val = 103;
              else if (val === numCards/2 - 5 && numCards >= 64) val = 104; // Ghost
              else if (val === numCards/2 - 6 && numCards >= 80) val = 105; // Freeze
          }
          cards.push(val);
          flipped[i] = true;
          matched[i] = false;
      }
      for (let i = numCards - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
      }
      firstFlip = -1;
      secondFlip = -1;
      matches = 0;
      moves = 0;
      combo = 1;
      movesEl.textContent = moves;
      scoreEl.textContent = score;
      comboEl.textContent = combo;
      lock = true;
      updateBest();
      render();
      
      let previewTime = diff === 'expert' ? 1000 : (diff === 'hard' ? 2000 : 3000);
      setTimeout(() => {
          for (let i = 0; i < numCards; i++) flipped[i] = false;
          lock = false;
          render();
      }, previewTime);
  }

  function render() {
      grid.innerHTML = '';
      let numCards = getNumCards();
      for (let i = 0; i < numCards; i++) {
          const c = document.createElement('div');
          c.className = 'card';
          c.tabIndex = 0;
          c.setAttribute('role', 'button');
          let label = 'Face down card';
          
          if (matched[i]) {
              c.classList.add('matched');
              label = 'Matched card';
              c.removeAttribute('tabindex');
          } else if (flipped[i]) {
              c.classList.add('flipped');
              if (cards[i] === 100) { c.textContent = "+T"; c.style.color = "#00f"; }
              else if (cards[i] === 101) { c.textContent = "??"; c.style.color = "#f00"; }
              else if (cards[i] === 102) { c.textContent = "-B"; c.style.color = "#800"; }
              else if (cards[i] === 103) { c.textContent = "+X"; c.style.color = "#f0f"; }
              else if (cards[i] === 104) { c.textContent = "+G"; c.style.color = "#888"; }
              else if (cards[i] === 105) { c.textContent = "+F"; c.style.color = "#0ff"; }
              else c.textContent = themes[currentTheme](cards[i]);
              label = 'Flipped card ' + c.textContent;
          }
          c.setAttribute('aria-label', label);
          c.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); c.onclick(); } };
          
          c.onclick = () => {
              if (lock || flipped[i] || matched[i]) return;
              startTimer();
              flipped[i] = true;
              playTone(600, 'square', 0.1);
              render();
              
              if (firstFlip === -1) {
                  firstFlip = i;
              } else {
                  secondFlip = i;
                  moves++;
                  movesEl.textContent = moves;
                  if (cards[firstFlip] === cards[secondFlip]) {
                      if (cards[firstFlip] === 100) {
                          score += 500;
                          if (diff === 'rush') rush_time_left += 10;
                          else elapsed = Math.max(0, elapsed - 10);
                      } else if (cards[firstFlip] === 101) {
                          for (let k = numCards - 1; k > 0; k--) {
                              if (!matched[k]) {
                                  let j = Math.floor(Math.random() * (k + 1));
                                  while(matched[j]) j = Math.floor(Math.random() * (k + 1));
                                  if (!matched[j]) {
                                      [cards[k], cards[j]] = [cards[j], cards[k]];
                                  }
                              }
                          }
                      } else if (cards[firstFlip] === 102) {
                          score = Math.max(0, score - 500);
                          if (diff === 'rush') rush_time_left = Math.max(0, rush_time_left - 15);
                          else elapsed += 15;
                          playTone(200, 'sawtooth', 0.5);
                      } else if (cards[firstFlip] === 103) {
                          score += 500;
                          for(let k=0; k<numCards; k++) {
                              if(!matched[k]) flipped[k] = true;
                          }
                          render();
                          setTimeout(() => {
                              for(let k=0; k<numCards; k++) if(!matched[k]) flipped[k] = false;
                              render();
                          }, 2000);
                      } else if (cards[firstFlip] === 104) {
                          score += 500;
                          let pairsToMatch = 2;
                          for (let k = 0; k < numCards && pairsToMatch > 0; k++) {
                              if (!matched[k] && cards[k] < 100) {
                                  for (let l = k + 1; l < numCards; l++) {
                                      if (!matched[l] && cards[l] === cards[k]) {
                                          matched[k] = true;
                                          matched[l] = true;
                                          matches++;
                                          pairsToMatch--;
                                          break;
                                      }
                                  }
                              }
                          }
                      } else if (cards[firstFlip] === 105) {
                          score += 500;
                          if (diff === 'rush') rush_time_left += 15;
                          else elapsed = Math.max(0, elapsed - 15);
                      }
                      
                      score += 100 * combo;
                      combo++;
                      if (diff === 'rush') {
                          rush_time_left += 2;
                          timeEl.textContent = rush_time_left;
                      } else {
                          timeEl.textContent = elapsed;
                      }
                      
                      scoreEl.textContent = score;
                      comboEl.textContent = combo;
                      matched[firstFlip] = true;
                      matched[secondFlip] = true;
                      firstFlip = -1;
                      secondFlip = -1;
                      matches++;
                      stats_pairs++;
                      try { localStorage.setItem('kmemory_pairs', stats_pairs); } catch(e) {}
                      document.getElementById('stats_pairs').textContent = stats_pairs;
                      
                      playTone(800, 'square', 0.2);
                      if (matches >= numCards / 2) {
                          if (diff !== 'rush') stopTimer();
                          stats_wins++;
                          try { localStorage.setItem('kmemory_wins', stats_wins); } catch(e) {}
                          document.getElementById('stats_wins').textContent = stats_wins;
                          
                          let b = null;
                          try { b = localStorage.getItem(getBestKey()); } catch(e) {}
                          if (!b || score > parseInt(b)) {
                              try { localStorage.setItem(getBestKey(), score); } catch(e) {}
                          }
                          
                          if (diff === 'campaign') {
                              campaign_level++;
                              if (campaign_level > 15) {
                                  setTimeout(() => { alert("You beat the Campaign! Total score: " + score); updateBest(); diff='campaign'; campaign_level=1; updateGridSize(); init(); }, 100);
                              } else {
                                  setTimeout(() => { alert("Stage Clear! Next Stage..."); updateBest(); updateGridSize(); init(); }, 100);
                              }
                          } else if (diff === 'rush') {
                              rush_level++;
                              rush_time_left += 20;
                              setTimeout(() => { alert("Board " + (rush_level - 1) + " Cleared! +20s"); updateGridSize(); init(); }, 100);
                          } else {
                              setTimeout(() => { alert("You won with score " + score + " in " + moves + " moves and " + elapsed + " seconds!"); updateBest(); init(); }, 100);
                          }
                      }
                      render();
                  } else {
                      combo = 1;
                      comboEl.textContent = combo;
                      lock = true;
                      playTone(400, 'square', 0.1);
                      setTimeout(() => {
                          flipped[firstFlip] = false;
                          flipped[secondFlip] = false;
                          firstFlip = -1;
                          secondFlip = -1;
                          lock = false;
                          render();
                      }, 1000);
                  }
              }
          };
          grid.appendChild(c);
      }
  }

  updateGridSize();
  init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KFreecell</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #1e1e1e;
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .header {
    background-color: #2d2d30;
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #3e3e42;
  }
  .header h1 {
    margin: 0;
    font-size: 20px;
  }
  .game-board {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .free-cells, .foundation {
    display: flex;
    gap: 10px;
  }
  .cell {
    width: 80px;
    height: 120px;
    border: 2px solid #555;
    border-radius: 5px;
    background-color: #252526;
  }
  .tableau {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-grow: 1;
  }
  .column {
    width: 80px;
    min-height: 120px;
    border: 1px dashed #555;
    border-radius: 5px;
  }
</style>
</head>
<body>
  <div class="header">
    <h1>KFreecell</h1>
  </div>
  <div class="game-board">
    <div class="top-row">
      <div class="free-cells" id="free-cells">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
      <div class="foundation" id="foundation">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
      </div>
    </div>
    <div class="tableau" id="tableau">
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
      <div class="column"></div>
    </div>
  </div>
  <script>
    console.log("KFreecell initialized");
    // Placeholder for game logic
  </script>
</body>
</html>

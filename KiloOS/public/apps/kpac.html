  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(freq, dur, type='square') {
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      gain.gain.setValueAtTime(1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
      osc.stop(audioCtx.currentTime + dur);
  }
  
  const keys = {};
  document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if ((e.key === 'p' || e.key === 'P') && !gameOver) paused = !paused;
  });
  document.addEventListener('keyup', e => keys[e.key] = false);

  function init(keepScore) {
      if (!keepScore) { score = 0; level = 1; lives = 3; }
      const mapIndex = (level - 1) % 10;
      map = maps[mapIndex].map(row => [...row]);
      px = 7; py = 12;
      pdx = 0; pdy = 0; ndx = 0; ndy = 0;
      ghosts = [
          {x: 7, y: 6, color: '#ff0000'},
          {x: 6, y: 7, color: '#ffb8ff'},
          {x: 8, y: 7, color: '#00ffff'},
          {x: 7, y: 7, color: '#ffb852'}
      ];
      frightTimer = 0;
      if (!keepScore) { score = 0; level = 1; lives = 3; }
      gameOver = 0; dotCount = 0; frameCount = 0;
      paused = false;
      fruitActive = 0;
      fruitTimer = 0;
      speedTimer = 0;
      
      for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
              if (map[r][c] >= 2 && map[r][c] <= 4) dotCount++;
          }
      }
  }

  function update() {
      if (gameOver) {
          if (keys['Enter']) init(false);
          return;
      }
      if (paused) return;
      
      if (keys['ArrowLeft'] || keys['a']) { ndx = -1; ndy = 0; }
      if (keys['ArrowRight'] || keys['d']) { ndx = 1; ndy = 0; }
      if (keys['ArrowUp'] || keys['w']) { ndx = 0; ndy = -1; }
      if (keys['ArrowDown'] || keys['s']) { ndx = 0; ndy = 1; }
      
      if (frightTimer > 0) frightTimer--;
      
      let ghostSpeed = Math.max(1, 4 - Math.floor(level/3));
      if (frightTimer > 0) ghostSpeed *= 2;
      
      if (frameCount % ghostSpeed === 0) {
          const dirs = [[1,0], [-1,0], [0,1], [0,-1]];
          for (let i = 0; i < ghosts.length; i++) {
              let g = ghosts[i];
              if (frightTimer === 0) {
                  let tx = px, ty = py;
                  if (i === 1) { // Pink ghost logic
                      tx = px + pdx * 2;
                      ty = py + pdy * 2;
                  } else if (i === 2) { // Cyan ghost logic
                      tx = px - pdx * 2;
                      ty = py - pdy * 2;
                  } else if (i === 3) { // Orange ghost logic
                      let distToPac = Math.abs(g.x - px) + Math.abs(g.y - py);
                      if (distToPac > 6) {
                          tx = px; ty = py;
                      } else {
                          tx = 0; ty = ROWS - 1;
                      }
                  }
                  
                  let best_d = -1;
                  let min_dist = 9999;
                  if (Math.random() < 0.2) {
                      best_d = Math.floor(Math.random() * 4);
                  } else {
                      for (let d = 0; d < 4; d++) {
                          let nx = g.x + dirs[d][0], ny = g.y + dirs[d][1];
                          if (nx < 0) nx = COLS - 1;
                          if (nx >= COLS) nx = 0;
                          if (ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
                              let dist = Math.abs(nx - tx) + Math.abs(ny - ty);
                              if (dist < min_dist) { min_dist = dist; best_d = d; }
                          }
                      }
                  }
                  if (best_d !== -1) {
                      let nx = g.x + dirs[best_d][0];
                      if (nx < 0) nx = COLS - 1;
                      if (nx >= COLS) nx = 0;
                      if (map[g.y + dirs[best_d][1]][nx] !== 1) {
                          g.x = nx; g.y += dirs[best_d][1];
                      }
                  }
              } else {
                  const d = Math.floor(Math.random() * 4);
                  let nx = g.x + dirs[d][0];
                  if (nx < 0) nx = COLS - 1;
                  if (nx >= COLS) nx = 0;
                  if (map[g.y + dirs[d][1]][nx] !== 1) {
                      g.x = nx; g.y += dirs[d][1];
                  }
              }
              if (g.x < 0) g.x = COLS - 1;
              if (g.x >= COLS) g.x = 0;
          }
      }
      
      if (ndx !== 0 || ndy !== 0) {
          const nx = px + ndx, ny = py + ndy;
          if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
              pdx = ndx; pdy = ndy;
              ndx = 0; ndy = 0;
          }
      }
      
      if (speedTimer > 0) speedTimer--;
      let playerMoves = (speedTimer > 0) ? true : (frameCount % 2 === 0);
      
      if (playerMoves) {
          let nx = px + pdx, ny = py + pdy;
          if (nx < 0) nx = COLS - 1;
          if (nx >= COLS) nx = 0;
          
          if (ny >= 0 && ny < ROWS && map[ny][nx] !== 1) {
              px = nx; py = ny;
              if (map[py][px] >= 2 && map[py][px] <= 4) {
                  if (map[py][px] === 3) { score += 40; frightTimer = 50; playSound(300, 0.3, 'sawtooth'); }
                  else if (map[py][px] === 4) { score += 20; speedTimer = 80; playSound(900, 0.1, 'triangle'); }
                  else { score += 10; playSound(600, 0.05, 'square'); }
                  if (score > highScore) { highScore = score; localStorage.setItem('kpac_highscore', highScore); }
                  if (score > statsMaxScore) { statsMaxScore = score; localStorage.setItem('kpac_maxscore', statsMaxScore); }
                  map[py][px] = 0;
                  dotCount--;
                  if (dotCount === 0) {
                      level++;
                      playSound(800, 0.5, 'sine');
                      init(true);
                  }
              }
          }
      }
      
      for (let g of ghosts) {
          if (px === g.x && py === g.y) {
              if (frightTimer > 0) {
                  score += 200;
                  statsGhostsEaten++;
                  localStorage.setItem('kpac_ghosts', statsGhostsEaten);
                  if (score > highScore) { highScore = score; localStorage.setItem('kpac_highscore', highScore); }
                  if (score > statsMaxScore) { statsMaxScore = score; localStorage.setItem('kpac_maxscore', statsMaxScore); }
                  playSound(800, 0.1, 'triangle');
                  g.x = 7; g.y = 6; // send to center
              } else {
                  playSound(200, 0.5, 'sawtooth');
                  lives--;
                  if (lives <= 0) {
                      gameOver = 1;
                      statsGamesPlayed++;
                      localStorage.setItem('kpac_games', statsGamesPlayed);
                  } else {
                      px = 7; py = 12;
                      pdx = 0; pdy = 0; ndx = 0; ndy = 0;
                      ghosts[0] = {x: 7, y: 6, color: '#ff0000'};
                      ghosts[1] = {x: 6, y: 7, color: '#ffb8ff'};
                      ghosts[2] = {x: 8, y: 7, color: '#00ffff'};
                      ghosts[3] = {x: 7, y: 7, color: '#ffb852'};
                  }
                  break;
              }
          }
      }
      
      if (dotCount < 50 && fruitActive === 0 && fruitTimer === 0 && Math.random() < 0.005) {
          fruitActive = 1;
          fruitTimer = 100;
      }
      if (fruitActive) {
          fruitTimer--;
          if (fruitTimer <= 0) fruitActive = 0;
          else if (px === 7 && py === 12) {
              score += 500;
              if (score > highScore) { highScore = score; localStorage.setItem('kpac_highscore', highScore); }
              if (score > statsMaxScore) { statsMaxScore = score; localStorage.setItem('kpac_maxscore', statsMaxScore); }
              fruitActive = 0;
              playSound(1000, 0.1, 'square');
          }
      }
      
      frameCount++;
  }

  function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, 300, 300);
      
      for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
              if (map[r][c] === 1) {
                  ctx.fillStyle = '#1414c8';
                  ctx.fillRect(c * TS, r * TS, TS, TS);
              } else if (map[r][c] === 2) {
                  ctx.fillStyle = '#ffc896';
                  ctx.fillRect(c * TS + 8, r * TS + 8, 4, 4);
              } else if (map[r][c] === 3) {
                  ctx.fillStyle = '#ffc896';
                  ctx.beginPath();
                  ctx.arc(c * TS + 10, r * TS + 10, 6, 0, Math.PI*2);
                  ctx.fill();
              } else if (map[r][c] === 4) {
                  ctx.fillStyle = '#00ffff';
                  ctx.fillRect(c * TS + 7, r * TS + 7, 6, 6);
              }
          }
      }
      
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(px * TS + 2, py * TS + 2, TS - 4, TS - 4);
      
      for (let g of ghosts) {
          ctx.fillStyle = frightTimer > 0 ? (Math.floor(frightTimer/2) % 2 === 0 ? '#0000ff' : '#ffffff') : g.color;
          ctx.fillRect(g.x * TS + 2, g.y * TS + 2, TS - 4, TS - 4);
      }
      
      if (fruitActive) {
          ctx.fillStyle = '#00ff00';
          ctx.fillRect(7 * TS + 4, 12 * TS + 4, TS - 8, TS - 8);
      }
      
      ctx.fillStyle = '#fff';
      ctx.font = '12px monospace';
      ctx.fillText(`Lv: ${level} Sc: ${score} HI: ${highScore} Lvs: ${lives}`, 5, 15);
      
      if (gameOver) {
          ctx.fillStyle = gameOver === 1 ? '#ff0000' : '#00ff00';
          ctx.fillText(gameOver === 1 ? 'GAME OVER' : 'YOU WIN!', 120, 140);
          ctx.fillStyle = '#fff';
          ctx.fillText(`Games: ${statsGamesPlayed} Ghosts: ${statsGhostsEaten} Max: ${statsMaxScore}`, 35, 160);
      } else if (paused) {
          ctx.fillStyle = '#ffff00';
          ctx.fillText('PAUSED', 130, 150);
      }
  }

  init(false);
  setInterval(() => {
      update();
      draw();
  }, 100);
</script>
</body>
</html>

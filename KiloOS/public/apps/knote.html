<!DOCTYPE html>
<html>
<head>
<title>KNote</title>
<style>
  body { margin: 0; background-color: #ffff96; display: flex; height: 100vh; overflow: hidden; font-family: sans-serif; }
  .sidebar { width: 150px; background: #e0e0a0; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .toolbar { padding: 5px; display: flex; justify-content: flex-end; border-bottom: 1px solid #ccc; gap: 5px; }
  button { background: #ffcccc; border: 1px solid #ff9999; border-radius: 3px; padding: 3px 8px; cursor: pointer; font-family: sans-serif; font-size: 12px; }
  button:hover { background: #ff9999; }
  .search-box { padding: 5px; border-bottom: 1px solid #ccc; }
  .search-box input { width: 100%; box-sizing: border-box; padding: 4px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; }
  .note-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
  .note-item { padding: 8px; border-bottom: 1px solid #ccc; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .note-item:hover { background: #d0d090; }
  .note-item.active { background: #ffff96; font-weight: bold; }
  textarea { flex: 1; width: 100%; box-sizing: border-box; background-color: transparent; border: none; padding: 10px; font-family: "Comic Sans MS", "Segoe UI", sans-serif; font-size: 16px; resize: none; outline: none; }
</style>
</head>
<body>
<div class="sidebar">
    <div style="padding: 5px;"><button id="newBtn" style="width: 100%">New Note</button></div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search notes..."></div>
    <ul class="note-list" id="noteList"></ul>
</div>
<div class="main">
    <div class="toolbar">
        <button id="pinBtn">Pin Note</button>
        <button id="exportBtn">Export TXT</button>
        <button id="delBtn">Delete Note</button>
    </div>
    <div id="statusBar" style="padding: 5px; background: #e0e0a0; border-top: 1px solid #ccc; font-size: 13px; font-weight: bold; border-bottom: 1px solid #ccc; white-space: pre-wrap;">  Words: 0 | Chars: 0</div>
    <textarea id="noteArea" spellcheck="false"></textarea>
</div>
<script>
  const noteArea = document.getElementById('noteArea');
  const newBtn = document.getElementById('newBtn');
  const delBtn = document.getElementById('delBtn');
  const pinBtn = document.getElementById('pinBtn');
  const exportBtn = document.getElementById('exportBtn');
  const searchInput = document.getElementById('searchInput');
  const noteList = document.getElementById('noteList');
  const statusBar = document.getElementById('statusBar');
  
  let notes = [];
  try {
      let saved = localStorage.getItem('knote_data_multi');
      if (saved) notes = JSON.parse(saved);
      else {
          let old = localStorage.getItem('knote_data');
          if (old) notes.push({ text: old, pinned: false });
          else notes.push({ text: "Buy milk\nFix that bug\nCall mom", pinned: false });
      }
  } catch (e) {
      notes = [{ text: "", pinned: false }];
  }
  
  if (notes.length === 0) notes.push({ text: "", pinned: false });
  notes.forEach(n => { if (typeof n.pinned === 'undefined') n.pinned = false; });

  let activeIndex = 0;
  
  function updateStats() {
      let text = noteArea.value;
      let chars = text.length;
      let words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
      statusBar.innerText = `  Words: ${words} | Chars: ${chars}`;
  }
  
  function save() {
      localStorage.setItem('knote_data_multi', JSON.stringify(notes));
      renderList();
  }
  
  function renderList() {
      noteList.innerHTML = '';
      let query = searchInput.value.toLowerCase().trim();
      
      let items = notes.map((note, idx) => ({ ...note, origIndex: idx }));
      if (query) {
          items = items.filter(n => n.text.toLowerCase().includes(query));
      }
      
      // Sort pinned notes first while maintaining order
      items.sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
      
      items.forEach((item) => {
          let i = item.origIndex;
          let li = document.createElement('li');
          li.className = 'note-item' + (i === activeIndex ? ' active' : '');
          let title = item.text.trim().split('\n')[0];
          let displayTitle = (item.pinned ? '📌 ' : '') + (title ? title : 'Empty Note');
          li.innerText = displayTitle;
          li.onclick = () => { activeIndex = i; loadActive(); };
          noteList.appendChild(li);
      });
      
      if (notes[activeIndex]) {
          pinBtn.innerText = notes[activeIndex].pinned ? 'Unpin Note' : 'Pin Note';
      }
  }
  
  function loadActive() {
      if (notes.length === 0) notes.push({ text: "", pinned: false });
      if (activeIndex >= notes.length) activeIndex = notes.length - 1;
      noteArea.value = notes[activeIndex].text;
      updateStats();
      renderList();
      noteArea.focus();
  }
  
  noteArea.addEventListener('input', () => {
      notes[activeIndex].text = noteArea.value;
      updateStats();
      save();
  });
  
  searchInput.addEventListener('input', () => {
      renderList();
  });
  
  newBtn.addEventListener('click', () => {
      notes.push({ text: "", pinned: false });
      activeIndex = notes.length - 1;
      save();
      loadActive();
  });
  
  delBtn.addEventListener('click', () => {
      notes.splice(activeIndex, 1);
      if (notes.length === 0) notes.push({ text: "", pinned: false });
      if (activeIndex >= notes.length) activeIndex = notes.length - 1;
      save();
      loadActive();
  });
  
  pinBtn.addEventListener('click', () => {
      if (notes[activeIndex]) {
          notes[activeIndex].pinned = !notes[activeIndex].pinned;
          save();
          renderList();
      }
  });

  exportBtn.addEventListener('click', () => {
      if (!notes[activeIndex]) return;
      let text = notes[activeIndex].text;
      let title = text.trim().split('\n')[0].replace(/[^a-zA-Z0-9_\-]/g, '_') || 'note';
      let blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      let a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${title}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
  });
  
  loadActive();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KNote</title>
<style>
  body { margin: 0; background-color: #ffff96; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  textarea {
      flex: 1;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      background-color: transparent;
      border: none;
      padding: 10px;
      font-family: "Comic Sans MS", "Segoe UI", sans-serif;
      font-size: 16px;
      resize: none;
      outline: none;
  }
</style>
</head>
<body>
<textarea id="noteArea" spellcheck="false">Buy milk
Fix that bug
Call mom</textarea>
<script>
  const noteArea = document.getElementById('noteArea');
  noteArea.focus();
</script>
</body>
</html>

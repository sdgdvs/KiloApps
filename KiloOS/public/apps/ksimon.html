<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KSimon</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #1a1a1a;
    color: #e0e0e0;
  }
  #game-container {
    text-align: center;
  }
  .simon-board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-gap: 10px;
    margin: 20px auto;
    width: 300px;
    height: 300px;
  }
  .simon-btn {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.1s ease-in-out;
    opacity: 0.6;
    transform: scale(1);
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  .simon-btn:active {
    opacity: 1;
    transform: scale(0.95);
  }
  .simon-btn.active {
    opacity: 1;
    filter: brightness(1.5);
    transform: scale(1.05);
  }
  #btn-0 { background-color: #00aa00; } /* green */
  #btn-0.active { box-shadow: 0 0 20px #00ff00; }
  #btn-1 { background-color: #aa0000; } /* red */
  #btn-1.active { box-shadow: 0 0 20px #ff0000; }
  #btn-2 { background-color: #aaaa00; } /* yellow */
  #btn-2.active { box-shadow: 0 0 20px #ffff00; }
  #btn-3 { background-color: #0000aa; } /* blue */
  #btn-3.active { box-shadow: 0 0 20px #0000ff; }
  
  body.game-over-flash {
    animation: flashRed 0.5s;
  }
  @keyframes flashRed {
    0% { background-color: #800000; }
    100% { background-color: #1a1a1a; }
  }
  
  #controls {
    margin-top: 20px;
  }
  #mode-select {
    background-color: #333;
    color: #e0e0e0;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 5px;
    margin-right: 10px;
    font-size: 16px;
    cursor: pointer;
  }
  #mode-select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #start-btn, .action-btn {
    background-color: #333;
    color: #e0e0e0;
    border: 1px solid #555;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.2s;
  }
  #start-btn:hover, .action-btn:hover {
    background-color: #444;
  }
  #start-btn:disabled, .action-btn:disabled {
    background-color: #222;
    color: #555;
    border-color: #333;
    cursor: not-allowed;
  }
  .action-btn {
    padding: 5px 10px;
    font-size: 14px;
    margin: 0 5px;
  }
  #status {
    margin-top: 10px;
    font-weight: bold;
    height: 20px;
  }
</style>
</head>
<body>

<div id="game-container">
  <h1>KSimon</h1>
  <div>Score: <span id="score">0</span> | High Score (<span id="high-score-mode">Classic</span>): <span id="high-score">0</span></div>
  <div class="simon-board">
    <button id="btn-0" class="simon-btn"></button>
    <button id="btn-1" class="simon-btn"></button>
    <button id="btn-2" class="simon-btn"></button>
    <button id="btn-3" class="simon-btn"></button>
  </div>
  <div id="controls">
    <select id="mode-select">
      <option value="classic">Mode: Classic</option>
      <option value="reverse">Mode: Reverse</option>
      <option value="speed">Mode: Speed</option>
      <option value="endless">Mode: Endless</option>
    </select>
    <button id="start-btn">Start Game</button>
    <div style="margin-top: 10px;">
      <button id="save-btn" class="action-btn" disabled>Save Game</button>
      <button id="load-btn" class="action-btn">Load Game</button>
      <button id="reset-btn" class="action-btn">Reset Stats</button>
    </div>
  </div>
  <div id="status">Press Start</div>
  <div id="stats" style="margin-top: 15px; font-size: 14px; color: #aaa;">
    Games: <span id="stat-games">0</span> | Streak: <span id="stat-streak">0</span> | Best Time: <span id="stat-time">0</span>s
  </div>
</div>

<script>
  const btns = [
    document.getElementById('btn-0'),
    document.getElementById('btn-1'),
    document.getElementById('btn-2'),
    document.getElementById('btn-3')
  ];
  const startBtn = document.getElementById('start-btn');
  const modeSelect = document.getElementById('mode-select');
  const scoreDisplay = document.getElementById('score');
  const statusDisplay = document.getElementById('status');
  const highScoreModeDisplay = document.getElementById('high-score-mode');
  const highScoreDisplay = document.getElementById('high-score');

  const statGamesDisplay = document.getElementById('stat-games');
  const statStreakDisplay = document.getElementById('stat-streak');
  const statTimeDisplay = document.getElementById('stat-time');
  const saveBtn = document.getElementById('save-btn');
  const loadBtn = document.getElementById('load-btn');
  const resetBtn = document.getElementById('reset-btn');

  function getStat(key) { return parseInt(localStorage.getItem('KSimon_Stat_' + key)) || 0; }
  function setStat(key, value) { localStorage.setItem('KSimon_Stat_' + key, value); }
  
  let statsGamesPlayed = getStat('gamesPlayed');
  let statsLongestStreak = getStat('longestStreak');
  let statsBestTime = getStat('bestTime');
  
  function updateStatsDisplay() {
    statGamesDisplay.innerText = statsGamesPlayed;
    statStreakDisplay.innerText = statsLongestStreak;
    statTimeDisplay.innerText = statsBestTime;
  }

  updateStatsDisplay();

  let startTime = 0;

  let sequence = [];
  let playerSequence = [];
  let isPlayingSequence = false;
  let currentMode = 'classic';

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const freqs = [415, 329, 261, 196]; // Green, Red, Yellow, Blue
  const freqWrong = 100;

  function playTone(freq, duration) {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration / 1000);
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration / 1000);
  }

  function getHighScore(mode) {
    return parseInt(localStorage.getItem('KSimon_HighScore_' + mode)) || 0;
  }
  function setHighScore(mode, score) {
    localStorage.setItem('KSimon_HighScore_' + mode, score);
  }
  function updateHighScoreDisplay() {
    highScoreModeDisplay.innerText = modeSelect.options[modeSelect.selectedIndex].text.replace('Mode: ', '');
    highScoreDisplay.innerText = getHighScore(modeSelect.value);
  }

  modeSelect.addEventListener('change', updateHighScoreDisplay);
  updateHighScoreDisplay();

  startBtn.addEventListener('click', startGame);

  saveBtn.addEventListener('click', saveGameState);
  loadBtn.addEventListener('click', loadGameState);
  resetBtn.addEventListener('click', resetStats);

  function saveGameState() {
    if (sequence.length === 0 || isPlayingSequence) return;
    const gameState = {
      sequence: sequence,
      currentMode: currentMode,
      elapsedTime: Date.now() - startTime
    };
    localStorage.setItem('KSimon_GameState', JSON.stringify(gameState));
    statusDisplay.innerText = "Game Saved!";
  }

  function loadGameState() {
    const saved = localStorage.getItem('KSimon_GameState');
    if (!saved) {
      statusDisplay.innerText = "No saved game found.";
      return;
    }
    const gameState = JSON.parse(saved);
    sequence = gameState.sequence;
    currentMode = gameState.currentMode;
    startTime = Date.now() - gameState.elapsedTime;
    
    modeSelect.value = currentMode;
    modeSelect.disabled = true;
    startBtn.disabled = true;
    saveBtn.disabled = true;
    
    scoreDisplay.innerText = (sequence.length - 1).toString();
    updateHighScoreDisplay();
    
    playerSequence = [];
    statusDisplay.innerText = "Game Loaded! Watch...";
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playSequence();
  }

  function resetStats() {
    localStorage.removeItem('KSimon_Stat_gamesPlayed');
    localStorage.removeItem('KSimon_Stat_longestStreak');
    localStorage.removeItem('KSimon_Stat_bestTime');
    statsGamesPlayed = 0;
    statsLongestStreak = 0;
    statsBestTime = 0;
    updateStatsDisplay();
    statusDisplay.innerText = "Stats Reset!";
  }

  btns.forEach((btn, index) => {
    btn.addEventListener('mousedown', () => {
      if (isPlayingSequence || sequence.length === 0) return;
      handlePlayerInput(index);
    });
  });

  document.addEventListener('keydown', (e) => {
    if (isPlayingSequence || sequence.length === 0) return;
    let index = -1;
    switch(e.key.toLowerCase()) {
      case 'q': case 'arrowup': index = 0; break;
      case 'w': case 'arrowright': index = 1; break;
      case 'a': case 'arrowdown': index = 2; break;
      case 's': case 'arrowleft': index = 3; break;
    }
    if (index !== -1) {
      e.preventDefault();
      handlePlayerInput(index);
    }
  });

  function startGame() {
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    startTime = Date.now();
    currentMode = modeSelect.value;
    modeSelect.disabled = true;
    sequence = [];
    scoreDisplay.innerText = "0";
    statusDisplay.innerText = "Get Ready...";
    startBtn.disabled = true;
    setTimeout(nextRound, 1000);
  }

  function nextRound() {
    playerSequence = [];
    sequence.push(Math.floor(Math.random() * 4));
    scoreDisplay.innerText = (sequence.length - 1).toString();
    playSequence();
  }

  function playSequence() {
    isPlayingSequence = true;
    saveBtn.disabled = true;
    statusDisplay.innerText = "Watch...";
    let i = currentMode === 'endless' ? Math.max(0, sequence.length - 1) : 0;
    
    let speedFactor = Math.max(0, sequence.length - 1);
    let flashDuration = currentMode === 'speed' ? Math.max(80, 200 - (speedFactor * 10)) : Math.max(150, 400 - (speedFactor * 20));
    let pauseDuration = currentMode === 'speed' ? Math.max(40, 100 - (speedFactor * 5)) : Math.max(75, 200 - (speedFactor * 10));

    function flashNext() {
      if (i >= sequence.length) {
        isPlayingSequence = false;
        statusDisplay.innerText = currentMode === 'reverse' ? "Your Turn (Reverse)!" : "Your Turn!";
        saveBtn.disabled = false;
        return;
      }
      const index = sequence[i];
      const btn = btns[index];
      btn.classList.add('active');
      playTone(freqs[index], flashDuration);
      setTimeout(() => {
        btn.classList.remove('active');
        i++;
        setTimeout(flashNext, pauseDuration);
      }, flashDuration);
    }
    
    flashNext();
  }

  function handlePlayerInput(index) {
    const btn = btns[index];
    btn.classList.add('active');
    setTimeout(() => {
      btn.classList.remove('active');
    }, 200);

    playerSequence.push(index);

    const currentStep = playerSequence.length - 1;
    let expectedIndex;
    if (currentMode === 'reverse') {
      expectedIndex = sequence[sequence.length - 1 - currentStep];
    } else {
      expectedIndex = sequence[currentStep];
    }

    if (playerSequence[currentStep] !== expectedIndex) {
      // Game Over
      document.body.classList.add('game-over-flash');
      setTimeout(() => document.body.classList.remove('game-over-flash'), 500);
      playTone(freqWrong, 800);
      let finalScore = sequence.length - 1;
      statusDisplay.innerText = "Game Over! Score: " + finalScore;
      
      if (finalScore > getHighScore(currentMode)) {
        setHighScore(currentMode, finalScore);
        updateHighScoreDisplay();
        statusDisplay.innerText += " (New High Score!)";
      }

      statsGamesPlayed++;
      statsLongestStreak = Math.max(statsLongestStreak, finalScore);
      let gameTime = Math.floor((Date.now() - startTime) / 1000);
      statsBestTime = Math.max(statsBestTime, gameTime);
      setStat('gamesPlayed', statsGamesPlayed);
      setStat('longestStreak', statsLongestStreak);
      setStat('bestTime', statsBestTime);
      updateStatsDisplay();
      
      sequence = [];
      startBtn.disabled = false;
      modeSelect.disabled = false;
      saveBtn.disabled = true;
      return;
    }

    playTone(freqs[index], 200);

    if (playerSequence.length === sequence.length) {
      statusDisplay.innerText = "Good! Get ready...";
      isPlayingSequence = true;
      setTimeout(nextRound, 1000);
    }
  }
</script>

</body>
</html>

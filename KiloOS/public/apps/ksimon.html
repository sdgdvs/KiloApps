<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KSimon</title>
<style>
  body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #1a1a1a;
    color: #e0e0e0;
  }
  #game-container {
    text-align: center;
  }
  .simon-board {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-gap: 10px;
    margin: 20px auto;
    width: 300px;
    height: 300px;
  }
  .simon-btn {
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: filter 0.1s;
    opacity: 0.6;
  }
  .simon-btn:active {
    opacity: 1;
  }
  .simon-btn.active {
    opacity: 1;
    filter: brightness(1.5);
  }
  #btn-0 { background-color: #00aa00; } /* green */
  #btn-1 { background-color: #aa0000; } /* red */
  #btn-2 { background-color: #aaaa00; } /* yellow */
  #btn-3 { background-color: #0000aa; } /* blue */
  
  #controls {
    margin-top: 20px;
  }
  #mode-select {
    background-color: #333;
    color: #e0e0e0;
    border: 1px solid #555;
    padding: 10px;
    border-radius: 5px;
    margin-right: 10px;
    font-size: 16px;
    cursor: pointer;
  }
  #mode-select:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #start-btn {
    background-color: #333;
    color: #e0e0e0;
    border: 1px solid #555;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    transition: background-color 0.2s;
  }
  #start-btn:hover {
    background-color: #444;
  }
  #start-btn:disabled {
    background-color: #222;
    color: #555;
    border-color: #333;
    cursor: not-allowed;
  }
  #status {
    margin-top: 10px;
    font-weight: bold;
    height: 20px;
  }
</style>
</head>
<body>

<div id="game-container">
  <h1>KSimon</h1>
  <div>Score: <span id="score">0</span></div>
  <div class="simon-board">
    <button id="btn-0" class="simon-btn"></button>
    <button id="btn-1" class="simon-btn"></button>
    <button id="btn-2" class="simon-btn"></button>
    <button id="btn-3" class="simon-btn"></button>
  </div>
  <div id="controls">
    <select id="mode-select">
      <option value="classic">Mode: Classic</option>
      <option value="reverse">Mode: Reverse</option>
      <option value="speed">Mode: Speed</option>
    </select>
    <button id="start-btn">Start Game</button>
  </div>
  <div id="status">Press Start</div>
</div>

<script>
  const btns = [
    document.getElementById('btn-0'),
    document.getElementById('btn-1'),
    document.getElementById('btn-2'),
    document.getElementById('btn-3')
  ];
  const startBtn = document.getElementById('start-btn');
  const modeSelect = document.getElementById('mode-select');
  const scoreDisplay = document.getElementById('score');
  const statusDisplay = document.getElementById('status');

  let sequence = [];
  let playerSequence = [];
  let isPlayingSequence = false;
  let currentMode = 'classic';

  startBtn.addEventListener('click', startGame);

  btns.forEach((btn, index) => {
    btn.addEventListener('mousedown', () => {
      if (isPlayingSequence || sequence.length === 0) return;
      handlePlayerInput(index);
    });
  });

  function startGame() {
    currentMode = modeSelect.value;
    modeSelect.disabled = true;
    sequence = [];
    scoreDisplay.innerText = "0";
    statusDisplay.innerText = "Get Ready...";
    startBtn.disabled = true;
    setTimeout(nextRound, 1000);
  }

  function nextRound() {
    playerSequence = [];
    sequence.push(Math.floor(Math.random() * 4));
    scoreDisplay.innerText = (sequence.length - 1).toString();
    playSequence();
  }

  function playSequence() {
    isPlayingSequence = true;
    statusDisplay.innerText = "Watch...";
    let i = 0;
    
    let flashDuration = currentMode === 'speed' ? 200 : 400;
    let pauseDuration = currentMode === 'speed' ? 100 : 200;

    function flashNext() {
      if (i >= sequence.length) {
        isPlayingSequence = false;
        statusDisplay.innerText = currentMode === 'reverse' ? "Your Turn (Reverse)!" : "Your Turn!";
        return;
      }
      const index = sequence[i];
      const btn = btns[index];
      btn.classList.add('active');
      setTimeout(() => {
        btn.classList.remove('active');
        i++;
        setTimeout(flashNext, pauseDuration);
      }, flashDuration);
    }
    
    flashNext();
  }

  function handlePlayerInput(index) {
    const btn = btns[index];
    btn.classList.add('active');
    setTimeout(() => {
      btn.classList.remove('active');
    }, 200);

    playerSequence.push(index);

    const currentStep = playerSequence.length - 1;
    let expectedIndex;
    if (currentMode === 'reverse') {
      expectedIndex = sequence[sequence.length - 1 - currentStep];
    } else {
      expectedIndex = sequence[currentStep];
    }

    if (playerSequence[currentStep] !== expectedIndex) {
      // Game Over
      statusDisplay.innerText = "Game Over! Score: " + (sequence.length - 1);
      sequence = [];
      startBtn.disabled = false;
      modeSelect.disabled = false;
      return;
    }

    if (playerSequence.length === sequence.length) {
      statusDisplay.innerText = "Good! Get ready...";
      isPlayingSequence = true;
      setTimeout(nextRound, 1000);
    }
  }
</script>

</body>
</html>

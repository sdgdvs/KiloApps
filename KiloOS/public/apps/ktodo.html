<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #1a1a1a;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  .header {
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .glass-panel {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  input[type="text"]:focus {
    border-color: #5a8bd4;
    box-shadow: 0 0 0 3px rgba(90, 139, 212, 0.3);
  }
  button.add-btn {
    background: linear-gradient(135deg, #5a8bd4, #3a6baf);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(90, 139, 212, 0.4);
  }
  button.add-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(90, 139, 212, 0.6);
  }
  button.add-btn:active {
    transform: translateY(0);
  }
  .todo-list {
    flex: 1;
    overflow-y: auto;
    padding-right: 4px;
  }
  .todo-list::-webkit-scrollbar { width: 6px; }
  .todo-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
  
  .todo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    margin-bottom: 8px;
    transition: all 0.2s;
    animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .todo-item:hover {
    background: rgba(255, 255, 255, 0.1);
    transform: translateX(2px);
  }
  .todo-item.completed {
    opacity: 0.6;
  }
  .todo-item.completed .todo-text {
    text-decoration: line-through;
    color: #888;
  }
  .todo-checkbox {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #5a8bd4;
  }
  .todo-text { flex: 1; font-size: 15px; cursor: pointer; user-select: none; }
  .delete-btn { 
    background: transparent; 
    color: #d45a5a; 
    border: none; 
    font-size: 18px;
    cursor: pointer; 
    opacity: 0.5;
    transition: all 0.2s;
  }
  .todo-item:hover .delete-btn { opacity: 1; }
  .delete-btn:hover {
    color: #ff6b6b;
    transform: scale(1.2);
  }
</style>
</head>
<body>
  <div class="header">KTodo</div>
  <div class="glass-panel">
    <div class="input-group">
      <input type="text" id="taskInput" placeholder="Add a new task..." onkeypress="handleKeyPress(event)">
      <button class="add-btn" onclick="addTask()">Add</button>
    </div>
    <div class="todo-list" id="todoList">
      <!-- Tasks injected via JS -->
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('ktodo_tasks')) || [];

    function saveTasks() {
      localStorage.setItem('ktodo_tasks', JSON.stringify(tasks));
      renderTasks();
    }

    function renderTasks() {
      const list = document.getElementById('todoList');
      list.innerHTML = '';
      
      tasks.forEach((task, index) => {
        const item = document.createElement('div');
        item.className = `todo-item ${task.completed ? 'completed' : ''}`;
        
        item.innerHTML = `
          <input type="checkbox" class="todo-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
          <span class="todo-text" onclick="toggleTask(${index})">${escapeHtml(task.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${index})" title="Delete Task">×</button>
        `;
        list.appendChild(item);
      });
    }

    function escapeHtml(unsafe) {
      return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (text) {
        tasks.unshift({ text, completed: false });
        input.value = '';
        saveTasks();
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') addTask();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
    }

    // Initial render
    renderTasks();
  </script>
</body>
</html>

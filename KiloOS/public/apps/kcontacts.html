<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #121212;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    box-sizing: border-box;
  }
  .sidebar {
    width: 35%;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
  }
  .search-bar {
    padding: 10px;
    border-bottom: 1px solid #333;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .search-bar input, .search-bar select {
    width: 100%;
    padding: 8px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    box-sizing: border-box;
    outline: none;
  }
  .contact-list {
    flex: 1;
    overflow-y: auto;
  }
  .contact-item {
    padding: 12px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    flex-direction: column;
  }
  .contact-item:hover, .contact-item.active {
    background: #2c3e50;
  }
  .contact-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .contact-item-name {
    font-weight: bold;
    color: #fff;
  }
  .contact-item-sub {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
  }
  .badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: #444;
    color: #fff;
  }
  .badge.Work { background: #d35400; }
  .badge.Personal { background: #27ae60; }
  .badge.Family { background: #8e44ad; }
  
  .details-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
  }
  .toolbar {
    padding: 10px;
    background: #222;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  button {
    background: #3498db;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #2980b9; }
  button.danger { background: #e74c3c; }
  button.danger:hover { background: #c0392b; }
  
  .form-area {
    padding: 20px;
    flex: 1;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 15px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-group.row {
    flex-direction: row;
    align-items: center;
    gap: 10px;
  }
  .form-group label {
    font-size: 12px;
    color: #aaa;
    font-weight: bold;
  }
  .form-group input[type="text"], .form-group textarea, .form-group select {
    padding: 10px;
    background: #111;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
  }
  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }
  
  .empty-state {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #666;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search contacts..." aria-label="Search Contacts">
      <select id="filterCategory" aria-label="Filter Contacts Category">
        <option value="All">All Categories</option>
        <option value="Favorites">★ Favorites Only</option>
        <option value="Work">Work</option>
        <option value="Personal">Personal</option>
        <option value="Family">Family</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="contact-list" id="contactList">
      <!-- Contact items -->
    </div>
  </div>
  
  <div class="details-panel">
    <div class="toolbar">
      <button id="btnNew">+ New</button>
      <button id="btnSave" style="display:none;">Save</button>
      <button class="danger" id="btnDel" style="display:none;">Delete</button>
    </div>
    
    <div class="empty-state" id="emptyState">
      Select a contact or create a new one.
    </div>
    
    <div class="form-area" id="formArea">
      <div class="form-group row">
        <input type="checkbox" id="inpFav">
        <label for="inpFav" style="font-size: 14px; color: #fff;">Favorite Contact ★</label>
      </div>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="inpName" placeholder="Full Name">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="inpCategory">
          <option value="Work">Work</option>
          <option value="Personal">Personal</option>
          <option value="Family">Family</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="inpEmail" placeholder="Email Address">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="inpPhone" placeholder="Phone Number">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="inpNotes" placeholder="Additional details..."></textarea>
      </div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const filterCategory = document.getElementById('filterCategory');
    const contactList = document.getElementById('contactList');
    const btnNew = document.getElementById('btnNew');
    const btnSave = document.getElementById('btnSave');
    const btnDel = document.getElementById('btnDel');
    const emptyState = document.getElementById('emptyState');
    const formArea = document.getElementById('formArea');
    
    const inpName = document.getElementById('inpName');
    const inpEmail = document.getElementById('inpEmail');
    const inpPhone = document.getElementById('inpPhone');
    const inpNotes = document.getElementById('inpNotes');
    const inpCategory = document.getElementById('inpCategory');
    const inpFav = document.getElementById('inpFav');

    let contacts = JSON.parse(localStorage.getItem('kcontacts_data') || '[]');
    if (contacts.length === 0) {
      contacts.push({name: "Alice Smith", phone: "555-1234", email: "alice@example.com", category: "Work", fav: false});
      contacts.push({name: "Bob Jones", phone: "555-5678", email: "bob@example.com", category: "Personal", fav: true});
    }
    
    let currentEditIndex = -1;

    function renderList() {
      const search = searchInput.value.toLowerCase();
      const catFilter = filterCategory.value;
      
      contactList.innerHTML = '';
      contacts.forEach((c, i) => {
        const nameMatch = (c.name || '').toLowerCase().includes(search);
        const emailMatch = (c.email || '').toLowerCase().includes(search);
        
        let catMatch = true;
        if (catFilter === 'Favorites') catMatch = c.fav === true;
        else if (catFilter !== 'All') catMatch = c.category === catFilter;
        
        if ((nameMatch || emailMatch) && catMatch) {
          const div = document.createElement('div');
          div.className = 'contact-item' + (i === currentEditIndex ? ' active' : '');
          div.tabIndex = 0;
          div.setAttribute('role', 'button');
          div.setAttribute('aria-label', 'Contact ' + (c.name || 'Unnamed Contact'));
          
          const header = document.createElement('div');
          header.className = 'contact-item-header';
          
          const nameSpan = document.createElement('span');
          nameSpan.className = 'contact-item-name';
          nameSpan.textContent = (c.name || 'Unnamed Contact') + (c.fav ? ' ★' : '');
          
          const badgeSpan = document.createElement('span');
          badgeSpan.className = 'badge ' + (c.category || 'Other');
          badgeSpan.textContent = c.category || 'Other';
          
          header.appendChild(nameSpan);
          header.appendChild(badgeSpan);
          
          const sub = document.createElement('div');
          sub.className = 'contact-item-sub';
          
          const emailSpan = document.createElement('span');
          emailSpan.textContent = c.email || '';
          
          sub.appendChild(emailSpan);
          
          div.appendChild(header);
          div.appendChild(sub);
          
          div.onclick = () => selectContact(i);
          div.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectContact(i); } };
          contactList.appendChild(div);
        }
      });
    }

    function selectContact(index) {
      currentEditIndex = index;
      const c = contacts[index];
      inpName.value = c.name || '';
      inpEmail.value = c.email || '';
      inpPhone.value = c.phone || '';
      inpNotes.value = c.notes || '';
      inpCategory.value = c.category || 'Other';
      inpFav.checked = !!c.fav;
      
      emptyState.style.display = 'none';
      formArea.style.display = 'flex';
      btnSave.style.display = 'block';
      btnDel.style.display = 'block';
      renderList();
    }

    btnNew.onclick = () => {
      currentEditIndex = -1;
      inpName.value = '';
      inpEmail.value = '';
      inpPhone.value = '';
      inpNotes.value = '';
      inpCategory.value = 'Other';
      inpFav.checked = false;
      
      emptyState.style.display = 'none';
      formArea.style.display = 'flex';
      btnSave.style.display = 'block';
      btnDel.style.display = 'none';
      renderList();
    };

    btnSave.onclick = () => {
      const c = {
        name: inpName.value.trim(),
        email: inpEmail.value.trim(),
        phone: inpPhone.value.trim(),
        notes: inpNotes.value.trim(),
        category: inpCategory.value,
        fav: inpFav.checked
      };
      
      if (!c.name) {
        alert("Name is required!");
        return;
      }

      if (currentEditIndex === -1) {
        contacts.push(c);
        currentEditIndex = contacts.length - 1;
      } else {
        contacts[currentEditIndex] = c;
      }
      
      localStorage.setItem('kcontacts_data', JSON.stringify(contacts));
      btnDel.style.display = 'block';
      renderList();
    };

    btnDel.onclick = () => {
      if (confirm('Delete this contact?')) {
        contacts.splice(currentEditIndex, 1);
        localStorage.setItem('kcontacts_data', JSON.stringify(contacts));
        currentEditIndex = -1;
        
        emptyState.style.display = 'flex';
        formArea.style.display = 'none';
        btnSave.style.display = 'none';
        btnDel.style.display = 'none';
        renderList();
      }
    };

    searchInput.oninput = renderList;
    filterCategory.onchange = renderList;

    renderList();
  </script>
</body>
</html>

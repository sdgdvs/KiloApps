<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #121212;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    box-sizing: border-box;
  }
  .sidebar {
    width: 35%;
    border-right: 1px solid #333;
    display: flex;
    flex-direction: column;
    background: #1a1a1a;
  }
  .search-bar {
    padding: 10px;
    border-bottom: 1px solid #333;
  }
  .search-bar input {
    width: 100%;
    padding: 8px;
    background: #2a2a2a;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    box-sizing: border-box;
    outline: none;
  }
  .contact-list {
    flex: 1;
    overflow-y: auto;
  }
  .contact-item {
    padding: 12px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
    transition: background 0.2s;
  }
  .contact-item:hover, .contact-item.active {
    background: #2c3e50;
  }
  .contact-item-name {
    font-weight: bold;
    color: #fff;
  }
  .contact-item-sub {
    font-size: 12px;
    color: #888;
    margin-top: 4px;
  }
  
  .details-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #1e1e1e;
  }
  .toolbar {
    padding: 10px;
    background: #222;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  button {
    background: #3498db;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover { background: #2980b9; }
  button.danger { background: #e74c3c; }
  button.danger:hover { background: #c0392b; }
  
  .form-area {
    padding: 20px;
    flex: 1;
    overflow-y: auto;
    display: none;
    flex-direction: column;
    gap: 15px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-group label {
    font-size: 12px;
    color: #aaa;
    font-weight: bold;
  }
  .form-group input, .form-group textarea {
    padding: 10px;
    background: #111;
    border: 1px solid #444;
    color: #fff;
    border-radius: 4px;
    outline: none;
    font-family: inherit;
  }
  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }
  
  .empty-state {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #666;
    font-style: italic;
  }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search contacts...">
    </div>
    <div class="contact-list" id="contactList">
      <!-- Contact items -->
    </div>
  </div>
  
  <div class="details-panel">
    <div class="toolbar">
      <button id="btnNew">+ New</button>
      <button id="btnSave" style="display:none;">Save</button>
      <button class="danger" id="btnDel" style="display:none;">Delete</button>
    </div>
    
    <div class="empty-state" id="emptyState">
      Select a contact or create a new one.
    </div>
    
    <div class="form-area" id="formArea">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="inpName" placeholder="Full Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="inpEmail" placeholder="Email Address">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="text" id="inpPhone" placeholder="Phone Number">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="inpNotes" placeholder="Additional details..."></textarea>
      </div>
    </div>
  </div>

  <script>
    // Phase 1 Scaffold
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>KSnake</title>
    <style>
        body { margin: 0; padding: 0; background: #1e1e1e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { background: #1e1e1e; border: 2px solid #666; box-sizing: content-box; }
        #message { position: absolute; text-align: center; display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="300" height="300"></canvas>
    <div id="message">
        <h2 style="color: red; margin:0">GAME OVER</h2>
        <p style="margin:5px 0">Press ENTER to return</p>
    </div>
    <div id="menu">
        <h2 style="color: white; margin:0 0 20px 0">KSNAKE</h2>
        <p style="margin:5px 0">Select Difficulty:</p>
        <p style="margin:5px 0">1 - Easy</p>
        <p style="margin:5px 0">2 - Medium</p>
        <p style="margin:5px 0">3 - Hard</p>
        <p style="margin:5px 0">W - Toggle Wrap: <span id="wrapStatus">OFF</span></p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgBox = document.getElementById('message');
        const menuBox = document.getElementById('menu');
        const CELL = 15;
        const WIDTH = 20;
        const HEIGHT = 20;

        let snake, food, dir, lastDir, gameState = 0; // 0=Menu, 1=Playing, 2=GameOver
        let wrapMode = false;
        let specialFood = null;
        let specialFoodTimer = 0;
        let difficulty = 1; // 0=Easy, 1=Medium, 2=Hard
        let score = 0;
        let scoreMult = 10;
        let highScore = localStorage.getItem('ksnakeHighScore') || 0;
        let currentSpeed = 150;
        let gameLoop;
        let obstacles = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function init() {
            snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
            dir = {x: 1, y: 0};
            lastDir = {x: 1, y: 0};
            gameState = 1;
            score = 0;
            
            specialFood = null;
            specialFoodTimer = 0;
            if (difficulty === 0) { currentSpeed = 200; scoreMult = 5; }
            else if (difficulty === 1) { currentSpeed = 150; scoreMult = 10; }
            else { currentSpeed = 100; scoreMult = 20; }
            
            obstacles = [];
            let numObs = difficulty * 10;
            for(let i=0; i<numObs; i++) {
                let ok = false;
                while(!ok) {
                    let ox = Math.floor(Math.random() * WIDTH);
                    let oy = Math.floor(Math.random() * HEIGHT);
                    ok = true;
                    if (oy === 5 && ox >= 2 && ox <= 6) ok = false;
                    if (ok) obstacles.push({x: ox, y: oy});
                }
            }
            
            msgBox.style.display = 'none';
            menuBox.style.display = 'none';
            canvas.style.display = 'block';
            placeFood();
            startGameLoop();
        }

        function startGameLoop() {
            if (gameLoop) clearTimeout(gameLoop);
            gameLoop = setTimeout(loop, currentSpeed);
        }

        function loop() {
            update();
            draw();
            if (gameState === 1) {
                gameLoop = setTimeout(loop, currentSpeed);
            }
        }

        function placeFood() {
            let ok = false;
            while(!ok) {
                food = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === food.x && o.y === food.y)) ok = false;
                if (snake.some(s => s.x === food.x && s.y === food.y)) ok = false;
            }
        }

        function placeSpecialFood() {
            let ok = false;
            while(!ok) {
                specialFood = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === specialFood.x && o.y === specialFood.y)) ok = false;
                if (snake.some(s => s.x === specialFood.x && s.y === specialFood.y)) ok = false;
                if (specialFood.x === food.x && specialFood.y === food.y) ok = false;
            }
            specialFoodTimer = 40;
        }

        function update() {
            if (gameState !== 1) return;

            lastDir = {x: dir.x, y: dir.y};
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            if (wrapMode) {
                if (head.x < 0) head.x = WIDTH - 1;
                else if (head.x >= WIDTH) head.x = 0;
                
                if (head.y < 0) head.y = HEIGHT - 1;
                else if (head.y >= HEIGHT) head.y = 0;
                
                if (snake.some(s => s.x === head.x && s.y === head.y) || obstacles.some(o => o.x === head.x && o.y === head.y)) {
                    playSound('die');
                    gameState = 2;
                    msgBox.style.display = 'block';
                    return;
                }
            } else {
                if (head.x < 0 || head.x >= WIDTH || head.y < 0 || head.y >= HEIGHT || snake.some(s => s.x === head.x && s.y === head.y) || obstacles.some(o => o.x === head.x && o.y === head.y)) {
                    playSound('die');
                    gameState = 2;
                    msgBox.style.display = 'block';
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                playSound('eat');
                score += scoreMult;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('ksnakeHighScore', highScore);
                }
                if (currentSpeed > 30) currentSpeed -= 2;
                placeFood();
                if (!specialFood && Math.random() < 0.2) {
                    placeSpecialFood();
                }
            } else {
                snake.pop();
            }

            if (specialFoodTimer > 0) {
                specialFoodTimer--;
                if (specialFoodTimer === 0) specialFood = null;
            }

            if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                playSound('eat');
                score += scoreMult * 5;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('ksnakeHighScore', highScore);
                }
                for (let i = 0; i < 3 && snake.length > 3; i++) {
                    snake.pop();
                }
                specialFood = null;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== 1) return;

            ctx.fillStyle = '#0f0';
            for (let s of snake) {
                ctx.fillRect(s.x * CELL, s.y * CELL, CELL - 1, CELL - 1);
            }

            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * CELL, food.y * CELL, CELL - 1, CELL - 1);
            
            if (specialFood) {
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(specialFood.x * CELL, specialFood.y * CELL, CELL - 1, CELL - 1);
            }
            
            ctx.fillStyle = '#666';
            for (let o of obstacles) {
                ctx.fillRect(o.x * CELL, o.y * CELL, CELL - 1, CELL - 1);
            }
            
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.fillText(`Score: ${score}  High: ${highScore}`, 5, 15);
        }

        window.addEventListener('keydown', e => {
            if (gameState === 0) {
                if (e.key === '1') { difficulty = 0; init(); }
                if (e.key === '2') { difficulty = 1; init(); }
                if (e.key === '3') { difficulty = 2; init(); }
                if (e.key.toLowerCase() === 'w') {
                    wrapMode = !wrapMode;
                    document.getElementById('wrapStatus').innerText = wrapMode ? 'ON' : 'OFF';
                }
            } else if (gameState === 2 && e.key === 'Enter') {
                gameState = 0;
                msgBox.style.display = 'none';
                menuBox.style.display = 'block';
                canvas.style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else if (gameState === 1) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
                if (e.key === 'ArrowUp' && lastDir.y !== 1) dir = {x: 0, y: -1};
                if (e.key === 'ArrowDown' && lastDir.y !== -1) dir = {x: 0, y: 1};
                if (e.key === 'ArrowLeft' && lastDir.x !== 1) dir = {x: -1, y: 0};
                if (e.key === 'ArrowRight' && lastDir.x !== -1) dir = {x: 1, y: 0};
            }
        });

        // initial state
        canvas.style.display = 'none';
        msgBox.style.display = 'none';
        menuBox.style.display = 'block';
    </script>
</body>
</html>

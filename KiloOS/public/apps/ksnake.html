<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>KSnake</title>
    <style>
        body { margin: 0; padding: 0; background: #1e1e1e; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; color: white; }
        canvas { background: #1e1e1e; border: 2px solid #666; box-sizing: content-box; }
        #message { position: absolute; text-align: center; display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="300" height="300" aria-label="KSnake Game" role="application" tabindex="0"></canvas>
    <div id="message">
        <h2 style="color: red; margin:0">GAME OVER</h2>
        <p style="margin:5px 0">Press ENTER to return</p>
    </div>
    <div id="menu">
        <h2 style="color: white; margin:0 0 20px 0">KSNAKE</h2>
        <p style="margin:5px 0">Select Difficulty:</p>
        <p style="margin:5px 0">1 - Easy</p>
        <p style="margin:5px 0">2 - Medium</p>
        <p style="margin:5px 0">3 - Hard</p>
        <p style="margin:5px 0">4 - Campaign</p>
        <p style="margin:5px 0">W - Toggle Wrap: <span id="wrapStatus">OFF</span></p>
        <p style="margin:15px 0 5px 0; font-size: 14px; color: #aaa;" id="statsDisplay"></p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const msgBox = document.getElementById('message');
        const menuBox = document.getElementById('menu');
        const CELL = 15;
        const WIDTH = 20;
        const HEIGHT = 20;

        let snake, food, dir, lastDir, gameState = 0; // 0=Menu, 1=Playing, 2=GameOver
        let wrapMode = false;
        let specialFood = null;
        let ghostFood = null;
        let ghostFoodTimer = 0;
        let ghostActiveTimer = 0;
        let campaignMode = false;
        let campaignLevel = 1;
        let applesEaten = 0;
        let specialFoodTimer = 0;
        let iceFood = null;
        let iceFoodTimer = 0;
        let iceActiveTimer = 0;
        let spiders = [];
        let portal1 = null;
        let portal2 = null;
        let trackers = [];
        
        let totalApples = parseInt(localStorage.getItem('ksnakeTotalApples')) || 0;
        let gamesPlayed = parseInt(localStorage.getItem('ksnakeGamesPlayed')) || 0;
        let difficulty = 1; // 0=Easy, 1=Medium, 2=Hard
        let score = 0;
        let scoreMult = 10;
        let highScore = localStorage.getItem('ksnakeHighScore') || 0;
        let currentSpeed = 150;
        let gameLoop;
        let spiderTick = 0;
        let obstacles = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function safeSetItem(key, val) {
            try { localStorage.setItem(key, val); } catch (e) { console.error(e); }
        }
        function playSound(type) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function init() {
            gamesPlayed++;
            safeSetItem('ksnakeGamesPlayed', gamesPlayed);
            document.getElementById('statsDisplay').innerText = `Games: ${gamesPlayed}  Total Apples: ${totalApples}`;
            
            snake = [{x: 5, y: 5}, {x: 4, y: 5}, {x: 3, y: 5}];
            dir = {x: 1, y: 0};
            lastDir = {x: 1, y: 0};
            gameState = 1;
            score = 0;
            applesEaten = 0;
            ghostFood = null;
            ghostFoodTimer = 0;
            ghostActiveTimer = 0;
            iceFood = null;
            iceFoodTimer = 0;
            iceActiveTimer = 0;
            spiderTick = 0;
            portal1 = null;
            portal2 = null;
            trackers = [];
            
            specialFood = null;
            specialFoodTimer = 0;
            if (campaignMode) { difficulty = 1; }
            if (difficulty === 0) { currentSpeed = 200; scoreMult = 5; }
            else if (difficulty === 1) { currentSpeed = 150; scoreMult = 10; }
            else { currentSpeed = 100; scoreMult = 20; }
            
            obstacles = [];
            let numObs = difficulty * 10;
            if (campaignMode) {
                numObs = campaignLevel * 4;
                if (numObs > 45) numObs = 45;
            }
            for(let i=0; i<numObs; i++) {
                let ok = false;
                while(!ok) {
                    let ox = Math.floor(Math.random() * WIDTH);
                    let oy = Math.floor(Math.random() * HEIGHT);
                    ok = true;
                    if (oy === 5 && ox >= 2 && ox <= 6) ok = false;
                    if (ok) obstacles.push({x: ox, y: oy});
                }
            }
            
            spiders = [];
            let numSpiders = difficulty;
            if (campaignMode) { numSpiders = Math.floor(campaignLevel / 2); }
            if (numSpiders > 10) numSpiders = 10;
            for(let i=0; i<numSpiders; i++) {
                spiders.push({x: Math.floor(Math.random() * WIDTH), y: Math.floor(Math.random() * HEIGHT)});
            }
            
            if (campaignMode && campaignLevel >= 6) {
                let ok = false;
                while(!ok) {
                    portal1 = {x: Math.floor(Math.random() * WIDTH), y: Math.floor(Math.random() * HEIGHT)};
                    portal2 = {x: Math.floor(Math.random() * WIDTH), y: Math.floor(Math.random() * HEIGHT)};
                    ok = true;
                    if (portal1.x === portal2.x && portal1.y === portal2.y) ok = false;
                    if (obstacles.some(o => (o.x === portal1.x && o.y === portal1.y) || (o.x === portal2.x && o.y === portal2.y))) ok = false;
                    if (portal1.y === 5 && portal1.x >= 2 && portal1.x <= 6) ok = false;
                    if (portal2.y === 5 && portal2.x >= 2 && portal2.x <= 6) ok = false;
                }
            }
            
            let numTrackers = 0;
            if (campaignMode && campaignLevel >= 11) {
                numTrackers = campaignLevel - 10;
            } else if (!campaignMode && difficulty === 2) {
                numTrackers = 1;
            }
            if (numTrackers > 5) numTrackers = 5;
            for(let i=0; i<numTrackers; i++) {
                trackers.push({x: Math.floor(Math.random() * WIDTH), y: Math.floor(Math.random() * HEIGHT)});
            }
            
            msgBox.style.display = 'none';
            menuBox.style.display = 'none';
            canvas.style.display = 'block';
            placeFood();
            startGameLoop();
            requestAnimationFrame(animLoop);
        }

        function startGameLoop() {
            if (gameLoop) clearTimeout(gameLoop);
            gameLoop = setTimeout(loop, currentSpeed);
        }

        function loop() {
            update();
            draw();
            if (gameState === 1) {
                let spd = currentSpeed;
                if (iceActiveTimer > 0) spd += 100;
                gameLoop = setTimeout(loop, spd);
            }
        }

        function placeFood() {
            let ok = false;
            while(!ok) {
                food = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === food.x && o.y === food.y)) ok = false;
                if (snake.some(s => s.x === food.x && s.y === food.y)) ok = false;
                if (portal1 && food.x === portal1.x && food.y === portal1.y) ok = false;
                if (portal2 && food.x === portal2.x && food.y === portal2.y) ok = false;
            }
        }

        function placeSpecialFood() {
            let ok = false;
            while(!ok) {
                specialFood = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === specialFood.x && o.y === specialFood.y)) ok = false;
                if (snake.some(s => s.x === specialFood.x && s.y === specialFood.y)) ok = false;
                if (specialFood.x === food.x && specialFood.y === food.y) ok = false;
                if (portal1 && specialFood.x === portal1.x && specialFood.y === portal1.y) ok = false;
                if (portal2 && specialFood.x === portal2.x && specialFood.y === portal2.y) ok = false;
            }
            specialFoodTimer = 40;
        }

        function placeGhostFood() {
            let ok = false;
            while(!ok) {
                ghostFood = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === ghostFood.x && o.y === ghostFood.y)) ok = false;
                if (snake.some(s => s.x === ghostFood.x && s.y === ghostFood.y)) ok = false;
                if (ghostFood.x === food.x && ghostFood.y === food.y) ok = false;
                if (specialFood && ghostFood.x === specialFood.x && ghostFood.y === specialFood.y) ok = false;
                if (portal1 && ghostFood.x === portal1.x && ghostFood.y === portal1.y) ok = false;
                if (portal2 && ghostFood.x === portal2.x && ghostFood.y === portal2.y) ok = false;
            }
            ghostFoodTimer = 40;
        }

        function placeIceFood() {
            let ok = false;
            while(!ok) {
                iceFood = {
                    x: Math.floor(Math.random() * WIDTH),
                    y: Math.floor(Math.random() * HEIGHT)
                };
                ok = true;
                if (obstacles.some(o => o.x === iceFood.x && o.y === iceFood.y)) ok = false;
                if (snake.some(s => s.x === iceFood.x && s.y === iceFood.y)) ok = false;
                if (iceFood.x === food.x && iceFood.y === food.y) ok = false;
                if (portal1 && iceFood.x === portal1.x && iceFood.y === portal1.y) ok = false;
                if (portal2 && iceFood.x === portal2.x && iceFood.y === portal2.y) ok = false;
            }
            iceFoodTimer = 40;
        }

        function update() {
            if (gameState !== 1) return;
            
            spiderTick++;
            if (spiderTick >= 2) {
                spiderTick = 0;
                for(let i=0; i<spiders.length; i++) {
                    let r = Math.floor(Math.random() * 4);
                    let dx = 0, dy = 0;
                    if (r === 0) dx = 1; else if (r === 1) dx = -1; else if (r === 2) dy = 1; else if (r === 3) dy = -1;
                    let nx = spiders[i].x + dx;
                    let ny = spiders[i].y + dy;
                    if (nx >= 0 && nx < WIDTH && ny >= 0 && ny < HEIGHT) {
                        if (!obstacles.some(o => o.x === nx && o.y === ny)) {
                            spiders[i].x = nx; spiders[i].y = ny;
                        }
                    }
                }
                
                for(let i=0; i<trackers.length; i++) {
                    let dx = 0, dy = 0;
                    if (snake[0].x > trackers[i].x) dx = 1;
                    else if (snake[0].x < trackers[i].x) dx = -1;
                    if (snake[0].y > trackers[i].y) dy = 1;
                    else if (snake[0].y < trackers[i].y) dy = -1;
                    
                    let nx = trackers[i].x + dx;
                    let ny = trackers[i].y;
                    let blocked = obstacles.some(o => o.x === nx && o.y === ny);
                    if (!blocked && dx !== 0) { trackers[i].x = nx; }
                    else {
                        nx = trackers[i].x; ny = trackers[i].y + dy; blocked = obstacles.some(o => o.x === nx && o.y === ny);
                        if (!blocked && dy !== 0) { trackers[i].y = ny; }
                    }
                }
            }

            lastDir = {x: dir.x, y: dir.y};
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
            
            if (portal1) {
                if (head.x === portal1.x && head.y === portal1.y) {
                    head.x = portal2.x; head.y = portal2.y;
                } else if (head.x === portal2.x && head.y === portal2.y) {
                    head.x = portal1.x; head.y = portal1.y;
                }
            }

            if (wrapMode) {
                if (head.x < 0) head.x = WIDTH - 1;
                else if (head.x >= WIDTH) head.x = 0;
                
                if (head.y < 0) head.y = HEIGHT - 1;
                else if (head.y >= HEIGHT) head.y = 0;
                
                if (ghostActiveTimer === 0 && (snake.some(s => s.x === head.x && s.y === head.y) || obstacles.some(o => o.x === head.x && o.y === head.y) || spiders.some(sp => sp.x === head.x && sp.y === head.y) || trackers.some(tr => tr.x === head.x && tr.y === head.y))) {
                    playSound('die');
                    gameState = 2;
                    msgBox.innerHTML = '<h2 style="color: red; margin:0">GAME OVER</h2><p style="margin:5px 0">Press ENTER to return</p>';
                    msgBox.style.display = 'block';
                    return;
                }
            } else {
                if (head.x < 0 || head.x >= WIDTH || head.y < 0 || head.y >= HEIGHT || (ghostActiveTimer === 0 && (snake.some(s => s.x === head.x && s.y === head.y) || obstacles.some(o => o.x === head.x && o.y === head.y) || spiders.some(sp => sp.x === head.x && sp.y === head.y) || trackers.some(tr => tr.x === head.x && tr.y === head.y)))) {
                    playSound('die');
                    gameState = 2;
                    msgBox.innerHTML = '<h2 style="color: red; margin:0">GAME OVER</h2><p style="margin:5px 0">Press ENTER to return</p>';
                    msgBox.style.display = 'block';
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                playSound('eat');
                addEatParticles(food.x, food.y, '#ff4757');
                score += scoreMult;
                totalApples++;
                safeSetItem('ksnakeTotalApples', totalApples);
                if (score > highScore) {
                    highScore = score;
                    safeSetItem('ksnakeHighScore', highScore);
                }
                if (currentSpeed > 30) currentSpeed -= 2;
                placeFood();
                if (!specialFood && Math.random() < 0.2) {
                    placeSpecialFood();
                }
                if (!ghostFood && Math.random() < 0.15) {
                    placeGhostFood();
                }
                if (!iceFood && Math.random() < 0.15) {
                    placeIceFood();
                }
                
                applesEaten++;
                if (campaignMode && applesEaten >= 10) {
                    campaignLevel++;
                    if (campaignLevel > 15) {
                        gameState = 3;
                        msgBox.innerHTML = '<h2 style="color: #0f0; margin:0">YOU WIN!</h2><p style="margin:5px 0">Press ENTER to return</p>';
                        msgBox.style.display = 'block';
                        return;
                    } else {
                        let newSpd = 150 - campaignLevel * 10;
                        if(newSpd < 40) newSpd = 40;
                        currentSpeed = newSpd;
                        init();
                    }
                }
            } else {
                snake.pop();
            }

            if (ghostActiveTimer > 0) ghostActiveTimer--;
            if (ghostFoodTimer > 0) {
                ghostFoodTimer--;
                if (ghostFoodTimer === 0) ghostFood = null;
            }
            if (ghostFood && head.x === ghostFood.x && head.y === ghostFood.y) {
                playSound('eat');
                addEatParticles(ghostFood.x, ghostFood.y, '#00d2d3');
                score += scoreMult * 2;
                if (score > highScore) {
                    highScore = score;
                    safeSetItem('ksnakeHighScore', highScore);
                }
                ghostActiveTimer = 50;
                ghostFood = null;
            }

            if (specialFoodTimer > 0) {
                specialFoodTimer--;
                if (specialFoodTimer === 0) specialFood = null;
            }

            if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                playSound('eat');
                addEatParticles(specialFood.x, specialFood.y, '#ffd700');
                score += scoreMult * 5;
                if (score > highScore) {
                    highScore = score;
                    safeSetItem('ksnakeHighScore', highScore);
                }
                for (let i = 0; i < 3 && snake.length > 3; i++) {
                    snake.pop();
                }
                specialFood = null;
            }
            
            if (iceActiveTimer > 0) iceActiveTimer--;
            if (iceFoodTimer > 0) {
                iceFoodTimer--;
                if (iceFoodTimer === 0) iceFood = null;
            }
            if (iceFood && head.x === iceFood.x && head.y === iceFood.y) {
                playSound('eat');
                addEatParticles(iceFood.x, iceFood.y, '#74b9ff');
                score += scoreMult * 2;
                if (score > highScore) {
                    highScore = score;
                    safeSetItem('ksnakeHighScore', highScore);
                }
                iceActiveTimer = 50;
                iceFood = null;
            }
        }

        let particles = [];
        function addEatParticles(gx, gy, color) {
            let cx = (gx + 0.5) * CELL;
            let cy = (gy + 0.5) * CELL;
            for (let i = 0; i < 12; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 2.5 + 1;
                particles.push({
                    x: cx,
                    y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2,
                    color: color,
                    life: 1.0
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.size *= 0.92;
                p.life -= 0.06;
                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            for (let p of particles) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawSnakeSegment(s, index, total, ghost) {
            let cx = s.x * CELL + CELL / 2;
            let cy = s.y * CELL + CELL / 2;
            let r = CELL / 2 - 1;
            let time = performance.now() * 0.005;

            if (index === 0) {
                // HEAD
                ctx.save();
                ctx.translate(cx, cy);

                let angle = 0;
                if (dir.x === 1) angle = 0;
                else if (dir.x === -1) angle = Math.PI;
                else if (dir.y === 1) angle = Math.PI / 2;
                else if (dir.y === -1) angle = -Math.PI / 2;
                ctx.rotate(angle);

                ctx.beginPath();
                ctx.ellipse(0, 0, r, r * 0.85, 0, 0, Math.PI * 2);
                if (ghost) {
                    let grad = ctx.createRadialGradient(0, 0, 2, 0, 0, r);
                    grad.addColorStop(0, '#74b9ff');
                    grad.addColorStop(1, '#0984e3');
                    ctx.fillStyle = grad;
                    ctx.shadowColor = '#00d2d3';
                    ctx.shadowBlur = 8;
                } else {
                    let grad = ctx.createRadialGradient(-2, -2, 2, 0, 0, r);
                    grad.addColorStop(0, '#2ecc71');
                    grad.addColorStop(1, '#27ae60');
                    ctx.fillStyle = grad;
                }
                ctx.fill();

                // Eyes
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(r * 0.3, -r * 0.35, 2.5, 0, Math.PI * 2);
                ctx.arc(r * 0.3, r * 0.35, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Pupils
                ctx.fillStyle = ghost ? '#0984e3' : '#1e272e';
                ctx.beginPath();
                ctx.arc(r * 0.4, -r * 0.35, 1.2, 0, Math.PI * 2);
                ctx.arc(r * 0.4, r * 0.35, 1.2, 0, Math.PI * 2);
                ctx.fill();

                // Flickering Tongue
                let tongueFlicker = Math.sin(time * 12) > 0.1;
                if (tongueFlicker) {
                    ctx.strokeStyle = '#ff3838';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(r * 0.8, 0);
                    ctx.lineTo(r * 1.35, 0);
                    ctx.lineTo(r * 1.55, -2);
                    ctx.moveTo(r * 1.35, 0);
                    ctx.lineTo(r * 1.55, 2);
                    ctx.stroke();
                }

                ctx.restore();
            } else {
                // BODY
                ctx.save();
                let scaleFactor = 1 - (index / (total * 2.5));
                let bodyR = r * Math.max(0.65, scaleFactor);

                ctx.beginPath();
                ctx.arc(cx, cy, bodyR, 0, Math.PI * 2);
                if (ghost) {
                    ctx.fillStyle = index % 2 === 0 ? '#48dbfb' : '#00d2d3';
                    ctx.shadowColor = '#00d2d3';
                    ctx.shadowBlur = 4;
                } else {
                    ctx.fillStyle = index % 2 === 0 ? '#2ecc71' : '#218c74';
                }
                ctx.fill();

                ctx.beginPath();
                ctx.arc(cx - 1, cy - 1, bodyR * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                ctx.fill();

                ctx.restore();
            }
        }

        function drawApple(foodX, foodY) {
            let cx = foodX * CELL + CELL / 2;
            let cy = foodY * CELL + CELL / 2;
            let time = performance.now() * 0.006;
            let bounce = Math.sin(time) * 1.2;
            let scale = 1 + Math.sin(time * 2) * 0.06;

            ctx.save();
            ctx.translate(cx, cy + bounce);
            ctx.scale(scale, scale);

            let r = CELL / 2 - 1.5;
            let grad = ctx.createRadialGradient(-2, -2, 1, 0, 0, r);
            grad.addColorStop(0, '#ff6b6b');
            grad.addColorStop(0.8, '#ee5253');
            grad.addColorStop(1, '#c0392b');

            ctx.beginPath();
            ctx.arc(0, 1, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(-r * 0.35, -r * 0.35, r * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();

            ctx.strokeStyle = '#574b90';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, -r + 1);
            ctx.quadraticCurveTo(2, -r - 3, 3, -r - 4);
            ctx.stroke();

            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.ellipse(3, -r - 2, 3, 1.5, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawSpecialFood(foodX, foodY) {
            let cx = foodX * CELL + CELL / 2;
            let cy = foodY * CELL + CELL / 2;
            let time = performance.now() * 0.008;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(time);

            ctx.fillStyle = '#f1c40f';
            ctx.shadowColor = '#f39c12';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            let spikes = 5;
            let outerR = CELL / 2 - 1;
            let innerR = outerR * 0.5;
            for (let i = 0; i < spikes * 2; i++) {
                let r = i % 2 === 0 ? outerR : innerR;
                let a = (i * Math.PI) / spikes;
                let x = Math.cos(a) * r;
                let y = Math.sin(a) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, 0, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawGhostFood(foodX, foodY) {
            let cx = foodX * CELL + CELL / 2;
            let cy = foodY * CELL + CELL / 2;
            let time = performance.now() * 0.007;
            let floatY = Math.sin(time * 2) * 1.5;

            ctx.save();
            ctx.translate(cx, cy + floatY);

            ctx.shadowColor = '#00d2d3';
            ctx.shadowBlur = 12;

            let grad = ctx.createRadialGradient(0, 0, 1, 0, 0, CELL / 2 - 2);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.5, '#48dbfb');
            grad.addColorStop(1, '#00d2d3');

            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(0, 0, CELL / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#10ac84';
            ctx.beginPath();
            ctx.arc(-2, -1, 1.2, 0, Math.PI * 2);
            ctx.arc(2, -1, 1.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawIceFood(foodX, foodY) {
            let cx = foodX * CELL + CELL / 2;
            let cy = foodY * CELL + CELL / 2;

            ctx.save();
            ctx.translate(cx, cy);

            ctx.shadowColor = '#74b9ff';
            ctx.shadowBlur = 8;

            let r = CELL / 2 - 2;
            ctx.fillStyle = '#a29bfe';
            ctx.beginPath();
            ctx.moveTo(0, -r);
            ctx.lineTo(r, 0);
            ctx.lineTo(0, r);
            ctx.lineTo(-r, 0);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(0, -r);
            ctx.lineTo(0, 0);
            ctx.lineTo(-r, 0);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawObstacle(obsX, obsY) {
            let x = obsX * CELL;
            let y = obsY * CELL;

            ctx.save();
            ctx.fillStyle = '#4b6584';
            ctx.fillRect(x, y, CELL - 1, CELL - 1);

            ctx.fillStyle = '#778ca3';
            ctx.fillRect(x, y, CELL - 1, 2);
            ctx.fillRect(x, y, 2, CELL - 1);

            ctx.fillStyle = '#2d98da';
            ctx.fillRect(x, y + CELL - 3, CELL - 1, 2);
            ctx.fillRect(x + CELL - 3, y, 2, CELL - 1);

            ctx.strokeStyle = '#26de81';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + 3, y + 5);
            ctx.lineTo(x + 7, y + 10);
            ctx.lineTo(x + 12, y + 8);
            ctx.stroke();

            ctx.restore();
        }

        function drawSpider(spX, spY) {
            let cx = spX * CELL + CELL / 2;
            let cy = spY * CELL + CELL / 2;
            let time = performance.now() * 0.01;
            let legWiggle = Math.sin(time * 4) * 2;

            ctx.save();
            ctx.translate(cx, cy);

            ctx.strokeStyle = '#a55eea';
            ctx.lineWidth = 1.5;
            for (let side = -1; side <= 1; side += 2) {
                for (let i = -1; i <= 1; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * 2);
                    ctx.lineTo(side * 6, i * 4 + legWiggle);
                    ctx.lineTo(side * 8, i * 5 + (side * legWiggle));
                    ctx.stroke();
                }
            }

            ctx.fillStyle = '#4b4b4b';
            ctx.beginPath();
            ctx.arc(0, 0, 4.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2d3436';
            ctx.beginPath();
            ctx.arc(0, -3, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ff3838';
            ctx.beginPath();
            ctx.arc(-1.2, -4, 0.9, 0, Math.PI * 2);
            ctx.arc(1.2, -4, 0.9, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPortal(pX, pY, isSecondary) {
            let cx = pX * CELL + CELL / 2;
            let cy = pY * CELL + CELL / 2;
            let time = performance.now() * 0.005;

            ctx.save();
            ctx.translate(cx, cy);

            let mainColor = isSecondary ? '#e67e22' : '#f39c12';
            ctx.shadowColor = mainColor;
            ctx.shadowBlur = 10;

            for (let i = 3; i >= 1; i--) {
                let r = (CELL / 2 - 1) * (i / 3);
                let rot = time * (i % 2 === 0 ? 2 : -2);
                ctx.save();
                ctx.rotate(rot);
                ctx.strokeStyle = i === 1 ? '#ffffff' : mainColor;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(0, 0, r, 0, Math.PI * 1.5);
                ctx.stroke();
                ctx.restore();
            }

            ctx.restore();
        }

        function drawTracker(trX, trY) {
            let cx = trX * CELL + CELL / 2;
            let cy = trY * CELL + CELL / 2;
            let time = performance.now() * 0.008;

            ctx.save();
            ctx.translate(cx, cy);

            ctx.shadowColor = '#ff3838';
            ctx.shadowBlur = 8;

            ctx.fillStyle = '#2c3e50';
            ctx.beginPath();
            ctx.arc(0, 0, CELL / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            let eyePulse = 1.5 + Math.sin(time * 3) * 0.8;
            ctx.fillStyle = '#ff3838';
            ctx.beginPath();
            ctx.arc(0, 0, eyePulse + 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, 0, eyePulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function animLoop() {
            if (gameState === 1) {
                draw();
                requestAnimationFrame(animLoop);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (gameState !== 1) return;

            updateParticles();
            drawParticles();

            for (let o of obstacles) drawObstacle(o.x, o.y);

            if (portal1) {
                drawPortal(portal1.x, portal1.y, false);
                drawPortal(portal2.x, portal2.y, true);
            }

            drawApple(food.x, food.y);
            if (ghostFood) drawGhostFood(ghostFood.x, ghostFood.y);
            if (specialFood) drawSpecialFood(specialFood.x, specialFood.y);
            if (iceFood) drawIceFood(iceFood.x, iceFood.y);

            for (let sp of spiders) drawSpider(sp.x, sp.y);

            for (let tr of trackers) drawTracker(tr.x, tr.y);

            for (let i = snake.length - 1; i >= 0; i--) {
                drawSnakeSegment(snake[i], i, snake.length, ghostActiveTimer > 0);
            }

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText(campaignMode ? `Lvl: ${campaignLevel}  Score: ${score}  High: ${highScore}` : `Score: ${score}  High: ${highScore}`, 5, 15);
        }

        window.addEventListener('keydown', e => {
            if (gameState === 0) {
                if (e.key === '1') { difficulty = 0; campaignMode = false; init(); }
                if (e.key === '2') { difficulty = 1; campaignMode = false; init(); }
                if (e.key === '3') { difficulty = 2; campaignMode = false; init(); }
                if (e.key === '4') { campaignMode = true; campaignLevel = 1; init(); }
                if (e.key.toLowerCase() === 'w') {
                    wrapMode = !wrapMode;
                    document.getElementById('wrapStatus').innerText = wrapMode ? 'ON' : 'OFF';
                }
            } else if ((gameState === 2 || gameState === 3) && e.key === 'Enter') {
                gameState = 0;
                msgBox.style.display = 'none';
                document.getElementById('statsDisplay').innerText = `Games: ${parseInt(localStorage.getItem('ksnakeGamesPlayed'))||0}  Total Apples: ${parseInt(localStorage.getItem('ksnakeTotalApples'))||0}`;
                menuBox.style.display = 'block';
                canvas.style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else if (gameState === 1) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
                if (e.key === 'ArrowUp' && lastDir.y !== 1) dir = {x: 0, y: -1};
                if (e.key === 'ArrowDown' && lastDir.y !== -1) dir = {x: 0, y: 1};
                if (e.key === 'ArrowLeft' && lastDir.x !== 1) dir = {x: -1, y: 0};
                if (e.key === 'ArrowRight' && lastDir.x !== -1) dir = {x: 1, y: 0};
            }
        });

        // initial state
        document.getElementById('statsDisplay').innerText = `Games: ${parseInt(localStorage.getItem('ksnakeGamesPlayed'))||0}  Total Apples: ${parseInt(localStorage.getItem('ksnakeTotalApples'))||0}`;
        canvas.style.display = 'none';
        msgBox.style.display = 'none';
        menuBox.style.display = 'block';
    </script>
</body>
</html>

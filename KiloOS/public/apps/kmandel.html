<!DOCTYPE html>
<html>
<head>
<title>KMandel</title>
<style>
  body { margin: 0; background-color: black; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { width: 100%; height: 100%; object-fit: contain; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  
  function render() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvas.width = w;
      canvas.height = h;
      
      const imgData = ctx.createImageData(w, h);
      const data = imgData.data;
      
      const minRe = -2.0, maxRe = 1.0;
      const minIm = -1.2, maxIm = 1.2;
      const re_factor = (maxRe - minRe) / (w - 1);
      const im_factor = (maxIm - minIm) / (h - 1);
      const max_iter = 100;
      
      let idx = 0;
      for (let y = 0; y < h; ++y) {
          const c_im = maxIm - y * im_factor;
          for (let x = 0; x < w; ++x) {
              const c_re = minRe + x * re_factor;
              let Z_re = c_re, Z_im = c_im;
              let isInside = true;
              let n = 0;
              
              for (n = 0; n < max_iter; ++n) {
                  const Z_re2 = Z_re * Z_re, Z_im2 = Z_im * Z_im;
                  if (Z_re2 + Z_im2 > 4) {
                      isInside = false;
                      break;
                  }
                  Z_im = 2 * Z_re * Z_im + c_im;
                  Z_re = Z_re2 - Z_im2 + c_re;
              }
              
              if (isInside) {
                  data[idx++] = 0;
                  data[idx++] = 0;
                  data[idx++] = 0;
                  data[idx++] = 255;
              } else {
                  data[idx++] = Math.floor((n * 255) / max_iter);
                  data[idx++] = Math.floor((n * n * 255) / (max_iter * max_iter));
                  data[idx++] = Math.floor((n * 128) / max_iter);
                  data[idx++] = 255;
              }
          }
      }
      ctx.putImageData(imgData, 0, 0);
  }
  
  let t = null;
  window.onresize = () => {
      if (t) clearTimeout(t);
      t = setTimeout(render, 100);
  };
  
  render();
</script>
</body>
</html>

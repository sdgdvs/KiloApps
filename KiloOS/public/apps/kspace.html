<!DOCTYPE html>
<html>
<head>
<title>KSpace</title>
<style>
  body { margin: 0; background-color: #0a0a1e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { image-rendering: pixelated; width: 100%; height: 100%; max-width: 640px; max-height: 960px; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="320" height="480" tabindex="0" role="img" aria-label="KSpace space shooter game canvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const W = 320, H = 480;
  
  let p = { x: W/2, y: H-50 };
  let bullets = [];
  let eBullets = [];
  let enemies = [];
  let stars = [];
  let explosions = [];
  for(let i=0; i<50; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, speed: 1 + Math.random() * 2 });
  }
  let powerups = [];
  let spreadTimer = 0;
  let rapidTimer = 0;
  let timeStopTimer = 0;
  let score = 0;
  let highScore = 0;
  try { highScore = parseInt(localStorage.getItem('kspace_highscore') || '0', 10) || 0; } catch(e) {}
  let totalKills = 0;
  try { totalKills = parseInt(localStorage.getItem('kspace_totalkills') || '0', 10) || 0; } catch(e) {}

  function saveStorage(key, val) {
      try { localStorage.setItem(key, val); } catch(e) {}
  }

  let gameOver = false;
  let frameCount = 0;
  let shieldActive = false;
  let wave = 1;
  let enemiesKilled = 0;
  let audioCtx;
  
  function addExplosion(x, y, count = 12, color = null) {
      for (let i = 0; i < count; i++) {
          let angle = Math.random() * Math.PI * 2;
          let speed = 1 + Math.random() * 3.5;
          explosions.push({
              x: x, y: y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 1.0,
              decay: 0.03 + Math.random() * 0.04,
              size: 2 + Math.random() * 3,
              color: color || (Math.random() < 0.5 ? '#ff4500' : (Math.random() < 0.5 ? '#ffa500' : '#ffff00'))
          });
      }
  }

  function updateExplosions() {
      for (let i = explosions.length - 1; i >= 0; i--) {
          let ex = explosions[i];
          ex.x += ex.vx;
          ex.y += ex.vy;
          ex.life -= ex.decay;
          if (ex.life <= 0) explosions.splice(i, 1);
      }
  }

  function drawExplosions() {
      for (let ex of explosions) {
          ctx.save();
          ctx.globalAlpha = Math.max(0, ex.life);
          ctx.fillStyle = ex.color;
          ctx.beginPath();
          ctx.arc(ex.x, ex.y, ex.size * ex.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
      }
  }
  
  function playSound(type) {
      if (!audioCtx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          audioCtx = new AudioContext();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      let t = audioCtx.currentTime;
      if (type === 0) { // shoot
          osc.type = 'square';
          osc.frequency.setValueAtTime(1000, t);
          osc.frequency.exponentialRampToValueAtTime(500, t + 0.1);
          gain.gain.setValueAtTime(0.05, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
          osc.start(t);
          osc.stop(t + 0.1);
      } else if (type === 1) { // explode
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(200, t);
          osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
          gain.gain.setValueAtTime(0.1, t);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
          osc.start(t);
          osc.stop(t + 0.2);
      } else if (type === 2) { // powerup
          osc.type = 'sine';
          osc.frequency.setValueAtTime(600, t);
          osc.frequency.setValueAtTime(800, t + 0.1);
          gain.gain.setValueAtTime(0.1, t);
          gain.gain.linearRampToValueAtTime(0, t + 0.2);
          osc.start(t);
          osc.stop(t + 0.2);
      } else if (type === 3) { // wave clear
          osc.type = 'square';
          osc.frequency.setValueAtTime(400, t);
          osc.frequency.setValueAtTime(600, t + 0.1);
          osc.frequency.setValueAtTime(800, t + 0.2);
          gain.gain.setValueAtTime(0.1, t);
          gain.gain.linearRampToValueAtTime(0, t + 0.4);
          osc.start(t);
          osc.stop(t + 0.4);
      }
  }
  
  const keys = {};
  document.addEventListener('keydown', e => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'Spacebar'].includes(e.key)) {
          e.preventDefault();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      keys[e.key] = true;
  });
  document.addEventListener('keyup', e => keys[e.key] = false);
  window.addEventListener('blur', () => {
      for (let k in keys) keys[k] = false;
  });

  function spawnEnemy() {
      let t = Math.floor(Math.random() * 100);
      let type, dx = 0;
      if (t < 35) type = 0;
      else if (t < 50) type = 1;
      else if (t < 65) type = 2;
      else if (t < 75) type = 3;
      else if (t < 85) { type = 4; dx = (Math.random() < 0.5 ? 2 : -2); }
      else if (t < 95) type = 5;
      else { type = 6; dx = (Math.random() < 0.5 ? 2 : -2); }
      let hp = type === 6 ? 50 : (type === 5 ? 30 : (type === 3 ? 10 : (type === 2 ? 5 : (type === 4 ? 3 : 1))));
      let ew = type === 6 ? 40 : 20;
      enemies.push({ x: Math.random() * (W - ew), y: -20, type: type, hp: hp, dx: dx });
  }

  function shoot() {
      playSound(0);
      let shots = spreadTimer > 0 ? 3 : 1;
      let dxs = [0, -2, 2];
      for(let i=0; i<shots; i++) {
          bullets.push({ x: p.x + 8, y: p.y, dx: dxs[i], dy: -8 });
      }
  }

  function update() {
      if (gameOver) {
          if (keys['Enter']) {
              gameOver = false;
              score = 0;
              enemies = [];
              bullets = [];
              eBullets = [];
              powerups = [];
              explosions = [];
              spreadTimer = 0;
              rapidTimer = 0;
              timeStopTimer = 0;
              shieldActive = false;
              wave = 1;
              enemiesKilled = 0;
              p = { x: W/2, y: H-50 };
          }
          return;
      }
      
      let currentWave = 1 + Math.floor(score / 1000);
      if (currentWave > wave) {
          wave = currentWave;
          playSound(3);
      }
      
      for(let s of stars) {
          s.y += s.speed;
          if (s.y > H) {
              s.y = 0;
              s.x = Math.random() * W;
          }
      }
      
      updateExplosions();
      
      const speed = (keys['Shift']) ? 8 : 4;
      let baseEnemySpeed = 2 + (score / 200);
      let spawnRate = Math.max(10, 30 - Math.floor(score / 100));
      if (keys['ArrowLeft'] || keys['a']) p.x -= speed;
      if (keys['ArrowRight'] || keys['d']) p.x += speed;
      if (keys['ArrowUp'] || keys['w']) p.y -= speed;
      if (keys['ArrowDown'] || keys['s']) p.y += speed;
      
      if (p.x < 0) p.x = 0;
      if (p.x > W - 20) p.x = W - 20;
      if (p.y < 0) p.y = 0;
      if (p.y > H - 20) p.y = H - 20;
      
      if (keys[' '] || keys['Enter']) {
          let fireRate = rapidTimer > 0 ? 2 : 5;
          if (frameCount % fireRate === 0) shoot();
      }
      
      for (let i = bullets.length - 1; i >= 0; i--) {
          bullets[i].y += bullets[i].dy;
          bullets[i].x += bullets[i].dx;
          if (bullets[i].y < 0 || bullets[i].x < 0 || bullets[i].x > W) bullets.splice(i, 1);
      }
      
      for (let i = enemies.length - 1; i >= 0; i--) {
          let ew = enemies[i].type === 6 ? 40 : 20;
          let eh = enemies[i].type === 6 ? 40 : 20;
          
          if (timeStopTimer === 0) {
              if (enemies[i].type === 0) {
                  enemies[i].y += baseEnemySpeed;
              } else if (enemies[i].type === 1) {
                  enemies[i].y += baseEnemySpeed * 0.75;
                  if (enemies[i].x < p.x) enemies[i].x += baseEnemySpeed * 0.5;
                  if (enemies[i].x > p.x) enemies[i].x -= baseEnemySpeed * 0.5;
              } else if (enemies[i].type === 2) {
                  enemies[i].y += baseEnemySpeed * 0.4;
              } else if (enemies[i].type === 3) {
                  enemies[i].y += baseEnemySpeed * 0.3;
              } else if (enemies[i].type === 4) {
                  enemies[i].y += baseEnemySpeed * 0.8;
                  enemies[i].x += enemies[i].dx;
                  if (enemies[i].x < 0) { enemies[i].x = 0; enemies[i].dx = -enemies[i].dx; }
                  if (enemies[i].x > W - ew) { enemies[i].x = W - ew; enemies[i].dx = -enemies[i].dx; }
              } else if (enemies[i].type === 5) {
                  enemies[i].y += baseEnemySpeed * 1.2;
              } else if (enemies[i].type === 6) {
                  if (enemies[i].y < 50) {
                      enemies[i].y += baseEnemySpeed * 0.5;
                  } else {
                      enemies[i].x += enemies[i].dx;
                      if (enemies[i].x < 0) { enemies[i].x = 0; enemies[i].dx = -enemies[i].dx; }
                      if (enemies[i].x > W - ew) { enemies[i].x = W - ew; enemies[i].dx = -enemies[i].dx; }
                  }
              }
              
              if (enemies[i].type === 2 && (frameCount % 60 === 0) && Math.random() < 0.5) {
                  eBullets.push({ x: enemies[i].x + 8, y: enemies[i].y + 20, dy: 4, dx: 0 });
              }
              
              if (enemies[i].type === 6 && (frameCount % 45 === 0)) {
                  let bdx = [-2, 0, 2];
                  for(let j=0; j<3; j++) {
                      eBullets.push({ x: enemies[i].x + 20, y: enemies[i].y + 40, dy: 4, dx: bdx[j] });
                  }
              }
          }
          
          let removed = false;
          if (p.x < enemies[i].x + ew && p.x + 20 > enemies[i].x && p.y < enemies[i].y + eh && p.y + 20 > enemies[i].y) {
              if (shieldActive) {
                  shieldActive = false;
                  addExplosion(enemies[i].x + ew/2, enemies[i].y + eh/2, 16);
                  enemies.splice(i, 1);
                  removed = true;
                  playSound(1);
              } else {
                  addExplosion(p.x + 10, p.y + 10, 30, '#ff1744');
                  gameOver = true;
                  playSound(1);
              }
          }
          if (removed) continue;
          
          let hit = false;
          for (let j = bullets.length - 1; j >= 0; j--) {
              if (bullets[j].x < enemies[i].x + ew && bullets[j].x + 4 > enemies[i].x && bullets[j].y < enemies[i].y + eh && bullets[j].y + 10 > enemies[i].y) {
                  bullets.splice(j, 1);
                  enemies[i].hp--;
                  hit = true;
                  addExplosion(bullets[j].x, bullets[j].y, 4, '#00e5ff');
                  break;
              }
          }
          
          if (hit && enemies[i].hp <= 0) {
              score += enemies[i].type === 3 ? 100 : (enemies[i].type === 2 ? 50 : (enemies[i].type === 4 ? 60 : 10));
              if (enemies[i].type === 5) score += 100;
              if (enemies[i].type === 6) score += 500;
              enemiesKilled++;
              totalKills++;
              playSound(1);
              addExplosion(enemies[i].x + ew/2, enemies[i].y + eh/2, enemies[i].type === 6 ? 30 : 14);
              if (score > highScore) {
                  highScore = score;
                  saveStorage('kspace_highscore', highScore);
              }
              saveStorage('kspace_totalkills', totalKills);
              if (Math.random() < 0.15) {
                  powerups.push({x: enemies[i].x, y: enemies[i].y, dy: 2, type: Math.floor(Math.random() * 5)});
              }
              enemies.splice(i, 1);
          } else if (enemies[i].y > H) {
              enemies.splice(i, 1);
          }
      }
      
      for (let i = eBullets.length - 1; i >= 0; i--) {
          if (timeStopTimer === 0) {
              eBullets[i].y += eBullets[i].dy;
              if (eBullets[i].dx) eBullets[i].x += eBullets[i].dx;
          }
          if (eBullets[i].y > H || eBullets[i].x < 0 || eBullets[i].x > W) {
              eBullets.splice(i, 1);
              continue;
          }
          if (p.x < eBullets[i].x + 4 && p.x + 20 > eBullets[i].x && p.y < eBullets[i].y + 10 && p.y + 20 > eBullets[i].y) {
              eBullets.splice(i, 1);
              if (shieldActive) {
                  shieldActive = false;
                  addExplosion(p.x + 10, p.y + 10, 10, '#00e5ff');
                  playSound(1);
              } else {
                  addExplosion(p.x + 10, p.y + 10, 30, '#ff1744');
                  gameOver = true;
                  playSound(1);
              }
          }
      }
      
      for (let i = powerups.length - 1; i >= 0; i--) {
          powerups[i].y += powerups[i].dy;
          if (p.x < powerups[i].x + 15 && p.x + 20 > powerups[i].x && p.y < powerups[i].y + 15 && p.y + 20 > powerups[i].y) {
              if (powerups[i].type === 0) {
                  spreadTimer = 300;
              } else if (powerups[i].type === 1) {
                  shieldActive = true;
              } else if (powerups[i].type === 2) {
                  rapidTimer = 300;
              } else if (powerups[i].type === 3) {
                  for (let j = enemies.length - 1; j >= 0; j--) {
                      if (enemies[j].type !== 5 && enemies[j].type !== 6) {
                          score += 10;
                          enemiesKilled++;
                          totalKills++;
                          addExplosion(enemies[j].x + 10, enemies[j].y + 10, 10);
                          enemies.splice(j, 1);
                      }
                  }
                  saveStorage('kspace_totalkills', totalKills);
                  playSound(1);
              } else if (powerups[i].type === 4) {
                  timeStopTimer = 300;
              }
              addExplosion(powerups[i].x + 7, powerups[i].y + 7, 12, '#00e5ff');
              powerups.splice(i, 1);
              score += 50;
              playSound(2);
              continue;
          }
          if (powerups[i].y > H) {
              powerups.splice(i, 1);
          }
      }
      if (spreadTimer > 0) spreadTimer--;
      if (rapidTimer > 0) rapidTimer--;
      if (timeStopTimer > 0) timeStopTimer--;
      
      if (frameCount % spawnRate === 0) spawnEnemy();
      frameCount++;
  }

  function drawPlayerShip(x, y, shield, frame) {
      ctx.save();
      ctx.translate(x, y);

      let flameH = 6 + (frame % 4) * 2;
      ctx.fillStyle = (frame % 2 === 0) ? '#ffcc00' : '#ff3300';
      ctx.beginPath();
      ctx.moveTo(6, 20); ctx.lineTo(10, 20 + flameH); ctx.lineTo(14, 20);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(8, 20); ctx.lineTo(10, 20 + flameH * 0.6); ctx.lineTo(12, 20);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#1e88e5';
      ctx.beginPath();
      ctx.moveTo(10, 0); ctx.lineTo(20, 16); ctx.lineTo(16, 20); ctx.lineTo(10, 15); ctx.lineTo(4, 20); ctx.lineTo(0, 16);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#90caf9';
      ctx.fillRect(0, 10, 2, 8);
      ctx.fillRect(18, 10, 2, 8);

      ctx.fillStyle = '#64b5f6';
      ctx.beginPath();
      ctx.moveTo(10, 1); ctx.lineTo(14, 12); ctx.lineTo(10, 18); ctx.lineTo(6, 12);
      ctx.closePath(); ctx.fill();

      ctx.fillStyle = '#00e5ff';
      ctx.beginPath();
      ctx.ellipse(10, 7, 3, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(9, 4, 2, 3);

      if (shield) {
          let rot = (frame * 0.1) % (Math.PI * 2);
          ctx.strokeStyle = '#00e5ff';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(10, 10, 16, rot, rot + Math.PI * 1.5);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(10, 10, 16, rot + Math.PI, rot + Math.PI * 2.5);
          ctx.stroke();
      }

      ctx.restore();
  }

  function drawEnemyShip(e, frame) {
      ctx.save();
      ctx.translate(e.x, e.y);
      let type = e.type;

      if (type === 0) { // Scout (Red Interceptor)
          ctx.fillStyle = '#e53935';
          ctx.beginPath();
          ctx.moveTo(0, 2); ctx.lineTo(10, 18); ctx.lineTo(20, 2); ctx.lineTo(13, 6); ctx.lineTo(10, 0); ctx.lineTo(7, 6);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#ffeb3b';
          ctx.beginPath(); ctx.arc(10, 10, 3, 0, Math.PI * 2); ctx.fill();
      } else if (type === 1) { // Chaser (Orange Predator)
          let aura = Math.sin(frame * 0.2) * 2;
          ctx.fillStyle = '#ff9800';
          ctx.beginPath();
          ctx.moveTo(10, 20); ctx.lineTo(20 + aura, 4); ctx.lineTo(10, 0); ctx.lineTo(0 - aura, 4);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#ff3d00';
          ctx.fillRect(7, 4, 6, 10);
      } else if (type === 2) { // Shooter (Purple Saucer)
          ctx.fillStyle = '#8e24aa';
          ctx.beginPath(); ctx.ellipse(10, 12, 10, 6, 0, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#e040fb';
          ctx.beginPath(); ctx.ellipse(10, 8, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
          let lightCol = (Math.floor(frame / 10) % 2 === 0) ? '#00e676' : '#ffeb3b';
          ctx.fillStyle = lightCol;
          ctx.fillRect(4, 12, 2, 2); ctx.fillRect(14, 12, 2, 2);
      } else if (type === 3) { // Armored (Grey Heavy Destroyer)
          ctx.fillStyle = '#78909c';
          ctx.fillRect(2, 2, 16, 16);
          ctx.fillStyle = '#37474f';
          ctx.fillRect(5, 5, 10, 10);
          ctx.fillStyle = '#42a5f5';
          ctx.fillRect(8, 0, 4, 20);
      } else if (type === 4) { // Zigzag (Cyan Fighter)
          ctx.fillStyle = '#00bcd4';
          ctx.beginPath(); ctx.moveTo(10, 18); ctx.lineTo(20, 0); ctx.lineTo(10, 6); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#80deea';
          ctx.fillRect(9, 8, 2, 8);
      } else if (type === 5) { // Asteroid (Brown Rock)
          ctx.translate(10, 10);
          ctx.rotate(frame * 0.02);
          ctx.fillStyle = '#6d4c41';
          ctx.beginPath();
          ctx.moveTo(-8, -4); ctx.lineTo(-2, -9); ctx.lineTo(6, -7); ctx.lineTo(9, 1);
          ctx.lineTo(5, 8); ctx.lineTo(-4, 9); ctx.lineTo(-9, 3);
          ctx.closePath(); ctx.fill();
          ctx.fillStyle = '#4e342e';
          ctx.beginPath(); ctx.arc(-2, -1, 3, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(3, 4, 2, 0, Math.PI * 2); ctx.fill();
      } else if (type === 6) { // Boss Dreadnought (40x40)
          ctx.fillStyle = '#b71c1c';
          ctx.beginPath();
          ctx.moveTo(20, 38); ctx.lineTo(38, 10); ctx.lineTo(32, 2); ctx.lineTo(20, 12);
          ctx.lineTo(8, 2); ctx.lineTo(2, 10);
          ctx.closePath(); ctx.fill();
          let eyeGlow = (frame % 10 < 5) ? '#ffea00' : '#ff1744';
          ctx.fillStyle = eyeGlow;
          ctx.beginPath(); ctx.arc(20, 20, 7, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#424242';
          ctx.fillRect(4, 24, 4, 12);
          ctx.fillRect(32, 24, 4, 12);
      }

      ctx.restore();
  }

  function drawPowerupItem(pu, frame) {
      ctx.save();
      ctx.translate(pu.x + 7.5, pu.y + 7.5);
      let pulse = 1 + Math.sin(frame * 0.1) * 0.15;
      ctx.scale(pulse, pulse);

      let colors = ['#00e676', '#00e5ff', '#ffffff', '#ffea00', '#7c4dff'];
      let labels = ['S', 'SH', 'R', 'B', 'T'];

      ctx.fillStyle = colors[pu.type] || '#fff';
      ctx.beginPath();
      ctx.arc(0, 0, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      ctx.fillStyle = '#000000';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(labels[pu.type] || 'P', 0, 1);

      ctx.restore();
  }

  function drawBulletItem(b) {
      ctx.save();
      ctx.fillStyle = '#00e5ff';
      ctx.fillRect(b.x, b.y, 4, 10);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(b.x + 1, b.y + 2, 2, 6);
      ctx.restore();
  }

  function drawEBulletItem(eb) {
      ctx.save();
      ctx.fillStyle = '#ff1744';
      ctx.beginPath();
      ctx.arc(eb.x + 2, eb.y + 5, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ff80ab';
      ctx.beginPath();
      ctx.arc(eb.x + 2, eb.y + 5, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
  }

  function draw() {
      let bgR = 10 + (wave * 5) % 40;
      let bgG = 10 + (wave * 10) % 40;
      let bgB = 30 + (wave * 15) % 60;
      ctx.fillStyle = `rgb(${bgR}, ${bgG}, ${bgB})`;
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#c8c8c8';
      for(let s of stars) {
          ctx.fillRect(s.x, s.y, 2, 2);
      }

      drawPlayerShip(p.x, p.y, shieldActive, frameCount);
      
      for (let b of bullets) {
          drawBulletItem(b);
      }
      
      for (let eb of eBullets) {
          drawEBulletItem(eb);
      }
      
      for (let e of enemies) {
          drawEnemyShip(e, frameCount);
      }
      
      for (let pu of powerups) {
          drawPowerupItem(pu, frameCount);
      }

      drawExplosions();
      
      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      ctx.fillText(`Score: ${score}  High: ${highScore}`, 10, 20);
      ctx.fillText(`Wave: ${wave}  Kills: ${enemiesKilled}`, 10, 38);
      ctx.fillText(`Life Kills: ${totalKills}`, W - 140, 20);
      
      if (gameOver) {
          ctx.fillStyle = '#ff0000';
          ctx.font = '32px monospace';
          ctx.fillText('GAME OVER', W/2 - 85, H/2);
          ctx.font = '16px monospace';
          ctx.fillText('Press Enter to Restart', W/2 - 105, H/2 + 30);
      }
  }

  setInterval(() => {
      update();
      draw();
  }, 16);
</script>
</body>
</html>

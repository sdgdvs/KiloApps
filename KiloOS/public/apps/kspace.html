<!DOCTYPE html>
<html>
<head>
<title>KSpace</title>
<style>
  body { margin: 0; background-color: #0a0a1e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { image-rendering: pixelated; width: 100%; height: 100%; max-width: 640px; max-height: 960px; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="320" height="480"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const W = 320, H = 480;
  
  let p = { x: W/2, y: H-50 };
  let bullets = [];
  let eBullets = [];
  let enemies = [];
  let stars = [];
  for(let i=0; i<50; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, speed: 1 + Math.random() * 2 });
  }
  let powerups = [];
  let spreadTimer = 0;
  let score = 0;
  let highScore = localStorage.getItem('kspace_highscore') || 0;
  let gameOver = false;
  let frameCount = 0;
  let shieldActive = false;
  
  const keys = {};
  document.addEventListener('keydown', e => keys[e.key] = true);
  document.addEventListener('keyup', e => keys[e.key] = false);

  function spawnEnemy() {
      let type = Math.floor(Math.random() * 3);
      enemies.push({ x: Math.random() * (W - 20), y: -20, type: type, hp: type === 2 ? 5 : 1 });
  }

  function shoot() {
      let shots = spreadTimer > 0 ? 3 : 1;
      let dxs = [0, -2, 2];
      for(let i=0; i<shots; i++) {
          bullets.push({ x: p.x + 8, y: p.y, dx: dxs[i], dy: -8 });
      }
  }

  function update() {
      if (gameOver) {
          if (keys['Enter']) {
              gameOver = false;
              score = 0;
              enemies = [];
              bullets = [];
              eBullets = [];
              powerups = [];
              spreadTimer = 0;
              shieldActive = false;
              p = { x: W/2, y: H-50 };
          }
          return;
      }
      
      for(let s of stars) {
          s.y += s.speed;
          if (s.y > H) {
              s.y = 0;
              s.x = Math.random() * W;
          }
      }
      
      const speed = 4;
      let baseEnemySpeed = 2 + (score / 200);
      let spawnRate = Math.max(10, 30 - Math.floor(score / 100));
      if (keys['ArrowLeft'] || keys['a']) p.x -= speed;
      if (keys['ArrowRight'] || keys['d']) p.x += speed;
      if (keys['ArrowUp'] || keys['w']) p.y -= speed;
      if (keys['ArrowDown'] || keys['s']) p.y += speed;
      
      if (p.x < 0) p.x = 0;
      if (p.x > W - 20) p.x = W - 20;
      if (p.y < 0) p.y = 0;
      if (p.y > H - 20) p.y = H - 20;
      
      if (keys[' '] || keys['Enter']) {
          if (frameCount % 5 === 0) shoot();
      }
      
      for (let i = bullets.length - 1; i >= 0; i--) {
          bullets[i].y += bullets[i].dy;
          bullets[i].x += bullets[i].dx;
          if (bullets[i].y < 0 || bullets[i].x < 0 || bullets[i].x > W) bullets.splice(i, 1);
      }
      
      for (let i = enemies.length - 1; i >= 0; i--) {
          if (enemies[i].type === 0) {
              enemies[i].y += baseEnemySpeed;
          } else if (enemies[i].type === 1) {
              enemies[i].y += baseEnemySpeed * 0.75;
              if (enemies[i].x < p.x) enemies[i].x += baseEnemySpeed * 0.5;
              if (enemies[i].x > p.x) enemies[i].x -= baseEnemySpeed * 0.5;
          } else {
              enemies[i].y += baseEnemySpeed * 0.4;
          }
          
          if (enemies[i].type === 2 && (frameCount % 60 === 0) && Math.random() < 0.5) {
              eBullets.push({ x: enemies[i].x + 8, y: enemies[i].y + 20, dy: 4 });
          }
          
          let removed = false;
          if (p.x < enemies[i].x + 20 && p.x + 20 > enemies[i].x && p.y < enemies[i].y + 20 && p.y + 20 > enemies[i].y) {
              if (shieldActive) {
                  shieldActive = false;
                  enemies.splice(i, 1);
                  removed = true;
              } else {
                  gameOver = true;
              }
          }
          if (removed) continue;
          
          let hit = false;
          for (let j = bullets.length - 1; j >= 0; j--) {
              if (bullets[j].x < enemies[i].x + 20 && bullets[j].x + 4 > enemies[i].x && bullets[j].y < enemies[i].y + 20 && bullets[j].y + 10 > enemies[i].y) {
                  bullets.splice(j, 1);
                  enemies[i].hp--;
                  hit = true;
                  break;
              }
          }
          
          if (hit && enemies[i].hp <= 0) {
              score += enemies[i].type === 2 ? 50 : 10;
              if (score > highScore) {
                  highScore = score;
                  localStorage.setItem('kspace_highscore', highScore);
              }
              if (Math.random() < 0.1) {
                  powerups.push({x: enemies[i].x, y: enemies[i].y, dy: 2, type: Math.floor(Math.random() * 2)});
              }
              enemies.splice(i, 1);
          } else if (enemies[i].y > H) {
              enemies.splice(i, 1);
          }
      }
      
      for (let i = eBullets.length - 1; i >= 0; i--) {
          eBullets[i].y += eBullets[i].dy;
          if (eBullets[i].y > H) {
              eBullets.splice(i, 1);
              continue;
          }
          if (p.x < eBullets[i].x + 4 && p.x + 20 > eBullets[i].x && p.y < eBullets[i].y + 10 && p.y + 20 > eBullets[i].y) {
              eBullets.splice(i, 1);
              if (shieldActive) {
                  shieldActive = false;
              } else {
                  gameOver = true;
              }
          }
      }
      
      for (let i = powerups.length - 1; i >= 0; i--) {
          powerups[i].y += powerups[i].dy;
          if (p.x < powerups[i].x + 15 && p.x + 20 > powerups[i].x && p.y < powerups[i].y + 15 && p.y + 20 > powerups[i].y) {
              if (powerups[i].type === 0) {
                  spreadTimer = 300;
              } else {
                  shieldActive = true;
              }
              powerups.splice(i, 1);
              score += 50;
              continue;
          }
          if (powerups[i].y > H) {
              powerups.splice(i, 1);
          }
      }
      if (spreadTimer > 0) spreadTimer--;
      
      if (frameCount % spawnRate === 0) spawnEnemy();
      frameCount++;
  }

  function draw() {
      ctx.fillStyle = '#0a0a1e';
      ctx.fillRect(0, 0, W, H);
      
      ctx.fillStyle = '#c8c8c8';
      for(let s of stars) {
          ctx.fillRect(s.x, s.y, 2, 2);
      }
      
      ctx.fillStyle = '#64c8ff';
      ctx.fillRect(p.x, p.y, 20, 20);
      
      if (shieldActive) {
          ctx.strokeStyle = '#32c8ff';
          ctx.lineWidth = 2;
          ctx.strokeRect(p.x - 4, p.y - 4, 28, 28);
      }
      
      ctx.fillStyle = '#ffff64';
      for (let b of bullets) {
          ctx.fillRect(b.x, b.y, 4, 10);
      }
      
      ctx.fillStyle = '#ff64ff';
      for (let eb of eBullets) {
          ctx.fillRect(eb.x, eb.y, 4, 10);
      }
      
      for (let e of enemies) {
          ctx.fillStyle = e.type === 0 ? '#ff3232' : e.type === 1 ? '#ff9632' : '#a020f0';
          ctx.fillRect(e.x, e.y, 20, 20);
      }
      
      for (let pu of powerups) {
          ctx.fillStyle = pu.type === 0 ? '#32ff32' : '#32c8ff';
          ctx.fillRect(pu.x, pu.y, 15, 15);
      }
      
      ctx.fillStyle = '#fff';
      ctx.font = '16px monospace';
      ctx.fillText(`Score: ${score}  High: ${highScore}`, 10, 20);
      
      if (gameOver) {
          ctx.fillStyle = '#ff0000';
          ctx.font = '32px monospace';
          ctx.fillText('GAME OVER', W/2 - 85, H/2);
          ctx.font = '16px monospace';
          ctx.fillText('Press Enter to Restart', W/2 - 105, H/2 + 30);
      }
  }

  setInterval(() => {
      update();
      draw();
  }, 16);
</script>
</body>
</html>

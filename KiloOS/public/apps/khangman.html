<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHangman</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        #game-container {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        #stats {
            background-color: #2c2c2c;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            justify-content: space-around;
            width: 100%;
            box-sizing: border-box;
        }
        #stats span {
            font-weight: bold;
            color: #4facfe;
        }
        h1 {
            margin-top: 0;
            color: #4facfe;
            font-size: 24px;
        }
        #hangman-canvas {
            background-color: #121212;
            border-radius: 4px;
            margin-bottom: 20px;
            display: inline-block;
        }
        #word-display {
            font-size: 32px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .key {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .key:hover:not(:disabled) {
            background-color: #3a3a3a;
        }
        .key:disabled {
            background-color: #121212;
            color: #555;
            cursor: not-allowed;
            border-color: #222;
        }
        #message {
            height: 24px;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button.restart {
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button.restart:hover {
            background-color: #005999;
        }
        button.hint-btn {
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-right: 10px;
            transition: background-color 0.2s;
        }
        button.hint-btn:hover:not(:disabled) {
            background-color: #f57c00;
        }
        button.hint-btn:disabled {
            background-color: #444;
            color: #777;
            cursor: not-allowed;
        }
        button.mute-btn:hover {
            background-color: #777 !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KHangman</h1>
    
    <div id="stats">
        <div>Wins: <span id="stat-wins">0</span></div>
        <div>Losses: <span id="stat-losses">0</span></div>
        <div>Streak: <span id="stat-streak">0</span></div>
        <div>Best: <span id="stat-best">0</span></div>
    </div>
    
    <select id="category" onchange="initGame()" style="margin-bottom: 20px; padding: 5px; background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 4px; font-size: 16px; cursor: pointer;">
        <option value="Technology">Technology</option>
        <option value="Animals">Animals</option>
        <option value="Countries">Countries</option>
        <option value="Science">Science</option>
    </select>
    
    <canvas id="hangman-canvas" width="200" height="200"></canvas>
    
    <div id="word-display">_ _ _ _ _</div>
    
    <div id="message">Guess a letter to start</div>
    
    <div id="keyboard"></div>
    
    <div style="display: flex; justify-content: center;">
        <button class="hint-btn" onclick="useHint()" id="hint-btn">Hint</button>
        <button class="restart" onclick="initGame()">New Game</button>
        <button class="mute-btn" onclick="toggleMute()" id="mute-btn" style="margin-left: 10px; background-color: #555; color: white; border: none; border-radius: 4px; padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 16px; transition: background-color 0.2s;">🔊 Sound</button>
    </div>
</div>

<script>
    const CATEGORIES = {
        "Technology": ["COMPUTER", "PROGRAM", "APPLICATION", "SOFTWARE", "DEVELOPER", "INTERNET", "BROWSER", "HARDWARE", "NETWORK", "DATABASE"],
        "Animals": ["ELEPHANT", "GIRAFFE", "KANGAROO", "PENGUIN", "DOLPHIN", "TIGER", "MONKEY", "CHEETAH", "GORILLA", "RHINO"],
        "Countries": ["AUSTRALIA", "BRAZIL", "CANADA", "DENMARK", "EGYPT", "FRANCE", "GERMANY", "JAPAN", "MEXICO", "SPAIN"],
        "Science": ["PHYSICS", "CHEMISTRY", "BIOLOGY", "ASTRONOMY", "GEOLOGY", "GRAVITY", "MOLECULE", "ATOM", "ENERGY", "RADIATION"]
    };
    const MAX_ERRORS = 6;
    let word = "";
    let guessed = new Set();
    let errors = 0;
    let gameEnded = false;
    let hintUsed = false;
    let stats = { wins: 0, losses: 0, streak: 0, best: 0 };

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    let isMuted = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        document.getElementById('mute-btn').innerText = isMuted ? '🔇 Muted' : '🔊 Sound';
    }

    function playSound(type) {
        if (isMuted) return;
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        if (type === 'valid') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'invalid') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            osc.frequency.setValueAtTime(1200, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'lose') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.6);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        }
    }

    function loadStats() {
        const saved = localStorage.getItem('khangman_stats');
        if (saved) {
            try {
                stats = JSON.parse(saved);
            } catch (e) {}
        }
        updateStatsDisplay();
    }
    
    function saveStats() {
        localStorage.setItem('khangman_stats', JSON.stringify(stats));
        updateStatsDisplay();
    }
    
    function updateStatsDisplay() {
        document.getElementById('stat-wins').innerText = stats.wins;
        document.getElementById('stat-losses').innerText = stats.losses;
        document.getElementById('stat-streak').innerText = stats.streak;
        document.getElementById('stat-best').innerText = stats.best;
    }

    function drawHangman() {
        const canvas = document.getElementById('hangman-canvas');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#ff5252';
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        
        // Base gallows
        ctx.beginPath();
        ctx.moveTo(20, 180);
        ctx.lineTo(180, 180); // Base
        ctx.moveTo(50, 180);
        ctx.lineTo(50, 20); // Pole
        ctx.lineTo(120, 20); // Top
        ctx.lineTo(120, 40); // Rope
        ctx.stroke();
        
        if (errors > 0) {
            // Head
            ctx.beginPath();
            ctx.arc(120, 60, 20, 0, Math.PI * 2);
            ctx.stroke();
        }
        if (errors > 1) {
            // Body
            ctx.beginPath();
            ctx.moveTo(120, 80);
            ctx.lineTo(120, 130);
            ctx.stroke();
        }
        if (errors > 2) {
            // Left arm
            ctx.beginPath();
            ctx.moveTo(120, 90);
            ctx.lineTo(90, 120);
            ctx.stroke();
        }
        if (errors > 3) {
            // Right arm
            ctx.beginPath();
            ctx.moveTo(120, 90);
            ctx.lineTo(150, 120);
            ctx.stroke();
        }
        if (errors > 4) {
            // Left leg
            ctx.beginPath();
            ctx.moveTo(120, 130);
            ctx.lineTo(90, 160);
            ctx.stroke();
        }
        if (errors > 5) {
            // Right leg
            ctx.beginPath();
            ctx.moveTo(120, 130);
            ctx.lineTo(150, 160);
            ctx.stroke();
        }
    }

    function initKeyboard() {
        const keyboard = document.getElementById('keyboard');
        keyboard.innerHTML = '';
        for (let i = 0; i < 26; i++) {
            const letter = String.fromCharCode(65 + i);
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = letter;
            btn.onclick = () => guess(letter);
            btn.id = 'key-' + letter;
            keyboard.appendChild(btn);
        }
    }

    function initGame() {
        const category = document.getElementById('category').value;
        const words = CATEGORIES[category];
        word = words[Math.floor(Math.random() * words.length)];
        guessed.clear();
        errors = 0;
        gameEnded = false;
        hintUsed = false;
        if(document.getElementById('hint-btn')) document.getElementById('hint-btn').disabled = false;
        document.getElementById('message').innerText = "Guess a letter";
        document.getElementById('message').style.color = "#e0e0e0";
        initKeyboard();
        updateDisplay();
    }

    function useHint() {
        if (hintUsed || gameEnded) return;
        
        let unGuessed = [];
        for (let char of word) {
            if (!guessed.has(char)) {
                unGuessed.push(char);
            }
        }
        
        if (unGuessed.length > 0) {
            let randomChar = unGuessed[Math.floor(Math.random() * unGuessed.length)];
            hintUsed = true;
            document.getElementById('hint-btn').disabled = true;
            guess(randomChar);
        }
    }

    function guess(letter) {
        if (guessed.has(letter) || errors >= MAX_ERRORS || isWin()) return;
        
        initAudio(); // Initialize audio context on first user interaction
        
        guessed.add(letter);
        document.getElementById('key-' + letter).disabled = true;
        
        if (!word.includes(letter)) {
            errors++;
            if (errors < MAX_ERRORS) playSound('invalid');
        } else {
            if (!isWin()) playSound('valid');
        }
        
        updateDisplay();
        checkGameState();
    }

    function updateDisplay() {
        drawHangman();
        
        let displayStr = "";
        for (let char of word) {
            displayStr += guessed.has(char) ? char + " " : "_ ";
        }
        document.getElementById('word-display').innerText = displayStr.trim();
    }

    function isWin() {
        return [...word].every(char => guessed.has(char));
    }

    function checkGameState() {
        const msgEl = document.getElementById('message');
        if (isWin()) {
            msgEl.innerText = "You Win!";
            msgEl.style.color = "#4caf50";
            disableAllKeys();
            if (!gameEnded) {
                gameEnded = true;
                playSound('win');
                stats.wins++;
                stats.streak++;
                if (stats.streak > stats.best) stats.best = stats.streak;
                saveStats();
            }
        } else if (errors >= MAX_ERRORS) {
            msgEl.innerText = "Game Over! Word was " + word;
            msgEl.style.color = "#f44336";
            disableAllKeys();
            if (!gameEnded) {
                gameEnded = true;
                playSound('lose');
                stats.losses++;
                stats.streak = 0;
                saveStats();
            }
        }
    }

    function disableAllKeys() {
        document.querySelectorAll('.key').forEach(btn => btn.disabled = true);
    }

    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.altKey || e.metaKey) return;
        if (e.key >= 'a' && e.key <= 'z') {
            guess(e.key.toUpperCase());
        } else if (e.key >= 'A' && e.key <= 'Z') {
            guess(e.key);
        }
    });

    loadStats();
    initGame();
</script>
</body>
</html>

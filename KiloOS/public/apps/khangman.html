<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHangman</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        #game-container {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-top: 0;
            color: #4facfe;
            font-size: 24px;
        }
        #hangman-drawing {
            font-family: monospace;
            white-space: pre;
            background-color: #121212;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: left;
            display: inline-block;
            font-size: 16px;
            color: #ff5252;
        }
        #word-display {
            font-size: 32px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }
        .key {
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px 0;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .key:hover:not(:disabled) {
            background-color: #3a3a3a;
        }
        .key:disabled {
            background-color: #121212;
            color: #555;
            cursor: not-allowed;
            border-color: #222;
        }
        #message {
            height: 24px;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        button.restart {
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s;
        }
        button.restart:hover {
            background-color: #005999;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>KHangman</h1>
    
    <div id="hangman-drawing">
  +---+
  |   |
      |
      |
      |
      |
=========
    </div>
    
    <div id="word-display">_ _ _ _ _</div>
    
    <div id="message">Guess a letter to start</div>
    
    <div id="keyboard"></div>
    
    <button class="restart" onclick="initGame()">New Game</button>
</div>

<script>
    const WORDS = ["HANGMAN", "COMPUTER", "PROGRAM", "APPLICATION", "SOFTWARE", "DEVELOPER"];
    const MAX_ERRORS = 6;
    let word = "";
    let guessed = new Set();
    let errors = 0;

    const DRAWINGS = [
`  +---+
  |   |
      |
      |
      |
      |
=========`,
`  +---+
  |   |
  O   |
      |
      |
      |
=========`,
`  +---+
  |   |
  O   |
  |   |
      |
      |
=========`,
`  +---+
  |   |
  O   |
 /|   |
      |
      |
=========`,
`  +---+
  |   |
  O   |
 /|\\  |
      |
      |
=========`,
`  +---+
  |   |
  O   |
 /|\\  |
 /    |
      |
=========`,
`  +---+
  |   |
  O   |
 /|\\  |
 / \\  |
      |
=========`
    ];

    function initKeyboard() {
        const keyboard = document.getElementById('keyboard');
        keyboard.innerHTML = '';
        for (let i = 0; i < 26; i++) {
            const letter = String.fromCharCode(65 + i);
            const btn = document.createElement('button');
            btn.className = 'key';
            btn.innerText = letter;
            btn.onclick = () => guess(letter);
            btn.id = 'key-' + letter;
            keyboard.appendChild(btn);
        }
    }

    function initGame() {
        word = WORDS[Math.floor(Math.random() * WORDS.length)];
        guessed.clear();
        errors = 0;
        document.getElementById('message').innerText = "Guess a letter";
        document.getElementById('message').style.color = "#e0e0e0";
        initKeyboard();
        updateDisplay();
    }

    function guess(letter) {
        if (guessed.has(letter) || errors >= MAX_ERRORS || isWin()) return;
        
        guessed.add(letter);
        document.getElementById('key-' + letter).disabled = true;
        
        if (!word.includes(letter)) {
            errors++;
        }
        
        updateDisplay();
        checkGameState();
    }

    function updateDisplay() {
        document.getElementById('hangman-drawing').innerText = DRAWINGS[errors];
        
        let displayStr = "";
        for (let char of word) {
            displayStr += guessed.has(char) ? char + " " : "_ ";
        }
        document.getElementById('word-display').innerText = displayStr.trim();
    }

    function isWin() {
        return [...word].every(char => guessed.has(char));
    }

    function checkGameState() {
        const msgEl = document.getElementById('message');
        if (isWin()) {
            msgEl.innerText = "You Win!";
            msgEl.style.color = "#4caf50";
            disableAllKeys();
        } else if (errors >= MAX_ERRORS) {
            msgEl.innerText = "Game Over! Word was " + word;
            msgEl.style.color = "#f44336";
            disableAllKeys();
        }
    }

    function disableAllKeys() {
        document.querySelectorAll('.key').forEach(btn => btn.disabled = true);
    }

    document.addEventListener('keydown', (e) => {
        if (e.key >= 'a' && e.key <= 'z') {
            guess(e.key.toUpperCase());
        } else if (e.key >= 'A' && e.key <= 'Z') {
            guess(e.key);
        }
    });

    initGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>KAudio</title>
<style>
  body { 
    margin: 0; 
    background: linear-gradient(135deg, #0f172a, #1e1b4b); 
    display: flex; flex-direction: column; 
    justify-content: center; align-items: center; 
    height: 100vh; overflow: hidden; 
    font-family: 'Inter', system-ui, sans-serif; user-select: none; color: #fff;
  }
  .synth-container {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .controls {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
  }
  .waveform-select {
    background: rgba(0, 0, 0, 0.4); color: #0ea5e9; border: 1px solid rgba(14, 165, 233, 0.4);
    padding: 6px 12px; border-radius: 6px; cursor: pointer; outline: none; font-size: 13px;
    transition: all 0.2s; appearance: none; text-align: center; font-weight: 500;
  }
  .waveform-select:hover { border-color: #0ea5e9; background: rgba(0, 0, 0, 0.6); }
  .waveform-select option { background: #1e1b4b; color: #fff; }
  .keys-wrapper { position: relative; display: flex; gap: 4px; }
  
  .key { 
    width: 44px; height: 160px; background: linear-gradient(180deg, #f8fafc 0%, #cbd5e1 100%); 
    border-radius: 0 0 6px 6px; display: flex; align-items: flex-end; justify-content: center; 
    padding-bottom: 12px; font-weight: 600; color: #475569; font-size: 13px;
    cursor: pointer; transition: transform 0.1s, box-shadow 0.1s, background 0.1s; 
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), inset 0 -4px 0 rgba(0,0,0,0.1);
    position: relative; z-index: 1;
  }
  .key.black {
    position: absolute; top: 0; left: 0; 
    width: 28px; height: 90px; background: linear-gradient(180deg, #334155 0%, #0f172a 100%);
    border-radius: 0 0 4px 4px; color: #94a3b8; font-size: 11px; z-index: 2;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), inset 0 -3px 0 rgba(0,0,0,0.5);
    padding-bottom: 8px;
  }
  
  /* Black Key Positions */
  .key.black[data-note="1"] { margin-left: 32px; }
  .key.black[data-note="3"] { margin-left: 80px; }
  .key.black[data-note="6"] { margin-left: 176px; }
  .key.black[data-note="8"] { margin-left: 224px; }
  .key.black[data-note="10"] { margin-left: 272px; }
  
  /* Active States */
  .key.active { 
    background: #0ea5e9; color: #fff; transform: translateY(2px);
    box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.1), inset 0 -2px 0 rgba(0,0,0,0.2), 0 0 15px rgba(14, 165, 233, 0.4);
  }
  .key.black.active {
    background: #38bdf8; transform: translateY(2px); color: #fff;
    box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.4), inset 0 -1px 0 rgba(0,0,0,0.5), 0 0 10px rgba(56, 189, 248, 0.4);
  }
</style>
</head>
<body>
<div class="synth-container">
  <div class="controls">
    <div style="font-size: 16px; font-weight: 700; letter-spacing: 0.5px;">KAudio<span style="color:#0ea5e9">.</span></div>
    <div id="octaveDisplay" style="font-size: 13px; font-weight: 500; color: #94a3b8; margin: 0 16px;">Oct: 0 (L/R)</div>
    <div id="recStatus" style="font-size: 13px; font-weight: bold; color: #ef4444; margin: 0 16px 0 0; opacity: 0.5;">Z: Rec, X: Play</div>
    <select id="waveType" class="waveform-select" aria-label="Waveform type">
      <option value="square">Square Wave</option>
      <option value="sine">Sine Wave</option>
      <option value="sawtooth">Sawtooth Wave</option>
      <option value="triangle">Triangle Wave</option>
    </select>
  </div>
  <div class="keys-wrapper" id="keys"></div>
</div>
<script>
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  let ctx = null;
  
  // 13 notes: C, C#, D, D#, E, F, F#, G, G#, A, A#, B, C
  const binds = ['A', 'W', 'S', 'E', 'D', 'F', 'T', 'G', 'Y', 'H', 'U', 'J', 'K'];
  const freqs = [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.00, 415.30, 440.00, 466.16, 493.88, 523.25];
  const isBlack = [false, true, false, true, false, false, true, false, true, false, true, false, false];
  
  const keyEls = [];
  const activeOscs = {};
  let octaveShift = 0;
  
  let isRecording = false;
  let isPlaying = false;
  let recordedEvents = [];
  let recordingStartTime = 0;
  let playbackTimeouts = [];
  
  const waveSelect = document.getElementById('waveType');
  const keysContainer = document.getElementById('keys');
  const octaveDisplay = document.getElementById('octaveDisplay');
  
  for (let i = 0; i < binds.length; i++) {
      let el = document.createElement('div');
      el.className = 'key' + (isBlack[i] ? ' black' : '');
      el.dataset.note = i;
      el.textContent = binds[i];
      el.tabIndex = 0;
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', 'Play key ' + binds[i]);
      keysContainer.appendChild(el);
      keyEls.push(el);
      
      el.addEventListener('mousedown', () => play(i));
      el.addEventListener('mouseup', () => stop(i));
      el.addEventListener('mouseleave', () => stop(i));
  }

  function initAudio() {
      if (!ctx) ctx = new AudioContext();
  }

  function play(i, fromPlayback = false) {
      initAudio();
      if (activeOscs[i]) return;
      
      if (isRecording && !fromPlayback && recordedEvents.length < 4000) {
          recordedEvents.push({ keyIndex: i, time: Date.now() - recordingStartTime, type: 1 });
      }
      
      let osc = ctx.createOscillator();
      let gain = ctx.createGain();
      
      osc.type = waveSelect.value;
      osc.frequency.value = freqs[i] * Math.pow(2, octaveShift);
      
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      
      activeOscs[i] = { osc, gain };
      keyEls[i].classList.add('active');
  }

  function stop(i, fromPlayback = false) {
      if (isRecording && !fromPlayback && recordedEvents.length < 4000) {
          recordedEvents.push({ keyIndex: i, time: Date.now() - recordingStartTime, type: 0 });
      }

      if (activeOscs[i]) {
          let { osc, gain } = activeOscs[i];
          gain.gain.setValueAtTime(0.1, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
          osc.stop(ctx.currentTime + 0.1);
          delete activeOscs[i];
      }
      keyEls[i].classList.remove('active');
  }

  function startPlayback() {
      isPlaying = true;
      document.getElementById('recStatus').textContent = '[PLAYING]';
      document.getElementById('recStatus').style.color = '#10b981';
      document.getElementById('recStatus').style.opacity = '1';
      
      let maxTime = 0;
      recordedEvents.forEach(ev => {
          let t = setTimeout(() => {
              if (ev.type === 1) play(ev.keyIndex, true);
              else stop(ev.keyIndex, true);
          }, ev.time);
          playbackTimeouts.push(t);
          if (ev.time > maxTime) maxTime = ev.time;
      });
      
      playbackTimeouts.push(setTimeout(() => {
          stopPlayback();
      }, maxTime + 100));
  }
  
  function stopPlayback() {
      isPlaying = false;
      playbackTimeouts.forEach(t => clearTimeout(t));
      playbackTimeouts = [];
      for (let i = 0; i < binds.length; i++) stop(i, true);
      document.getElementById('recStatus').textContent = 'Z: Rec, X: Play';
      document.getElementById('recStatus').style.color = '#ef4444';
      document.getElementById('recStatus').style.opacity = '0.5';
  }

  document.addEventListener('keydown', e => {
      let idx = binds.indexOf(e.key.toUpperCase());
      if (idx !== -1 && !e.repeat) play(idx);
      
      if (e.key.toUpperCase() === 'Z') {
          if (isPlaying) stopPlayback();
          isRecording = !isRecording;
          if (isRecording) {
              recordedEvents = [];
              recordingStartTime = Date.now();
              for (let i = 0; i < binds.length; i++) {
                  if (activeOscs[i]) {
                      recordedEvents.push({ keyIndex: i, time: 0, type: 1 });
                  }
              }
              document.getElementById('recStatus').textContent = '[RECORDING]';
              document.getElementById('recStatus').style.color = '#ef4444';
              document.getElementById('recStatus').style.opacity = '1';
          } else {
              document.getElementById('recStatus').textContent = 'Z: Rec, X: Play';
              document.getElementById('recStatus').style.opacity = '0.5';
          }
      }
      if (e.key.toUpperCase() === 'X') {
          if (isRecording) {
              isRecording = false;
              document.getElementById('recStatus').textContent = 'Z: Rec, X: Play';
              document.getElementById('recStatus').style.opacity = '0.5';
          }
          if (recordedEvents.length === 0) return;
          if (isPlaying) stopPlayback();
          else startPlayback();
      }
      
      if (e.key === 'ArrowUp') {
          e.preventDefault();
          waveSelect.selectedIndex = (waveSelect.selectedIndex - 1 + waveSelect.options.length) % waveSelect.options.length;
      }
      if (e.key === 'ArrowDown') {
          e.preventDefault();
          waveSelect.selectedIndex = (waveSelect.selectedIndex + 1) % waveSelect.options.length;
      }
      if (e.key === 'ArrowLeft') {
          e.preventDefault();
          if (octaveShift > -4) {
              for (let i = 0; i < binds.length; i++) stop(i);
              octaveShift--;
              octaveDisplay.textContent = 'Oct: ' + (octaveShift > 0 ? '+' : '') + octaveShift + ' (L/R)';
          }
      }
      if (e.key === 'ArrowRight') {
          e.preventDefault();
          if (octaveShift < 4) {
              for (let i = 0; i < binds.length; i++) stop(i);
              octaveShift++;
              octaveDisplay.textContent = 'Oct: ' + (octaveShift > 0 ? '+' : '') + octaveShift + ' (L/R)';
          }
      }
  });

  document.addEventListener('keyup', e => {
      let idx = binds.indexOf(e.key.toUpperCase());
      if (idx !== -1) stop(idx);
  });

  window.addEventListener('blur', () => {
      for (let i = 0; i < binds.length; i++) stop(i);
      if (isPlaying) stopPlayback();
  });
</script>
</body>
</html>

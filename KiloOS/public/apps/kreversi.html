<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>KReversi</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f0f0f0; }
        h1 { font-size: 24px; color: #333; }
        .board { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 2px; background: #333; padding: 2px; width: max-content; }
        .cell { background: #008000; width: 40px; height: 40px; }
    </style>
</head>
<body>
    <h1>KReversi</h1>
    <div id="board" class="board"></div>
    <script>
        const board = document.getElementById('board');
        for (let i = 0; i < 64; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            board.appendChild(cell);
        }
    </script>
</body>
</html>

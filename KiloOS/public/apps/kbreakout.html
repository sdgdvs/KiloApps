<!DOCTYPE html>
<html>
<head>
<style>
body { background: #14141e; color: #fff; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
canvas { background: #1a1a24; border: 2px solid #33c; border-radius: 4px; box-shadow: 0 0 10px rgba(51,51,204,0.5); }
#ui { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 16px; text-shadow: 1px 1px 0 #000; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">L<span id="lv_txt">1</span> Sc: <span id="sc">0</span> Hi: <span id="hi">0</span> Lv: <span id="lv">3</span> Br: <span id="brk">0</span></div>
<canvas id="c" width="400" height="400"></canvas>
<script>
const cvs = document.getElementById('c'), ctx = cvs.getContext('2d');
let w = cvs.width, h = cvs.height;
let pad_w = 60, pad_h = 10, pad_x = w/2 - pad_w/2;
let ball_x = w/2, ball_y = h-50, ball_size = 8, ball_dx = 0, ball_dy = 0;
let state = 0; // 0=start, 1=play, 2=gameover
let score = 0, high_score = parseInt(localStorage.getItem('kbreakout_hi')||'0');
let lifetime_bricks = parseInt(localStorage.getItem('kbreakout_bricks')||'0');
let level = 1;
document.getElementById('hi').innerText = high_score; document.getElementById('brk').innerText = lifetime_bricks; document.getElementById('lv_txt').innerText = level;
let diff = 0, speed = 3;
let lives = 3;
let power_active = 0, power_x = 0, power_y = 0, paddle_timer = 0, power_type = 0, pierce_timer = 0;
let sticky_timer = 0, ball_stuck = 0, ball_stuck_offset = 0;
let laser_timer = 0, lasers = [];
let ufo_active = 0, ufo_x = 0, ufo_y = 25, ufo_dx = 2, ufo_timer = 300;
let keys = {};
const ROWS = 5, COLS = 10, BR_W = w/COLS, BR_H = 20;
let bricks = [];
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(f, type, dur) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
}

function initLevel() {
    bricks = [];
    let bCount = 0;
    for(let r=0; r<ROWS; r++) {
        let row = [];
        for(let c=0; c<COLS; c++) {
            let v = 0;
            let L = level % 10;
            if (L === 1) {
                if (r === 1 && c % 3 === 1) v = 9; else if (r === 2) v = 2; else v = 1;
            } else if (L === 2) {
                if ((r+c)%2 === 0) v = 1; else if (r === 0) v = 9;
            } else if (L === 3) {
                if (c >= r && c < COLS - r) v = (r === 0) ? 2 : 1;
            } else if (L === 4) {
                if ((r===1 && (c===2 || c===7))) v = 9;
                else if (r===3 && (c>1 && c<8)) v = 2;
                else if (r===4 && (c===2 || c===7)) v = 1;
            } else if (L === 5) {
                if (c === 2 || c === 7) v = 9; else v = (r%2===0) ? 2 : 1;
            } else if (L === 6) {
                if ((r+c)%2 === 0) v = 2; else v = 9;
                if (v === 9 && (r===4 || r===0)) v = 1;
            } else if (L === 7) {
                if (Math.abs(r - 2) + Math.abs(c - 4) < 3) v = 2;
            } else if (L === 8) {
                if (c === 1 || c === 8) v = 9; else v = 2;
            } else if (L === 9) {
                if (c >= r && c < COLS - r) v = 2;
            } else {
                v = 2;
            }
            row.push(v);
            if (v !== 0 && v !== 9) bCount++;
        }
        bricks.push(row);
    }
    if (bCount === 0) bricks[0][0] = 1;
    power_active = 0;
    paddle_timer = 0;
    pierce_timer = 0;
    sticky_timer = 0;
    laser_timer = 0;
    ball_stuck = 0;
    lasers = [];
    ufo_active = 0;
    ufo_timer = 300;
    pad_w = diff === 1 ? 40 : 60;
    pad_x = w/2 - pad_w/2;
    ball_x = w/2;
    ball_y = h-50;
    ball_dx = speed * (Math.random()>0.5?1:-1);
    ball_dy = -speed;
}

window.onkeydown = e => keys[e.key] = 1;
window.onkeyup = e => {
    keys[e.key] = 0;
    if(state !== 1) {
        if(e.key === 'Enter') { diff = 0; speed = 3; score = 0; lives = 3; level = 1; pad_w = 60; initLevel(); state = 1; }
        if(e.key === ' ') { diff = 1; speed = 5; score = 0; lives = 3; level = 1; pad_w = 40; initLevel(); state = 1; }
    }
};

cvs.onmousemove = e => {
    if(state === 1) {
        let rect = cvs.getBoundingClientRect();
        pad_x = e.clientX - rect.left - pad_w/2;
        if(pad_x < 0) pad_x = 0;
        if(pad_x > w - pad_w) pad_x = w - pad_w;
    }
};

function loop() {
    requestAnimationFrame(loop);
    ctx.clearRect(0,0,w,h);
    
    if(state === 1) {
        if(keys['ArrowLeft']) pad_x -= 6;
        if(keys['ArrowRight']) pad_x += 6;
        if(pad_x < 0) pad_x = 0;
        if(pad_x > w - pad_w) pad_x = w - pad_w;
        
        if (ball_stuck) {
            ball_x = pad_x + ball_stuck_offset;
            ball_y = h - 30 - ball_size;
            if (keys['ArrowUp'] || keys[' ']) {
                ball_stuck = 0;
                ball_dy = -speed;
            }
        } else {
            ball_x += ball_dx;
            ball_y += ball_dy;
            
            if(ball_x < 0) { ball_x = 0; ball_dx = -ball_dx; }
            if(ball_x > w - ball_size) { ball_x = w - ball_size; ball_dx = -ball_dx; }
            if(ball_y < 0) { ball_y = 0; ball_dy = -ball_dy; }
            
            if(ball_y + ball_size > h - 30 && ball_y < h - 30 + pad_h && ball_x + ball_size > pad_x && ball_x < pad_x + pad_w) {
                ball_y = h - 30 - ball_size;
                ball_dy = -ball_dy;
                let hit = (ball_x + ball_size/2) - (pad_x + pad_w/2);
                ball_dx = hit * 0.2;
                if(Math.abs(ball_dx) < 1) ball_dx = ball_dx > 0 ? 1 : -1;
                playTone(400, 'square', 0.1);
                if (sticky_timer > 0) {
                    ball_stuck = 1;
                    ball_stuck_offset = ball_x - pad_x;
                }
            }
            
            if(ball_y > h) {
                lives--;
                power_active = 0;
                sticky_timer = 0;
                laser_timer = 0;
                ball_stuck = 0;
                if (lives <= 0) {
                    state = 2;
                    playTone(150, 'sawtooth', 0.5);
                    if(score > high_score) { high_score = score; localStorage.setItem('kbreakout_hi', high_score); } localStorage.setItem('kbreakout_bricks', lifetime_bricks); document.getElementById('hi').innerText = high_score; document.getElementById('brk').innerText = lifetime_bricks; document.getElementById('lv_txt').innerText = level;
                } else {
                    paddle_timer = 0;
                    pad_w = diff === 1 ? 40 : 60;
                    pad_x = w/2 - pad_w/2;
                    ball_x = w/2;
                    ball_y = h-50;
                    ball_dx = speed * (Math.random()>0.5?1:-1);
                    ball_dy = -speed;
                    playTone(250, 'sawtooth', 0.3);
                }
            }
        }
        
        if (power_active) {
            power_y += 3;
            if (power_y + 10 > h - 30 && power_y < h - 30 + pad_h && power_x + 10 > pad_x && power_x < pad_x + pad_w) {
                power_active = 0;
                if (power_type === 1) { paddle_timer = 300; pad_w = diff === 1 ? 80 : 100; }
                else if (power_type === 2) { lives++; }
                else if (power_type === 3) { pierce_timer = 300; }
                else if (power_type === 4) { sticky_timer = 300; }
                else if (power_type === 5) { laser_timer = 300; }
                playTone(300, 'sine', 0.2);
            }
            if (power_y > h) power_active = 0;
        }
        
        if (paddle_timer > 0) {
            paddle_timer--;
            if (paddle_timer === 0) pad_w = diff === 1 ? 40 : 60;
        }
        if (pierce_timer > 0) pierce_timer--;
        if (sticky_timer > 0) sticky_timer--;
        
        if (laser_timer > 0) {
            laser_timer--;
            if (laser_timer % 30 === 0) {
                lasers.push({x: pad_x + pad_w/2, y: h - 30});
            }
        }
        
        if (ufo_active) {
            ufo_x += ufo_dx;
            if (ufo_x < 0 || ufo_x > w - 30) ufo_dx = -ufo_dx;
            if (ball_x + ball_size > ufo_x && ball_x < ufo_x + 30 && ball_y + ball_size > ufo_y && ball_y < ufo_y + 10) {
                ufo_active = 0;
                ball_dy = -ball_dy;
                score += 50 + diff * 50;
                playTone(500, 'square', 0.1);
            }
        } else {
            if (ufo_timer > 0) ufo_timer--;
            else if (level >= 3) { ufo_active = 1; ufo_x = 0; ufo_dx = 2 + diff; ufo_timer = 400 + Math.random()*400; }
        }
        
        for (let i = lasers.length - 1; i >= 0; i--) {
            lasers[i].y -= 5;
            if (lasers[i].y < 0) {
                lasers.splice(i, 1);
                continue;
            }
            let r = Math.floor((lasers[i].y - 40) / BR_H);
            let c = Math.floor(lasers[i].x / BR_W);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
                if (bricks[r][c] !== 0 && bricks[r][c] !== 9) {
                    if (bricks[r][c] === 2) {
                        bricks[r][c] = 1; score += 5; lifetime_bricks++; playTone(700, 'square', 0.05);
                    } else {
                        bricks[r][c] = 0; score += 10; lifetime_bricks++; playTone(600, 'square', 0.05);
                    }
                    lasers.splice(i, 1);
                }
            }
        }
        
        let bLeft = 0;
        for(let r=0; r<ROWS; r++) {
            for(let c=0; c<COLS; c++) {
                if(bricks[r][c]) {
                    if (bricks[r][c] !== 9) bLeft++;
                    let bx = c * BR_W, by = r * BR_H + 40;
                    if(!ball_stuck && ball_x + ball_size > bx && ball_x < bx + BR_W && ball_y + ball_size > by && ball_y < by + BR_H) {
                        if (bricks[r][c] === 9) {
                            ball_dy = -ball_dy;
                            playTone(800, 'square', 0.05);
                        } else if (bricks[r][c] === 2) {
                            if (pierce_timer > 0) {
                                bricks[r][c] = 0; bLeft--; lifetime_bricks++; score += 5 + diff * 5; playTone(700, 'square', 0.05);
                            } else {
                                bricks[r][c] = 1; ball_dy = -ball_dy; lifetime_bricks++; score += 5 + diff * 5; playTone(700, 'square', 0.05);
                            }
                        } else {
                            bricks[r][c] = 0;
                            bLeft--;
                            if (pierce_timer <= 0) ball_dy = -ball_dy;
                            lifetime_bricks++;
                            score += 10 + diff * 10;
                            playTone(600, 'square', 0.05);
                            if (!power_active && Math.random() < 0.2) {
                                power_active = 1;
                                power_type = Math.floor(Math.random() * 5) + 1;
                                power_x = bx + BR_W/2;
                                power_y = by;
                            }
                        }
                    }
                    if (bricks[r][c] === 9) ctx.fillStyle = '#666';
                    else if (bricks[r][c] === 2) ctx.fillStyle = '#f66';
                    else ctx.fillStyle = `rgb(${200-r*30},${100+c*15},${50+r*20})`;
                    ctx.fillRect(bx+1, by+1, BR_W-2, BR_H-2);
                }
            }
        }
        
        if(bLeft === 0) {
            if (level % 3 === 0) speed += 0.5;
            level++;
            initLevel();
        }
    }
    
    ctx.fillStyle = '#3cf';
    if(state !== 0) ctx.fillRect(pad_x, h-30, pad_w, pad_h);
    
    if (power_active) {
        if (power_type === 1) ctx.fillStyle = '#ff0';
        else if (power_type === 2) ctx.fillStyle = '#0f0';
        else if (power_type === 3) ctx.fillStyle = '#f00';
        else if (power_type === 4) ctx.fillStyle = '#00f';
        else ctx.fillStyle = '#0ff';
        ctx.fillRect(power_x, power_y, 10, 10);
    }
    
    if (ufo_active) {
        ctx.fillStyle = '#c3c';
        ctx.fillRect(ufo_x, ufo_y, 30, 10);
    }
    
    ctx.fillStyle = pierce_timer > 0 ? '#f33' : '#fff';
    if(state !== 0) ctx.fillRect(ball_x, ball_y, ball_size, ball_size);
    
    ctx.fillStyle = '#0ff';
    for (let l of lasers) {
        ctx.fillRect(l.x - 2, l.y - 5, 4, 10);
    }
    
    document.getElementById('sc').innerText = score;
    document.getElementById('lv').innerText = lives;
    document.getElementById('lv_txt').innerText = level;
    document.getElementById('brk').innerText = lifetime_bricks;
    document.getElementById('hi').innerText = high_score; 
    
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    if(state === 0) {
        ctx.fillText('KBreakout', w/2, h/2 - 20);
        ctx.font = '14px monospace';
        ctx.fillText('Press ENTER for Easy', w/2, h/2 + 20);
        ctx.fillText('Press SPACE for Hard', w/2, h/2 + 40);
    } else if(state === 2) {
        ctx.fillText('GAME OVER', w/2, h/2 - 20);
        ctx.font = '14px monospace';
        ctx.fillText('Press ENTER for Easy', w/2, h/2 + 20);
        ctx.fillText('Press SPACE for Hard', w/2, h/2 + 40);
    }
}
loop();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KClock</title>
<style>
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Tahoma', sans-serif; background: #ece9d8; user-select: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
  .display { background: white; border: 2px inset #ccc; font-size: 32px; font-weight: bold; font-family: 'Consolas', monospace; padding: 10px 20px; text-align: center; width: 150px; box-sizing: border-box; }
  .buttons { display: flex; gap: 10px; }
  button { padding: 4px 10px; cursor: pointer; border: 1px solid #999; border-radius: 3px; background: linear-gradient(to bottom, #f9f9f9, #e0e0e0); }
  button:active { background: #d0d0d0; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.3); }
</style>
</head>
<body>
  <div class="display" id="display">00:00.00</div>
  <div class="buttons">
    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>
    <button onclick="reset()">Reset</button>
  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let timer = null;

    function formatTime(ms) {
      let centis = Math.floor((ms % 1000) / 10);
      let seconds = Math.floor((ms / 1000) % 60);
      let minutes = Math.floor(ms / 60000);
      
      return String(minutes).padStart(2, '0') + ':' + 
             String(seconds).padStart(2, '0') + '.' + 
             String(centis).padStart(2, '0');
    }

    function update() {
      const now = Date.now();
      const currentMs = elapsed + (timer ? (now - startTime) : 0);
      document.getElementById('display').innerText = formatTime(currentMs);
    }

    function start() {
      if (!timer) {
        startTime = Date.now();
        timer = setInterval(update, 15);
      }
    }

    function stop() {
      if (timer) {
        clearInterval(timer);
        elapsed += (Date.now() - startTime);
        timer = null;
        update();
      }
    }

    function reset() {
      if (timer) clearInterval(timer);
      timer = null;
      elapsed = 0;
      update();
    }
  </script>
</body>
</html>

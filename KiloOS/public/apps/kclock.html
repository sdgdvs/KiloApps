<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: hsl(210, 15%, 12%);
    --card-bg: hsl(210, 15%, 20%);
    --primary: hsl(200, 85%, 60%);
    --border-color: rgba(255, 255, 255, 0.1);
    --text-main: #ffffff;
  }
  body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; }
  .tabs { display: flex; border-bottom: 1px solid var(--border-color); background: var(--card-bg); }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 13px; font-weight: 600; color: #aaa; transition: all 0.2s; border-bottom: 2px solid transparent; }
  .tab:hover { color: #fff; background: rgba(255,255,255,0.05); }
  .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
  .content { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .content.active { display: flex; }
  
  .digital-clock { font-family: 'JetBrains Mono', monospace; font-size: 48px; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
  .date-display { font-size: 14px; color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
  
  .btn-row { display: flex; gap: 10px; margin-top: 30px; }
  button { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.15); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 600; transition: all 0.2s; }
  button:hover { background: rgba(255,255,255,0.15); }
  button.primary { background: var(--primary); color: #111; border-color: var(--primary); }
  button.primary:hover { filter: brightness(1.2); }
</style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'clock')">Clock</div>
    <div class="tab" onclick="switchTab(event, 'stopwatch')">Stopwatch</div>
    <div class="tab" onclick="switchTab(event, 'timer')">Timer</div>
    <div class="tab" onclick="switchTab(event, 'alarms')">Alarms</div>
  </div>

  <div id="tab-clock" class="content active">
    <div class="digital-clock" id="main-clock">00:00:00</div>
    <div class="date-display" id="main-date">...</div>
  </div>

  <div id="tab-stopwatch" class="content">
    <div class="digital-clock" id="stopwatch-display">00:00.00</div>
    <div class="btn-row">
      <button onclick="toggleStopwatch()" id="sw-btn" class="primary">Start</button>
      <button onclick="lapStopwatch()">Lap</button>
      <button onclick="resetStopwatch()">Reset</button>
    </div>
    <div id="lap-list" style="margin-top:20px; width:100%; max-height:150px; overflow-y:auto; font-family:'JetBrains Mono', monospace; font-size:13px; color:#aaa; text-align:center;"></div>
  </div>

  <div id="tab-timer" class="content">
    <div class="digital-clock" id="timer-display">00:00</div>
    <div style="margin-top:10px;">
      <input type="number" id="timer-mins" value="5" min="1" max="99" style="width:50px; background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:5px; padding:5px; text-align:center; font-family:'Inter', sans-serif;"> min
    </div>
    <div class="btn-row">
      <button onclick="toggleTimer()" id="tm-btn" class="primary">Start</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <div id="tab-alarms" class="content">
    <div style="margin-top:20px; margin-bottom: 20px;">
      <input type="time" id="alarm-time" style="background:rgba(255,255,255,0.1); color:white; border:1px solid rgba(255,255,255,0.2); border-radius:5px; padding:8px; font-family:'Inter', sans-serif;">
      <button onclick="addAlarm()" class="primary">Add Alarm</button>
    </div>
    <div id="alarm-list" style="width:100%; flex:1; overflow-y:auto; font-family:'Inter', sans-serif; font-size:14px; color:#ddd;"></div>
  </div>

  <script>
    function switchTab(e, id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
      e.currentTarget.classList.add('active');
      document.getElementById('tab-' + id).classList.add('active');
    }

    // Clock Logic
    function updateClock() {
      const now = new Date();
      document.getElementById('main-clock').innerText = now.toLocaleTimeString('en-US', { hour12: false });
      document.getElementById('main-date').innerText = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      if (typeof checkAlarms === 'function') checkAlarms(now);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Stopwatch Logic
    let swStart = 0;
    let swElapsed = 0;
    let swInterval = null;
    let swRunning = false;
    let swLapCount = 0;

    function formatSw(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      const centi = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
      return `${minutes}:${seconds}.${centi}`;
    }

    function updateSwDisplay() {
      const current = swRunning ? Date.now() - swStart + swElapsed : swElapsed;
      document.getElementById('stopwatch-display').innerText = formatSw(current);
    }

    function toggleStopwatch() {
      if (swRunning) {
        swElapsed += Date.now() - swStart;
        clearInterval(swInterval);
        swRunning = false;
        document.getElementById('sw-btn').innerText = 'Start';
        document.getElementById('sw-btn').classList.add('primary');
      } else {
        swStart = Date.now();
        swInterval = setInterval(updateSwDisplay, 10);
        swRunning = true;
        document.getElementById('sw-btn').innerText = 'Stop';
        document.getElementById('sw-btn').classList.remove('primary');
      }
    }

    function lapStopwatch() {
      if (swRunning) {
        swLapCount++;
        const current = Date.now() - swStart + swElapsed;
        const div = document.createElement('div');
        div.innerText = `Lap ${swLapCount}:\u00A0\u00A0${formatSw(current)}`;
        document.getElementById('lap-list').prepend(div);
      }
    }

    function resetStopwatch() {
      swRunning = false;
      clearInterval(swInterval);
      swElapsed = 0;
      swLapCount = 0;
      document.getElementById('lap-list').innerHTML = '';
      updateSwDisplay();
      document.getElementById('sw-btn').innerText = 'Start';
      document.getElementById('sw-btn').classList.add('primary');
    }

    // Timer Logic
    let tmStart = 0;
    let tmDuration = 0;
    let tmRemaining = 0;
    let tmInterval = null;
    let tmRunning = false;

    function formatTm(ms) {
      if (ms < 0) ms = 0;
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
      const seconds = (totalSeconds % 60).toString().padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function updateTmDisplay() {
      const current = tmRunning ? tmDuration - (Date.now() - tmStart) : tmRemaining;
      if (current <= 0 && tmRunning) {
        clearInterval(tmInterval);
        tmRunning = false;
        document.getElementById('timer-display').innerText = "00:00";
        document.getElementById('tm-btn').innerText = 'Start';
        document.getElementById('tm-btn').classList.add('primary');
        alert("Timer Finished!");
      } else {
        document.getElementById('timer-display').innerText = formatTm(current);
      }
    }

    function toggleTimer() {
      if (tmRunning) {
        tmRemaining = tmDuration - (Date.now() - tmStart);
        clearInterval(tmInterval);
        tmRunning = false;
        document.getElementById('tm-btn').innerText = 'Resume';
        document.getElementById('tm-btn').classList.add('primary');
      } else {
        if (tmRemaining === 0) {
          const mins = parseInt(document.getElementById('timer-mins').value) || 0;
          let useMins = mins > 0 ? mins : 5;
          tmDuration = useMins * 60000;
          tmRemaining = tmDuration;
        } else {
          tmDuration = tmRemaining;
        }
        if (tmDuration > 0) {
          tmStart = Date.now();
          tmInterval = setInterval(updateTmDisplay, 50);
          tmRunning = true;
          document.getElementById('tm-btn').innerText = 'Pause';
          document.getElementById('tm-btn').classList.remove('primary');
        }
      }
    }

    function resetTimer() {
      tmRunning = false;
      clearInterval(tmInterval);
      tmRemaining = 0;
      document.getElementById('timer-display').innerText = "00:00";
      document.getElementById('tm-btn').innerText = 'Start';
      document.getElementById('tm-btn').classList.add('primary');
    }

    // Alarms Logic
    let alarms = [];
    
    function addAlarm() {
      const timeInput = document.getElementById('alarm-time').value;
      if (!timeInput) return;
      if (!alarms.some(a => a.time === timeInput)) {
        alarms.push({ time: timeInput, active: true, triggered: false });
        renderAlarms();
      }
    }
    
    function toggleAlarm(index) {
      alarms[index].active = !alarms[index].active;
      alarms[index].triggered = false;
      renderAlarms();
    }
    
    function deleteAlarm(index) {
      alarms.splice(index, 1);
      renderAlarms();
    }
    
    function renderAlarms() {
      const list = document.getElementById('alarm-list');
      list.innerHTML = '';
      alarms.sort((a,b) => a.time.localeCompare(b.time)).forEach((a, i) => {
        const div = document.createElement('div');
        div.style.display = 'flex';
        div.style.justifyContent = 'space-between';
        div.style.alignItems = 'center';
        div.style.padding = '8px 20px';
        div.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
        div.innerHTML = `
          <span style="font-weight:bold; font-size:18px; ${a.active ? '' : 'text-decoration:line-through; color:#888;'}">${a.time}</span>
          <div>
            <button style="padding:4px 8px; font-size:12px; margin-right:5px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:10px; cursor:pointer;" onclick="toggleAlarm(${i})">${a.active ? 'Disable' : 'Enable'}</button>
            <button style="padding:4px 8px; font-size:12px; background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:10px; cursor:pointer;" onclick="deleteAlarm(${i})">Delete</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function checkAlarms(now) {
      const hhmm = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      alarms.forEach(a => {
        if (a.active && a.time === hhmm && !a.triggered) {
          a.triggered = true;
          alert("Alarm! Time is " + a.time);
        }
        if (a.time !== hhmm) {
          a.triggered = false;
        }
      });
    }
  </script>
</body>
</html>

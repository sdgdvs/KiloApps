<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    background: #fdfdfd;
    color: #333;
    font-family: 'Georgia', serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    transition: background 0.3s, color 0.3s;
  }
  body.dark {
    background: #121212;
    color: #e0e0e0;
  }
  .toolbar {
    background: #eee;
    border-bottom: 1px solid #ddd;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  body.dark .toolbar {
    background: #1a1a1a;
    border-color: #333;
  }
  .toolbar-group {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button, label.btn {
    background: #fff;
    border: 1px solid #ccc;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
    transition: all 0.2s;
  }
  button:hover, label.btn:hover { background: #f0f0f0; }
  
  body.dark button, body.dark label.btn {
    background: #2a2a2a;
    border-color: #444;
    color: #e0e0e0;
  }
  body.dark button:hover, body.dark label.btn:hover { background: #3a3a3a; }
  
  .file-input { display: none; }
  
  .reader-container {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
    display: flex;
    justify-content: center;
    scroll-behavior: smooth;
  }
  .content {
    max-width: 800px;
    width: 100%;
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #888;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .empty-state p { margin-top: 10px; }
  
  .status-bar {
    background: #eee;
    border-top: 1px solid #ddd;
    padding: 5px 20px;
    font-size: 12px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: flex-end;
    gap: 20px;
  }
  body.dark .status-bar {
    background: #1a1a1a;
    border-color: #333;
    color: #aaa;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="toolbar-group">
      <label class="btn" tabindex="0" id="btnOpenLabel" aria-label="Open File" role="button">
        Open File
        <input type="file" id="fileInp" class="file-input" accept=".txt,.md,.csv,.log" tabindex="-1">
      </label>
      <button id="btnClear" aria-label="Clear Document">Clear</button>

    </div>
    <div class="toolbar-group">
      <button id="btnAUp" aria-label="Increase Font Size">A+</button>
      <button id="btnADown" aria-label="Decrease Font Size">A-</button>
      <button id="btnTheme" aria-label="Toggle Dark Mode">Dark Mode</button>

    </div>
  </div>
  
  <div class="reader-container" id="readerContainer" aria-live="polite">
    <div class="empty-state" id="emptyState">
      <h3>No Document Loaded</h3>
      <p>Open a text file to begin reading.</p>
    </div>
    <div class="content" id="textContent" style="display:none;"></div>
  </div>

  <div class="status-bar" id="statusBar" style="display:none;">
    <span id="statWords">Words: 0</span>
    <span id="statLines">Lines: 0</span>
    <span id="statChars">Chars: 0</span>
  </div>

  <script>
    const fileInp = document.getElementById('fileInp');
    const btnClear = document.getElementById('btnClear');
    const btnAUp = document.getElementById('btnAUp');
    const btnADown = document.getElementById('btnADown');
    const btnTheme = document.getElementById('btnTheme');
    
    const readerContainer = document.getElementById('readerContainer');
    const emptyState = document.getElementById('emptyState');
    const textContent = document.getElementById('textContent');
    const statusBar = document.getElementById('statusBar');
    const statWords = document.getElementById('statWords');
    const statLines = document.getElementById('statLines');
    const statChars = document.getElementById('statChars');

    let currentText = '';
    try { currentText = localStorage.getItem('kread_text') || ''; } catch(e) {}
    let currentScroll = 0;
    try { currentScroll = parseInt(localStorage.getItem('kread_scroll') || '0'); } catch(e) {}
    let fontSize = 18;
    try { fontSize = parseInt(localStorage.getItem('kread_fontsize') || '18'); } catch(e) {}
    let isDark = false;
    try { isDark = localStorage.getItem('kread_dark') === 'true'; } catch(e) {}

    const btnOpenLabel = document.getElementById('btnOpenLabel');
    btnOpenLabel.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInp.click();
      }
    });

    function safeSetItem(k, v) {
      try { localStorage.setItem(k, v); } catch(e) { console.warn("Storage full", e); }
    }


    function updateStats() {
      if (!currentText) return;
      const chars = currentText.length;
      const lines = chars > 0 ? currentText.split(/\r\n|\r|\n/).length : 0;
      const words = chars > 0 ? (currentText.match(/\S+/g) || []).length : 0;
      statChars.textContent = `Chars: ${chars}`;
      statLines.textContent = `Lines: ${lines}`;
      statWords.textContent = `Words: ${words}`;
    }

    function applyState() {
      textContent.style.fontSize = fontSize + 'px';
      if (isDark) document.body.classList.add('dark');
      else document.body.classList.remove('dark');
      
      if (currentText) {
        emptyState.style.display = 'none';
        textContent.style.display = 'block';
        statusBar.style.display = 'flex';
        textContent.textContent = currentText;
        updateStats();
        setTimeout(() => readerContainer.scrollTop = currentScroll, 10);
      } else {
        emptyState.style.display = 'flex';
        textContent.style.display = 'none';
        statusBar.style.display = 'none';
      }
    }

    fileInp.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        currentText = ev.target.result;
        currentScroll = 0;
        safeSetItem('kread_text', currentText);
        safeSetItem('kread_scroll', '0');
        applyState();
      };
      reader.readAsText(file);
      fileInp.value = '';
    });

    btnClear.onclick = () => {
      currentText = '';
      currentScroll = 0;
      try { localStorage.removeItem('kread_text'); } catch(e) {}
      safeSetItem('kread_scroll', '0');
      applyState();
    };

    btnAUp.onclick = () => {
      fontSize = Math.min(fontSize + 2, 48);
      safeSetItem('kread_fontsize', fontSize);
      applyState();
    };

    btnADown.onclick = () => {
      fontSize = Math.max(fontSize - 2, 12);
      safeSetItem('kread_fontsize', fontSize);
      applyState();
    };

    btnTheme.onclick = () => {
      isDark = !isDark;
      safeSetItem('kread_dark', isDark);
      applyState();
    };

    let scrollTimeout;
    readerContainer.onscroll = () => {
      if (scrollTimeout) clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        if (currentText) {
          safeSetItem('kread_scroll', readerContainer.scrollTop);
        }
      }, 500);
    };

    applyState();
  </script>
</body>
</html>

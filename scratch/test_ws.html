<!DOCTYPE html>
<html>
<body>
<div id="output"></div>
<script>
function log(msg) { document.getElementById('output').innerHTML += msg + '<br>'; }
log('Starting...');
try {
    const ws = new WebSocket('wss://proxy-us.ftelnet.ca:2083', ['telnet', 'telehack.com', '23']);
    ws.onopen = () => { log('Connected with subprotocols!'); ws.send('help\r\n'); };
    ws.onmessage = (e) => { log('Received: ' + (typeof e.data === 'string' ? e.data : 'binary data')); };
    ws.onerror = (e) => { log('Error with subprotocols.'); };
} catch (err) {
    log('Exception: ' + err.message);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFont</title>
    <style>
        :root {
            --bg-base: #121212;
            --bg-glass: rgba(30, 30, 30, 0.7);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #e0e0e0;
            --text-muted: #9e9e9e;
            --accent: #bb86fc;
            --accent-hover: #9c27b0;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            gap: 20px;
        }

        .sidebar {
            flex: 1;
            max-width: 200px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin: 0 0 10px 5px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .font-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex: 1;
        }

        /* Custom Scrollbar */
        .font-list::-webkit-scrollbar {
            width: 6px;
        }
        .font-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .font-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }

        .font-item {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 14px;
        }

        .font-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .font-item.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 2px 8px rgba(187, 134, 252, 0.4);
        }

        .main-content {
            flex: 2;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .sample-text {
            font-size: 24px;
            line-height: 1.5;
            transition: opacity 0.3s ease, transform 0.3s ease;
            max-width: 90%;
            word-wrap: break-word;
        }

        .sample-text.animate {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .font-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-glass);
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <h2>System Fonts</h2>
            <ul class="font-list" id="fontList">
                <!-- Populated by JS -->
            </ul>
        </div>
        <div class="main-content">
            <div class="sample-text" id="sampleText">
                The quick brown fox jumps over the lazy dog.<br><br>
                0123456789<br><br>
                Aa Bb Cc Dd Ee Ff
            </div>
            <div class="font-info" id="fontInfo">Segoe UI</div>
        </div>
    </div>

    <script>
        const fonts = [
            "Arial", "Arial Black", "Comic Sans MS", "Courier New", 
            "Georgia", "Impact", "Lucida Console", "Lucida Sans Unicode", 
            "Palatino Linotype", "Segoe UI", "Tahoma", "Times New Roman", 
            "Trebuchet MS", "Verdana", "Consolas", "Symbol", "Webdings", 
            "Wingdings"
        ];

        const fontListEl = document.getElementById('fontList');
        const sampleTextEl = document.getElementById('sampleText');
        const fontInfoEl = document.getElementById('fontInfo');

        function init() {
            fonts.sort().forEach((font, index) => {
                const li = document.createElement('li');
                li.className = 'font-item';
                li.textContent = font;
                li.style.fontFamily = font;
                
                if (font === 'Segoe UI' || (index === 0 && !fonts.includes('Segoe UI'))) {
                    li.classList.add('active');
                    selectFont(font);
                }

                li.addEventListener('click', () => {
                    document.querySelectorAll('.font-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    selectFont(font);
                });

                fontListEl.appendChild(li);
            });
        }

        function selectFont(fontName) {
            // Re-trigger animation
            sampleTextEl.classList.remove('animate');
            void sampleTextEl.offsetWidth; // trigger reflow
            
            sampleTextEl.style.fontFamily = fontName;
            fontInfoEl.textContent = fontName;
            
            sampleTextEl.classList.add('animate');
        }

        init();
    </script>
</body>
</html>
